<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Personal - Protección Patrimonial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    
    <!-- Importar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importar Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#fef2f2', 100: '#fee2e2', 200: '#fecaca', 300: '#fca5a5', 400: '#f87171',
                            500: '#dc2626', 600: '#b91c1c', 700:'#991b1b', 800:'#7f1d1d', 900:'#450a0a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        .form-section-title {
            grid-column: 1 / -1;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        .form-input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            transition: all 0.2s;
            background-color: #f8fafc;
        }
        .form-input:focus {
            background-color: #ffffff;
            border-color: #dc2626;
            outline: none;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen py-10 px-4">

    <!-- Header y Botón Volver -->
    <div class="max-w-5xl mx-auto mb-6 flex justify-between items-center">
        <a href="login.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 transition-colors font-bold text-sm group">
            <div class="w-8 h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center shadow-sm group-hover:border-brand-200 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <span>Cancelar y Volver</span>
        </a>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-br from-brand-600 to-brand-800 rounded-lg flex items-center justify-center text-white text-sm shadow-md">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <span class="font-bold text-slate-700">Alta de Personal</span>
        </div>
    </div>

    <!-- Tarjeta de Registro -->
    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden relative">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-brand-600 to-brand-400"></div>

        <form id="formRegistro" onsubmit="return RegistrarUsuario(event)" class="p-8 sm:p-10">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900">Crear Nuevo Expediente</h1>
                <p class="text-slate-400 text-sm mt-1" id="step-description">Paso 1: Configuración de Acceso</p>
                
                <!-- Indicador de Pasos -->
                <div class="flex justify-center gap-2 mt-4">
                    <div id="dot-step1" class="w-3 h-3 rounded-full bg-brand-600 transition-colors"></div>
                    <div id="dot-step2" class="w-3 h-3 rounded-full bg-slate-200 transition-colors"></div>
                </div>
            </div>

            <!-- === PASO 1: USUARIO Y CONTRASEÑA === -->
            <div id="step1-container" class="max-w-md mx-auto animate-fade-in">
                <div class="space-y-6">
                    <div>
                        <label class="input-label">Nombre de Usuario</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <input type="text" id="regUsuario" class="form-input pl-10" placeholder="Ej. juan.perez" required>
                        </div>
                        <p class="text-xs text-slate-400 mt-1">Este será tu ID para iniciar sesión en el sistema.</p>
                    </div>

                    <div>
                        <label class="input-label">Contraseña</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <i class="fa-solid fa-lock"></i>
                            </div>
                            <input type="password" id="regPassword" class="form-input pl-10" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div>
                        <label class="input-label">Confirmar Contraseña</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <i class="fa-solid fa-check-double"></i>
                            </div>
                            <input type="password" id="regConfirmPassword" class="form-input pl-10" placeholder="••••••••" required>
                        </div>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-100 flex justify-end">
                    <button type="button" onclick="nextStep()" class="px-8 py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl shadow-lg shadow-brand-500/20 transition-all active:scale-95 flex items-center gap-2">
                        Continuar <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- === PASO 2: DATOS DEL EXPEDIENTE (Oculto inicialmente) === -->
            <div id="step2-container" class="hidden animate-fade-in">
                
                <!-- GRID DE CAMPOS -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4">

                    <!-- === SECCIÓN: DATOS PERSONALES === -->
                    <div class="form-section-title mt-0">Datos Personales</div>

                    <div class="lg:col-span-2">
                        <label class="input-label">Nombre Completo</label>
                        <input type="text" class="form-input" placeholder="Apellido Paterno, Materno, Nombres" required>
                    </div>

                    <div>
                        <label class="input-label">Fecha de Nacimiento</label>
                        <input type="date" class="form-input" onchange="calcularEdad(this.value)" required>
                    </div>

                    <div>
                        <label class="input-label">Edad</label>
                        <input type="number" id="edadCalculada" class="form-input bg-slate-100 text-slate-500" readonly placeholder="Auto">
                    </div>

                    <div>
                        <label class="input-label">Sexo</label>
                        <select class="form-input">
                            <option value="">Seleccionar...</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                            <option value="X">Otro</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Estado Civil</label>
                        <select class="form-input">
                            <option value="">Seleccionar...</option>
                            <option value="Soltero">Soltero(a)</option>
                            <option value="Casado">Casado(a)</option>
                            <option value="Divorciado">Divorciado(a)</option>
                            <option value="Viudo">Viudo(a)</option>
                            <option value="Union">Unión Libre</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Lugar de Nacimiento</label>
                        <input type="text" class="form-input" placeholder="Estado / Ciudad">
                    </div>

                    <div class="lg:col-span-2">
                        <label class="input-label">Domicilio Actual</label>
                        <input type="text" class="form-input" placeholder="Calle, Número, Colonia, CP, Ciudad">
                    </div>

                    <!-- === SECCIÓN: DATOS FAMILIARES === -->
                    <div class="form-section-title">Datos Familiares</div>

                    <div>
                        <label class="input-label">¿Tiene Hijos?</label>
                        <select class="form-input" onchange="toggleHijos(this.value)">
                            <option value="No">No</option>
                            <option value="Si">Sí</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Cantidad de Hijos</label>
                        <input type="number" id="inputHijos" class="form-input" placeholder="0" disabled>
                    </div>

                    <!-- === SECCIÓN: CONTACTO Y SALUD === -->
                    <div class="form-section-title">Contacto y Salud</div>

                    <div>
                        <label class="input-label">Número de Celular</label>
                        <input type="tel" class="form-input" placeholder="(000) 000-0000" required>
                    </div>

                    <div>
                        <label class="input-label">Correo Electrónico</label>
                        <input type="email" class="form-input" placeholder="ejemplo@correo.com">
                    </div>

                    <div>
                        <label class="input-label">Contacto de Emergencia</label>
                        <input type="tel" class="form-input" placeholder="Nombre y Teléfono">
                    </div>

                    <div class="lg:col-span-3">
                        <label class="input-label">Alergias a Medicamentos</label>
                        <input type="text" class="form-input" placeholder="Especifique o escriba 'Ninguna'">
                    </div>

                    <!-- === SECCIÓN: DATOS LABORALES === -->
                    <div class="form-section-title">Información Laboral</div>

                    <div>
                        <label class="input-label">Número de Empleado</label>
                        <input type="text" class="form-input font-bold" placeholder="ID de Nómina" required>
                    </div>

                    <div>
                        <label class="input-label">Número de Seguro Social (NSS)</label>
                        <input type="text" class="form-input" placeholder="11 Dígitos">
                    </div>

                    <div>
                        <label class="input-label">Fecha de Ingreso</label>
                        <input type="date" class="form-input" required>
                    </div>

                    <div>
                        <label class="input-label">Compañía</label>
                        <input type="text" class="form-input" placeholder="Razón Social">
                    </div>

                    <div>
                        <label class="input-label">Puesto</label>
                        <input type="text" class="form-input" placeholder="Cargo asignado">
                    </div>

                    <div>
                        <label class="input-label">Predio / Ubicación</label>
                        <input type="text" class="form-input" placeholder="Lugar de trabajo asignado">
                    </div>

                    <div>
                        <label class="input-label">Estatus</label>
                        <select class="form-input bg-green-50 text-green-700 border-green-200">
                            <option value="Activo" selected>Activo</option>
                            <option value="Baja">Baja</option>
                            <option value="Incapacitado">Incapacitado</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Fecha de Baja</label>
                        <input type="date" class="form-input" disabled>
                    </div>

                    <!-- === SECCIÓN: PERFIL PROFESIONAL === -->
                    <div class="form-section-title">Perfil Profesional</div>

                    <div>
                        <label class="input-label">Escolaridad Máxima</label>
                        <select class="form-input">
                            <option value="">Seleccionar...</option>
                            <option value="Secundaria">Secundaria</option>
                            <option value="Preparatoria">Preparatoria / Bachillerato</option>
                            <option value="Tecnico">Técnico</option>
                            <option value="Licenciatura">Licenciatura / Ingeniería</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Tiempo de Experiencia</label>
                        <input type="text" class="form-input" placeholder="Ej. 2 años en seguridad">
                    </div>

                    <div class="lg:col-span-3">
                        <label class="input-label">Cursos Básicos (Paquetería Office, etc.)</label>
                        <textarea class="form-input" rows="2" placeholder="Listar cursos..."></textarea>
                    </div>

                    <div class="lg:col-span-3">
                        <label class="input-label">Cursos Avanzados (Área de Seguridad)</label>
                        <textarea class="form-input" rows="2" placeholder="Cursos especializados..."></textarea>
                    </div>

                    <!-- === SECCIÓN: FOTOGRAFÍA === -->
                    <div class="form-section-title">Fotografía</div>

                    <div class="lg:col-span-3 space-y-4">
                        <!-- Contenedor Principal de Foto -->
                        <div id="photo-upload-area" class="flex flex-col items-center justify-center w-full">
                            <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-40 border-2 border-slate-300 border-dashed rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100 hover:border-brand-300 transition-colors relative overflow-hidden group">
                                <!-- Previsualización de Imagen -->
                                <img id="photo-preview" class="absolute inset-0 w-full h-full object-contain hidden p-2 z-10 bg-white">
                                
                                <!-- Placeholder de Carga -->
                                <div id="upload-placeholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 mb-3 group-hover:text-brand-400 transition-colors"></i>
                                    <p class="text-sm text-slate-500"><span class="font-bold">Clic para subir</span> o arrastra la foto</p>
                                    <p class="text-xs text-slate-400 mt-1">SVG, PNG, JPG (MAX. 2MB)</p>
                                </div>
                                <input id="dropzone-file" type="file" class="hidden" accept="image/*" onchange="previewImage(this)" />
                            </label>
                            
                            <!-- Separador -->
                            <div class="w-full flex items-center justify-center mt-3 mb-1 relative">
                                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                                <span class="relative px-2 bg-white text-xs text-slate-400 font-bold uppercase">O también</span>
                            </div>

                            <!-- Botón de Cámara -->
                            <button type="button" onclick="startCamera()" class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 border border-slate-200 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-colors shadow-sm">
                                <i class="fa-solid fa-camera"></i> Tomar Foto desde Dispositivo
                            </button>
                        </div>

                        <!-- Interfaz de Cámara (Oculta por defecto) -->
                        <div id="camera-container" class="hidden flex-col items-center gap-3 bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-lg">
                            <div class="relative w-full max-w-sm aspect-[4/3] bg-black rounded-lg overflow-hidden border-2 border-slate-700">
                                <video id="camera-feed" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1]"></video>
                                <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-50">
                                    <i class="fa-regular fa-face-smile text-6xl text-white/50"></i>
                                </div>
                            </div>
                            <div class="flex gap-3 w-full max-w-sm">
                                <button type="button" onclick="capturePhoto()" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white py-2.5 rounded-lg font-bold shadow-md transition-colors flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-camera-retro"></i> Capturar
                                </button>
                                <button type="button" onclick="stopCamera()" class="px-4 py-2.5 bg-slate-700 hover:bg-slate-600 text-white border border-slate-600 rounded-lg font-bold transition-colors">
                                    Cancelar
                                </button>
                            </div>
                        </div>
                        
                        <!-- Canvas oculto para procesar la captura -->
                        <canvas id="photo-canvas" class="hidden"></canvas>
                    </div>

                </div>

                <!-- Botones de Acción Paso 2 -->
                <div class="mt-8 pt-6 border-t border-slate-200 flex gap-4 justify-end">
                    <button type="button" onclick="prevStep()" class="px-6 py-3 bg-white border border-slate-300 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Atrás
                    </button>
                    <button type="submit" class="px-8 py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl shadow-lg shadow-brand-500/20 transition-all transform active:scale-95 flex items-center gap-2">
                        <i class="fa-solid fa-save"></i>
                        Guardar Expediente
                    </button>
                </div>
            </div>

        </form>
    </div>

    <script>
        function toggleHijos(valor) {
            const input = document.getElementById('inputHijos');
            input.disabled = valor !== 'Si';
            if(valor !== 'Si') input.value = '';
        }

        function calcularEdad(fechaNac) {
            if(!fechaNac) return;
            const hoy = new Date();
            const nacimiento = new Date(fechaNac);
            let edad = hoy.getFullYear() - nacimiento.getFullYear();
            const mes = hoy.getMonth() - nacimiento.getMonth();
            if (mes < 0 || (mes === 0 && hoy.getDate() < nacimiento.getDate())) {
                edad--;
            }
            document.getElementById('edadCalculada').value = edad;
        }

        // --- LÓGICA DE NAVEGACIÓN ENTRE PASOS ---
        function nextStep() {
            const user = document.getElementById('regUsuario').value;
            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;

            if(!user || !pass || !confirm) {
                alert("Por favor completa todos los campos de configuración de cuenta.");
                return;
            }

            if(pass !== confirm) {
                alert("Las contraseñas no coinciden. Por favor verifica.");
                return;
            }

            // Cambiar a Paso 2
            document.getElementById('step1-container').classList.add('hidden');
            document.getElementById('step2-container').classList.remove('hidden');
            
            // Actualizar indicadores visuales
            document.getElementById('step-description').textContent = "Paso 2: Información del Expediente";
            document.getElementById('dot-step1').classList.replace('bg-brand-600', 'bg-slate-200');
            document.getElementById('dot-step2').classList.replace('bg-slate-200', 'bg-brand-600');
            
            window.scrollTo(0, 0);
        }

        function prevStep() {
            // Regresar a Paso 1
            document.getElementById('step2-container').classList.add('hidden');
            document.getElementById('step1-container').classList.remove('hidden');
            
            // Actualizar indicadores
            document.getElementById('step-description').textContent = "Paso 1: Configuración de Acceso";
            document.getElementById('dot-step2').classList.replace('bg-brand-600', 'bg-slate-200');
            document.getElementById('dot-step1').classList.replace('bg-slate-200', 'bg-brand-600');
            
            window.scrollTo(0, 0);
        }

        // --- LÓGICA DE FOTO Y CÁMARA ---
        let videoStream = null;

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photo-preview');
                    const placeholder = document.getElementById('upload-placeholder');
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('opacity-0'); 
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function startCamera() {
            const uploadArea = document.getElementById('photo-upload-area');
            const cameraContainer = document.getElementById('camera-container');
            const video = document.getElementById('camera-feed');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = videoStream;
                
                uploadArea.classList.add('hidden');
                cameraContainer.classList.remove('hidden');
                cameraContainer.classList.add('flex');
            } catch (err) {
                console.error("Error al acceder a la cámara:", err);
                alert("No se pudo acceder a la cámara. Por favor verifica los permisos o usa la opción de subir archivo.");
            }
        }

        function stopCamera() {
            const uploadArea = document.getElementById('photo-upload-area');
            const cameraContainer = document.getElementById('camera-container');
            const video = document.getElementById('camera-feed');

            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            video.srcObject = null;

            cameraContainer.classList.add('hidden');
            cameraContainer.classList.remove('flex');
            uploadArea.classList.remove('hidden');
        }

        function capturePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('photo-canvas');
            const preview = document.getElementById('photo-preview');
            const placeholder = document.getElementById('upload-placeholder');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const context = canvas.getContext('2d');
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL('image/jpeg');
            preview.src = dataUrl;
            preview.classList.remove('hidden');
            placeholder.classList.add('opacity-0');

            stopCamera();
        }

        function RegistrarUsuario(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Guardando...';

            setTimeout(() => {
                alert('Expediente guardado exitosamente. (Simulación)');
                // Aquí iría la lógica para enviar a la base de datos o localStorage
                btn.disabled = false;
                btn.innerHTML = originalContent;
                // window.location.href = 'login.html';
            }, 1500);
            
            return false;
        }
    </script>
</body>
</html>
