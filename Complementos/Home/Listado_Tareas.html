<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .task-card { transition: all 0.2s ease; cursor: pointer; }
        .task-card:hover { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col border-r border-gray-100">

    <div class="p-4 border-b bg-gray-50">
        <h2 class="text-lg font-bold text-blue-800">Tareas del Día</h2>
        <p id="statusMsg" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Conectando a Firebase...</p>
    </div>

    <div id="listContainer" class="flex-grow overflow-y-auto p-3 space-y-2 custom-scroll">
        <!-- Las tareas se cargarán aquí -->
        <div class="flex items-center justify-center h-full">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN DE FIREBASE
        let firebaseConfig;
        try {
            // Intentamos importar del script relativo al shell si es posible
            const module = await import('../../script.js');
            firebaseConfig = module.firebaseConfig;
        } catch (e) {
            // Fallback para previsualización
            firebaseConfig = JSON.parse(window.parent.__firebase_config || '{}');
        }

        const appId = window.parent.__app_id || 'default-app-id';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. Verificación de Seguridad (No se admiten anónimos)
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                document.getElementById('statusMsg').innerText = "Sincronizado en tiempo real";
                startListening();
            } else {
                document.getElementById('listContainer').innerHTML = `
                    <div class="p-6 text-center text-red-500 text-xs italic">
                        Acceso denegado. Se requiere sesión activa.
                    </div>
                `;
            }
        });

        // 2. Escuchar cambios en Firestore
        function startListening() {
            // Ruta obligatoria: /artifacts/{appId}/public/data/{collectionName}
            const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tareas');
            
            // Usamos onSnapshot para actualizaciones en tiempo real
            onSnapshot(tasksRef, (snapshot) => {
                const tareas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTasks(tareas);
            }, (error) => {
                console.error("Error Firestore:", error);
                document.getElementById('listContainer').innerHTML = `<p class="text-xs text-red-400 p-4">Error al cargar datos.</p>`;
            });
        }

        // 3. Renderizado de UI
        function renderTasks(tareas) {
            const container = document.getElementById('listContainer');
            
            if (tareas.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 text-xs py-10 italic">No hay tareas pendientes.</p>`;
                return;
            }

            // Ordenar por hora (formato HH:mm)
            tareas.sort((a, b) => (a.hora || '').localeCompare(b.hora || ''));

            container.innerHTML = '';
            tareas.forEach(tarea => {
                const card = document.createElement('div');
                card.className = "task-card p-3 border border-gray-100 rounded-xl shadow-sm bg-white animate-fade-in";
                card.onclick = () => selectTask(tarea.id);
                card.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded self-start">${tarea.hora || '--:--'}</span>
                        <h4 class="font-bold text-gray-700 text-sm mt-1">${tarea.titulo || 'Sin título'}</h4>
                        <p class="text-[10px] text-gray-400 truncate mt-0.5">${tarea.desc || ''}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 4. Comunicación con el Shell
        function selectTask(id) {
            window.parent.postMessage({
                type: 'TASK_SELECTED',
                payload: { id: id }
            }, '*');
        }

        // Escuchar comandos del Shell
        window.addEventListener('message', (event) => {
            if (event.data.type === 'SELECT_ALL') {
                console.log("Comando recibido: Seleccionar todas");
            }
        });
    </script>
</body>
</html>
