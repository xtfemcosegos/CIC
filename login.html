<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Protección Patrimonial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    
    <!-- Importar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importar Iconos (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Configuración de Tema -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#fef2f2', 100: '#fee2e2', 200: '#fecaca', 300: '#fca5a5', 400: '#f87171',
                            500: '#dc2626', 600: '#b91c1c', 700:'#991b1b', 800:'#7f1d1d', 900:'#450a0a'
                        }
                    },
                    animation: { 'fade-in': 'fadeIn 0.5s ease-out forwards' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Botón Volver -->
    <div class="absolute top-6 left-6">
        <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-brand-600 transition-colors font-bold text-sm group">
            <div class="w-8 h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center shadow-sm group-hover:border-brand-200 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <span class="hidden sm:inline">Volver al Inicio</span>
        </a>
    </div>

    <!-- Tarjeta de Login -->
    <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-xl border border-slate-200 w-full max-w-sm animate-fade-in relative overflow-hidden">
        
        <!-- Decoración Superior -->
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-brand-600 to-brand-400"></div>

        <!-- Logo / Marca -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-brand-600 to-brand-800 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-500/20 mx-auto mb-5 text-3xl transform hover:scale-105 transition-transform duration-300">
                <i class="fa-solid fa-shield-cat"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">¡Hola de nuevo!</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Accede a tu cuenta institucional</p>
        </div>

        <!-- Formulario -->
        <form id="formLogin" onsubmit="return IniciarSesion(event)" class="space-y-5">
            
            <!-- Usuario -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1 tracking-wider">Usuario / ID</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <input type="text" id="usuario" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all font-semibold text-slate-700 placeholder-slate-400" placeholder="Ingresa tu usuario" required>
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1 tracking-wider">Contraseña</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="contraseña" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all font-semibold text-slate-700 placeholder-slate-400" placeholder="••••••••" required>
                </div>
                <div class="text-right mt-2">
                    <a href="#" class="text-xs font-medium text-slate-400 hover:text-brand-600 transition-colors">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <!-- Botones -->
            <div class="pt-2 space-y-3">
                <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
                    <span>Iniciar Sesión</span>
                    <i class="fa-solid fa-arrow-right-long group-hover:translate-x-1 transition-transform"></i>
                </button>
                
                <button type="button" onclick="location.href='register.html'" class="w-full bg-white border-2 border-slate-100 hover:border-slate-300 text-slate-600 font-bold py-3.5 rounded-xl transition-all active:scale-[0.98]">
                    Crear Cuenta
                </button>
            </div>

        </form>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center">
        <p class="text-xs text-slate-400 font-medium">© 2024 Protección Patrimonial</p>
    </div>

    <!-- Lógica (Placeholder para integración futura) -->
    <!-- Mantengo tu referencia original, pero añado un fallback por si el archivo no existe aún -->
    <script src="Scripts/Principal.js?v=0.1.3" onerror="console.warn('Script Principal.js no encontrado, usando lógica local temporal.')"></script>
    
    <script>
        // Función wrapper local para evitar errores si Principal.js no está listo
        function IniciarSesion(e) {
            e.preventDefault();
            
            // Si la función original existe (cargada desde Principal.js), úsala
            if (typeof window.OriginalIniciarSesion === 'function') {
                return window.OriginalIniciarSesion(e);
            }

            // --- LÓGICA TEMPORAL VISUAL ---
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            const user = document.getElementById('usuario').value;
            
            // Estado de carga
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Validando...';
            
            setTimeout(() => {
                // Aquí conectarás tu lógica real más adelante
                console.log(`Intento de login para: ${user}`);
                alert(`¡Bienvenido, ${user}! (Lógica pendiente de ajuste)`);
                
                // Redirigir al dashboard como ejemplo de éxito
                // window.location.href = 'index.html'; 
                
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }, 1500);
            
            return false;
        }
    </script>
</body>
</html>
