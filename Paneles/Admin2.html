<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel 2.0 - CIC 7.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
        }

        .transition-all-custom {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Ocultar scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animación de pestañas activas */
        .tab-active {
            filter: brightness(1.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
            z-index: 20;
        }

        /* Contenedores de aplicaciones */
        .app-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: scale(0.98);
        }
        .app-iframe.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
            transform: scale(1);
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Contenedor de Pestañas -->
    <nav id="tabsContainer" class="relative z-50 bg-slate-950 flex items-center px-6 pt-3 pb-0 gap-4 transition-all-custom overflow-x-auto no-scrollbar border-b border-white/5">
        
        <!-- Botón Cajón de Aplicaciones (Rendija Blanca) -->
        <button onclick="openExternalUrl('Nav2.html')" class="p-2 mb-2 hover:bg-white/10 rounded-xl transition-all group shrink-0" title="Cajón de Aplicaciones">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
        </button>

        <!-- Lista de Pestañas Dinámicas -->
        <div id="tabsList" class="flex gap-1 items-end">
            <!-- Las pestañas se generan por JS -->
        </div>
    </nav>

    <!-- Área Principal (Multi-Iframe) -->
    <main id="appContainer" class="flex-1 bg-black relative overflow-hidden">
        <!-- Los iframes se inyectarán aquí -->
    </main>

    <script>
        // Ajuste de rutas relativas considerando que estamos en Paneles/
        const apps = [
            { id: 'home', name: 'Inicio', url: '../Apps/Home.html', icon: '../MM/Logo.png', color: '#3b82f6' },
            { id: 'asistencia', name: 'Asistencia', url: '../Apps/RegAs.html', icon: '../MM/RegAs.png', color: '#10b981' },
            { id: 'usuarios', name: 'Usuarios', url: '../Apps/RegUs.html', icon: '../MM/RegUs.png', color: '#6366f1' },
            { id: 'siniestros', name: 'Siniestros', url: '../Apps/RegSin.html', icon: '../MM/RegSin.png', color: '#f43f5e' },
            { id: 'inventario', name: 'Inventario', url: '../Apps/RegIn.html', icon: '../MM/RegIn.png', color: '#f59e0b' },
            { id: 'marbetes', name: 'Marbetes', url: '../Apps/Marbetes.html', icon: '../MM/RegMa.png', color: '#a855f7' },
            { id: 'rondines', name: 'Rondines', url: '../Apps/Bitacora_Rondinero.html', icon: '../MM/Bitácora.png', color: '#06b6d4' }
        ];

        let currentId = 'home';

        function initSystem() {
            const list = document.getElementById('tabsList');
            const container = document.getElementById('appContainer');
            
            list.innerHTML = '';
            container.innerHTML = '';

            apps.forEach(app => {
                // 1. Crear Pestaña
                const btn = document.createElement('button');
                btn.id = `tab-${app.id}`;
                btn.className = `flex items-center gap-2 px-5 py-3 rounded-t-xl transition-all-custom border-t-2 border-transparent group shrink-0 relative overflow-hidden`;
                btn.style.backgroundColor = `rgba(15, 23, 42, 0.5)`;
                
                btn.onclick = () => loadApp(app.id);
                btn.innerHTML = `
                    <div class="absolute inset-0 opacity-0 group-hover:opacity-10 transition-opacity" style="background-color: ${app.color}"></div>
                    <img src="${app.icon}" alt="" class="h-4 w-4 object-contain relative z-10" onerror="this.src='https://via.placeholder.com/20?text=?';">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-500 group-hover:text-slate-200 transition-colors relative z-10">${app.name}</span>
                `;
                list.appendChild(btn);

                // 2. Crear Iframe
                const iframe = document.createElement('iframe');
                iframe.id = `iframe-${app.id}`;
                iframe.src = app.url;
                iframe.className = 'app-iframe';
                iframe.loading = "lazy";
                container.appendChild(iframe);
            });

            // Carga inicial
            setTimeout(() => {
                loadApp('home');
            }, 100);
        }

        /**
         * Activa la aplicación seleccionada cambiando visibilidad de iframes
         */
        function loadApp(id) {
            currentId = id;
            
            apps.forEach(app => {
                const btn = document.getElementById(`tab-${app.id}`);
                const iframe = document.getElementById(`iframe-${app.id}`);
                const label = btn.querySelector('span');

                if (app.id === id) {
                    btn.classList.add('tab-active');
                    btn.style.backgroundColor = `${app.color}20`;
                    btn.style.borderTopColor = app.color;
                    label.style.color = 'white';
                    iframe.classList.add('active');
                } else {
                    btn.classList.remove('tab-active');
                    btn.style.backgroundColor = `rgba(15, 23, 42, 0.5)`;
                    btn.style.borderTopColor = 'transparent';
                    label.style.color = '';
                    iframe.classList.remove('active');
                }
            });
        }

        /**
         * Carga una URL externa en el iframe que esté activo en ese momento
         */
        function openExternalUrl(url) {
            const activeIframe = document.querySelector('.app-iframe.active');
            if (activeIframe) {
                activeIframe.src = url;
            }
        }

        // Escuchar mensajes de aplicaciones hijas
        window.addEventListener('message', (event) => {
            if (event.data.action === 'toggleMenu') {
                openExternalUrl('Nav2.html');
            } else if (event.data.action === 'selectApp') {
                // Al seleccionar una app en el Nav, primero restauramos el iframe actual a su url original
                const activeApp = apps.find(a => a.id === currentId);
                const activeIframe = document.querySelector('.app-iframe.active');
                if (activeIframe && activeApp) {
                    activeIframe.src = activeApp.url;
                }
                // Cambiamos a la aplicación seleccionada
                loadApp(event.data.id);
            } else if (event.data.action === 'closeMenu') {
                // Restaurar el iframe actual si solo se quiere cerrar el menú
                const activeApp = apps.find(a => a.id === currentId);
                const activeIframe = document.querySelector('.app-iframe.active');
                if (activeIframe && activeApp) {
                    activeIframe.src = activeApp.url;
                }
            }
        });

        if (document.readyState === 'complete') {
            initSystem();
        } else {
            window.addEventListener('load', initSystem);
        }
    </script>
</body>
</html>
