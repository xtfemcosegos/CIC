<!-- Contenedor principal de la navegación -->
<div class="flex flex-col h-full bg-slate-50 select-none">
    <div class="p-6 space-y-8 flex-1 overflow-y-auto custom-scrollbar">
        
        <!-- SECCIÓN DE APLICACIONES FIJAS -->
        <section id="nav-apps-container">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1 mb-3">Módulos CIC</p>
            <div id="apps-grid" class="grid grid-cols-3 gap-2">
                <!-- Se genera vía JS -->
            </div>
        </section>

        <!-- SECCIÓN DE BUSCADOR -->
        <section id="nav-search-area" class="pt-4 border-t border-slate-200">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-red-800 transition-colors text-sm"></i>
                <input type="text" placeholder="Buscar..." class="w-full bg-white border border-slate-200 p-4 pl-12 rounded-2xl text-xs font-bold outline-none focus:border-red-800 shadow-sm transition-all placeholder:text-slate-300">
            </div>
        </section>
    </div>

    <!-- SECCIÓN CONTEXTUAL -->
    <section id="nav-module-tools" class="bg-white border-t border-slate-200 mt-auto shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.05)]">
        <div class="px-6 py-4 bg-slate-50/50 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 bg-red-800 rounded-full animate-pulse"></div>
                <h4 id="module-tool-title" class="text-[9px] font-black uppercase tracking-[0.15em] text-slate-500">Módulo Activo</h4>
            </div>
            <i class="fa-solid fa-microchip text-[10px] text-slate-300"></i>
        </div>
        
        <div id="module-tool-body" class="p-6 min-h-[180px]">
            <div id="context-default" class="flex flex-col items-center justify-center opacity-30 py-10 text-center space-y-3">
                <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-layer-group text-slate-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-black uppercase tracking-widest leading-tight text-slate-500">Seleccione un módulo<br>para operar</p>
            </div>
        </div>
    </section>
</div>

<script>
    (function() {
        const appsList = [
            { id: 'regas', label: 'RegAs', icon: 'fa-user-clock', color: 'blue' },
            { id: 'marbetes', label: 'Marbetes', icon: 'fa-car', color: 'amber' },
            { id: 'siniestros', label: 'Siniestros', icon: 'fa-triangle-exclamation', color: 'rose' }
        ];

        let selectedAppId = null;

        function renderApps() {
            const grid = document.getElementById('apps-grid');
            if (!grid) return;
            grid.innerHTML = '';
            appsList.forEach((app) => {
                const isSelected = app.id === selectedAppId;
                const btn = document.createElement('button');
                let bgClass = isSelected ? 'border-red-800 ring-2 ring-red-800/10 bg-white shadow-lg z-10 scale-[1.02]' : 'border-white bg-white shadow-sm hover:shadow-md';
                if (app.id === 'siniestros' && !isSelected) bgClass = 'bg-rose-600 border-rose-700 text-white shadow-sm hover:bg-rose-700';
                btn.className = `flex flex-col items-center justify-center p-3 border rounded-2xl transition-all duration-300 group ${bgClass}`;
                btn.onclick = () => selectApp(app.id);
                const iconWrapper = document.createElement('div');
                let iconColor = isSelected ? 'text-red-800' : 'text-slate-400';
                let iconBg = isSelected ? 'bg-red-50' : 'bg-slate-50';
                if (app.id === 'siniestros' && !isSelected) { iconBg = 'bg-white/20'; iconColor = 'text-white'; }
                iconWrapper.className = `w-10 h-10 ${iconBg} rounded-xl flex items-center justify-center ${iconColor} group-hover:scale-110 transition-all duration-300 mb-2 shadow-inner`;
                iconWrapper.innerHTML = `<i class="fa-solid ${app.icon} text-sm"></i>`;
                const span = document.createElement('span');
                span.className = `text-[9px] font-black uppercase tracking-tighter text-center ${isSelected ? 'text-red-800' : (app.id === 'siniestros' ? 'text-white' : 'text-slate-500')}`;
                span.innerText = app.label;
                btn.appendChild(iconWrapper); btn.appendChild(span); grid.appendChild(btn);
            });
        }

        function selectApp(id) {
            selectedAppId = id;
            const app = appsList.find(a => a.id === id);
            document.getElementById('module-tool-title').innerText = app.label;
            renderApps();
            updateModuleTools(app);
        }

        function updateModuleTools(app) {
            const bodyEl = document.getElementById('module-tool-body');
            if (!bodyEl) return;

            // Función auxiliar para generar botones de herramientas con navegación
            const toolBtn = (icon, text, colorClass, file = null) => `
                <button ${file ? `onclick="loadContent('${file}')"` : ''} class="w-full text-left p-3.5 bg-slate-50 border border-transparent rounded-xl text-[9px] font-black uppercase tracking-wide hover:bg-white hover:border-slate-200 hover:shadow-sm transition-all flex items-center gap-3 group">
                    <div class="w-7 h-7 bg-white rounded-lg flex items-center justify-center shadow-sm border border-slate-100">
                        <i class="fa-solid ${icon} ${colorClass} text-xs transition-transform group-hover:scale-110"></i>
                    </div>
                    <span class="text-slate-600 group-hover:text-red-800 transition-colors">${text}</span>
                </button>
            `;

            if (app.id === 'regas') {
                bodyEl.innerHTML = `
                    <div class="space-y-2 animate-in">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="w-1 h-3 bg-blue-600 rounded-full"></div>
                            <p class="text-[9px] font-black text-slate-800 uppercase tracking-widest">Registros RegAs</p>
                        </div>
                        ${toolBtn('fa-shield-halved', 'Protección Patrimonial', 'text-red-800', 'Apps/Shells/RegAs_PP.html')}
                        ${toolBtn('fa-handshake', 'Prestadores', 'text-blue-600')}
                        ${toolBtn('fa-user-tie', 'Consultores', 'text-amber-600')}
                        ${toolBtn('fa-user-plus', 'Visitas Externas', 'text-emerald-600')}
                    </div>
                `;
            } else if (app.id === 'marbetes') {
                bodyEl.innerHTML = `
                    <div class="space-y-2 animate-in">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="w-1 h-3 bg-amber-500 rounded-full"></div>
                            <p class="text-[9px] font-black text-slate-800 uppercase tracking-widest">Gestión Marbetes</p>
                        </div>
                        ${toolBtn('fa-plus-circle', 'Emitir Nuevo Marbete', 'text-amber-500')}
                        ${toolBtn('fa-pen-to-square', 'Actualizar Datos', 'text-slate-400')}
                        ${toolBtn('fa-print', 'Impresión Masiva', 'text-blue-500')}
                    </div>
                `;
            } else if (app.id === 'siniestros') {
                bodyEl.innerHTML = `
                    <div class="space-y-2 animate-in">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="w-1 h-3 bg-rose-600 rounded-full"></div>
                            <p class="text-[9px] font-black text-slate-800 uppercase tracking-widest">Gestión Siniestros</p>
                        </div>
                        <!-- Botón principal de registro actualizado -->
                        <button onclick="loadContent('Apps/Shells/RegSin.html')" class="w-full text-left p-3 bg-rose-50 border border-rose-100 rounded-xl text-[9px] font-black uppercase tracking-wide hover:bg-rose-600 hover:text-white transition-all flex items-center gap-3 group">
                            <div class="w-7 h-7 bg-white rounded-lg flex items-center justify-center shadow-sm">
                                <i class="fa-solid fa-file-circle-exclamation text-rose-600 text-xs"></i>
                            </div>
                            <span>Registrar Siniestro</span>
                        </button>
                        <!-- Historial actualizado para apuntar a HistorialReportes.html -->
                        ${toolBtn('fa-clock-rotate-left', 'Historial de Eventos', 'text-slate-500', 'Apps/Shells/HistorialReportes.html')}
                        ${toolBtn('fa-chart-pie', 'Estadísticas Mensuales', 'text-slate-500')}
                    </div>
                `;
            }
        }

        renderApps();
    })();
</script>

<style>
    .animate-in { animation: enter 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
