<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏱️ Registro de Asistencia - Dashboard</title>
  <style>
    :root {
      /* === Paleta de Colores Pro === */
      --primary-dark: #1a202c;
      --primary-light: #2d3748;
      --accent: #b71c1c; /* Rojo Institucional */
      --accent-hover: #d32f2f;
      --success: #2f855a;
      --success-light: #c6f6d5;
      --warning: #ecc94b;
      --text-main: #2d3748;
      --text-light: #718096;
      --bg-body: #f7fafc;
      
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
      
      --radius: 12px;
      --header-height: 60px;
      --primary-gradient: linear-gradient(135deg, #8b0000 0%, #4a0000 100%);
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-body);
      background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-main);
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* === CLASES UTILITARIAS === */
    .d-none { display: none !important; }
    .text-center { text-align: center; }
    
    /* === Header === */
    .app-header {
      height: var(--header-height);
      background: var(--primary-gradient);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 100;
      color: white;
    }

    .brand { display: flex; align-items: center; gap: 15px; }
    .brand-logo { font-size: 1.5rem; }
    .brand-title { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }

    .header-controls { display: flex; gap: 15px; align-items: center; }
    
    /* Indicador de Sincronización (NUEVO) */
    .sync-status {
        display: flex; align-items: center; gap: 8px;
        background: rgba(0,0,0,0.25); padding: 5px 12px; border-radius: 20px;
        font-size: 0.75rem; color: rgba(255,255,255,0.9); font-weight: 500;
        border: 1px solid rgba(255,255,255,0.1);
        transition: opacity 0.3s ease;
        opacity: 0; pointer-events: none; /* Invisible por defecto */
    }
    .sync-status.active { opacity: 1; pointer-events: auto; }
    
    .sync-spinner {
        width: 12px; height: 12px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white; border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    .live-clock-mini { 
        font-variant-numeric: tabular-nums; 
        font-weight: 600; 
        color: white; 
        background: rgba(255, 255, 255, 0.15); 
        padding: 5px 12px; 
        border-radius: 8px; 
        font-size: 0.9rem; 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        backdrop-filter: blur(4px); 
    }

    .nav-btn { 
        background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); color: white; 
        padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; 
    }
    .nav-btn option { background-color: #4a0000; color: white; }

    /* === Main Layout === */
    .dashboard {
      flex: 1; display: flex; flex-direction: column; padding: 20px 25px; 
      overflow: hidden; max-width: 1600px; margin: 0 auto; width: 100%;
    }

    /* === Control Bar === */
    .control-bar {
      background: white; padding: 15px 20px; border-radius: var(--radius); box-shadow: var(--shadow-sm);
      display: flex; flex-wrap: wrap; gap: 20px; align-items: center; margin-bottom: 25px; border: 1px solid #e2e8f0; flex-shrink: 0;
    }

    .search-wrapper { flex: 2; min-width: 300px; position: relative; }
    .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #a0aec0; }
    .main-search-input { width: 100%; padding: 10px 15px 10px 40px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
    .main-search-input:focus { outline: none; border-color: var(--accent); }

    .filters-wrapper { flex: 3; display: flex; gap: 10px; align-items: center; overflow-x: auto; }
    .filter-chip { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; background: white; color: var(--text-light); transition: all 0.2s; white-space: nowrap; }
    .filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
    .filter-select { padding: 6px 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 0.85rem; }

    .btn-generate {
        background: #2d3748; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-left: auto;
    }

    /* === GRID & CARDS === */
    .dashboard-grid-container {
      flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 20px; padding: 5px;
      scrollbar-width: thin;
    }

    .area-group-card {
        background: white; border-radius: var(--radius); border: 1px solid #e2e8f0; box-shadow: var(--shadow-sm); padding: 15px;
        display: flex; flex-direction: column; gap: 10px; flex: 1 1 300px; animation: fadeIn 0.5s ease;
    }

    .area-group-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 5px; }
    .area-title { font-size: 0.95rem; font-weight: 800; color: var(--primary-dark); text-transform: uppercase; }
    .badge-count { background: #edf2f7; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; color: #4a5568; }

    .area-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }

    /* === TARJETAS COMPACTAS (LIST STYLE) === */
    .card-wrapper {
        position: relative;
        height: 60px; /* Altura compacta inicial */
        transition: height 0.2s ease, z-index 0s;
        z-index: 1;
    }

    .employee-card {
        position: absolute; top: 0; left: 0; width: 100%;
        background: white; border-radius: 8px; border: 1px solid #e2e8f0;
        padding: 8px; display: flex; flex-direction: row; /* Diseño Horizontal */
        align-items: center; overflow: hidden; cursor: pointer;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        transition: all 0.2s ease;
        height: 60px; /* Match wrapper */
    }

    /* Hover Effect: Expande y muestra detalles */
    .card-wrapper:hover {
        height: 110px;
        z-index: 50;
    }
    
    .card-wrapper:hover .employee-card {
        height: auto;
        min-height: 110px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        border-color: #cbd5e0;
        align-items: flex-start; /* Alinear arriba al expandir */
        flex-wrap: wrap; /* Permitir wrap para los botones */
    }

    .employee-card.status-in { border-left: 4px solid var(--success); }
    .employee-card.status-out { border-left: 4px solid var(--accent); }

    .card-avatar {
        width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
        margin-right: 12px; background: #edf2f7; border: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .status-out .card-avatar { filter: grayscale(1); opacity: 0.7; }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
        font-weight: 700; font-size: 0.85rem; color: var(--primary-dark);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-status-text { font-size: 0.7rem; color: var(--text-light); }

    /* Detalles Ocultos */
    .card-details-hover {
        display: none; width: 100%; margin-top: 10px;
        padding-top: 8px; border-top: 1px solid #f0f0f0;
        animation: fadeIn 0.2s;
    }
    .card-wrapper:hover .card-details-hover { display: block; }

    .btn-card-action {
        width: 100%; padding: 6px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase;
        display: flex; justify-content: center; align-items: center; gap: 5px;
    }
    .btn-in { background: #e8f5e9; color: #2f855a; }
    .btn-in:hover { background: #c6f6d5; }
    .btn-out { background: #fff5f5; color: #c53030; }
    .btn-out:hover { background: #fed7d7; }

    /* === MODAL DE PERFIL (Edición) === */
    .modal-overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(26, 32, 44, 0.85); backdrop-filter: blur(4px);
        z-index: 2000; display: none; justify-content: center; align-items: center; 
        opacity: 0; transition: opacity 0.2s; 
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    
    .modal-card { 
        background: white; width: 95%; max-width: 500px; border-radius: 16px; overflow: hidden; 
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        transform: scale(0.95); transition: transform 0.2s; 
    }
    .modal-overlay.active .modal-card { transform: scale(1); }
    
    /* Header Modal Estilo ID Card */
    .modal-profile-header {
        background: #f8fafc; padding: 20px; display: flex; align-items: center; gap: 20px;
        border-bottom: 1px solid #e2e8f0; position: relative;
    }
    .modal-img-large { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .modal-user-info { flex: 1; }
    .modal-user-info h3 { margin: 0; font-size: 1.2rem; color: var(--primary-dark); }
    .modal-user-info p { margin: 2px 0 0; color: var(--text-light); font-size: 0.9rem; }
    .btn-close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 24px; color: #a0aec0; cursor: pointer; }

    .modal-body { padding: 20px; }

    /* Sección Checkboxes */
    .modal-section-title { font-size: 0.8rem; font-weight: 700; color: #718096; text-transform: uppercase; margin-bottom: 10px; display: block; }
    
    /* Area Selector en Modal */
    .modal-area-select {
        width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; 
        font-weight: 600; color: #2d3748; background: white; margin-top: 5px;
    }

    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; margin-top: 15px; }
    .checkbox-item { 
        display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--primary-dark); 
        background: #f7fafc; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s;
    }
    .checkbox-item:hover { border-color: #cbd5e0; background: #edf2f7; }
    .checkbox-item input { accent-color: var(--accent); transform: scale(1.2); cursor: pointer; }

    .input-textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-family: inherit; font-size: 0.9rem; resize: vertical; min-height: 70px; margin-bottom: 15px; }

    /* Botones de acción del Modal */
    .modal-actions { display: flex; gap: 15px; margin-bottom: 20px; }
    .btn-modal { flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 0.95rem; }
    
    .btn-save-edit { background: #4a5568; color: white; transition: background 0.3s; }
    .btn-save-edit:hover { background: #2d3748; }
    
    .btn-secondary { background: #edf2f7; color: var(--text-main); border: 1px solid #e2e8f0; }
    .btn-secondary:hover { background: #e2e8f0; }

    /* Mensaje de éxito interno */
    .modal-msg-success { 
        margin-top: 10px; padding: 10px; border-radius: 8px; background: #f0fff4; 
        color: #2f855a; font-weight: 700; text-align: center; border: 1px solid #c6f6d5;
        display: none; animation: fadeIn 0.3s;
    }

    /* Botón de Acción Principal */
    .action-divider { border-top: 1px dashed #cbd5e0; margin: 10px 0 20px 0; position: relative; }
    .action-divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #a0aec0; font-size: 0.8rem; font-weight: 600; }

    .btn-punch-trigger {
        width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; text-transform: uppercase;
        display: flex; justify-content: center; align-items: center; gap: 10px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn-punch-trigger:active { transform: scale(0.98); }
    .trigger-in { background: var(--success); color: white; }
    .trigger-in:hover { background: #276749; }
    .trigger-out { background: var(--accent); color: white; }
    .trigger-out:hover { background: #9b2c2c; }

    /* === SEGUNDO MODAL (Confirmación Hora) === */
    .punch-confirm-modal { width: 90%; max-width: 350px; text-align: center; }
    .punch-time-display { font-size: 2.5rem; font-weight: 800; color: var(--primary-dark); margin: 15px 0; font-variant-numeric: tabular-nums; }
    .punch-time-input { 
        font-size: 2rem; font-weight: 800; color: var(--primary-dark); text-align: center; 
        border: 2px solid #cbd5e0; border-radius: 10px; background: #f8fafc; width: 100%; margin-bottom: 15px; 
    }
    .punch-actions { display: flex; gap: 10px; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-logo">⏱️</div>
      <div class="brand-title">Asistencia</div>
    </div>
    
    <div class="header-controls">
      <!-- INDICADOR DE SINCRONIZACIÓN -->
      <div id="syncIndicator" class="sync-status">
          <div class="sync-spinner"></div>
          <span>Sincronizando asistencia...</span>
      </div>

      <div id="headerClock" class="live-clock-mini">--:--</div>
      <select id="navFormularios" class="nav-btn">
        <option value="" disabled selected>Menú</option>
        <option value="regresarGrid">Volver</option>
        <option value="registro_siniestros">Siniestros</option>
      </select>
    </div>
  </header>

  <main class="dashboard">
    <div class="control-bar">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="mainSearchInput" class="main-search-input" placeholder="Buscar empleado..." autocomplete="off">
      </div>
      <div class="filters-wrapper">
        <div class="filter-chip active" data-filter="all">Todos</div>
        <div class="filter-chip" data-filter="in">En Turno</div>
        <div class="filter-chip" data-filter="out">Fuera</div>
        <select id="areaFilterSelect" class="filter-select"><option value="all">Todas las Áreas</option></select>
        <button id="btnGenerateTables" class="btn-generate">📊 Reporte</button>
      </div>
    </div>

    <!-- Grid de Tarjetas Compactas -->
    <div id="cardsGrid" class="dashboard-grid-container">
      <div class="text-center" style="width:100%; padding:40px; color:#aaa;">Cargando personal...</div>
    </div>
  </main>

  <!-- MODAL 1: PERFIL Y EDICIÓN -->
  <div id="profileModal" class="modal-overlay">
    <div class="modal-card">
        <button class="btn-close-modal" id="btnCloseProfile">×</button>
        
        <div class="modal-profile-header">
            <img id="modalProfileImg" src="" class="modal-img-large" alt="Foto">
            <div class="modal-user-info">
                <h3 id="modalProfileName">Nombre</h3>
                <p id="modalProfileMeta">ID: 0000</p>
                <!-- Area ahora es un Select Editable -->
                <select id="modalProfileAreaSelect" class="modal-area-select"></select>
            </div>
        </div>

        <div class="modal-body">
            <!-- Sección de Edición -->
            <div class="checkbox-grid">
                <label class="checkbox-item"><input type="checkbox" id="chkFes"> Festivo</label>
                <label class="checkbox-item"><input type="checkbox" id="chkTiEx"> T. Extra</label>
                <label class="checkbox-item"><input type="checkbox" id="chkRec"> Recuperación</label>
                <label class="checkbox-item"><input type="checkbox" id="chkRet"> Retardo</label>
            </div>
            <textarea id="txtComentario" class="input-textarea" placeholder="Agregar comentario..."></textarea>
            
            <div id="profileMessage" class="modal-msg-success"></div> <!-- Mensaje de Éxito -->

            <!-- ACCIONES DEL FORMULARIO DE EDICIÓN -->
            <div class="modal-actions">
                <button id="btnCancelProfile" class="btn-modal btn-secondary">Cancelar</button>
                <button id="btnSaveEdits" class="btn-modal btn-save-edit">💾 Guardar Cambios</button>
            </div>

            <!-- Sección de Acción -->
            <div class="action-divider"><span>REGISTRO</span></div>
            <button id="btnTriggerPunch" class="btn-punch-trigger">
                <!-- Se llena dinamicamente: 🟢 Registrar Entrada -->
            </button>
        </div>
    </div>
  </div>

  <!-- MODAL 2: CONFIRMACIÓN DE HORA (PUNCH) -->
  <div id="punchModal" class="modal-overlay" style="z-index: 2100;">
      <div class="modal-card punch-confirm-modal">
          <div style="padding:20px;">
              <h3 id="punchTitle" style="margin:0; color:#2d3748;">Confirmar Hora</h3>
              <p id="punchSubtitle" style="color:#718096; font-size:0.9rem;">Acción</p>
              
              <input type="time" id="punchTimeInput" class="punch-time-input">
              
              <div id="punchMessage" class="modal-msg-success" style="margin-bottom:15px;"></div> <!-- Mensaje de Éxito -->

              <div class="punch-actions">
                  <button id="btnCancelPunch" class="btn-save-edit" style="background:#edf2f7; color:#2d3748; margin:0;">Cancelar</button>
                  <button id="btnConfirmPunch" class="btn-save-edit" style="background:var(--accent); color:white; margin:0;">Confirmar</button>
              </div>
          </div>
      </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      
      const API_DASHBOARD = "https://default3b2cbccb81bb44a2a19a2386bb3606.02.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/097a63200e254f4db1c47d052f2613ef/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=4GE6KXcJvL1j7ih9cl-ubC93RoycRieLuJuz2DdbFU4";
      const API_ACTION = "https://default3b2cbccb81bb44a2a19a2386bb3606.02.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9f1a1b8b772e4e8299870e50b78b6dd5/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ADqvyD8wK1Qwzdx8bmSkrMB6-bURKepai99jsYOqab4";
      const STORAGE_REPORT_KEY = "asistencia_reporte_data";

      // Refs
      const headerClock = document.getElementById("headerClock");
      const mainSearchInput = document.getElementById("mainSearchInput");
      const cardsGrid = document.getElementById("cardsGrid");
      const areaFilterSelect = document.getElementById("areaFilterSelect");
      const syncIndicator = document.getElementById("syncIndicator"); // NUEVO REF
      
      // Modal 1 Refs
      const profileModal = document.getElementById("profileModal");
      const btnCloseProfile = document.getElementById("btnCloseProfile");
      const btnCancelProfile = document.getElementById("btnCancelProfile");
      const modalProfileImg = document.getElementById("modalProfileImg");
      const modalProfileName = document.getElementById("modalProfileName");
      const modalProfileMeta = document.getElementById("modalProfileMeta");
      const modalProfileAreaSelect = document.getElementById("modalProfileAreaSelect"); 
      const profileMessage = document.getElementById("profileMessage");
      
      const chkFes = document.getElementById("chkFes");
      const chkTiEx = document.getElementById("chkTiEx");
      const chkRec = document.getElementById("chkRec");
      const chkRet = document.getElementById("chkRet");
      const txtComentario = document.getElementById("txtComentario");
      const btnSaveEdits = document.getElementById("btnSaveEdits");
      const btnTriggerPunch = document.getElementById("btnTriggerPunch");

      // Modal 2 Refs
      const punchModal = document.getElementById("punchModal");
      const punchTitle = document.getElementById("punchTitle");
      const punchSubtitle = document.getElementById("punchSubtitle");
      const punchTimeInput = document.getElementById("punchTimeInput");
      const punchMessage = document.getElementById("punchMessage");
      const btnCancelPunch = document.getElementById("btnCancelPunch");
      const btnConfirmPunch = document.getElementById("btnConfirmPunch");

      // State
      let dashboardUsers = [];
      let currentFilterStatus = 'all'; 
      let currentFilterArea = 'all';
      let activeUser = null; 
      let pendingAction = null; 

      const areasOficiales = ["Centro de Control", "Encargado", "Edison", "Recepcion", "Impulso", "Michelena", "Carranza", "Simon Bolivar", "Rondinero", "Universidad"];

      // --- Helpers ---
      const normalize = (str) => str ? str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
      
      const safeBool = (val) => {
          if (!val) return false;
          const s = String(val).toLowerCase();
          return s === 'true' || s === 'yes' || s === '1' || s === 'on';
      };

      const excelFractionToTime = (val) => {
         if(!val) return "";
         if(String(val).includes(":")) return String(val).substring(0,5);
         if(!isNaN(val)) {
             const totalSeconds = Math.floor(parseFloat(val) * 86400);
             const h = Math.floor(totalSeconds / 3600);
             const m = Math.floor((totalSeconds % 3600) / 60);
             return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
         }
         return val;
      };

      // 1. Clock
      setInterval(() => {
        const now = new Date();
        headerClock.textContent = now.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
      }, 1000);

      // 2. Fetch Data (ACTUALIZADO CON INDICADOR)
      const cargarDatosReporteBackground = async () => {
          try {
              // Mostrar indicador
              syncIndicator.classList.add('active');
              
              const response = await fetch(API_DASHBOARD, { 
                  method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ Mode: "GenerarTablas" }) 
              });
              if(response.ok) {
                  const data = await response.json();
                  const cleanData = Array.isArray(data) ? data : (data.Usuarios || []);
                  localStorage.setItem(STORAGE_REPORT_KEY, JSON.stringify(cleanData));
              }
          } catch(e) { 
              console.warn("Background fetch failed", e); 
          } finally {
              // Ocultar indicador sea éxito o error
              setTimeout(() => syncIndicator.classList.remove('active'), 1000); // Pequeño delay para suavidad
          }
      };

      const cargarDatosDashboard = async () => {
         try {
            cargarDatosReporteBackground(); // Inicia background fetch
            const response = await fetch(API_DASHBOARD, { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ Mode: "ElementosPP" }) 
            });
            if(!response.ok) throw new Error("Error API");
            const data = await response.json();
            dashboardUsers = data.Usuarios || [];
            
            if(areaFilterSelect.options.length === 1) {
                areasOficiales.forEach(area => {
                    const opt = document.createElement('option');
                    opt.value = area; opt.textContent = area; areaFilterSelect.appendChild(opt);
                });
            }
            renderGrid();
         } catch(e) { cardsGrid.innerHTML = '<div class="text-center" style="padding:20px;">Error de conexión.</div>'; }
      };

      // 3. Render
      const renderGrid = () => {
          cardsGrid.innerHTML = "";
          const term = normalize(mainSearchInput.value.trim());
          
          const filtered = dashboardUsers.filter(user => {
              if (term) {
                  return normalize(user.Nombre).includes(term) || String(user.ID).includes(term);
              }
              const status = (user["Ultimo estado"] || "").toLowerCase();
              const isIn = status === "entrada";
              
              if(currentFilterStatus === 'in' && !isIn) return false;
              if(currentFilterStatus === 'out' && isIn) return false;

              if(currentFilterArea !== 'all') {
                  const userArea = normalize(user.Area);
                  const filterArea = normalize(currentFilterArea);
                  const target = (filterArea === "centro de control") ? "cco" : filterArea;
                  if(userArea !== target) return false;
              }
              return true;
          });

          if(filtered.length === 0) {
              cardsGrid.innerHTML = '<div class="text-center" style="width:100%; color:#aaa;">No se encontraron resultados.</div>';
              return;
          }

          const grouped = filtered.reduce((acc, user) => {
            let area = user.Area || "Sin Asignar";
            if(area.toLowerCase() === 'cco') area = 'Centro de Control';
            if (!acc[area]) acc[area] = [];
            acc[area].push(user);
            return acc;
          }, {});

          Object.keys(grouped).sort().forEach(areaName => {
              const groupCard = document.createElement('div');
              groupCard.className = 'area-group-card';
              
              groupCard.innerHTML = `
                  <div class="area-group-header">
                      <div class="area-title">${areaName}</div>
                      <div class="badge-count">${grouped[areaName].length}</div>
                  </div>
                  <div class="area-cards-grid"></div>
              `;
              
              const gridContainer = groupCard.querySelector('.area-cards-grid');

              grouped[areaName].forEach(u => {
                  const id = u.ID;
                  const status = (u["Ultimo estado"] || "").toLowerCase();
                  const isIn = status === "entrada";
                  const timeStr = excelFractionToTime(u.Entrada || u.Hora);

                  const wrapper = document.createElement('div');
                  wrapper.className = 'card-wrapper';

                  const card = document.createElement('div');
                  card.className = `employee-card ${isIn ? 'status-in' : 'status-out'}`;
                  
                  const btnLabel = isIn ? "Registrar Salida" : "Registrar Entrada";
                  const btnClass = isIn ? "btn-out" : "btn-in";

                  card.innerHTML = `
                      <img src="FP/${id}.jpg" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(u.Nombre)}&background=edf2f7&color=2d3748'" class="card-avatar">
                      <div class="card-info">
                          <div class="card-name">${u.Nombre}</div>
                          ${isIn ? `<div class="card-status-text">Entrada: ${timeStr}</div>` : ''}
                      </div>
                      <div class="card-details-hover">
                          <button class="btn-card-action ${btnClass}">
                              ${isIn ? '🔻' : '🟢'} ${btnLabel}
                          </button>
                      </div>
                  `;
                  
                  card.addEventListener('click', () => openProfileModal(u));
                  wrapper.appendChild(card);
                  gridContainer.appendChild(wrapper);
              });
              cardsGrid.appendChild(groupCard);
          });
      };

      // 4. Modal Perfil
      const openProfileModal = (user) => {
          activeUser = user;
          profileMessage.style.display = 'none'; // Ocultar mensaje previo
          
          modalProfileImg.src = `FP/${user.ID}.jpg`;
          modalProfileImg.onerror = function() { this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.Nombre)}&background=b71c1c&color=fff`; };
          modalProfileName.textContent = user.Nombre;
          modalProfileMeta.textContent = `ID: ${user.ID}`;
          
          modalProfileAreaSelect.innerHTML = "";
          areasOficiales.forEach(a => {
             const opt = document.createElement('option');
             opt.value = a; opt.textContent = a;
             if(a === user.Area) opt.selected = true;
             modalProfileAreaSelect.appendChild(opt);
          });

          const localData = JSON.parse(localStorage.getItem(STORAGE_REPORT_KEY) || "[]");
          const userRecord = localData.find(r => String(r.ID) === String(user.ID));

          chkFes.checked = false; chkTiEx.checked = false; chkRec.checked = false; chkRet.checked = false;
          txtComentario.value = "";

          if (userRecord) {
              chkFes.checked = safeBool(userRecord.Fes);
              chkTiEx.checked = safeBool(userRecord.TiEx);
              chkRec.checked = safeBool(userRecord.Rec);
              chkRet.checked = safeBool(userRecord.Ret);
              txtComentario.value = userRecord.Comentarios || userRecord.Comentario || "";
          }

          const status = (user["Ultimo estado"] || "").toLowerCase();
          const isIn = status === "entrada";
          
          btnTriggerPunch.className = "btn-punch-trigger " + (isIn ? "trigger-out" : "trigger-in");
          btnTriggerPunch.innerHTML = isIn ? "🔻 Registrar Salida" : "🟢 Registrar Entrada";
          btnTriggerPunch.onclick = () => openPunchModal(user, isIn ? "Salida" : "Entrada");

          profileModal.classList.add('active');
      };

      const getExtraDataFromDOM = () => ({
          Fes: chkFes.checked, TiEx: chkTiEx.checked, Rec: chkRec.checked, Ret: chkRet.checked, 
          Comentarios: txtComentario.value, Area: modalProfileAreaSelect.value 
      });

      // 5. Enviar Solicitud General
      const sendRequest = async (payload) => {
          try {
              const resp = await fetch(API_ACTION, { 
                  method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) 
              });
              return resp.ok;
          } catch(e) {
              return false;
          }
      };

      // 5a. Guardar Edición con Feedback Visual
      btnSaveEdits.addEventListener('click', async () => {
          if(!activeUser) return;
          const btn = btnSaveEdits;
          const originalText = btn.textContent;
          btn.disabled = true; btn.textContent = "Guardando...";
          profileMessage.style.display = 'none';

          const extraData = getExtraDataFromDOM();
          updateLocalStorage(activeUser.ID, extraData);

          const payload = {
              Key: getKey(activeUser.ID),
              Fecha: getTodayString(),
              Numero: activeUser.ID,
              Nombre: activeUser.Nombre,
              Turno: getTurno(),
              TipoRegistro: "Edicion", 
              ...extraData
          };

          const success = await sendRequest(payload);
          
          if(success) {
              // Éxito Visual
              btn.textContent = "✔ Guardado";
              btn.style.backgroundColor = "var(--success)";
              profileMessage.textContent = "✔ Cambios guardados correctamente";
              profileMessage.style.display = "block";
              
              setTimeout(() => {
                  profileModal.classList.remove('active');
                  btn.disabled = false; 
                  btn.textContent = originalText;
                  btn.style.backgroundColor = ""; // Reset color
                  profileMessage.style.display = 'none';
              }, 1500);
          } else {
              // Error
              btn.textContent = "Error";
              btn.disabled = false;
              setTimeout(() => { btn.textContent = originalText; }, 2000);
          }
      });

      // 6. Modal Punch
      const openPunchModal = (user, type) => {
          pendingAction = { user, type };
          punchMessage.style.display = 'none'; // Ocultar mensaje previo
          punchTitle.textContent = type === "Entrada" ? "Registrar Entrada" : "Registrar Salida";
          punchSubtitle.textContent = user.Nombre;
          const now = new Date();
          punchTimeInput.value = now.toLocaleTimeString('es-MX', {hour12: false, hour:'2-digit', minute:'2-digit'});
          punchModal.classList.add('active');
      };

      // 7. Confirmar Punch con Feedback Visual
      btnConfirmPunch.addEventListener('click', async () => {
          if(!pendingAction) return;
          const btn = btnConfirmPunch;
          const originalText = btn.textContent;
          btn.disabled = true; btn.textContent = "...";
          punchMessage.style.display = 'none';

          const timeVal = punchTimeInput.value;
          const [h, m] = timeVal.split(':');
          const horaEnvio = `${h}:${m}:00`;
          
          const extraData = getExtraDataFromDOM();

          const payload = {
              Key: getKey(pendingAction.user.ID, parseInt(h, 10)),
              Fecha: getTodayString(),
              Numero: pendingAction.user.ID,
              Nombre: pendingAction.user.Nombre,
              Turno: getTurno(parseInt(h, 10)),
              Hora: horaEnvio,
              TipoRegistro: pendingAction.type,
              ...extraData
          };

          if(pendingAction.type === 'Entrada') {
              updateLocalStorage(pendingAction.user.ID, { Area: extraData.Area, Entrada: horaEnvio });
          }

          const success = await sendRequest(payload);
          
          if(success) {
              btn.textContent = "✔";
              btn.style.backgroundColor = "var(--success)";
              punchMessage.textContent = "✔ Registro Exitoso";
              punchMessage.style.display = "block";

              setTimeout(() => {
                  punchModal.classList.remove('active');
                  profileModal.classList.remove('active'); 
                  
                  // Reset botón
                  btn.disabled = false; 
                  btn.textContent = originalText;
                  btn.style.backgroundColor = ""; 
                  
                  cargarDatosDashboard(); 
              }, 1500);
          } else {
              btn.textContent = "Error";
              btn.disabled = false;
              setTimeout(() => { btn.textContent = originalText; }, 2000);
          }
      });

      // --- Helpers Comunes ---
      const getKey = (id, hour = new Date().getHours()) => {
          const now = new Date();
          const dd = String(now.getDate()).padStart(2, '0');
          const mm = String(now.getMonth() + 1).padStart(2, '0');
          const yyyy = now.getFullYear();
          let letra = (hour >= 18) ? 'N' : (hour >= 12 ? 'T' : 'D');
          return `${dd}${mm}${yyyy}${id}${letra}`;
      };

      const getTurno = (hour = new Date().getHours()) => {
          if (hour >= 18) return 'Noche';
          if (hour >= 12) return 'Tarde';
          return 'Día';
      };

      const getTodayString = () => {
          const now = new Date();
          return `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
      };

      const updateLocalStorage = (id, dataObj) => {
          const localData = JSON.parse(localStorage.getItem(STORAGE_REPORT_KEY) || "[]");
          const idx = localData.findIndex(r => String(r.ID) === String(id));
          if(idx >= 0) {
              localData[idx] = { ...localData[idx], ...dataObj };
          } else {
              localData.push({ ID: id, ...dataObj });
          }
          localStorage.setItem(STORAGE_REPORT_KEY, JSON.stringify(localData));
      };

      // Close handlers
      btnCloseProfile.onclick = () => profileModal.classList.remove('active');
      btnCancelProfile.onclick = () => profileModal.classList.remove('active'); 
      btnCancelPunch.onclick = () => punchModal.classList.remove('active');

      // Listeners
      mainSearchInput.addEventListener('input', renderGrid);
      document.querySelectorAll('.filter-chip').forEach(chip => {
          chip.addEventListener('click', () => {
              document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
              chip.classList.add('active');
              currentFilterStatus = chip.dataset.filter;
              renderGrid();
          });
      });
      areaFilterSelect.addEventListener('change', (e) => { currentFilterArea = e.target.value; renderGrid(); });
      document.getElementById('btnGenerateTables').addEventListener('click', () => window.location.href = "https://cicxtfemco.online/RegAs/Reporte.html");

      // Init
      cargarDatosDashboard();
    });
  </script>
</body>
</html>
