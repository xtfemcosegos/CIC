<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regas - Shell</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <style>
        :root {
            --color-base: #8B0056; /* Fiusha oscuro */
            --bg-glossy: linear-gradient(145deg, #2a2a2a 0%, #000000 100%);
            --hover-color: rgba(255, 255, 255, 0.15);
            --active-color: rgba(139, 0, 86, 0.6); /* Fiusha oscuro transparente */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Open Sans', sans-serif;
            background-color: var(--color-base);
            overflow: hidden;
            display: flex;
            transition: all 0.3s ease;
        }

        /* --- SIDEBAR NEGRO BRILLANTE --- */
        #sidebar {
            background: var(--bg-glossy);
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.8), inset 1px 1px 0px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, transform 0.3s ease;
            z-index: 100;
            position: relative;
            overflow: hidden;
        }

        /* Brillo sutil superior del sidebar */
        #sidebar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 30%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.05), transparent);
            pointer-events: none;
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            align-items: center;
            position: relative;
        }

        .identity-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 15px;
            cursor: pointer;
        }

        .identity-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            flex-shrink: 0;
            margin: 0 auto;
            transition: transform 0.2s;
        }

        .identity-icon:hover {
            transform: scale(1.05);
        }

        /* Botón Hamburguesa Móvil */
        .hamburger-btn {
            display: none;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            margin-left: auto;
        }
        .hamburger-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;}

        .view-controls {
            display: flex;
            flex-wrap: nowrap;
            gap: 5px;
            margin-top: 15px;
            width: 100%;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: none;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 4px;
            padding: 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .control-btn:hover { background: var(--hover-color); }
        .control-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;}

        /* --- NAVEGACIÓN --- */
        .nav-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 10px 0;
            gap: 5px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .nav-btn:hover {
            background-color: var(--hover-color);
            color: #fff;
        }

        .nav-btn.active {
            background-color: var(--active-color);
            color: #fff;
            border-left: 3px solid var(--color-base);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            margin: 0 auto;
        }

        .nav-btn span {
            margin-left: 15px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            display: none;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            flex: 1;
            background-color: #f0f0f0;
            position: relative;
        }

        .section-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .section-iframe.active {
            display: block;
        }

        /* --- BOTÓN FLOTANTE (Para Modo Oculto) --- */
        #floating-identity {
            position: fixed;
            top: 15px;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            background-color: #000;
            padding: 2px;
            transition: transform 0.2s;
        }
        #floating-identity:hover { transform: scale(1.05); }

        /* ================= ESTADOS Y MODOS (ESCRITORIO) ================= */
        /* POSICIONES */
        body.pos-left { flex-direction: row; }
        body.pos-right { flex-direction: row-reverse; }
        body.pos-left #floating-identity { left: 15px; }
        body.pos-right #floating-identity { right: 15px; }

        /* MODO: ETIQUETAS */
        body.mode-labels #sidebar { width: 220px; }
        body.mode-labels .identity-icon { margin: 0; }
        body.mode-labels .view-controls { display: flex; opacity: 1; }
        body.mode-labels .nav-btn span { display: block; opacity: 1; }
        body.mode-labels .nav-btn svg { margin: 0; }

        /* MODO: ICONOS (Sidebar compacto) */
        body.mode-icons #sidebar { width: 70px; }
        body.mode-icons .view-controls { display: none; }

        /* MODO: OCULTO */
        body.mode-hidden #sidebar {
            position: fixed;
            height: 100%;
            transform: translateX(-100%);
        }
        body.mode-hidden.pos-right #sidebar { transform: translateX(100%); }
        body.mode-hidden #floating-identity { display: block; }
        
        /* OVERLAY TEMPORAL (Cuando se abre el menú en modo oculto) */
        body.mode-hidden.show-overlay #sidebar {
            transform: translateX(0);
            width: 220px; /* Expande temporalmente para ver opciones */
        }
        body.mode-hidden.show-overlay .nav-btn span, body.mode-hidden.show-overlay .view-controls {
            display: flex; opacity: 1;
        }
        body.mode-hidden.show-overlay .nav-btn svg, body.mode-hidden.show-overlay .identity-icon { margin: 0; }

        /* ================= VISTA MÓVIL (DOCK SUPERIOR) ================= */
        @media (max-width: 768px) {
            body { flex-direction: column !important; }
            
            /* Sidebar se vuelve una barra superior completa */
            body.mode-labels #sidebar, body.mode-icons #sidebar, body.mode-hidden #sidebar {
                width: 100% !important;
                height: 55px;
                flex-direction: row;
                position: static;
                transform: none;
                align-items: center;
                padding: 0 10px;
                box-sizing: border-box;
                z-index: 1000;
            }

            .sidebar-header { 
                border: none; 
                padding: 0; 
                flex-direction: row; 
                align-items: center;
                margin-right: 5px;
            }
            .identity-container { width: auto; gap: 0; }
            .identity-icon { width: 34px; height: 34px; margin: 0; }
            
            .hamburger-btn { display: flex; }
            
            .nav-list { 
                flex-direction: row; 
                padding: 0 5px; 
                align-items: center; 
                overflow-x: auto; 
                flex: 1; 
                -ms-overflow-style: none;  
                scrollbar-width: none; 
            }
            .nav-list::-webkit-scrollbar { display: none; }
            
            .nav-btn { padding: 8px 12px; border-left: none; border-bottom: 3px solid transparent; }
            .nav-btn.active { border-left: none; border-bottom: 3px solid var(--color-base); }
            .nav-btn span { display: none !important; } 
            .nav-btn svg { margin: 0; width: 22px; height: 22px;}

            .view-controls { 
                display: none !important; 
                position: absolute; top: 60px; left: 10px; background: var(--bg-glossy); flex-direction: row; padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); z-index: 2000; width: auto; gap: 10px;
            }
            .view-controls.mobile-show { display: flex !important; }
            .control-btn { padding: 10px 15px; }

            body.mode-hidden #floating-identity { display: none !important; } /* Siempre barra superior en móvil */
        }
    </style>
</head>
<body>

    <!-- Botón Identidad Flotante (Para Modo Oculto) -->
    <img src="../../ico/asistencia.ico" id="floating-identity" alt="Regas" onclick="toggleOverlay()">

    <!-- Sidebar / Dock -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="identity-container" onclick="toggleSettings()">
                <img src="../../ico/asistencia.ico" class="identity-icon" alt="Regas">
            </div>
            <button class="hamburger-btn" onclick="document.getElementById('view-controls').classList.toggle('mobile-show')">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <!-- Controles de Vista -->
            <div class="view-controls" id="view-controls">
                <div class="control-btn" onclick="setConfig('mode', 'hidden')" title="Modo Oculto">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </div>
                <div class="control-btn" onclick="setConfig('mode', 'labels')" title="Sidebar Completo">
                    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </div>
                <div class="control-btn" onclick="setConfig('mode', 'icons')" title="Solo Iconos">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                </div>
                <div class="control-btn" onclick="togglePosition()" title="Cambiar Lado">
                    <svg viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"></polyline><path d="M4 20v-7a4 4 0 0 1 4-4h12"></path></svg>
                </div>
            </div>
        </div>
        <div class="nav-list" id="nav-list">
            <!-- Secciones generadas dinámicamente -->
        </div>
    </nav>

    <!-- Contenido Principal -->
    <div class="app-body" style="display: flex; flex: 1; overflow: hidden;">
        <main id="main-content" style="flex: 1; position: relative;">
            <!-- Iframes generados dinámicamente -->
        </main>

        <!-- Panel Derecho Unificado -->
        <aside class="side-panel" id="right-panel" style="display: none;">
            <div class="side-resizer left-edge" id="right-resizer"></div>
            <!-- Sub-Panel de Detalle -->
            <div id="right-panel-detail" style="display: none; flex-direction: column; height: 100%;">
                <div class="detail-header">
                    <div class="detail-header-info">
                        <img id="detail-photo" class="detail-photo" src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23cccccc%22%3E%3Cpath%20d%3D%22M12%2012c2.21%200%204-1.79%204-4s-1.79-4-4-4-4%201.79-4%204%201.79%204%204%204zm0%202c-2.67%200-8%201.34-8%204v2h16v-2c0-2.66-5.33-4-8-4z%22%2F%3E%3C%2Fsvg%3E" alt="Foto">
                        <div class="detail-text-group">
                            <h3 id="detail-name">Detalles</h3>
                            <span id="detail-id" style="font-size: 11px; opacity: 0.8;"></span>
                        </div>
                    </div>
                    <button onclick="closeRightPanel()">×</button>
                </div>
                <div id="detail-quick-actions-container" style="background: #fafafa;"></div>
                <div class="detail-tabs">
                    <div class="d-tab" onclick="selectDetailTab('perfil')" id="tab-perfil">Perfil</div>
                    <div class="d-tab active" onclick="selectDetailTab('turno')" id="tab-turno">Turno</div>
                    <div class="d-tab" onclick="selectDetailTab('patrones')" id="tab-patrones">Patrones</div>
                </div>
                <div id="content-perfil" class="d-content"></div>
                <div id="content-turno-detail" class="d-content active"><div id="turno-details-container"></div></div>
                <div id="content-patrones" class="d-content"></div>
            </div>

            <!-- Sub-Panel de Catálogo de Elementos -->
            <div id="right-panel-add" style="display: none; flex-direction: column; height: 100%;">
                <div class="detail-header">
                    <div class="detail-header-info"><div class="detail-text-group"><h3 style="font-size: 14px; margin: 0;">Catálogo</h3><span style="font-size: 11px; opacity: 0.8;">Buscar y asignar elemento</span></div></div>
                    <button onclick="closeRightPanel()">×</button>
                </div>
                <div style="padding: 15px; background: #fafafa; border-bottom: 1px solid var(--border-color);"><input type="text" id="search-elemento-input" placeholder="Buscar por Nombre o ID..." oninput="window.renderElementosList(this.value)" class="form-select" style="width: 100%; box-sizing: border-box;"></div>
                <div id="add-elemento-list" style="flex: 1; overflow-y: auto; padding: 0;"></div>
            </div>

            <!-- Sub-Panel de Intercambio -->
            <div id="right-panel-swap" style="display: none; flex-direction: column; height: 100%;">
                <div class="detail-header">
                    <div class="detail-header-info"><div class="detail-text-group"><h3 style="font-size: 14px; margin: 0;">Intercambiar Turno</h3><span id="swap-subtitle" style="font-size: 11px; opacity: 0.8;">Selecciona un turno</span></div></div>
                    <button onclick="closeRightPanel()">×</button>
                </div>
                <div style="padding: 15px; background: #fafafa; border-bottom: 1px solid var(--border-color);"><input type="text" id="search-swap-input" placeholder="Buscar por Nombre o ID..." oninput="window.renderSwapList(this.value)" class="form-select" style="width: 100%; box-sizing: border-box;"></div>
                <div id="swap-element-list" style="flex: 1; overflow-y: auto; padding: 0;"></div>
            </div>

            <!-- Sub-Panel de Reporte -->
            <div id="right-panel-report" style="display: none; flex-direction: column; height: 100%;">
                <div class="detail-header">
                    <div class="detail-header-info"><div class="detail-text-group"><h3 style="font-size: 14px; margin: 0;">Reporte de Distribución</h3><span id="report-date-subtitle" style="font-size: 11px; opacity: 0.8;"></span></div></div>
                    <button onclick="closeRightPanel()">×</button>
                </div>
                <div style="padding: 15px; background: #fafafa; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: row; justify-content: space-between; align-items: center; gap: 10px;">
                    <div style="display: flex; flex-direction: column; gap: 10px;"><label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:12px; font-weight:600; color:#334155; margin:0;"><input type="checkbox" id="chk-report-empty" style="accent-color: var(--fiusha); width: 16px; height: 16px;"> Mostrar casetas sin elementos</label><label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:12px; font-weight:600; color:#334155; margin:0;"><input type="checkbox" id="chk-report-time" style="accent-color: var(--fiusha); width: 16px; height: 16px;"> Mostrar hora de entrada</label></div>
                    <button id="btn-copy-report" class="btn-action-main" title="Copiar al Portapapeles" style="padding: 0; background: #10b981; margin: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 8px;"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                </div>
                <textarea id="report-content" spellcheck="false" style="flex: 1; padding: 15px; font-family: monospace; font-size: 12px; color: #333; background: #fff; border: none; outline: none; resize: none; width: 100%; box-sizing: border-box;"></textarea>
            </div>
        </aside>
    </div>

    <script>
        // Definición de las secciones y sus iconos SVG
        const SECTIONS = [
            { id: 'inicio', title: 'Inicio', icon: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>' },
            { id: 'Planeación', title: 'Planeación', icon: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>' },
            { id: 'Reportes', title: 'Reportes', icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>' },
            { id: 'Recorridos', title: 'Recorridos', icon: '<polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line>' },
            { id: 'Elementos', title: 'Elementos', icon: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>' },
            { id: 'Casetas', title: 'Casetas', icon: '<rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line>' },
            { id: 'Eventos', title: 'Eventos', icon: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>' }
        ];

        let activeIframe = null;

        // Configuración inicial desde LocalStorage
        const CONFIG_KEY = 'regasShellConfig';
        let config = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {
            mode: 'labels', // 'labels', 'icons', 'hidden'
            position: 'left', // 'left', 'right'
            lastSection: 'inicio'
        };

        // --- Funciones de Comunicación con Iframes ---
        function postToActiveIframe(message) {
            if (activeIframe && activeIframe.contentWindow) {
                activeIframe.contentWindow.postMessage(message, '*');
            }
        }

        // --- Inicialización del DOM ---
        function init() {
            const navList = document.getElementById('nav-list');
            
            // Generar botones
            SECTIONS.forEach(sec => {
                const a = document.createElement('a');
                a.className = 'nav-btn';
                a.setAttribute('data-section', sec.id);
                a.innerHTML = `<svg viewBox="0 0 24 24">${sec.icon}</svg><span>${sec.title}</span>`;
                a.onclick = (e) => {
                    e.preventDefault();
                    navigate(sec.id);
                    document.body.classList.remove('show-overlay'); // Cierra overlay temporal
                };
                navList.appendChild(a);
            });

            applyConfig();
            
            // Restaurar estado e inyectar punto inicial nativo
            window.history.replaceState({ section: config.lastSection }, "", "");
            navigate(config.lastSection, false);
            initPanelLogic();
        }

        // --- Lógica de Navegación ---
        function navigate(sectionId, saveHistory = true) {
            // 1. Ocultar todos los iframes activos
            document.querySelectorAll('.section-iframe').forEach(ifr => ifr.classList.remove('active'));
            
            // 2. Crear iframe si no existe (Carga Diferida) o mostrarlo si ya existe
            let iframe = document.getElementById('iframe-' + sectionId);
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'iframe-' + sectionId;
                iframe.className = 'section-iframe';
                iframe.src = sectionId + '.html';
                document.getElementById('main-content').appendChild(iframe);
            }
            activeIframe = iframe;
            iframe.classList.add('active');

            // Actualizar botones activos
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`[data-section="${sectionId}"]`);
            if(activeBtn) activeBtn.classList.add('active');

            config.lastSection = sectionId;
            saveConfig();

            if (saveHistory) {
                window.history.pushState({ section: sectionId }, "", "");
            }
        }

        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.section) {
                navigate(e.state.section, false);
            }
        });

        // --- Lógica de Vistas e Interfaz ---
        function applyConfig() {
            document.body.className = `mode-${config.mode} pos-${config.position}`;
        }

        function saveConfig() {
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        }

        function setConfig(key, value) {
            config[key] = value;
            saveConfig();
            applyConfig();
            document.body.classList.remove('show-overlay');
        }

        function togglePosition() {
            setConfig('position', config.position === 'left' ? 'right' : 'left');
        }

        // --- LÓGICA DEL PANEL DERECHO UNIFICADO ---
        async function initPanelLogic() {
            // Importar funciones del script modular
            const scrpt = await import('./scrpt.js');
            
            // Exponer funciones al scope global para que los `onclick` del HTML funcionen
            window.closeRightPanel = () => {
                scrpt.closeRightPanel();
                postToActiveIframe({ action: 'panelClosed' }); // Notificar al iframe
            };
            window.selectDetailTab = scrpt.selectDetailTab;

            // Funciones de Lógica de UI para paneles
            window.copyReportToClipboard = function() {
                const content = document.getElementById('report-content').value;
                navigator.clipboard.writeText(content).then(() => {
                    const btn = document.querySelector('button[title="Copiar al Portapapeles"]');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                    btn.style.background = '#059669';
                    setTimeout(() => { btn.innerHTML = originalHTML; btn.style.background = '#10b981'; }, 2000);
                });
            };

            let panelContext = {}; // Almacena el contexto del iframe activo (ej. fecha)

            window.renderElementosList = function(query = '') {
                const listContainer = document.getElementById('add-elemento-list');
                listContainer.innerHTML = '';
                let elementos = window.elementosGlobal.filter(el => el.Operativa && el.Operativa.Estado === 'Activo');
                
                if (query) {
                    query = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                    elementos = elementos.filter(el => {
                        let elId = el.ID ? String(el.ID).toLowerCase() : "";
                        let elName = el.id ? String(el.id).toLowerCase() : "";
                        elId = elId.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        elName = elName.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        return elName.includes(query) || elId.includes(query);
                    });
                }
                if (elementos.length === 0) { listContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #888; font-size: 13px;">No se encontraron resultados.</p>'; return; }

                const grouped = {};
                elementos.forEach(el => {
                    const casetaId = (el.Operativa && el.Operativa.AccesoPredeterminado) ? el.Operativa.AccesoPredeterminado : 'Sin Asignar';
                    if (!grouped[casetaId]) grouped[casetaId] = [];
                    grouped[casetaId].push(el);
                });
                const getCasetaIndex = (cId) => { if (cId === 'Sin Asignar') return 9999; const c = window.casetasGlobal.find(x => x.id === cId); return c ? (c.index || 0) : 9998; };
                const sortedCasetaIds = Object.keys(grouped).sort((a, b) => getCasetaIndex(a) - getCasetaIndex(b));

                sortedCasetaIds.forEach(casetaId => {
                    const header = document.createElement('div');
                    header.className = 'add-element-group-header';
                    header.innerText = casetaId;
                    listContainer.appendChild(header);

                    grouped[casetaId].forEach(el => {
                        const elId = el.ID ? String(el.ID) : String(el.id);
                        const elName = el.id; 
                        const div = document.createElement('div');
                        div.className = 'add-element-item';
                        div.setAttribute('draggable', 'true');
                        div.innerHTML = `
                            <img class="add-element-img" src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23cccccc%22%3E%3Cpath%20d%3D%22M12%2012c2.21%200%204-1.79%204-4s-1.79-4-4-4-4%201.79-4%204%201.79%204%204%204zm0%202c-2.67%200-8%201.34-8%204v2h16v-2c0-2.66-5.33-4-8-4z%22%2F%3E%3C%2Fsvg%3E" data-emp-id-add="${elId}">
                            <div class="add-element-info"><span class="add-element-name">${elName}</span><span class="add-element-id">ID: ${elId}</span></div>
                        `;
                        div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', JSON.stringify({ idElemento: elId, isNew: true })); postToActiveIframe({ action: 'dragStart' }); });
                        div.addEventListener('dragend', () => postToActiveIframe({ action: 'dragEnd' }));
                        
                        // El Shell ahora abre el panel directamente, sin mensajes de ida y vuelta
                        div.onclick = async () => {
                            const { contextDate } = panelContext;
                            if (!contextDate) return console.error("No hay contexto de fecha para abrir el panel de detalle.");

                            const reqDate = new Date(contextDate);
                            const anio = reqDate.getFullYear().toString();
                            const mes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][reqDate.getMonth()];
                            const dia = reqDate.getDate().toString().padStart(2, '0') + (reqDate.getMonth()+1).toString().padStart(2, '0') + reqDate.getFullYear().toString();
                            
                            const record = await scrpt.downloadRegas(anio, mes, dia, elId);
                            
                            const el = window.elementosGlobal.find(e => e.ID == elId || e.id == elName);
                            const casetaPredeterminada = el?.Operativa?.AccesoPredeterminado;
                            const casetaItem = casetaPredeterminada ? window.casetasGlobal.find(c => c.id === casetaPredeterminada) : null;
                            const bgHeader = casetaItem ? casetaItem.bgHeader : null;

                            document.getElementById('right-panel-detail').style.display = 'flex';
                            document.getElementById('right-panel-add').style.display = 'none';
                            await scrpt.openDetailPanel(elId, elName, record || {}, null, bgHeader, window.casetasGlobal, window.motivosGlobal, false, anio, mes, dia);
                            
                            let stateDetail = JSON.parse(localStorage.getItem('regasPanelState') || '{}');
                            stateDetail.isOpen = true;
                            stateDetail.mode = 'detail';
                            stateDetail.elId = elId;
                            stateDetail.elName = elName;
                            stateDetail.anio = anio;
                            stateDetail.mes = mes;
                            stateDetail.dia = dia;
                            localStorage.setItem('regasPanelState', JSON.stringify(stateDetail));
                        };

                        listContainer.appendChild(div);
                        scrpt.getFotoElemento(elId).then(fotoUrl => { const img = div.querySelector(`img[data-emp-id-add="${elId}"]`); if(img) img.src = fotoUrl; });
                    });
                });
            };

            window.renderSwapList = function(query = '') {
                const sourceData = window.intercambioData;
                if (!sourceData) return;
                const listContainer = document.getElementById('swap-element-list');
                listContainer.innerHTML = '';
                
                let elementos = window.elementosGlobal.filter(el => el.Operativa && el.Operativa.Estado === 'Activo');
                if (query) {
                    query = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                    elementos = elementos.filter(el => {
                        let elId = el.ID ? String(el.ID).toLowerCase() : "";
                        let elName = el.id ? String(el.id).toLowerCase() : "";
                        elId = elId.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        elName = elName.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        return elName.includes(query) || elId.includes(query);
                    });
                }
                if (elementos.length === 0) { listContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #888; font-size: 13px;">No se encontraron resultados.</p>'; return; }

                elementos.forEach(el => {
                    const elId = el.ID ? String(el.ID) : String(el.id);
                    if (elId === sourceData.idElemento) return;

                    const record = window.currentRegasData ? window.currentRegasData[elId] : null;
                    const shifts = [];
                    if (record) {
                        Object.keys(record).forEach(k => {
                            const lowerK = k.toLowerCase();
                            if (['matutino', 'vespertino', 'nocturno', 'ausentismo'].includes(lowerK)) shifts.push({ name: lowerK, data: record[k] });
                        });
                    }

                    const div = document.createElement('div');
                    div.className = 'add-element-item';
                    div.style.flexDirection = 'column';
                    div.style.alignItems = 'flex-start';
                    div.style.gap = '8px';

                    let html = `<div style="display: flex; align-items: center; gap: 12px; width: 100%;"><img src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23cccccc%22%3E%3Cpath%20d%3D%22M12%2012c2.21%200%204-1.79%204-4s-1.79-4-4-4-4%201.79-4%204%201.79%204%204%204zm0%202c-2.67%200-8%201.34-8%204v2h16v-2c0-2.66-5.33-4-8-4z%22%2F%3E%3C%2Fsvg%3E" data-emp-id-swap="${elId}" style="width:34px; height:34px; border-radius:50%; object-fit:cover; border:1px solid #e2e8f0; flex-shrink:0;"><div style="display:flex; flex-direction:column;"><span style="font-weight:600; font-size:12px; color:#334155;">${el.id}</span><span style="font-size:10px; color:#64748b; margin-top:2px;">ID: ${elId}</span></div></div>`;

                    if (shifts.length > 0) {
                        html += `<div style="display: flex; gap: 5px; flex-wrap: wrap; width: 100%;">`;
                        shifts.forEach(sh => {
                            const caseta = sh.data.Caseta || sh.data.motivo || 'Desconocido';
                            const isAus = sh.name === 'ausentismo';
                            const color = isAus ? '#64748b' : (sh.name === 'matutino' ? '#ca8a04' : (sh.name === 'vespertino' ? '#1d4ed8' : '#000000'));
                            const bgColor = isAus ? '#f1f5f9' : (sh.name === 'matutino' ? '#fef08a' : (sh.name === 'vespertino' ? '#dbeafe' : '#e2e8f0'));
                            html += `<button class="btn-swap-shift" data-shift="${sh.name}" style="flex: 1; padding: 6px; border: 1px solid ${color}; background-color: ${bgColor}; color: ${color}; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold;">${sh.name.toUpperCase()} (${caseta})</button>`;
                        });
                        html += `</div>`;
                    } else {
                        html += `<div style="width: 100%;"><button class="btn-swap-shift" data-shift="ninguno" style="width: 100%; padding: 6px; border: 1px dashed #cbd5e1; background-color: transparent; color: #64748b; border-radius: 6px; cursor: pointer; font-size: 10px;">Intercambiar y dejar sin turno</button></div>`;
                    }

                    div.innerHTML = html;
                    div.querySelectorAll('.btn-swap-shift').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const targetShiftName = btn.getAttribute('data-shift');
                            const targetShiftDesc = targetShiftName === 'ninguno' ? 'Ninguno' : targetShiftName.toUpperCase();
                            if (confirm(`¿Confirmas el intercambio de turnos?\n\n1. ${sourceData.empleadoNombre} recibe: ${targetShiftDesc}\n2. ${el.id} recibe: ${sourceData.shift.name.toUpperCase()}`)) {
                                btn.innerText = 'Intercambiando...'; btn.disabled = true;
                                // El Shell ejecuta el intercambio directamente
                                const { contextDate } = panelContext;
                                const reqDate = new Date(contextDate);
                                const anio = reqDate.getFullYear().toString();
                                const mes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][reqDate.getMonth()];
                                const dia = reqDate.getDate().toString().padStart(2, '0') + (reqDate.getMonth()+1).toString().padStart(2, '0') + reqDate.getFullYear().toString();
                                
                                scrpt.executeSwap(sourceData, elId, targetShiftName, anio, mes, dia);
                            }
                        });
                    });
                    listContainer.appendChild(div);
                    scrpt.getFotoElemento(elId).then(fotoUrl => { const img = div.querySelector(`img[data-emp-id-swap="${elId}"]`); if(img) img.src = fotoUrl; });
                });
            };

            // Escuchar mensajes de los iframes para abrir/cerrar el panel
            window.addEventListener('message', async (event) => {
                if (event.data && event.data.action) {
                    const { action, payload } = event.data;
                    
                    // Cargar catálogos si aún no existen
                    if (!window.casetasGlobal) {
                        [window.casetasGlobal, window.motivosGlobal, window.elementosGlobal] = await Promise.all([
                            scrpt.downloadCasetas(),
                            scrpt.downloadMotivosAusentismo(),
                            scrpt.downloadElementos()
                        ]);
                    }

                    switch(action) {
                        case 'requestOpenDetailPanel':
                            const { idElemento, empleadoNombre, initialShiftName, bgHeader, contextDate } = payload;
                            const reqDate = new Date(contextDate);
                            const isToday = reqDate.toDateString() === new Date().toDateString();
                            const anio = reqDate.getFullYear().toString();
                            const mes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][reqDate.getMonth()];
                            const dia = reqDate.getDate().toString().padStart(2, '0') + (reqDate.getMonth()+1).toString().padStart(2, '0') + reqDate.getFullYear().toString();
                            
                            const record = await scrpt.downloadRegas(anio, mes, dia, idElemento);

                            document.getElementById('right-panel').style.display = 'flex';
                            document.getElementById('right-panel-detail').style.display = 'flex';
                            document.getElementById('right-panel-add').style.display = 'none';
                            document.getElementById('right-panel-swap').style.display = 'none';
                            document.getElementById('right-panel-report').style.display = 'none';

                            await scrpt.openDetailPanel(
                                idElemento, empleadoNombre, record || {}, 
                                initialShiftName, bgHeader, window.casetasGlobal, 
                                window.motivosGlobal, isToday, anio, mes, dia
                            );
                            
                            let stateDetailReq = JSON.parse(localStorage.getItem('regasPanelState') || '{}');
                            stateDetailReq.isOpen = true;
                            stateDetailReq.mode = 'detail';
                            stateDetailReq.elId = idElemento;
                            stateDetailReq.elName = empleadoNombre;
                            stateDetailReq.anio = anio;
                            stateDetailReq.mes = mes;
                            stateDetailReq.dia = dia;
                            localStorage.setItem('regasPanelState', JSON.stringify(stateDetailReq));
                            break;
                        case 'openAddPanel':
                            panelContext = payload; // Guardar contexto
                            document.getElementById('right-panel').style.display = 'flex';
                            document.getElementById('right-panel-detail').style.display = 'none';
                            document.getElementById('right-panel-swap').style.display = 'none';
                            document.getElementById('right-panel-report').style.display = 'none';
                            document.getElementById('right-panel-add').style.display = 'flex';
                            if(document.getElementById('search-elemento-input')) document.getElementById('search-elemento-input').value = '';
                            window.renderElementosList();
                            
                            let stateAdd = JSON.parse(localStorage.getItem('regasPanelState') || '{}');
                            stateAdd.isOpen = true;
                            stateAdd.mode = 'add';
                            localStorage.setItem('regasPanelState', JSON.stringify(stateAdd));
                            break;
                        case 'openSwapPanel':
                            window.intercambioData = payload.intercambioData;
                            panelContext = payload; // Guardar contexto
                            window.currentRegasData = payload.currentRegasData;
                            document.getElementById('right-panel').style.display = 'flex';
                            document.getElementById('right-panel-detail').style.display = 'none';
                            document.getElementById('right-panel-add').style.display = 'none';
                            document.getElementById('right-panel-report').style.display = 'none';
                            document.getElementById('right-panel-swap').style.display = 'flex';
                            if (document.getElementById('search-swap-input')) document.getElementById('search-swap-input').value = '';
                            if (payload.intercambioData) document.getElementById('swap-subtitle').innerText = `Turno de ${payload.intercambioData.empleadoNombre}`;
                            window.renderSwapList();
                            
                            let stateSwap = JSON.parse(localStorage.getItem('regasPanelState') || '{}');
                            stateSwap.isOpen = true;
                            stateSwap.mode = 'swap';
                            localStorage.setItem('regasPanelState', JSON.stringify(stateSwap));
                            break;
                        case 'openReportPanel':
                            document.getElementById('right-panel').style.display = 'flex';
                            document.getElementById('right-panel-detail').style.display = 'none';
                            document.getElementById('right-panel-add').style.display = 'none';
                            document.getElementById('right-panel-swap').style.display = 'none';
                            document.getElementById('right-panel-report').style.display = 'flex';
                            postToActiveIframe({ action: 'generateReportContent', payload: { tabId: payload.tabId } });
                            
                            let stateReport = JSON.parse(localStorage.getItem('regasPanelState') || '{}');
                            stateReport.isOpen = true;
                            stateReport.mode = 'report';
                            stateReport.reportTab = payload.tabId;
                            localStorage.setItem('regasPanelState', JSON.stringify(stateReport));
                            break;
                        case 'closeRightPanel':
                            window.closeRightPanel();
                            break;
                        case 'selectDetailTab':
                            window.selectDetailTab(payload.tab);
                            break;
                    }
                }
            });

            // Lógica de redimensionamiento
            const rightResizer = document.getElementById('right-resizer');
            const rightPanel = document.getElementById('right-panel');
            let isRightResizing = false;

            const savedRightWidth = localStorage.getItem('regasRightPanelWidth');
            if (savedRightWidth && rightPanel) {
                rightPanel.style.width = savedRightWidth;
            }

            if (rightResizer) {
                rightResizer.addEventListener('mousedown', (e) => {
                    isRightResizing = true;
                    rightResizer.classList.add('is-resizing');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                });
            }
            window.addEventListener('mousemove', (e) => {
                if (!isRightResizing) return;
                let newWidth = window.innerWidth - e.clientX;
                if (newWidth < 300) newWidth = 300;
                if (newWidth > 800) newWidth = 800;
                if (rightPanel) rightPanel.style.width = `${newWidth}px`;
            });
            window.addEventListener('mouseup', () => {
                if (isRightResizing) {
                    isRightResizing = false;
                    if (rightResizer) rightResizer.classList.remove('is-resizing');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    if (rightPanel) localStorage.setItem('regasRightPanelWidth', rightPanel.style.width);
                }
            });

            // Restaurar estado del panel al cargar
            const savedState = localStorage.getItem('regasPanelState');
            if (savedState) {
                const config = JSON.parse(savedState);
                if (config.isOpen) {
                    if (config.mode === 'add') {
                        window.openAddPanel();
                    } else if (config.mode === 'report' && config.reportTab) {
                        window.openReportPanel(config.reportTab);
                    } else if (config.mode === 'detail' && config.elId && config.anio) {
                        const existingRecord = await scrpt.downloadRegas(config.anio, config.mes, config.dia, config.elId);
                        await scrpt.openDetailPanel(config.elId, config.elName, existingRecord || {}, null, null, window.casetasGlobal, window.motivosGlobal, false, config.anio, config.mes, config.dia);
                        if (config.tab) window.selectDetailTab(config.tab);
                    }
                }
            }

            // Notificar a los iframes cuando se guarde un cambio en el panel
            // para que puedan refrescar su vista si es necesario.
            window.addEventListener('regasUpdated', () => {
                postToActiveIframe({ action: 'regasUpdated' });
            });
        }

        function toggleOverlay() {
            document.body.classList.toggle('show-overlay');
        }

        function toggleSettings() {
            // En modo iconos, hacer click al icono de la app abre los controles temporalmente
            if(config.mode === 'icons') {
                setConfig('mode', 'labels');
            }
        }

        // Arrancar
        init();
    </script>
</body>
</html>
