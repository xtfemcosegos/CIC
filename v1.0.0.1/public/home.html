<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Público</title>
    <!-- Cargando la fuente Open Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #ffffff; /* Fondo blanco */
            color: #000000; /* Texto negro */
            font-family: 'Open Sans', sans-serif;
            font-size: 16px; /* Tamaño general de letra ampliado */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            position: relative;
            padding: 45px 130px; /* Padding ajustado para centrado vertical y espacio lateral */
            text-align: center;
            border-bottom: 3px solid #8B0000; /* Rojo oscuro */
            background: linear-gradient(to bottom, #000000 0%, #1a1a1a 35%, #404040 50%, #1a1a1a 65%, #000000 100%); /* Degradado metálico muy sutil */
        }
        .header h1 {
            color: #ffffff; /* Blanco para contraste */
            margin: 0;
            font-size: 32px; /* Letras un poco más grandes */
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9); /* Sombra negra fuerte para resaltar en el centro blanco */
        }
        .header .subtitle {
            color: #ff4d4d; /* Rojo más brillante para contraste */
            margin-top: 10px;
            font-size: 18px; /* Letras un poco más grandes */
            font-weight: 400;
            opacity: 0.9;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
        }
        .header-logo {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%); /* Centrado vertical perfecto */
            width: 70px; /* Tamaño del icono */
            height: auto;
        }
        .btn-login {
            position: absolute;
            top: 50%;
            transform: translateY(-50%); /* Centrado vertical perfecto */
            right: 20px;
            z-index: 10; /* Asegura que ningún otro elemento lo bloquee */
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #8B0000;
            padding: 12px 28px; /* Botón más grande */
            font-size: 16px; /* Letra más grande */
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.2); /* Sombra para que no se pierda en el fondo negro */
        }
        .btn-login:hover {
            background-color: #8B0000;
            border-color: #000000;
        }
        .content {
            padding: 60px 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-large {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #8B0000; /* Borde rojo oscuro */
            padding: 15px 40px;
            font-size: 24px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-family: 'Open Sans', sans-serif;
            margin: 15px; /* Margen añadido para separar los botones */
            width: 400px; /* Ancho fijo para que sean iguales */
            max-width: 90vw; /* Ajuste para pantallas pequeñas */
            box-sizing: border-box; /* Incluye el borde y relleno en el tamaño total */
        }
        .btn-large:hover {
            background-color: #8B0000;
            color: #ffffff;
            border-color: #000000;
        }
        .btn-large img {
            width: 36px;
            height: 36px;
            margin-right: 15px;
        }
        .btn-large svg {
            width: 36px;
            height: 36px;
            margin-right: 15px;
            stroke: currentColor; /* Permite que el color cambie al hacer hover */
        }
        .star-yellow {
            stroke: #FFD700 !important; /* Borde amarillo */
            fill: #FFD700; /* Relleno amarillo */
        }
        .footer {
            margin-top: auto; /* Empuja el footer hacia abajo */
            text-align: center;
            padding: 40px 20px;
            background-color: #fafafa;
            border-top: 1px solid #eeeeee;
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="../ico/cic.ico" alt="Icono Sistema" class="header-logo">
        <button class="btn-login" onclick="irAlLogin()">Iniciar Sesión</button>
        <h1>Bienvenido a Centro de Control</h1>
        <p class="subtitle">¿En qué podemos servirte?</p>
    </header>
    <main class="content">
        <button class="btn-large">
            <img src="../ico/marbetes.ico" alt="Icono Marbetes">
            Marbetes
        </button>
        <button class="btn-large">
            <!-- Icono genérico (Caja) en SVG para Objetos Extraviados -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            Objetos Extraviados
        </button>
        <button class="btn-large">
            <!-- Icono genérico (Mapa) en SVG para Monitoreos de viaje -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                <line x1="9" y1="3" x2="9" y2="18"></line>
                <line x1="15" y1="6" x2="15" y2="21"></line>
            </svg>
            Monitoreos de viaje en carretera
        </button>
    </main>
    <footer class="footer">
        <button class="btn-large">
            <!-- Icono genérico (Estrella amarilla) en SVG para Califica nuestro servicio -->
            <svg class="star-yellow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
            Califica nuestro servicio
        </button>
    </footer>

    <script>
        function irAlLogin() {
            if (window.self !== window.top) {
                // Si estamos dentro del iframe (index.html), le pedimos que cambie de vista
                window.parent.postMessage({action: 'switchFrame', target: 'iframe-login'}, '*');
            } else {
                // Si abriste home.html de forma directa en tu navegador
                window.location.href = '../login.html';
            }
        }
    </script>
</body>
</html>
