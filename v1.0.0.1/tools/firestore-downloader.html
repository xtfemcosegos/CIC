<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firestore Downloader Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background: #f4f6f8; padding: 20px; color: #334155; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h1 { color: #8B0056; margin-top: 0; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        textarea, input[type="text"], input[type="email"], input[type="password"] { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 13px; background: #f8fafc; transition: all 0.2s;
        }
        textarea:focus, input:focus { outline: none; border-color: #8B0056; box-shadow: 0 0 0 3px rgba(139, 0, 86, 0.1); background: #ffffff; }
        button { background: #8B0056; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; transition: all 0.2s; }
        button:hover { background: #680040; transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: translateY(0); }
        
        #auth-section { display: none; background: #fef2f2; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fca5a5; }
        #result-section { display: none; margin-top: 30px; border-top: 2px dashed #e2e8f0; padding-top: 20px; }
        pre { background: #0f172a; color: #38bdf8; padding: 20px; border-radius: 8px; overflow-x: auto; max-height: 500px; font-size: 13px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        
        .status { font-weight: 600; margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 6px; display: none; }
        .status.error { display: block; background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
        .status.success { display: block; background: #dcfce7; color: #059669; border: 1px solid #86efac; }
        .status.loading { display: block; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Descargador de Firestore
        </h1>
        <p style="color: #475569; font-size: 14px; margin-bottom: 25px;">Introduce la configuración JSON de Firebase y la ruta de la colección o documento que deseas extraer.</p>
        
        <div class="form-group">
            <label>Configuración de Firebase (JSON Object)</label>
            <textarea id="config" rows="8" placeholder='{
  "apiKey": "AIzaSy...",
  "authDomain": "...",
  "projectId": "...",
  "storageBucket": "...",
  "messagingSenderId": "...",
  "appId": "..."
}'></textarea>
        </div>

        <div class="form-group">
            <label>Ruta de Extracción</label>
            <input type="text" id="path" placeholder="Ejemplo: usuarios (Colección)  o  usuarios/123/datos (Documento)">
        </div>

        <button id="btn-download">Intentar Descargar</button>
        <div id="status-msg" class="status"></div>

        <div id="auth-section">
            <h3 style="margin-top:0; color: #991b1b; display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Permiso Denegado
            </h3>
            <p style="font-size: 14px; margin-bottom: 15px; color: #7f1d1d;">La base de datos requiere autenticación. Ingresa tus credenciales de administrador/usuario:</p>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button id="btn-auth-download" style="background: #b91c1c;">Autenticar y Descargar</button>
        </div>

        <div id="result-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="color: #334155; margin: 0;">Resultado (JSON)</h3>
                <button id="btn-save-json" style="background: #059669; display: flex; align-items: center; gap: 8px;">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    Guardar Archivo .json
                </button>
            </div>
            <pre id="json-output"></pre>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, deleteApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        let currentApp = null;
        let db = null;
        let auth = null;
        let lastResult = null;

        const statusMsg = document.getElementById('status-msg');
        const authSection = document.getElementById('auth-section');
        const resultSection = document.getElementById('result-section');

        function showStatus(msg, type = 'loading') {
            statusMsg.textContent = msg;
            statusMsg.className = `status ${type}`;
        }

        function initFirebase() {
            const configStr = document.getElementById('config').value.trim();
            if (!configStr) throw new Error("Por favor, ingresa la configuración de Firebase.");
            
            let firebaseConfig;
            try {
                // Eval evalúa el objeto incluso si falta el entrecomillado estricto del JSON
                firebaseConfig = new Function('return ' + configStr)();
            } catch (e) {
                throw new Error("El formato de configuración es inválido. Asegúrate de que sea un objeto de JavaScript o JSON.");
            }

            // Limpiar la instancia si el usuario presiona descargar varias veces con distintos proyectos
            if (getApps().length > 0) {
                getApps().forEach(app => deleteApp(app));
            }

            currentApp = initializeApp(firebaseConfig);
            db = getFirestore(currentApp);
            auth = getAuth(currentApp);
        }

        async function fetchFirestoreData() {
            const path = document.getElementById('path').value.trim();
            if (!path) throw new Error("Falta la ruta de extracción.");

            const segments = path.split('/').filter(s => s.length > 0);
            
            // Lógica: Si los segmentos son pares (ej. users/123) es un Documento. Si son impares (ej. users) es una Colección.
            if (segments.length % 2 === 0) {
                const docRef = doc(db, path);
                const snapshot = await getDoc(docRef);
                if (snapshot.exists()) return { [snapshot.id]: snapshot.data() };
                else throw new Error(`El documento "${path}" no existe.`);
            } else {
                const colRef = collection(db, path);
                const snapshot = await getDocs(colRef);
                const data = {};
                snapshot.forEach(doc => data[doc.id] = doc.data());
                if (Object.keys(data).length === 0) throw new Error(`La colección "${path}" está vacía o no existe.`);
                return data;
            }
        }

        async function handleDownload(withAuth = false) {
            showStatus("Inicializando conexión...", 'loading');
            authSection.style.display = "none";
            resultSection.style.display = "none";
            document.getElementById('json-output').textContent = "";

            try {
                if (!currentApp || withAuth) initFirebase();

                if (withAuth) {
                    const email = document.getElementById('email').value.trim();
                    const pass = document.getElementById('password').value.trim();
                    if (!email || !pass) throw new Error("Por favor ingresa tu correo y contraseña.");
                    showStatus("Autenticando usuario...", 'loading');
                    await signInWithEmailAndPassword(auth, email, pass);
                }

                showStatus("Extrayendo datos de Firestore...", 'loading');
                const data = await fetchFirestoreData();
                lastResult = data;
                
                document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);
                resultSection.style.display = "block";
                showStatus(`¡Extracción completada! Se encontraron ${Object.keys(data).length} registros principales.`, 'success');

            } catch (error) {
                console.error(error);
                
                if (error.code === 'permission-denied' && !withAuth) {
                    showStatus("Acceso denegado: Las reglas de seguridad bloquean accesos anónimos.", 'error');
                    authSection.style.display = "block";
                } else if (error.code === 'auth/invalid-credential') {
                    showStatus("Error: El correo electrónico o la contraseña son incorrectos.", 'error');
                    authSection.style.display = "block";
                } else {
                    showStatus(error.message || "Error desconocido al procesar la solicitud.", 'error');
                }
            }
        }

        document.getElementById('btn-download').addEventListener('click', () => handleDownload(false));
        document.getElementById('btn-auth-download').addEventListener('click', () => handleDownload(true));

        document.getElementById('btn-save-json').addEventListener('click', () => {
            if (!lastResult) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(lastResult, null, 2));
            const node = document.createElement('a');
            node.setAttribute("href", dataStr);
            
            const pathName = document.getElementById('path').value.replace(/\//g, '_');
            node.setAttribute("download", `firestore_export_${pathName}.json`);
            
            document.body.appendChild(node);
            node.click();
            node.remove();
        });
    </script>
</body>
</html>
