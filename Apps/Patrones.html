<!-- Panel de Patrones Operativos - Módulo CIC Protection -->
<div class="flex flex-col h-full bg-slate-50 select-none text-slate-900 font-sans p-6 space-y-8 animate-in slide-in-from-right duration-500 pb-24 h-full overflow-y-auto custom-scrollbar">
    
    <!-- CONTEXTO DEL USUARIO -->
    <header class="space-y-2">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-red-800 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-red-900/20">
                <i class="fa-solid fa-gears text-xl"></i>
            </div>
            <div>
                <h3 id="pattern-user-name" class="text-sm font-black uppercase text-slate-900 truncate">Cargando Elemento...</h3>
                <p id="pattern-start-date" class="text-[9px] font-bold text-red-800 uppercase tracking-widest italic">Fecha Inicio: --/--/--</p>
            </div>
        </div>
    </header>

    <!-- CONSTRUCTOR DE SECUENCIA -->
    <section class="space-y-6">
        <div>
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                <span class="w-4 h-4 bg-slate-200 rounded-full flex items-center justify-center text-[7px] text-slate-500">1</span>
                Construir Secuencia
            </p>
            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="addPatternSlot('M')" class="px-4 py-2 bg-amber-50 text-amber-600 border border-amber-100 rounded-xl text-[10px] font-black uppercase hover:bg-amber-500 hover:text-white transition-all shadow-sm">+ Turno M</button>
                <button onclick="addPatternSlot('V')" class="px-4 py-2 bg-blue-50 text-blue-600 border border-blue-100 rounded-xl text-[10px] font-black uppercase hover:bg-blue-500 hover:text-white transition-all shadow-sm">+ Turno V</button>
                <button onclick="addPatternSlot('N')" class="px-4 py-2 bg-slate-100 text-slate-600 border border-slate-200 rounded-xl text-[10px] font-black uppercase hover:bg-slate-900 hover:text-white transition-all shadow-sm">+ Turno N</button>
                <button onclick="addPatternSlot('D')" class="px-4 py-2 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-500 hover:text-white transition-all shadow-sm">+ Descanso</button>
            </div>

            <div id="pattern-slots-container" class="min-h-[120px] bg-white rounded-[2rem] border-2 border-dashed border-slate-200 p-6 flex flex-wrap gap-3 items-center justify-center relative shadow-inner">
                <p id="pattern-empty-msg" class="text-[9px] font-black text-slate-300 uppercase absolute pointer-events-none">Arrastre o agregue turnos aquí</p>
            </div>
        </div>

        <div class="pt-6 border-t border-slate-200 space-y-4">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Guardar como Plantilla</p>
            <div class="flex gap-2">
                <input id="new-template-name" type="text" placeholder="Nombre (ej. 2x2x2x2)..." class="flex-1 bg-white border border-slate-200 p-3 rounded-xl text-[9px] font-black uppercase outline-none focus:border-red-800 shadow-sm">
                <button onclick="savePatternAsTemplate()" class="px-5 bg-red-800 text-white rounded-xl text-[9px] font-black uppercase hover:bg-red-700 active:scale-95 transition-all">Guardar</button>
            </div>
            <div id="pattern-templates-list" class="grid grid-cols-1 gap-2">
                <!-- Plantillas inyectadas -->
            </div>
        </div>
    </section>

    <!-- ALCANCE TEMPORAL -->
    <section class="space-y-6 pt-6 border-t border-slate-200">
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] flex items-center gap-2">
            <span class="w-4 h-4 bg-slate-200 rounded-full flex items-center justify-center text-[7px] text-slate-500">2</span>
            Alcance del Patrón
        </p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="setPatternRange('1w')" id="range-btn-1w" class="range-btn p-4 bg-white border border-slate-200 rounded-2xl text-[9px] font-black uppercase hover:border-red-800 transition-all shadow-sm">1 Semana</button>
            <button onclick="setPatternRange('1m')" id="range-btn-1m" class="range-btn p-4 bg-white border border-slate-200 rounded-2xl text-[9px] font-black uppercase hover:border-red-800 transition-all shadow-sm">1 Mes</button>
            <button onclick="setPatternRange('1y')" id="range-btn-1y" class="range-btn p-4 bg-white border border-slate-200 rounded-2xl text-[9px] font-black uppercase hover:border-red-800 transition-all shadow-sm">1 Año</button>
            <input type="date" id="pattern-date-end" class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-[9px] font-black uppercase outline-none focus:border-red-800 shadow-sm" onchange="setPatternRange('custom')">
        </div>
        <button id="btn-run-pattern" onclick="runPatternProcess()" class="w-full py-5 bg-slate-900 text-white rounded-2xl text-xs font-black uppercase tracking-[0.2em] hover:bg-emerald-600 transition-all shadow-xl active:scale-[0.98] flex items-center justify-center gap-3">
            <i class="fa-solid fa-play"></i> Aplicar Patrón
        </button>
    </section>

    <!-- ACCIONES RÁPIDAS (MULTIPLICADOR) -->
    <section class="space-y-6 pt-10 border-t border-slate-200">
        <div class="flex items-center justify-between">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Ausencia Masiva</p>
            <span class="px-3 py-1 bg-red-50 text-red-800 text-[7px] font-black rounded-full uppercase">Multiplicador</span>
        </div>
        <div class="space-y-3">
            <select id="multi-abs-reason" class="w-full bg-white border border-slate-200 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-red-800 shadow-sm">
                <option value="Vacaciones">Vacaciones</option>
                <option value="Descanso">Descanso</option>
                <option value="Incapacidad">Incapacidad</option>
                <option value="Suspensión">Suspensión</option>
                <option value="Permiso">Permiso</option>
                <option value="Falta">Falta</option>
            </select>
            <div class="flex gap-2">
                <input type="number" id="multi-abs-days" value="5" min="1" class="flex-1 bg-white border border-slate-200 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-red-800 shadow-sm text-center">
                <button onclick="applyMultiAbsence()" class="px-8 bg-red-800 text-white rounded-2xl text-[9px] font-black uppercase hover:bg-red-700 shadow-lg active:scale-95">Aplicar Días</button>
            </div>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'cic5-pp';

    let currentPattern = [];
    let selectedRange = '1w';
    const email = window.selectedUserEmail;
    const name = window.selectedUserDisplayName;
    const startDate = window.selectedOperationDate;
    const role = window.selectedUserRole;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            initUI();
            syncTemplates();
        }
    });

    function initUI() {
        if(!email || !name || !startDate) {
            document.getElementById('pattern-user-name').innerText = "Sin Selección";
            return;
        }
        document.getElementById('pattern-user-name').innerText = name;
        document.getElementById('pattern-start-date').innerText = `Inicio: ${startDate}`;
        setPatternRange('1w');
    }

    window.addPatternSlot = (code) => {
        currentPattern.push(code);
        renderSlots();
    };

    function renderSlots() {
        const container = document.getElementById('pattern-slots-container');
        const msg = document.getElementById('pattern-empty-msg');
        container.innerHTML = '';
        container.appendChild(msg);
        msg.classList.toggle('hidden', currentPattern.length > 0);

        currentPattern.forEach((code, index) => {
            const slot = document.createElement('div');
            const colors = { 'M': 'bg-amber-500', 'V': 'bg-blue-500', 'N': 'bg-slate-900', 'D': 'bg-emerald-500' };
            slot.className = `w-10 h-10 ${colors[code]} text-white rounded-xl flex items-center justify-center text-xs font-black shadow-lg relative group cursor-grab active:cursor-grabbing`;
            slot.innerHTML = `
                ${code}
                <button onclick="removeSlot(${index})" class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-white text-red-800 rounded-full shadow-md text-[8px] opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            `;
            slot.draggable = true;
            slot.ondragstart = (e) => e.dataTransfer.setData('text/plain', index);
            slot.ondragover = (e) => e.preventDefault();
            slot.ondrop = (e) => {
                e.preventDefault();
                const from = e.dataTransfer.getData('text/plain');
                const item = currentPattern.splice(from, 1)[0];
                currentPattern.splice(index, 0, item);
                renderSlots();
            };
            container.appendChild(slot);
        });
    }

    window.removeSlot = (i) => { currentPattern.splice(i, 1); renderSlots(); };

    window.setPatternRange = (range) => {
        selectedRange = range;
        document.querySelectorAll('.range-btn').forEach(b => {
            b.classList.toggle('bg-red-800', b.id === `range-btn-${range}`);
            b.classList.toggle('text-white', b.id === `range-btn-${range}`);
            b.classList.toggle('border-red-800', b.id === `range-btn-${range}`);
        });
    };

    function syncTemplates() {
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'planning_templates'), (snap) => {
            const list = document.getElementById('pattern-templates-list');
            if(!list) return;
            list.innerHTML = snap.docs.map(d => {
                const data = d.data();
                return `
                    <div class="p-3 bg-white border border-slate-100 rounded-2xl flex items-center justify-between group/tmp transition-all hover:border-red-100 shadow-sm">
                        <div onclick="loadTemplate('${d.id}')" class="flex-1 cursor-pointer">
                            <p class="text-[9px] font-black text-slate-800 uppercase truncate">${data.name}</p>
                            <p class="text-[7px] font-bold text-slate-400 uppercase tracking-tighter">${data.pattern.join(' → ')}</p>
                        </div>
                        <button onclick="deleteTemplate('${d.id}')" class="p-1.5 text-slate-200 hover:text-red-800 opacity-0 group-hover/tmp:opacity-100 transition-opacity">
                            <i class="fa-solid fa-trash-can text-[10px]"></i>
                        </button>
                    </div>`;
            }).join('');
        });
    }

    window.savePatternAsTemplate = async () => {
        const n = document.getElementById('new-template-name').value.trim();
        if(!n || currentPattern.length === 0) return;
        await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'planning_templates')), { name: n, pattern: currentPattern, createdAt: serverTimestamp() });
        document.getElementById('new-template-name').value = '';
    };

    window.loadTemplate = async (id) => {
        const s = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'planning_templates', id));
        if(s.exists()) { currentPattern = s.data().pattern; renderSlots(); }
    };

    window.deleteTemplate = async (id) => { if(confirm("¿Eliminar plantilla?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'planning_templates', id)); };

    window.runPatternProcess = async () => {
        if(currentPattern.length === 0 || !email) return;
        const btn = document.getElementById('btn-run-pattern');
        btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> PROCESANDO...`;

        const start = new Date(startDate + 'T00:00:00');
        let end = new Date(start);
        if(selectedRange === '1w') end.setDate(start.getDate() + 7);
        else if(selectedRange === '1m') end.setMonth(start.getMonth() + 1);
        else if(selectedRange === '1y') end.setFullYear(start.getFullYear() + 1);
        else end = new Date(document.getElementById('pattern-date-end').value + 'T00:00:00');

        const configSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'user_operational_configs', email));
        const stName = configSnap.exists() ? (configSnap.data().defaultStation || 'General') : 'General';
        const isCC = stName.toLowerCase().includes('centro de control');
        const duration = role && role.toLowerCase().includes('encargado') ? 12 : 8;

        let curr = new Date(start);
        let i = 0;
        try {
            while(curr < end) {
                const dStr = curr.toISOString().split('T')[0];
                const shiftCode = currentPattern[i % currentPattern.length];
                const docId = `${dStr}_${email}`;
                
                let entry = '07:00';
                if (shiftCode === 'M') entry = isCC ? '06:00' : '07:00';
                else if (shiftCode === 'V') entry = isCC ? '14:00' : '13:00';
                else if (shiftCode === 'N') entry = isCC ? '22:00' : '21:00';

                const calcExit = (s, h) => {
                    const [hh, mm] = s.split(':').map(Number);
                    let tm = hh * 60 + mm + (h * 60);
                    return `${String(Math.floor((tm/60)%24)).padStart(2,'0')}:${String(Math.floor(tm%60)).padStart(2,'0')}`;
                };

                let obj = shiftCode === 'D' ? { type: 'ausentismo', reason: 'Descanso', shift: 'M', station: 'General', isConfirmed: true } :
                    { shift: shiftCode, station: stName, type: 'asignacion', assignedEntry: entry, assignedExit: calcExit(entry, duration), shiftDuration: duration, isConfirmed: false };

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId), { email, name, date: dStr, shifts: [obj], type: obj.type, reason: obj.reason || null, updatedAt: serverTimestamp() });
                curr.setDate(curr.getDate() + 1); i++;
            }
            btn.innerHTML = `<i class="fa-solid fa-check"></i> ÉXITO`;
            setTimeout(() => { btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-play"></i> Aplicar Patrón`; window.toggleRightPanel?.(false); }, 1500);
        } catch (e) { console.error(e); btn.disabled = false; btn.innerHTML = "ERROR"; }
    };

    window.applyMultiAbsence = async () => {
        const r = document.getElementById('multi-abs-reason').value;
        const c = parseInt(document.getElementById('multi-abs-days').value);
        if(!c || !email) return;
        const start = new Date(startDate + 'T00:00:00');
        for(let i=0; i < c; i++) {
            const curr = new Date(start); curr.setDate(start.getDate() + i);
            const dStr = curr.toISOString().split('T')[0];
            const obj = { type: 'ausentismo', reason: r, shift: 'M', station: 'General', isConfirmed: true };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', `${dStr}_${email}`), { email, name, date: dStr, shifts: [obj], type: 'ausentismo', reason: r, updatedAt: serverTimestamp() });
        }
        window.toggleRightPanel?.(false);
    };
</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 3px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.3; cursor: pointer; }
</style>
