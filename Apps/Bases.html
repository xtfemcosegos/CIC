<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes construction {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(5deg); }
            75% { transform: translateY(-10px) rotate(-5deg); }
        }
        .anim-worker {
            animation: construction 2s ease-in-out infinite;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 30%;
            background: #7f1d1d;
            border-radius: 10px;
            animation: move 3s linear infinite;
        }
        @keyframes move {
            0% { left: -30%; }
            100% { left: 110%; }
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col items-center justify-center p-10 text-center overflow-hidden">
    
    <div class="anim-worker text-7xl mb-6">
        👷‍♂️
    </div>

    <h2 class="text-xl font-black text-red-900 uppercase tracking-tighter mb-2">
        Módulo en proceso de creación
    </h2>
    
    <p class="text-slate-500 text-sm max-w-xs mb-8 italic">
        "Estamos martillando bits y pegando píxeles. Vuelve pronto o trae café."
    </p>

    <div class="progress-bar max-w-[200px]">
        <div class="progress-fill"></div>
    </div>

    <div class="mt-12 opacity-20">
        <img src="https://img.icons8.com/flat-round/96/shield.png" class="w-12 h-12">
    </div>

</body>
</html>
