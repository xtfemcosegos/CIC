<!-- Apps/Esquema.html: Interfaz avanzada para definir la estructura de datos por rol -->
<div class="max-w-5xl mx-auto p-6 md:p-12 space-y-10 animate-in fade-in duration-500 pb-32">
    
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-slate-100 pb-8">
        <div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                Diseñador de <span class="text-red-800">Esquemas</span>
            </h2>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">
                Define la estructura de información según el rango jerárquico
            </p>
        </div>

        <div class="flex flex-wrap items-center gap-3">
            <!-- Selector de Rol -->
            <div class="flex items-center bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm">
                <label class="text-[9px] font-black uppercase text-slate-400 px-4">Rol a Editar:</label>
                <select id="role-selector" class="bg-slate-50 border-none text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-xl outline-none focus:ring-2 focus:ring-red-800/20 cursor-pointer">
                    <option value="Administrador">Administrador</option>
                    <option value="Operador CCO">Operador CCO</option>
                    <option value="Encargado">Encargado</option>
                    <option value="Guardia">Guardia</option>
                    <option value="Colaborador">Colaborador</option>
                </select>
            </div>

            <!-- Botones de JSON con etiquetas claras -->
            <div class="flex items-center gap-2">
                <button onclick="exportSchemaJSON()" class="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-[10px] font-black uppercase text-slate-500 hover:text-blue-600 hover:border-blue-200 transition-all shadow-sm">
                    <i class="fa-solid fa-file-export"></i>
                    <span>Exportar</span>
                </button>
                <button onclick="triggerImportJSON()" class="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-[10px] font-black uppercase text-slate-500 hover:text-emerald-600 hover:border-emerald-200 transition-all shadow-sm">
                    <i class="fa-solid fa-file-import"></i>
                    <span>Importar</span>
                </button>
                <input type="file" id="json-import-input" class="hidden" accept=".json" onchange="handleImportJSON(this)">
            </div>
        </div>
    </header>

    <div class="flex items-center justify-between bg-red-50 p-6 rounded-[2rem] border border-red-100">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-red-800 rounded-full flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-layer-group text-sm"></i>
            </div>
            <div>
                <h4 class="text-[10px] font-black text-red-900 uppercase tracking-widest">Estructura Global</h4>
                <p class="text-[9px] text-red-700/70 font-bold uppercase">Arrastre elementos para reordenar o use los iconos de lápiz para editar</p>
            </div>
        </div>
        <button onclick="openAddSectionModal()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-md">
            + Añadir Sección
        </button>
    </div>

    <div id="schema-designer-container" class="space-y-8">
        <div class="py-20 text-center opacity-20">
            <i class="fa-solid fa-circle-notch animate-spin text-4xl mb-4 text-red-800"></i>
            <p class="text-[10px] font-black uppercase tracking-[0.3em]">Sincronizando estructura...</p>
        </div>
    </div>

    <!-- MODALES PERSONALIZADOS -->

    <!-- Modal: Nueva/Editar Sección -->
    <div id="modal-section" class="hidden fixed inset-0 z-[250] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeSchemaModals()"></div>
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 relative shadow-2xl animate-in zoom-in duration-300">
            <h3 id="section-modal-title" class="text-xl font-black text-slate-900 tracking-tighter uppercase mb-6 text-center">Sección</h3>
            <input type="hidden" id="edit-section-idx" value="-1">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Título de la Sección</label>
                    <input type="text" id="input-section-title" placeholder="Ej: Equipo Táctico" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800">
                </div>
                <div class="flex gap-4">
                    <button onclick="closeSchemaModals()" class="flex-1 p-4 text-[10px] font-black uppercase text-slate-400">Cancelar</button>
                    <button onclick="handleSaveSection()" id="btn-save-section" class="flex-[2] bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase hover:bg-red-800 shadow-lg">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Nueva/Editar Campo -->
    <div id="modal-field" class="hidden fixed inset-0 z-[250] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeSchemaModals()"></div>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 relative shadow-2xl animate-in zoom-in duration-300">
            <h3 id="field-modal-title" class="text-xl font-black text-slate-900 tracking-tighter uppercase mb-6 text-center">Campo</h3>
            <input type="hidden" id="target-sec-idx">
            <input type="hidden" id="edit-field-idx" value="-1">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Campo (Etiqueta)</label>
                    <input type="text" id="input-field-label" placeholder="Ej: Número de Placa" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Tipo de Entrada</label>
                        <select id="select-field-type" onchange="toggleOptionsVisibility(this.value)" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-[11px] font-bold outline-none focus:border-red-800 cursor-pointer">
                            <option value="text">Texto</option>
                            <option value="number">Número</option>
                            <option value="email">Correo Electrónico</option>
                            <option value="tel">Teléfono / Contacto</option>
                            <option value="map">Ubicación / Mapa</option>
                            <option value="date">Fecha</option>
                            <option value="checkbox">Interruptor (Sí/No)</option>
                            <option value="select">Lista de Selección</option>
                        </select>
                    </div>
                    <div id="field-options-area" class="hidden space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Opciones (Comas)</label>
                        <input type="text" id="input-field-options" placeholder="Opción 1, Opción 2..." class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800">
                    </div>
                </div>
                <div class="flex gap-4 pt-2">
                    <button onclick="closeSchemaModals()" class="flex-1 p-4 text-[10px] font-black uppercase text-slate-400">Cancelar</button>
                    <button onclick="handleSaveField()" class="flex-[2] bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase hover:bg-red-800 shadow-lg">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Confirmación -->
    <div id="modal-confirm" class="hidden fixed inset-0 z-[300] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-md" onclick="closeSchemaModals()"></div>
        <div class="bg-white w-full max-w-xs rounded-[3rem] p-10 relative shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i id="confirm-icon" class="fa-solid fa-trash-can text-2xl"></i>
            </div>
            <h3 id="confirm-title" class="text-lg font-black text-slate-900 uppercase tracking-tight mb-2">Confirmar</h3>
            <p id="confirm-msg" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-relaxed mb-8">Esta acción es permanente.</p>
            <div class="space-y-3" id="confirm-buttons">
                <button id="btn-confirm-action" class="w-full bg-red-600 text-white p-4 rounded-2xl text-[10px] font-black uppercase hover:bg-red-800 transition-all">Aceptar</button>
                <button onclick="closeSchemaModals()" class="w-full p-4 text-[10px] font-black uppercase text-slate-400">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    const db = getFirestore();
    const appId = 'cic5-pp';
    let currentRole = "Administrador";
    let currentSchema = null;

    // Variables para Drag & Drop
    let draggedSectionIdx = null;
    let draggedFieldInfo = null; // { sIdx, fIdx }

    const roleSelector = document.getElementById('role-selector');
    roleSelector.onchange = (e) => loadRoleSchema(e.target.value);

    window.loadRoleSchema = (role) => {
        currentRole = role;
        const schemaRef = doc(db, 'artifacts', appId, 'public', 'data', 'role_schemas', role);
        
        onSnapshot(schemaRef, (snap) => {
            if (snap.exists()) {
                currentSchema = snap.data();
                renderDesigner(currentSchema.sections || []);
            } else {
                setDoc(schemaRef, { sections: [], updatedAt: serverTimestamp() });
            }
        });
    };

    function renderDesigner(sections) {
        const container = document.getElementById('schema-designer-container');
        
        if (sections.length === 0) {
            container.innerHTML = `
                <div class="bg-white border-2 border-dashed border-slate-200 rounded-[3rem] p-20 text-center opacity-40">
                    <i class="fa-solid fa-object-ungroup text-5xl mb-6"></i>
                    <p class="text-[11px] font-black uppercase tracking-[0.3em]">No hay secciones definidas</p>
                </div>`;
            return;
        }

        container.innerHTML = sections.map((sec, sIdx) => `
            <div class="bg-white border border-slate-100 rounded-[3rem] p-8 md:p-12 shadow-sm relative overflow-hidden group/sec animate-in slide-in-from-bottom-2" 
                 draggable="true" 
                 ondragstart="event.stopPropagation(); handleSectionDragStart(${sIdx})" 
                 ondragover="handleSectionDragOver(event, ${sIdx})" 
                 ondrop="handleSectionDrop(${sIdx})">
                
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-4">
                        <div class="cursor-grab active:cursor-grabbing text-slate-300 hover:text-red-800 transition-colors p-2">
                            <i class="fa-solid fa-grip-vertical"></i>
                        </div>
                        <h4 class="text-xs font-black text-slate-900 uppercase tracking-[0.2em] border-l-4 border-red-800 pl-4">${sec.title}</h4>
                        <button onclick="openEditSectionModal(${sIdx})" class="text-slate-300 hover:text-slate-900 transition-colors" title="Renombrar Sección">
                            <i class="fa-solid fa-pen text-[10px]"></i>
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openAddFieldModal(${sIdx})" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-red-800 transition-all flex items-center justify-center hover:shadow-inner" title="Añadir Campo">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                        <button onclick="requestDeleteSection(${sIdx})" class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-red-600 transition-all flex items-center justify-center hover:shadow-inner" title="Eliminar Sección">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8" ondragover="event.preventDefault()">
                    ${sec.fields.length === 0 ? `
                        <div class="col-span-full py-8 text-center bg-slate-50/50 rounded-2xl border border-dashed border-slate-200">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Sin campos</p>
                        </div>
                    ` : sec.fields.map((field, fIdx) => `
                        <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 relative group/field hover:border-red-800/20 transition-all cursor-move" 
                             draggable="true" 
                             ondragstart="event.stopPropagation(); handleFieldDragStart(${sIdx}, ${fIdx})" 
                             ondragover="handleFieldDragOver(event)" 
                             ondrop="event.stopPropagation(); handleFieldDrop(${sIdx}, ${fIdx})">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2">
                                    <i class="fa-solid fa-grip-lines text-[10px] text-slate-200"></i>
                                    <span class="text-[8px] font-black bg-white px-2 py-1 rounded text-slate-400 uppercase border border-slate-100">${field.type}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="openEditFieldModal(${sIdx}, ${fIdx})" class="opacity-0 group-hover/field:opacity-100 text-slate-300 hover:text-slate-900 transition-all" title="Editar Campo">
                                        <i class="fa-solid fa-pen text-[10px]"></i>
                                    </button>
                                    <button onclick="requestDeleteField(${sIdx}, ${fIdx})" class="opacity-0 group-hover/field:opacity-100 text-slate-300 hover:text-red-600 transition-all" title="Eliminar Campo">
                                        <i class="fa-solid fa-circle-xmark text-xs"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="text-[10px] font-black text-slate-900 uppercase tracking-widest">${field.label}</p>
                            ${renderFieldPreview(field)}
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function renderFieldPreview(field) {
        const base = "mt-3 w-full bg-white/60 border border-slate-200 p-3 rounded-xl text-[9px] font-bold text-slate-300 uppercase pointer-events-none";
        switch(field.type) {
            case 'checkbox': return `<div class="mt-3 flex items-center gap-2"><div class="w-4 h-4 bg-white border border-slate-200 rounded"></div><span class="text-[8px] font-bold text-slate-300 uppercase">Interruptor</span></div>`;
            case 'map': return `<div class="${base} flex items-center gap-2"><i class="fa-solid fa-location-dot"></i> Ubicación</div>`;
            case 'email': return `<div class="${base} flex items-center gap-2"><i class="fa-solid fa-envelope"></i> Email</div>`;
            case 'tel': return `<div class="${base} flex items-center gap-2"><i class="fa-solid fa-phone"></i> Teléfono</div>`;
            case 'select': return `<div class="${base} flex items-center justify-between"><span>Lista</span><i class="fa-solid fa-chevron-down"></i></div>`;
            default: return `<div class="${base}">Entrada (${field.type})</div>`;
        }
    }

    // --- LÓGICA DRAG & DROP ---

    window.handleSectionDragStart = (idx) => { draggedSectionIdx = idx; };
    window.handleSectionDragOver = (e, idx) => { e.preventDefault(); };
    window.handleSectionDrop = async (targetIdx) => {
        if (draggedSectionIdx === null || draggedSectionIdx === targetIdx) return;
        const sections = [...currentSchema.sections];
        const [movedSection] = sections.splice(draggedSectionIdx, 1);
        sections.splice(targetIdx, 0, movedSection);
        await saveSchemaToDB({ sections });
        draggedSectionIdx = null;
    };

    window.handleFieldDragStart = (sIdx, fIdx) => { draggedFieldInfo = { sIdx, fIdx }; };
    window.handleFieldDragOver = (e) => { e.preventDefault(); };
    window.handleFieldDrop = async (targetSIdx, targetFIdx) => {
        if (!draggedFieldInfo) return;
        const sections = JSON.parse(JSON.stringify(currentSchema.sections));
        const [movedField] = sections[draggedFieldInfo.sIdx].fields.splice(draggedFieldInfo.fIdx, 1);
        sections[targetSIdx].fields.splice(targetFIdx, 0, movedField);
        await saveSchemaToDB({ sections });
        draggedFieldInfo = null;
    };

    // --- ACCIONES DE MODALES ---

    window.closeSchemaModals = () => {
        ['modal-section', 'modal-field', 'modal-confirm'].forEach(id => document.getElementById(id).classList.add('hidden'));
    };

    window.openAddSectionModal = () => {
        document.getElementById('edit-section-idx').value = "-1";
        document.getElementById('section-modal-title').innerHTML = "Nueva <span class='text-red-800'>Sección</span>";
        document.getElementById('modal-section').classList.remove('hidden');
        document.getElementById('input-section-title').value = "";
        document.getElementById('input-section-title').focus();
    };

    window.openEditSectionModal = (idx) => {
        document.getElementById('edit-section-idx').value = idx;
        document.getElementById('section-modal-title').innerHTML = "Renombrar <span class='text-red-800'>Sección</span>";
        document.getElementById('input-section-title').value = currentSchema.sections[idx].title;
        document.getElementById('modal-section').classList.remove('hidden');
        document.getElementById('input-section-title').focus();
    };

    window.handleSaveSection = async () => {
        const title = document.getElementById('input-section-title').value.trim();
        const editIdx = parseInt(document.getElementById('edit-section-idx').value);
        if (!title) return;
        
        const sections = [...currentSchema.sections];
        if (editIdx >= 0) {
            sections[editIdx].title = title;
        } else {
            sections.push({ title, fields: [] });
        }
        
        await saveSchemaToDB({ sections });
        closeSchemaModals();
    };

    window.openAddFieldModal = (sIdx) => {
        document.getElementById('target-sec-idx').value = sIdx;
        document.getElementById('edit-field-idx').value = "-1";
        document.getElementById('field-modal-title').innerHTML = "Añadir <span class='text-red-800'>Campo</span>";
        document.getElementById('modal-field').classList.remove('hidden');
        document.getElementById('input-field-label').value = "";
        document.getElementById('select-field-type').value = "text";
        document.getElementById('input-field-options').value = "";
        document.getElementById('field-options-area').classList.add('hidden');
    };

    window.openEditFieldModal = (sIdx, fIdx) => {
        const field = currentSchema.sections[sIdx].fields[fIdx];
        document.getElementById('target-sec-idx').value = sIdx;
        document.getElementById('edit-field-idx').value = fIdx;
        document.getElementById('field-modal-title').innerHTML = "Editar <span class='text-red-800'>Campo</span>";
        document.getElementById('modal-field').classList.remove('hidden');
        
        document.getElementById('input-field-label').value = field.label;
        document.getElementById('select-field-type').value = field.type;
        document.getElementById('input-field-options').value = field.options ? field.options.join(', ') : "";
        
        toggleOptionsVisibility(field.type);
        document.getElementById('input-field-label').focus();
    };

    window.toggleOptionsVisibility = (val) => {
        document.getElementById('field-options-area').classList.toggle('hidden', val !== 'select');
    };

    window.handleSaveField = async () => {
        const sIdx = parseInt(document.getElementById('target-sec-idx').value);
        const fIdx = parseInt(document.getElementById('edit-field-idx').value);
        const label = document.getElementById('input-field-label').value.trim();
        const type = document.getElementById('select-field-type').value;
        const optRaw = document.getElementById('input-field-options').value;

        if (!label) return;

        const sections = JSON.parse(JSON.stringify(currentSchema.sections));
        const fieldData = { label, type };
        if (type === 'select') fieldData.options = optRaw.split(',').map(o => o.trim()).filter(o => o);

        if (fIdx >= 0) {
            sections[sIdx].fields[fIdx] = fieldData;
        } else {
            sections[sIdx].fields.push(fieldData);
        }
        
        await saveSchemaToDB({ sections });
        closeSchemaModals();
    };

    // --- IMPORT / EXPORT JSON ---

    window.exportSchemaJSON = () => {
        if (!currentSchema) return;
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentSchema, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `Esquema_${currentRole.replace(' ', '_')}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    };

    window.triggerImportJSON = () => { document.getElementById('json-import-input').click(); };

    window.handleImportJSON = (input) => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const json = JSON.parse(e.target.result);
                if (!json.sections || !Array.isArray(json.sections)) throw new Error("Inválido");
                const btn = document.getElementById('btn-confirm-action');
                document.getElementById('confirm-title').innerText = "Importar";
                document.getElementById('confirm-msg').innerText = `¿Sobrescribir esquema de ${currentRole}?`;
                document.getElementById('modal-confirm').classList.remove('hidden');
                btn.onclick = async () => { await saveSchemaToDB({ sections: json.sections }); closeSchemaModals(); input.value = ""; };
            } catch (err) { alert("Error JSON"); input.value = ""; }
        };
        reader.readAsText(file);
    };

    // --- ELIMINACIÓN ---

    window.requestDeleteSection = (sIdx) => {
        const btn = document.getElementById('btn-confirm-action');
        document.getElementById('confirm-title').innerText = "¿Eliminar Sección?";
        document.getElementById('confirm-msg').innerText = "Se perderán todos los campos y el orden establecido de esta sección.";
        document.getElementById('modal-confirm').classList.remove('hidden');
        btn.onclick = async () => {
            const sections = [...currentSchema.sections];
            sections.splice(sIdx, 1);
            await saveSchemaToDB({ sections });
            closeSchemaModals();
        };
    };

    window.requestDeleteField = (sIdx, fIdx) => {
        const btn = document.getElementById('btn-confirm-action');
        document.getElementById('confirm-title').innerText = "¿Eliminar Campo?";
        document.getElementById('confirm-msg').innerText = "¿Está seguro de eliminar este campo del esquema global del rol?";
        document.getElementById('modal-confirm').classList.remove('hidden');
        btn.onclick = async () => {
            const sections = [...currentSchema.sections];
            sections[sIdx].fields.splice(fIdx, 1);
            await saveSchemaToDB({ sections });
            closeSchemaModals();
        };
    };

    async function saveSchemaToDB(data) {
        try {
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'role_schemas', currentRole);
            await updateDoc(ref, { ...data, updatedAt: serverTimestamp() });
        } catch (err) { console.error("Error DB:", err); }
    }

    loadRoleSchema("Administrador");
</script>

<style>
    .animate-in { animation: schema-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes schema-enter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .cursor-grab { cursor: grab; }
    .cursor-grabbing { cursor: grabbing; }
</style>
