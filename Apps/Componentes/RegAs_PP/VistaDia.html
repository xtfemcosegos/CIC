<!-- Vista Operativa Diaria Refinada - Arquitectura de Pestañas y Listas -->
<div id="vista-dia-content" class="max-w-[1600px] mx-auto px-4 md:px-6 space-y-8 animate-in fade-in duration-700 pb-32 pt-6">
    
    <!-- BLOQUE DE TURNOS -->
    <section id="duty-section" class="bg-white rounded-[2.5rem] border border-slate-200/60 shadow-sm overflow-hidden flex flex-col min-h-[600px] transition-all duration-300">
        <!-- BARRA DE PESTAÑAS (Ahora visible en todos los dispositivos) -->
        <div class="flex items-center justify-center bg-slate-50 border-b border-slate-100 p-3 gap-2">
            <button onclick="switchActiveTab('M')" id="tab-M" class="px-8 py-3 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all text-slate-400 bg-white hover:bg-slate-100">Matutino</button>
            <button onclick="switchActiveTab('V')" id="tab-V" class="px-8 py-3 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all text-slate-400 bg-white hover:bg-slate-100">Vespertino</button>
            <button onclick="switchActiveTab('N')" id="tab-N" class="px-8 py-3 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all text-slate-400 bg-white hover:bg-slate-100">Nocturno</button>
        </div>

        <!-- CONTENEDOR DE TURNOS (Ancho completo) -->
        <div class="flex-1 h-full">
            <!-- Columna Matutino -->
            <div id="col-M" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'M')" class="flex flex-col shift-column w-full">
                <div class="sticky top-0 z-20 bg-amber-50/80 backdrop-blur-md px-8 py-5 border-b border-amber-100/50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-amber-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-amber-500/20">
                            <i class="fa-solid fa-sun text-sm"></i>
                        </div>
                        <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest">Distribución Matutina</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[10px] font-bold text-slate-500 uppercase hover:text-amber-700 flex items-center gap-2 transition-all">
                        <i id="toggle-icon-M" class="fa-solid fa-eye-slash"></i>
                        <span id="toggle-text-M">Cerrados</span>
                    </button>
                </div>
                <div id="list-M" class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>

            <!-- Columna Vespertino -->
            <div id="col-V" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'V')" class="hidden flex flex-col shift-column w-full">
                <div class="sticky top-0 z-20 bg-blue-50/80 backdrop-blur-md px-8 py-5 border-b border-blue-100/50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                            <i class="fa-solid fa-cloud-sun text-sm"></i>
                        </div>
                        <h3 class="text-xs font-black text-slate-900 uppercase tracking-widest">Distribución Vespertina</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[10px] font-bold text-slate-500 uppercase hover:text-blue-700 flex items-center gap-2 transition-all">
                        <i id="toggle-icon-V" class="fa-solid fa-eye-slash"></i>
                        <span id="toggle-text-V">Cerrados</span>
                    </button>
                </div>
                <div id="list-V" class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>

            <!-- Columna Nocturno -->
            <div id="col-N" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'N')" class="hidden flex flex-col shift-column w-full">
                <div class="sticky top-0 z-20 bg-slate-900 px-8 py-5 border-b border-white/5 flex items-center justify-between text-white">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-slate-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                            <i class="fa-solid fa-moon text-sm"></i>
                        </div>
                        <h3 class="text-xs font-black uppercase tracking-widest">Distribución Nocturna</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[10px] font-bold text-slate-400 uppercase hover:text-white flex items-center gap-2 transition-all">
                        <i id="toggle-icon-N" class="fa-solid fa-eye-slash"></i>
                        <span id="toggle-text-N">Cerrados</span>
                    </button>
                </div>
                <div id="list-N" class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>
        </div>
    </section>

    <!-- BLOQUE DE INASISTENCIAS -->
    <section id="absence-section" class="space-y-6 transition-all duration-300 pb-20">
        <div class="flex items-center gap-4 px-2">
            <div class="w-12 h-12 bg-red-800 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-red-800/20">
                <i class="fa-solid fa-user-xmark text-lg"></i>
            </div>
            <div>
                <h3 class="text-sm font-black text-red-900 uppercase tracking-widest leading-none">Gestión de Inasistencias</h3>
                <p class="text-[10px] font-bold text-red-800/50 uppercase tracking-tighter mt-1">Arrastra personal directamente a la categoría correspondiente</p>
            </div>
        </div>
        
        <div id="container-ABS" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">
            <!-- Inyectado por renderAll -->
        </div>
    </section>
</div>

<!-- Menú Contextual para Asignación -->
<div id="custom-context-menu" class="fixed z-[300] hidden min-w-[220px] bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 animate-in fade-in zoom-in-95 duration-100 overflow-visible text-slate-900">
    <div class="px-4 py-2 border-b border-slate-100 mb-1">
        <p id="menu-user-name" class="text-xs font-black uppercase text-slate-900 truncate">Usuario</p>
        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Asignar a Caseta</p>
    </div>
    <div id="stations-menu-list" class="max-h-[400px] overflow-y-visible"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, setDoc, doc, getDoc, updateDoc, getDocs, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'cic5-pp';

    let allUsers = [];
    let currentStations = [];
    let rawAssignments = [];
    let rawStationStatuses = [];
    let stationDailyStatuses = {}; 
    let showClosedStations = false; 
    let selectedElementForAction = null;
    
    const absenceReasons = ['Descanso', 'Permiso', 'Vacaciones', 'Falta', 'Incapacidad', 'Suspensión'];
    const getDateInput = () => document.getElementById('view-date-input');

    // --- LÓGICA DE HORARIOS Y DURACIÓN ---
    function calculateDuration(start, end) {
        if (!start || !end) return 0;
        const [h1, m1] = start.split(':').map(Number);
        const [h2, m2] = end.split(':').map(Number);
        let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (diff < 0) diff += 24 * 60; 
        return Math.round((diff / 60) * 10) / 10;
    }

    function calculateExitTime(start, hours) {
        if (!start) return "";
        const [h, m] = start.split(':').map(Number);
        let totalMinutes = h * 60 + m + (parseFloat(hours) * 60);
        let finalH = Math.floor((totalMinutes / 60) % 24);
        let finalM = Math.floor(totalMinutes % 60);
        return `${String(finalH).padStart(2, '0')}:${String(finalM).padStart(2, '0')}`;
    }

    function getCalculatedTimes(shift, stationName) {
        const isCC = stationName.toLowerCase().includes('centro de control');
        const duration = 8; // Turnos de 8 horas por defecto
        if (shift === 'M') return isCC ? { in: '06:00', out: '14:00' } : { in: '07:00', out: '15:00' };
        if (shift === 'V') return isCC ? { in: '14:00', out: '22:00' } : { in: '13:00', out: '21:00' };
        if (shift === 'N') return isCC ? { in: '22:00', out: '06:00' } : { in: '21:00', out: '05:00' };
        return { in: '07:00', out: '15:00' };
    }

    onAuthStateChanged(auth, (user) => { if (user) { initDateLogic(); syncData(); } });

    function initDateLogic() {
        const dateInput = getDateInput();
        if(!dateInput) { setTimeout(initDateLogic, 200); return; }
        if(!dateInput.value) {
            const now = new Date();
            if (now.getHours() < 5) now.setDate(now.getDate() - 1);
            dateInput.value = now.toISOString().split('T')[0];
        }
        window.loadDailyView = () => renderAll();
        // Inicializar con el turno actual
        const hour = new Date().getHours();
        let currentShift = 'M';
        if (hour >= 13 && hour < 21) currentShift = 'V';
        else if (hour >= 21 || hour < 7) currentShift = 'N';
        setTimeout(() => switchActiveTab(currentShift), 500);
        renderAll();
    }

    async function syncData() {
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
            allUsers = snap.docs.map(d => d.data());
            renderAll();
        });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stations'), (snap) => {
            currentStations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderAll();
        });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'), (snap) => {
            rawAssignments = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
            renderAll();
        });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'station_daily_status'), (snap) => {
            rawStationStatuses = snap.docs.map(d => d.data());
            renderAll();
        });
    }

    window.allowDrop = (ev) => ev.preventDefault();

    window.handleDragStartInternal = (ev, email) => {
        ev.dataTransfer.setData("text/elementEmail", email);
        ev.dataTransfer.effectAllowed = "move";
    };

    window.handleDrop = async (ev, shift, absenceReason = null) => {
        ev.preventDefault();
        const email = ev.dataTransfer.getData("text/elementEmail");
        const dateInput = getDateInput();
        if(!email || !dateInput) return;

        const user = allUsers.find(u => u.email === email);
        if(!user) return;

        const stationEl = ev.target.closest('.station-container');
        const stationName = shift === 'ABS' ? 'General' : (stationEl ? stationEl.dataset.stationName : 'General');

        const id = `${dateInput.value}_${email}`;
        const isAbs = shift === 'ABS';
        const times = isAbs ? { in: null, out: null } : getCalculatedTimes(shift, stationName);

        const data = {
            email,
            name: user.name,
            date: dateInput.value,
            shift: isAbs ? 'M' : shift, 
            station: stationName,
            type: isAbs ? 'ausentismo' : 'asignacion',
            isConfirmed: false,
            assignedEntry: times.in,
            assignedExit: times.out,
            shiftDuration: isAbs ? 0 : 8, // Default 8 horas
            updatedAt: serverTimestamp()
        };

        if(isAbs) data.reason = absenceReason || 'Falta';
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id), data);
    };

    function renderAll() {
        const dateInput = getDateInput();
        if(!dateInput || !dateInput.value) return;
        const targetDate = dateInput.value;

        const displayDate = document.getElementById('current-view-date');
        if (displayDate) displayDate.innerText = `Jornada: ${targetDate}`;

        const currentDayAssignments = rawAssignments.filter(a => a.date === targetDate);
        stationDailyStatuses = {};
        rawStationStatuses.forEach(d => { if (d.date === targetDate) stationDailyStatuses[`${d.shift}_${d.stationId}`] = d.isClosed; });

        ['M', 'V', 'N'].forEach(shift => {
            const listContainer = document.getElementById(`list-${shift}`);
            if (!listContainer) return;
            listContainer.innerHTML = '';
            
            const sortedStations = [...currentStations].sort((a, b) => (a.order || 0) - (b.order || 0));
            sortedStations.forEach(st => {
                const isClosed = stationDailyStatuses[`${shift}_${st.id}`] || false;
                const elements = [];
                
                currentDayAssignments.forEach(doc => {
                    if (doc.shifts && doc.shifts.length > 0) {
                        doc.shifts.forEach((s, idx) => {
                            if (s.shift === shift && s.station === st.name && s.type !== 'ausentismo') {
                                elements.push({ ...s, email: doc.email, name: doc.name, docId: doc.docId, isFromShifts: true, shiftIndex: idx });
                            }
                        });
                    } else if (doc.shift === shift && doc.station === st.name && doc.type !== 'ausentismo') {
                        elements.push(doc);
                    }
                });

                if (!isClosed || showClosedStations) {
                    listContainer.appendChild(createStationSection(st, shift, elements, isClosed));
                }
            });
        });

        // Renderizar Ausentismos
        const absContainer = document.getElementById('container-ABS');
        if (absContainer) {
            absContainer.innerHTML = '';
            absenceReasons.forEach(reason => {
                const elements = currentDayAssignments.filter(a => {
                    if (a.shifts && a.shifts.length > 0) {
                        return a.shifts.some(s => s.type === 'ausentismo' && s.reason === reason);
                    }
                    return a.type === 'ausentismo' && a.reason === reason;
                });
                absContainer.appendChild(createAbsenceSection(reason, elements));
            });
        }
    }

    function createAbsenceSection(reason, elements) {
        const section = document.createElement('div');
        section.className = "bg-white p-5 rounded-[2rem] border border-slate-200/60 shadow-sm space-y-5 flex flex-col transition-all hover:border-red-100";
        
        section.ondragover = (e) => allowDrop(e);
        section.ondrop = (e) => handleDrop(e, 'ABS', reason);

        const reasonColors = {
            'Falta': 'bg-red-500',
            'Vacaciones': 'bg-emerald-500',
            'Descanso': 'bg-slate-400',
            'Incapacidad': 'bg-blue-500',
            'Suspensión': 'bg-orange-500',
            'Permiso': 'bg-purple-500'
        };
        const colorClass = reasonColors[reason] || 'bg-slate-400';

        section.innerHTML = `
            <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-1 text-slate-900">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-4 ${colorClass} rounded-full"></div>
                    <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-600">${reason}</h4>
                </div>
                <span class="text-xs font-bold text-slate-300">${elements.length}</span>
            </div>
            <div class="space-y-3 flex-1">
                ${elements.length > 0 ? elements.map(el => renderElementRow(el, true)).join('') : `<div class="py-4 text-center border-2 border-dashed border-slate-50 rounded-2xl text-[8px] font-bold text-slate-200 uppercase tracking-widest">Vacío</div>`}
            </div>`;
        return section;
    }

    function createStationSection(st, shift, elements, isClosed) {
        const section = document.createElement('div');
        section.className = `station-container space-y-4 transition-all ${isClosed ? 'opacity-40 grayscale bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-200' : ''}`;
        section.dataset.stationName = st.name;
        
        section.innerHTML = `
            <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4 text-slate-900">
                <h4 class="text-[10px] font-black uppercase tracking-widest ${isClosed ? 'text-slate-400' : 'text-slate-500'}">${st.name}</h4>
                <div class="flex items-center gap-2">
                    ${isClosed ? `<button onclick="window.toggleStationStatus('${st.id}', '${shift}', true)" class="text-[9px] font-black text-emerald-600 uppercase">Abrir</button>` : `<button onclick="window.toggleStationStatus('${st.id}', '${shift}', false)" class="text-[9px] font-black text-slate-300 hover:text-red-800 uppercase transition-colors">Cerrar</button>`}
                    <span class="w-6 h-6 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-400">${elements.length}</span>
                </div>
            </div>
            <div class="space-y-3">
                ${elements.length > 0 ? elements.map(el => renderElementRow(el)).join('') : (isClosed ? '' : `<div class="py-5 border-2 border-dashed border-slate-50 flex items-center justify-center text-[9px] font-bold text-slate-300 uppercase tracking-widest rounded-2xl">Sin personal</div>`)}
            </div>`;
        return section;
    }

    function renderElementRow(el, isAbsence = false) {
        const u = allUsers.find(usr => usr.email === el.email) || { photo: null, name: 'S/N' };
        const isConfirmed = el.isConfirmed === true;
        const entry = el.assignedEntry || '--:--';
        const exit = el.assignedExit || '--:--';
        const duration = el.shiftDuration || (el.assignedEntry && el.assignedExit ? calculateDuration(entry, exit) : 8);
        
        const timeInfo = isAbsence ? '' : `<p class="text-[9px] font-black uppercase tracking-tighter text-slate-400">${entry} a ${exit} · ${duration}H</p>`;

        let actionBtn = "";
        if (!isAbsence) {
            if (!el.realEntry) {
                actionBtn = `<button onclick="event.stopPropagation(); window.quickRegisterEntry('${el.docId}', ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-9 h-9 flex items-center justify-center bg-emerald-500 text-white rounded-xl shadow-lg shadow-emerald-500/20 hover:bg-emerald-600 transition-all active:scale-90" title="Entrada Rápida"><i class="fa-solid fa-right-to-bracket text-xs"></i></button>`;
            } else if (!el.realExit) {
                actionBtn = `<button onclick="event.stopPropagation(); window.quickRegisterExit('${el.docId}', ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-9 h-9 flex items-center justify-center bg-red-800 text-white rounded-xl shadow-lg shadow-red-800/20 hover:bg-red-900 transition-all active:scale-90" title="Salida Rápida"><i class="fa-solid fa-right-from-bracket text-xs"></i></button>`;
            } else {
                actionBtn = `<div class="w-9 h-9 flex items-center justify-center bg-slate-100 text-slate-400 rounded-xl" title="Finalizado"><i class="fa-solid fa-check text-xs"></i></div>`;
            }
        }

        let configCard = "";
        if (!isConfirmed && !isAbsence) {
            configCard = `
                <div class="mt-3 p-4 bg-red-50 border border-red-100 rounded-2xl space-y-4 animate-in slide-in-from-top-1 shadow-inner" onclick="event.stopPropagation()">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[8px] font-black text-red-900 uppercase block mb-1">Entrada</label>
                            <input type="time" value="${entry}" onchange="window.updateTimeConfig('${el.docId}', 'assignedEntry', this.value, ${duration}, ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-full text-xs font-bold bg-white border border-red-200 rounded-xl p-2 outline-none focus:ring-2 focus:ring-red-500 text-slate-900 shadow-sm">
                        </div>
                        <div>
                            <label class="text-[8px] font-black text-red-900 uppercase block mb-1">Duración (H)</label>
                            <input type="number" value="${duration}" onchange="window.updateTimeConfig('${el.docId}', 'shiftDuration', this.value, null, ${el.isFromShifts || false}, ${el.shiftIndex || 0}, '${entry}')" class="w-full text-xs font-bold bg-white border border-red-200 rounded-xl p-2 outline-none focus:ring-2 focus:ring-red-500 text-slate-900 shadow-sm">
                        </div>
                    </div>
                    <button onclick="window.confirmAssignment('${el.docId}', ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-full py-3 bg-slate-900 text-white text-[10px] font-black uppercase rounded-xl hover:bg-emerald-600 transition-all shadow-md">Confirmar Asignación</button>
                </div>
            `;
        }

        return `
            <div draggable="true" ondragstart="window.handleDragStartInternal(event, '${el.email}')"
                 class="p-3.5 bg-white rounded-2xl border border-slate-100 hover:border-red-200 transition-all group/row shadow-sm cursor-grab active:cursor-grabbing" onclick="window.viewElementDetail('${el.email}')">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4 min-w-0">
                        <div class="w-10 h-10 rounded-2xl overflow-hidden border border-slate-100 relative bg-slate-50 shrink-0 shadow-sm">
                            ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-user text-sm"></i></div>`}
                        </div>
                        <div class="truncate">
                            <p class="text-xs font-black uppercase tracking-tight text-slate-800 truncate leading-none mb-1">${u.name}</p>
                            ${timeInfo}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        ${actionBtn}
                        <button onclick="event.stopPropagation(); window.deleteAssignment('${el.docId}')" class="p-2 text-slate-200 hover:text-red-800 transition-colors shrink-0"><i class="fa-solid fa-circle-xmark text-sm"></i></button>
                    </div>
                </div>
                ${configCard}
            </div>`;
    }

    // --- ACCIONES DE FIREBASE ---

    window.quickRegisterEntry = async (id, isFromShifts, shiftIndex) => {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        try {
            if (isFromShifts) {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const data = snap.data();
                    data.shifts[shiftIndex].realEntry = timeStr;
                    await updateDoc(docRef, { shifts: data.shifts, updatedAt: serverTimestamp() });
                }
            } else {
                await updateDoc(docRef, { realEntry: timeStr, updatedAt: serverTimestamp() });
            }
        } catch (e) { console.error(e); }
    };

    window.quickRegisterExit = async (id, isFromShifts, shiftIndex) => {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        try {
            if (isFromShifts) {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const data = snap.data();
                    data.shifts[shiftIndex].realExit = timeStr;
                    await updateDoc(docRef, { shifts: data.shifts, updatedAt: serverTimestamp() });
                }
            } else {
                await updateDoc(docRef, { realExit: timeStr, updatedAt: serverTimestamp() });
            }
        } catch (e) { console.error(e); }
    };

    window.updateTimeConfig = async (id, field, value, currentDuration, isFromShifts, shiftIndex, currentEntry) => {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        try {
            if (isFromShifts) {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const data = snap.data();
                    const s = data.shifts[shiftIndex];
                    if (field === 'assignedEntry') {
                        s.assignedEntry = value;
                        s.assignedExit = calculateExitTime(value, currentDuration);
                    } else if (field === 'shiftDuration') {
                        s.shiftDuration = parseFloat(value);
                        s.assignedExit = calculateExitTime(currentEntry, value);
                    }
                    await updateDoc(docRef, { shifts: data.shifts, updatedAt: serverTimestamp() });
                }
            } else {
                const updateObj = {};
                if (field === 'assignedEntry') {
                    updateObj.assignedEntry = value;
                    updateObj.assignedExit = calculateExitTime(value, currentDuration);
                } else if (field === 'shiftDuration') {
                    updateObj.shiftDuration = parseFloat(value);
                    updateObj.assignedExit = calculateExitTime(currentEntry, value);
                }
                updateObj.updatedAt = serverTimestamp();
                await updateDoc(docRef, updateObj);
            }
        } catch (e) { console.error(e); }
    };

    window.confirmAssignment = async (id, isFromShifts, shiftIndex) => {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        try {
            if (isFromShifts) {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const data = snap.data();
                    // Marcamos el turno específico como confirmado
                    data.shifts[shiftIndex].isConfirmed = true;
                    await updateDoc(docRef, { shifts: data.shifts, updatedAt: serverTimestamp() });
                }
            } else {
                // Confirmación simple a nivel de raíz
                await updateDoc(docRef, { isConfirmed: true, updatedAt: serverTimestamp() });
            }
            console.log("Asignación confirmada:", id);
        } catch (e) { console.error("Error al confirmar:", e); }
    };

    window.deleteAssignment = async (id) => {
        if (confirm("¿Eliminar asignación?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id));
    };

    window.toggleStationStatus = async (stationId, shift, currentStatus) => {
        const dateInput = getDateInput();
        if(!dateInput) return;
        const statusRef = doc(db, 'artifacts', appId, 'public', 'data', 'station_daily_status', `${dateInput.value}_${shift}_${stationId}`);
        await setDoc(statusRef, { stationId, date: dateInput.value, shift, isClosed: !currentStatus, updatedAt: serverTimestamp() });
    };

    window.toggleClosedStations = () => { showClosedStations = !showClosedStations; renderAll(); };

    window.switchActiveTab = (shift) => {
        ['M','V','N'].forEach(s => {
            const col = document.getElementById(`col-${s}`);
            const tab = document.getElementById(`tab-${s}`);
            if(!col || !tab) return;
            
            if (s === shift) {
                col.classList.remove('hidden');
                tab.classList.replace('text-slate-400', 'text-white');
                tab.classList.replace('bg-white', 'bg-slate-900');
                tab.classList.add('shadow-lg');
            } else {
                col.classList.add('hidden');
                tab.classList.replace('text-white', 'text-slate-400');
                tab.classList.replace('bg-slate-900', 'bg-white');
                tab.classList.remove('shadow-lg');
            }
        });
    };

    window.viewElementDetail = (email) => {
        const dateInput = getDateInput();
        window.selectedUserEmail = email;
        window.selectedOperationDate = dateInput ? dateInput.value : '';
        if(typeof window.loadRightContent === 'function') window.loadRightContent('Apps/Componentes/RegAs_PP/Detalle.html');
    };

    window.directAssign = async (stationName, shift) => {
        if (!selectedElementForAction) return;
        const dateInput = getDateInput();
        if(!dateInput) return;
        const times = getCalculatedTimes(shift, stationName);
        const docId = `${dateInput.value}_${selectedElementForAction}`;
        
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId), {
            email: selectedElementForAction,
            station: stationName,
            shift: shift,
            date: dateInput.value,
            type: 'asignacion',
            assignedEntry: times.in,
            assignedExit: times.out,
            shiftDuration: 8, // Default 8 horas
            isConfirmed: false,
            updatedAt: serverTimestamp()
        });
    };

    setTimeout(renderAll, 500);
</script>
