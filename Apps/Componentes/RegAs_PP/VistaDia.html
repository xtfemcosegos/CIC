<!-- Vista Operativa Diaria Optimizada - Sin controles internos (Navegación vía Shell) -->
<div id="vista-dia-content" class="w-full px-2 space-y-4 animate-in fade-in duration-700 pb-10 pt-4 h-full flex flex-col overflow-hidden text-slate-900">
    
    <!-- BLOQUE PRINCIPAL DE OPERACIÓN -->
    <section id="duty-section" class="bg-white rounded-[2rem] border border-slate-200/60 shadow-sm overflow-hidden flex flex-col flex-1 min-h-0 transition-all duration-300">
        
        <!-- El Shell ahora controla las pestañas. Aquí solo reside el contenedor dinámico -->
        <div class="flex-1 overflow-hidden relative flex flex-col">
            
            <!-- Pestaña Inicio Inteligente -->
            <div id="col-I" class="hidden flex-col flex-1 overflow-y-auto custom-scrollbar p-6 gap-8 bg-slate-50/20">
                <!-- Sección: Salidas Pendientes -->
                <div>
                    <div class="flex items-center justify-between mb-4 px-2">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-amber-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <i class="fa-solid fa-person-walking-arrow-right text-sm"></i>
                            </div>
                            <div>
                                <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-900">Personal para Salida</h3>
                                <p id="label-date-exit" class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Analizando...</p>
                            </div>
                        </div>
                    </div>
                    <div id="container-pending-exit" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <!-- Dinámico -->
                    </div>
                </div>

                <!-- Sección: Próximos a Ingresar -->
                <div>
                    <div class="flex items-center justify-between mb-4 px-2 pt-6 border-t border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <i class="fa-solid fa-id-badge text-sm"></i>
                            </div>
                            <div>
                                <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-900">Personal para Entrada</h3>
                                <p id="label-current-shift" class="text-[8px] font-bold text-blue-600 uppercase tracking-tighter">Analizando horario...</p>
                            </div>
                        </div>
                    </div>
                    <div id="container-incoming" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <!-- Dinámico -->
                    </div>
                </div>
            </div>

            <!-- Columna Matutino -->
            <div id="col-M" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'M')" class="hidden flex-col shift-column w-full h-full overflow-hidden">
                <div class="sticky top-0 z-20 bg-amber-50/90 backdrop-blur-md px-6 py-4 border-b border-amber-100/50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-amber-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                            <i class="fa-solid fa-sun text-sm"></i>
                        </div>
                        <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-900">Distribución Matutina</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[10px] font-bold text-slate-500 uppercase hover:text-amber-700 flex items-center gap-2">
                        <i id="toggle-icon-M" class="fa-solid fa-eye-slash"></i> <span id="toggle-text-M">Cerrados</span>
                    </button>
                </div>
                <div id="list-M" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>

            <!-- Columna Vespertino -->
            <div id="col-V" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'V')" class="hidden flex-col shift-column w-full h-full overflow-hidden">
                <div class="sticky top-0 z-20 bg-blue-50/90 backdrop-blur-md px-6 py-4 border-b border-blue-100/50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white shadow-lg">
                            <i class="fa-solid fa-cloud-sun text-sm"></i>
                        </div>
                        <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-900">Distribución Vespertina</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[10px] font-bold text-slate-500 uppercase hover:text-blue-700 flex items-center gap-2">
                        <i id="toggle-icon-V" class="fa-solid fa-eye-slash"></i> <span id="toggle-text-V">Cerrados</span>
                    </button>
                </div>
                <div id="list-V" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>

            <!-- Columna Nocturno -->
            <div id="col-N" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'N')" class="hidden flex-col shift-column w-full h-full overflow-hidden">
                <div class="sticky top-0 z-20 bg-slate-900 px-6 py-4 border-b border-white/5 flex items-center justify-between text-white">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-slate-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                            <i class="fa-solid fa-moon text-sm"></i>
                        </div>
                        <h3 class="text-[11px] font-black uppercase tracking-widest text-white">Distribución Nocturna</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[10px] font-bold text-slate-400 uppercase hover:text-white flex items-center gap-2">
                        <i id="toggle-icon-N" class="fa-solid fa-eye-slash"></i> <span id="toggle-text-N">Cerrados</span>
                    </button>
                </div>
                <div id="list-N" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>

            <!-- Pestaña Ausentismos -->
            <div id="col-ABS" class="hidden flex-col w-full h-full overflow-hidden">
                <div class="sticky top-0 z-20 bg-red-50/90 backdrop-blur-md px-6 py-4 border-b border-red-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-red-800 rounded-xl flex items-center justify-center text-white shadow-lg">
                            <i class="fa-solid fa-user-slash text-sm"></i>
                        </div>
                        <div>
                            <h3 class="text-[11px] font-black text-red-900 uppercase tracking-widest leading-none">Gestión de Inasistencias</h3>
                            <p class="text-[8px] font-bold text-red-800/60 uppercase tracking-tighter mt-1">Haga scroll para ver más motivos</p>
                        </div>
                    </div>
                </div>
                <div id="container-ABS" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/30">
                    <!-- Inyectado dinámicamente -->
                </div>
            </div>

        </div>
    </section>
</div>

<!-- MENÚ CONTEXTUAL PRINCIPAL -->
<div id="custom-context-menu" class="fixed z-[300] hidden min-w-[260px] bg-white rounded-[2rem] shadow-2xl border border-slate-200 py-4 animate-in fade-in zoom-in-95 duration-100 text-slate-900 overflow-visible">
    <div class="px-6 py-3 border-b border-slate-100 mb-2">
        <p id="menu-user-name" class="text-[11px] font-black uppercase text-slate-900 truncate">Personal</p>
        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Seleccionar Destino</p>
    </div>
    <div id="stations-menu-list" class="max-h-[165px] overflow-y-auto custom-scrollbar px-3 space-y-1"></div>
</div>

<!-- SUBMENÚ FLOTANTE -->
<div id="custom-submenu" class="fixed z-[310] hidden min-w-[200px] bg-white rounded-[2rem] shadow-2xl border border-slate-200 py-4 animate-in fade-in zoom-in-95 duration-150 text-slate-900">
    <div class="px-6 py-2 border-b border-slate-50 mb-2">
        <p id="submenu-title" class="text-[9px] font-black uppercase text-red-800 tracking-widest truncate">Destino</p>
    </div>
    <div id="submenu-list" class="px-3 space-y-1"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, setDoc, doc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'cic5-pp';

    let allUsers = [];
    let currentStations = [];
    let rawAssignments = [];
    let rawStationStatuses = [];
    let showClosedStations = false; 
    let expandedGroups = new Set();
    let selectedElementForMenu = { email: null, name: null };
    let unsubscribers = [];
    let activeShiftTab = 'I';
    
    const defaultAbsenceReasons = ['Descanso', 'Permiso', 'Vacaciones', 'Falta', 'Incapacidad', 'Suspensión'];
    
    const getDateInput = () => document.getElementById('view-date-input') || document.getElementById('global-report-date');

    function calculateDuration(start, end) {
        if (!start || !end) return 0;
        const [h1, m1] = start.split(':').map(Number);
        const [h2, m2] = end.split(':').map(Number);
        let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (diff < 0) diff += 24 * 60; 
        return Math.round((diff / 60) * 10) / 10;
    }

    function calculateExitTime(start, hours) {
        if (!start) return "";
        const [h, m] = start.split(':').map(Number);
        let totalMinutes = h * 60 + m + (parseFloat(hours) * 60);
        let finalH = Math.floor((totalMinutes / 60) % 24);
        let finalM = Math.floor(totalMinutes % 60);
        return `${String(finalH).padStart(2, '0')}:${String(finalM).padStart(2, '0')}`;
    }

    function getCalculatedTimes(shift, stationName) {
        const isCC = stationName.toLowerCase().includes('centro de control');
        if (shift === 'M') return isCC ? { in: '06:00', out: '14:00' } : { in: '07:00', out: '15:00' };
        if (shift === 'V') return isCC ? { in: '14:00', out: '22:00' } : { in: '13:00', out: '21:00' };
        if (shift === 'N') return isCC ? { in: '22:00', out: '06:00' } : { in: '21:00', out: '05:00' };
        return { in: '07:00', out: '15:00' };
    }

    onAuthStateChanged(auth, (user) => { 
        if (user) { 
            syncData(); 
            setTimeout(initComponent, 100);
        } 
    });

    function initComponent() {
        const dateInput = getDateInput();
        if(!dateInput) { setTimeout(initComponent, 200); return; }
        if(!dateInput.value) {
            const now = new Date();
            dateInput.value = now.toLocaleDateString('en-CA');
        }
        window.loadDailyView = () => renderAll();
        // Carga inicial
        switchActiveTab(activeShiftTab);
    }

    async function syncData() {
        unsubscribers.forEach(unsub => unsub());
        unsubscribers = [];

        unsubscribers.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
            allUsers = snap.docs.map(d => d.data());
            renderAll();
        }));
        unsubscribers.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stations'), (snap) => {
            currentStations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderAll();
        }));
        unsubscribers.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'), (snap) => {
            rawAssignments = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
            renderAll();
        }));
        unsubscribers.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'station_daily_status'), (snap) => {
            rawStationStatuses = snap.docs.map(d => d.data());
            renderAll();
        }));
    }

    // Funciones globales para Drag & Drop
    window.allowDrop = (ev) => ev.preventDefault();
    window.handleDragStartInternal = (ev, email) => {
        ev.dataTransfer.setData("text/elementEmail", email);
        ev.dataTransfer.effectAllowed = "move";
    };

    window.handleDrop = async (ev, shift, absenceReason = null) => {
        ev.preventDefault();
        const email = ev.dataTransfer.getData("text/elementEmail");
        const dateInput = getDateInput();
        if(!email || !dateInput) return;
        const user = allUsers.find(u => u.email === email);
        if(!user) return;
        const stationEl = ev.target.closest('.station-container');
        const stationName = shift === 'ABS' ? 'General' : (stationEl ? stationEl.dataset.stationName : 'General');
        await performAssignmentUpdate(email, user.name, dateInput.value, shift, stationName, absenceReason);
    };

    async function performAssignmentUpdate(email, name, date, shift, stationName, absenceReason = null) {
        const id = `${date}_${email}`;
        const isAbs = shift === 'ABS';
        const times = isAbs ? { in: null, out: null } : getCalculatedTimes(shift, stationName);

        const newShiftObj = {
            shift: isAbs ? 'M' : shift, 
            station: stationName,
            type: isAbs ? 'ausentismo' : 'asignacion',
            isConfirmed: false,
            assignedEntry: times.in, 
            assignedExit: times.out,
            shiftDuration: isAbs ? 0 : 8
        };
        if(isAbs) newShiftObj.reason = absenceReason || 'Falta';

        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        const snap = await getDoc(docRef);

        if (snap.exists()) {
            const data = snap.data();
            let shifts = data.shifts || [];
            if (shifts.length === 0 && data.shift) {
                shifts.push({
                    shift: data.shift, station: data.station, type: data.type,
                    reason: data.reason, assignedEntry: data.assignedEntry,
                    assignedExit: data.assignedExit, shiftDuration: data.shiftDuration,
                    isConfirmed: data.isConfirmed, realEntry: data.realEntry, realExit: data.realExit
                });
            }
            shifts = shifts.filter(s => isAbs ? s.type !== 'ausentismo' : s.shift !== shift);
            shifts.push(newShiftObj);
            await updateDoc(docRef, { shifts, updatedAt: serverTimestamp(), type: shifts[0].type, reason: shifts.find(s => s.type === 'ausentismo')?.reason || null });
        } else {
            await setDoc(docRef, { email, name, date, shifts: [newShiftObj], type: newShiftObj.type, reason: newShiftObj.reason || null, updatedAt: serverTimestamp() });
        }
    }

    /**
     * Renderizado de Inicio Inteligente con cálculo dinámico
     */
    function renderInicioTab() {
        const now = new Date();
        const hour = now.getHours();
        const dateToday = now.toISOString().split('T')[0];
        const yesterday = new Date(); yesterday.setDate(now.getDate() - 1);
        const dateYesterday = yesterday.toISOString().split('T')[0];

        let exitShift = null; let entryShift = null;
        let exitDate = dateToday; let entryDate = dateToday;
        let exitLabel = ""; let entryLabel = "";

        if (hour >= 0 && hour < 8) {
            exitShift = 'N'; exitDate = dateYesterday; entryShift = 'M';
            exitLabel = `Nocturno (${dateYesterday})`; entryLabel = `Matutino (Hoy)`;
        } else if (hour >= 8 && hour < 16) {
            exitShift = 'M'; entryShift = 'V';
            exitLabel = "Matutino (Saliente)"; entryLabel = "Vespertino (Entrante)";
        } else if (hour >= 16 && hour < 22) {
            exitShift = 'V'; entryShift = 'N';
            exitLabel = "Vespertino (Saliente)"; entryLabel = "Nocturno (Entrante)";
        } else { 
            exitShift = 'N'; entryShift = null;
            exitLabel = "Nocturno (Saliente)"; entryLabel = "Sin ingresos próximos";
        }

        const lE = document.getElementById('label-date-exit');
        const lI = document.getElementById('label-current-shift');
        if (lE) lE.innerText = exitLabel;
        if (lI) lI.innerText = entryLabel;

        const pendingExits = [];
        rawAssignments.filter(a => a.date === exitDate).forEach(doc => {
            const shifts = doc.shifts?.length ? doc.shifts : [doc];
            shifts.forEach((s, idx) => {
                if (s.shift === exitShift && s.realEntry && !s.realExit) {
                    pendingExits.push({ ...s, email: doc.email, name: doc.name, docId: doc.docId, isFromShifts: !!doc.shifts, shiftIndex: idx });
                }
            });
        });

        const incomingUsers = [];
        if (entryShift) {
            rawAssignments.filter(a => a.date === entryDate).forEach(doc => {
                const shifts = doc.shifts?.length ? doc.shifts : [doc];
                shifts.forEach((s, idx) => {
                    if (s.shift === entryShift && !s.realEntry && s.type !== 'ausentismo') {
                        incomingUsers.push({ ...s, email: doc.email, name: doc.name, docId: doc.docId, isFromShifts: !!doc.shifts, shiftIndex: idx });
                    }
                });
            });
        }

        const exitCont = document.getElementById('container-pending-exit');
        const inCont = document.getElementById('container-incoming');
        if(exitCont) exitCont.innerHTML = pendingExits.length > 0 ? pendingExits.map(el => renderElementRow(el)).join('') : `<div class="col-span-full py-10 text-center opacity-30 text-[9px] font-black uppercase tracking-widest border-2 border-dashed border-slate-100 rounded-[2rem]">Sin salidas pendientes</div>`;
        if(inCont) inCont.innerHTML = incomingUsers.length > 0 ? incomingUsers.map(el => renderElementRow(el)).join('') : `<div class="col-span-full py-10 text-center opacity-30 text-[9px] font-black uppercase tracking-widest border-2 border-dashed border-slate-100 rounded-[2rem]">Sin ingresos pendientes</div>`;
    }

    function renderAll() {
        const dateInput = getDateInput();
        if(!dateInput?.value) return;
        const targetDate = dateInput.value;
        
        const currentDayAssignments = rawAssignments.filter(a => a.date === targetDate);
        const flattenedElements = [];
        currentDayAssignments.forEach(doc => {
            if (doc.shifts?.length) {
                doc.shifts.forEach((s, idx) => flattenedElements.push({ ...s, email: doc.email, name: doc.name, docId: doc.docId, isFromShifts: true, shiftIndex: idx }));
            } else if (doc.shift || doc.type === 'ausentismo') {
                flattenedElements.push({ ...doc, isFromShifts: false });
            }
        });

        if (activeShiftTab === 'I') renderInicioTab();

        const dailyStationStatusMap = {};
        rawStationStatuses.forEach(d => { if (d.date === targetDate) dailyStationStatusMap[`${d.shift}_${d.stationId}`] = d.isClosed; });

        ['M', 'V', 'N'].forEach(shift => {
            const listContainer = document.getElementById(`list-${shift}`);
            if (!listContainer) return;
            listContainer.innerHTML = '';
            const sortedStations = [...currentStations].sort((a, b) => (a.order || 0) - (b.order || 0));
            sortedStations.forEach(st => {
                const isClosed = dailyStationStatusMap[`${shift}_${st.id}`] || false;
                const elements = flattenedElements.filter(el => el.shift === shift && el.station === st.name && el.type !== 'ausentismo');
                if (!isClosed || showClosedStations) listContainer.appendChild(createStationSection(st, shift, elements, isClosed));
            });
            const otherElements = flattenedElements.filter(el => el.shift === shift && el.type !== 'ausentismo' && !sortedStations.some(st => st.name === el.station));
            if (otherElements.length > 0) listContainer.appendChild(createStationSection({ name: 'Sin Caseta', id: 'others' }, shift, otherElements, false));
        });

        const absContainer = document.getElementById('container-ABS');
        if (absContainer) {
            absContainer.innerHTML = '';
            const presentAbsences = flattenedElements.filter(el => el.type === 'ausentismo');
            const presentReasons = [...new Set([...defaultAbsenceReasons, ...presentAbsences.map(el => el.reason).filter(Boolean)])];
            presentReasons.forEach(reason => {
                const elements = presentAbsences.filter(el => (el.reason || 'Falta').toLowerCase() === reason.toLowerCase());
                if (defaultAbsenceReasons.includes(reason) || elements.length > 0) absContainer.appendChild(createAbsenceSection(reason, elements));
            });
        }
    }

    // --- FUNCIONES DE SOPORTE UI ---
    window.toggleGroupExpansion = (groupId) => {
        if (expandedGroups.has(groupId)) expandedGroups.delete(groupId);
        else expandedGroups.add(groupId);
        renderAll();
    };

    function createAbsenceSection(reason, elements) {
        const section = document.createElement('div');
        const groupId = `abs_${reason}`;
        const isExpanded = expandedGroups.has(groupId);
        const displayElements = isExpanded ? elements : elements.slice(0, 3);
        const hiddenCount = elements.length - 3;
        section.className = "bg-white p-5 rounded-[2.5rem] border border-slate-200/60 shadow-sm space-y-4 flex flex-col transition-all hover:border-red-100";
        section.ondragover = (e) => allowDrop(e);
        section.ondrop = (e) => handleDrop(e, 'ABS', reason);
        const reasonColors = { 'falta': 'bg-red-500', 'vacaciones': 'bg-emerald-500', 'descanso': 'bg-slate-400', 'incapacidad': 'bg-blue-500', 'suspensión': 'bg-orange-500', 'permiso': 'bg-purple-500' };
        const colorClass = reasonColors[reason.toLowerCase()] || 'bg-slate-300';
        let showMoreBtn = elements.length > 3 ? `<button onclick="window.toggleGroupExpansion('${groupId}')" class="w-full py-2.5 mt-1 bg-slate-50 hover:bg-slate-100 text-[9px] font-black uppercase text-slate-500 rounded-xl transition-all border border-slate-100 active:scale-95">${isExpanded ? 'Mostrar menos' : `<i class="fa-solid fa-plus mr-1"></i> Ver ${hiddenCount} más`}</button>` : "";
        section.innerHTML = `<div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-1 text-slate-900"><div class="flex items-center gap-2"><div class="w-2.5 h-5 ${colorClass} rounded-full"></div><h4 class="text-[11px] font-black uppercase tracking-widest text-slate-600">${reason}</h4></div><span class="text-[13px] font-black text-slate-300">${elements.length}</span></div><div class="space-y-3 flex-1">${elements.length > 0 ? displayElements.map(el => renderElementRow(el, true)).join('') : `<div class="py-8 text-center border-2 border-dashed border-slate-50 rounded-[2rem] text-[9px] font-bold text-slate-200 uppercase tracking-widest">Sin registros</div>`}${showMoreBtn}</div>`;
        return section;
    }

    function createStationSection(st, shift, elements, isClosed) {
        const section = document.createElement('div');
        const groupId = `st_${shift}_${st.id}`;
        const isExpanded = expandedGroups.has(groupId);
        const displayElements = isExpanded ? elements : elements.slice(0, 3);
        const hiddenCount = elements.length - 3;
        section.className = `station-container space-y-4 ${isClosed ? 'opacity-40 grayscale bg-slate-50 p-5 rounded-[2rem] border border-dashed border-slate-200' : ''}`;
        section.dataset.stationName = st.name;
        let showMoreBtn = elements.length > 3 && !isClosed ? `<button onclick="window.toggleGroupExpansion('${groupId}')" class="w-full py-2.5 mt-1 bg-slate-50 hover:bg-slate-100 text-[9px] font-black uppercase text-slate-400 rounded-xl transition-all border border-slate-100 active:scale-95">${isExpanded ? 'Mostrar menos' : `<i class="fa-solid fa-plus mr-1"></i> Ver ${hiddenCount} más`}</button>` : "";
        section.innerHTML = `<div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4 text-slate-900"><h4 class="text-[11px] font-black uppercase tracking-widest ${isClosed ? 'text-slate-400' : 'text-slate-500'}">${st.name}</h4><div class="flex items-center gap-3">${isClosed ? `<button onclick="window.toggleStationStatus('${st.id}', '${shift}', true)" class="text-[10px] font-black text-emerald-600 uppercase">Abrir</button>` : `<button onclick="window.toggleStationStatus('${st.id}', '${shift}', false)" class="text-[10px] font-black text-slate-300 hover:text-red-800 uppercase">Cerrar</button>`}<span class="w-7 h-7 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-[11px] font-black text-slate-400">${elements.length}</span></div></div><div class="space-y-3">${elements.length > 0 ? displayElements.map(el => renderElementRow(el)).join('') : (isClosed ? '' : `<div class="py-6 border-2 border-dashed border-slate-50 flex items-center justify-center text-[10px] font-bold text-slate-300 uppercase tracking-widest rounded-[2rem]">Sin personal</div>`)}${showMoreBtn}</div>`;
        return section;
    }

    function renderElementRow(el, isAbsence = false) {
        const u = allUsers.find(usr => usr.email === el.email) || { photo: null, name: 'S/N' };
        const isConfirmed = el.isConfirmed === true;
        const entry = el.assignedEntry || '--:--';
        const exit = el.assignedExit || '--:--';
        const duration = el.shiftDuration || (el.assignedEntry && el.assignedExit ? calculateDuration(entry, exit) : 8);
        const timeInfo = isAbsence ? '' : `<p class="text-[10px] font-black uppercase tracking-tighter text-slate-400">${entry} a ${exit} · ${duration}H</p>`;
        
        let actionBtn = !isAbsence ? (!el.realEntry ? `<button onclick="event.stopPropagation(); window.quickRegisterEntry('${el.docId}', ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-11 h-11 flex items-center justify-center bg-emerald-500 text-white rounded-2xl shadow-xl shadow-emerald-500/20 active:scale-90"><i class="fa-solid fa-right-to-bracket text-sm"></i></button>` : (!el.realExit ? `<button onclick="event.stopPropagation(); window.quickRegisterExit('${el.docId}', ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-11 h-11 flex items-center justify-center bg-red-800 text-white rounded-2xl shadow-xl shadow-red-800/20 active:scale-90"><i class="fa-solid fa-right-from-bracket text-sm"></i></button>` : `<div class="w-11 h-11 flex items-center justify-center bg-slate-100 text-slate-400 rounded-2xl"><i class="fa-solid fa-check text-sm"></i></div>`)) : "";
        let configCard = !isConfirmed && !isAbsence && !el.assignedEntry ? `<div class="mt-4 p-4 bg-red-50 border border-red-100 rounded-[1.5rem] space-y-3 animate-in slide-in-from-top-1" onclick="event.stopPropagation()"><div class="grid grid-cols-2 gap-3"><input type="time" value="${entry}" onchange="window.updateTimeConfig('${el.docId}', 'assignedEntry', this.value, ${duration}, ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-full text-[13px] font-bold bg-white border border-red-200 rounded-xl p-3 outline-none"><input type="number" value="${duration}" onchange="window.updateTimeConfig('${el.docId}', 'shiftDuration', this.value, null, ${el.isFromShifts || false}, ${el.shiftIndex || 0}, '${entry}')" class="w-full text-[13px] font-bold bg-white border border-red-200 rounded-xl p-3 outline-none"></div><button onclick="window.confirmAssignment('${el.docId}', ${el.isFromShifts || false}, ${el.shiftIndex || 0})" class="w-full py-3 bg-slate-900 text-white text-[11px] font-black uppercase rounded-2xl hover:bg-emerald-600 transition-all active:scale-95">Confirmar Jornada</button></div>` : "";
        
        return `<div draggable="true" ondragstart="window.handleDragStartInternal(event, '${el.email}')" oncontextmenu="window.handleElementRightClick(event, '${el.email}', '${u.name}')" class="p-4 bg-white rounded-[1.8rem] border border-slate-100 hover:border-red-200 transition-all shadow-sm cursor-grab active:cursor-grabbing hover:shadow-md" onclick="window.viewElementDetail('${el.email}')">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 min-w-0">
                    <div class="w-14 h-14 rounded-[1.2rem] overflow-hidden border-2 border-slate-50 relative bg-slate-50 shrink-0 shadow-inner">
                        ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-200"><i class="fa-solid fa-user text-xl"></i></div>`}
                    </div>
                    <div class="truncate">
                        <p class="text-[13px] font-black uppercase tracking-tight text-slate-800 truncate leading-tight mb-1.5">${u.name}</p>
                        ${timeInfo}
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    ${actionBtn}
                    <button onclick="event.stopPropagation(); window.deleteAssignment('${el.docId}')" class="p-2.5 text-slate-200 hover:text-red-800 transition-colors"><i class="fa-solid fa-circle-xmark text-lg"></i></button>
                </div>
            </div>
            ${configCard}
        </div>`;
    }

    // --- ACCIONES DE FIREBASE ---
    window.quickRegisterEntry = async (id, isFromShifts, shiftIndex) => {
        const t = `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        if (isFromShifts) {
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const data = snap.data(); data.shifts[shiftIndex].realEntry = t;
                await updateDoc(docRef, { shifts: data.shifts, updatedAt: serverTimestamp() });
            }
        } else await updateDoc(docRef, { realEntry: t, updatedAt: serverTimestamp() });
    };

    window.quickRegisterExit = async (id, isFromShifts, shiftIndex) => {
        const t = `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        if (isFromShifts) {
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const data = snap.data(); data.shifts[shiftIndex].realExit = t;
                await updateDoc(docRef, { shifts: data.shifts, updatedAt: serverTimestamp() });
            }
        } else await updateDoc(docRef, { realExit: t, updatedAt: serverTimestamp() });
    };

    window.updateTimeConfig = async (id, field, value, dur, isS, idx, entry) => {
        const dR = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        if (isS) {
            const snap = await getDoc(dR);
            if (snap.exists()) {
                const data = snap.data(); const s = data.shifts[idx];
                if (field === 'assignedEntry') { s.assignedEntry = value; s.assignedExit = calculateExitTime(value, dur); }
                else if (field === 'shiftDuration') { s.shiftDuration = parseFloat(value); s.assignedExit = calculateExitTime(entry, value); }
                await updateDoc(dR, { shifts: data.shifts, updatedAt: serverTimestamp() });
            }
        } else {
            const uO = { updatedAt: serverTimestamp() };
            if (field === 'assignedEntry') { uO.assignedEntry = value; uO.assignedExit = calculateExitTime(value, dur); }
            else if (field === 'shiftDuration') { uO.shiftDuration = parseFloat(value); uO.assignedExit = calculateExitTime(entry, value); }
            await updateDoc(dR, uO);
        }
    };

    window.confirmAssignment = async (id, isS, idx) => {
        const dR = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id);
        if (isS) {
            const snap = await getDoc(dR);
            if (snap.exists()) {
                const d = snap.data(); d.shifts[idx].isConfirmed = true;
                await updateDoc(dR, { shifts: d.shifts, updatedAt: serverTimestamp() });
            }
        } else await updateDoc(dR, { isConfirmed: true, updatedAt: serverTimestamp() });
    };

    window.deleteAssignment = async (id) => { if (confirm("¿Eliminar asignación?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id)); };

    window.toggleStationStatus = async (stationId, shift, currentStatus) => {
        const dInp = getDateInput(); if(!dInp) return;
        const statusRef = doc(db, 'artifacts', appId, 'public', 'data', 'station_daily_status', `${dInp.value}_${shift}_${stationId}`);
        await setDoc(statusRef, { stationId, date: dInp.value, shift, isClosed: !currentStatus, updatedAt: serverTimestamp() });
    };

    window.toggleClosedStations = () => { showClosedStations = !showClosedStations; renderAll(); };

    // --- FUNCIÓN DE NAVEGACIÓN (CONTROLADA POR SHELL) ---
    window.switchActiveTab = (shift) => {
        activeShiftTab = shift;
        ['I', 'M','V','N','ABS'].forEach(s => {
            const col = document.getElementById(`col-${s}`);
            if(!col) return;
            if (s === shift) {
                col.classList.remove('hidden'); col.classList.add('flex');
            } else {
                col.classList.add('hidden'); col.classList.remove('flex');
            }
        });
        
        // Sincronizar UI del Shell si la función existe
        if (typeof window.updateShellTabUI === 'function') {
            window.updateShellTabUI(shift);
        }

        renderAll();
    };

    window.viewElementDetail = (email) => {
        const dInp = getDateInput();
        window.selectedUserEmail = email;
        window.selectedOperationDate = dInp ? dInp.value : '';
        if(typeof window.loadRightContent === 'function') window.loadRightContent('Apps/Componentes/RegAs_PP/Detalle.html');
    };

    // --- MENÚ CONTEXTUAL ---
    window.handleElementRightClick = (e, email, name) => {
        e.preventDefault(); e.stopPropagation();
        selectedElementForMenu = { email, name };
        const menu = document.getElementById('custom-context-menu');
        const sub = document.getElementById('custom-submenu');
        document.getElementById('menu-user-name').innerText = name;
        sub.classList.add('hidden');
        let top = e.clientY; let left = e.clientX;
        if (top + 300 > window.innerHeight) top = window.innerHeight - 310;
        if (left + 500 > window.innerWidth) left = window.innerWidth - 510;
        menu.style.top = `${top}px`; menu.style.left = `${left}px`;
        menu.classList.remove('hidden');
        renderContextMenuList();
        const closeAll = (ev) => { 
            if(!menu.contains(ev.target) && !sub.contains(ev.target)) { 
                menu.classList.add('hidden'); sub.classList.add('hidden');
                document.removeEventListener('click', closeAll); 
            } 
        };
        setTimeout(() => document.addEventListener('click', closeAll), 10);
    };

    function renderContextMenuList() {
        const stationsList = document.getElementById('stations-menu-list');
        const sortedStations = [...currentStations].sort((a,b) => (a.order||0) - (b.order||0));
        let html = sortedStations.map(st => `<button onclick="window.openSubMenu(event, '${st.id}', 'station', '${st.name}')" class="w-full flex items-center justify-between px-4 py-3 bg-slate-50 border border-transparent rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-600 hover:bg-red-800 hover:text-white transition-all group/item shadow-sm"><span class="truncate">${st.name}</span><i class="fa-solid fa-chevron-right text-[8px] opacity-30 group-hover/item:opacity-100"></i></button>`).join('');
        html += `<button onclick="window.openSubMenu(event, 'abs_list', 'abs', 'Ausentismos')" class="w-full flex items-center justify-between px-4 py-3 bg-red-50 border border-red-100 rounded-2xl text-[10px] font-black uppercase tracking-widest text-red-800 hover:bg-red-800 hover:text-white transition-all group/item mt-2 shadow-sm"><span>Ausentismos</span><i class="fa-solid fa-chevron-right text-[8px] opacity-30 group-hover/item:opacity-100"></i></button>`;
        stationsList.innerHTML = html;
    }

    window.openSubMenu = (e, id, type, title) => {
        e.stopPropagation();
        const sub = document.getElementById('custom-submenu');
        const menu = document.getElementById('custom-context-menu');
        const list = document.getElementById('submenu-list');
        document.getElementById('submenu-title').innerText = title;
        const menuRect = menu.getBoundingClientRect();
        let subLeft = menuRect.right + 10; let subTop = menuRect.top;
        if (subLeft + 200 > window.innerWidth) subLeft = menuRect.left - 210;
        if (subTop + 300 > window.innerHeight) subTop = window.innerHeight - 310;
        sub.style.left = `${subLeft}px`; sub.style.top = `${subTop}px`;
        sub.classList.remove('hidden');
        if (type === 'station') {
            list.innerHTML = `<button onclick="window.directContextAssign('${title}', 'M')" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase rounded-2xl bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white transition-all shadow-sm">Matutino (M)</button><button onclick="window.directContextAssign('${title}', 'V')" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase rounded-2xl bg-blue-50 text-blue-600 hover:bg-blue-500 hover:text-white transition-all shadow-sm">Vespertino (V)</button><button onclick="window.directContextAssign('${title}', 'N')" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase rounded-2xl bg-slate-100 text-slate-600 hover:bg-slate-900 hover:text-white transition-all shadow-sm">Nocturno (N)</button>`;
        } else {
            list.innerHTML = defaultAbsenceReasons.map(r => `<button onclick="window.directContextAbsence('${r}')" class="w-full text-left px-4 py-2.5 text-[9px] font-black uppercase rounded-xl bg-red-50 text-red-800 hover:bg-red-800 hover:text-white transition-all shadow-sm">${r}</button>`).join('');
        }
    };

    window.directContextAssign = async (stationName, shift) => {
        const { email, name } = selectedElementForMenu;
        const dateInput = getDateInput();
        if(!email || !dateInput) return;
        await performAssignmentUpdate(email, name, dateInput.value, shift, stationName);
        document.getElementById('custom-context-menu').classList.add('hidden');
        document.getElementById('custom-submenu').classList.add('hidden');
    };

    window.directContextAbsence = async (reason) => {
        const { email, name } = selectedElementForMenu;
        const dateInput = getDateInput();
        if(!email || !dateInput) return;
        await performAssignmentUpdate(email, name, dateInput.value, 'ABS', 'General', reason);
        document.getElementById('custom-context-menu').classList.add('hidden');
        document.getElementById('custom-submenu').classList.add('hidden');
    };

</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .shift-column { height: 100%; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.2; cursor: pointer; }
    [draggable="true"] { -webkit-user-drag: element; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
