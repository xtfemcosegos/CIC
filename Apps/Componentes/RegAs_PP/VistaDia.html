<!-- Vista Operativa Diaria Refinada - Arquitectura de Pestañas y Listas -->
<div id="vista-dia-content" class="max-w-[1600px] mx-auto px-4 md:px-6 space-y-8 animate-in fade-in duration-700 pb-32 pt-6">
    
    <!-- BLOQUE DE TURNOS (ID: duty-section para toggle) -->
    <section id="duty-section" class="bg-white rounded-[2.5rem] border border-slate-200/60 shadow-sm overflow-hidden flex flex-col min-h-[600px] transition-all duration-300">
        <!-- BARRA DE PESTAÑAS (Mobile) -->
        <div class="flex items-center justify-center lg:hidden bg-slate-50 border-b border-slate-100 p-2 gap-2">
            <button onclick="switchActiveTab('M')" id="tab-M" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Turno M</button>
            <button onclick="switchActiveTab('V')" id="tab-V" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Turno V</button>
            <button onclick="switchActiveTab('N')" id="tab-N" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Turno N</button>
        </div>

        <!-- CONTENEDOR MULTI-COLUMNA -->
        <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 divide-x divide-slate-100 h-full flex-1">
            <!-- Columna Turno Matutino -->
            <div id="col-M" class="flex flex-col shift-column">
                <div class="sticky top-0 z-20 bg-amber-50/80 backdrop-blur-md px-6 py-4 border-b border-amber-100/50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center text-white shadow-lg shadow-amber-500/20">
                            <i class="fa-solid fa-sun text-xs"></i>
                        </div>
                        <h3 class="text-[11px] font-black text-slate-900 uppercase tracking-widest">Matutino</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[9px] font-bold text-slate-500 uppercase hover:text-amber-700 flex items-center gap-2 transition-all">
                        <i id="toggle-icon-M" class="fa-solid fa-eye-slash"></i>
                        <span id="toggle-text-M">Cerrados</span>
                    </button>
                </div>
                <div id="list-M" class="p-4 space-y-6 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>

            <!-- Columna Turno Vespertino -->
            <div id="col-V" class="flex flex-col shift-column">
                <div class="sticky top-0 z-20 bg-blue-50/80 backdrop-blur-md px-6 py-4 border-b border-blue-100/50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                            <i class="fa-solid fa-cloud-sun text-xs"></i>
                        </div>
                        <h3 class="text-[11px] font-black text-slate-900 uppercase tracking-widest">Vespertino</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[9px] font-bold text-slate-500 uppercase hover:text-blue-700 flex items-center gap-2 transition-all">
                        <i id="toggle-icon-V" class="fa-solid fa-eye-slash"></i>
                        <span id="toggle-text-V">Cerrados</span>
                    </button>
                </div>
                <div id="list-V" class="p-4 space-y-6 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>

            <!-- Columna Turno Nocturno -->
            <div id="col-N" class="flex flex-col shift-column">
                <div class="sticky top-0 z-20 bg-slate-900 px-6 py-4 border-b border-white/5 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-slate-700 rounded-lg flex items-center justify-center text-white shadow-lg">
                            <i class="fa-solid fa-moon text-xs"></i>
                        </div>
                        <h3 class="text-[11px] font-black text-white uppercase tracking-widest">Nocturno</h3>
                    </div>
                    <button onclick="toggleClosedStations()" class="text-[9px] font-bold text-slate-500 uppercase hover:text-white flex items-center gap-2 transition-all">
                        <i id="toggle-icon-N" class="fa-solid fa-eye-slash"></i>
                        <span id="toggle-text-N">Cerrados</span>
                    </button>
                </div>
                <div id="list-N" class="p-4 space-y-6 overflow-y-auto flex-1 custom-scrollbar"></div>
            </div>
        </div>
    </section>

    <!-- BLOQUE DE AUSENTISMOS -->
    <section id="absence-section" class="space-y-4 transition-all duration-300">
        <div class="flex items-center gap-4 px-2">
            <div class="w-10 h-10 bg-red-800 rounded-xl flex items-center justify-center text-white shadow-xl shadow-red-800/20">
                <i class="fa-solid fa-user-xmark text-sm"></i>
            </div>
            <div>
                <h3 class="text-xs font-black text-red-900 uppercase tracking-widest leading-none">Gestión de Ausentismos</h3>
                <p class="text-[8px] font-bold text-red-800/50 uppercase tracking-tighter mt-1">Clic Derecho sobre elemento para asignar</p>
            </div>
        </div>
        <div id="container-ABS" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 2xl:grid-cols-6 gap-4"></div>
    </section>
</div>

<!-- Menú Contextual para Asignación -->
<div id="custom-context-menu" class="fixed z-[300] hidden min-w-[200px] bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 animate-in fade-in zoom-in-95 duration-100">
    <div class="px-4 py-2 border-b border-slate-100 mb-1">
        <p id="menu-user-name" class="text-[9px] font-black uppercase text-slate-900 truncate">Usuario</p>
        <p class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">Asignar a Caseta</p>
    </div>
    <div id="stations-menu-list" class="max-h-[300px] overflow-y-auto custom-scrollbar">
        <!-- Las casetas se cargan aquí dinámicamente -->
    </div>
</div>

<!-- Modal de Acción Rápida (Mantenido para clic normal opcional) -->
<div id="action-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
    <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
        <div class="p-6 text-center space-y-4">
            <div id="modal-user-photo" class="w-20 h-20 mx-auto rounded-2xl border-4 border-slate-50 overflow-hidden shadow-lg"></div>
            <div>
                <h3 id="modal-user-name" class="text-sm font-black uppercase text-slate-900">Nombre del Usuario</h3>
                <p id="modal-user-status" class="text-[9px] font-bold uppercase text-red-600 tracking-widest mt-1">En Descanso</p>
            </div>
            <div class="grid grid-cols-1 gap-2 pt-2">
                <button onclick="activateElement()" class="py-3 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-600/20">
                    <i class="fa-solid fa-bolt mr-2"></i> Abrir Panel de Asignación
                </button>
                <button onclick="closeActionModal()" class="py-3 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 transition-all">
                    Cancelar
                </button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, setDoc, doc, updateDoc, getDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'cic5-pp';

    let allUsers = [];
    let currentStations = [];
    let currentDayAssignments = [];
    let stationDailyStatuses = {}; 
    let activeShift = 'M';
    let showClosedStations = false; 
    let selectedElementForAction = null;
    
    const absenceReasons = ['Descanso', 'Permiso', 'Vacaciones', 'Falta', 'Incapacidades', 'Suspensión'];
    
    const getDateInput = () => document.getElementById('view-date-input');

    // --- FILTRADO DE VISTA ---
    window.switchViewFilter = (type, btn) => {
        const dutySec = document.getElementById('duty-section');
        const absSec = document.getElementById('absence-section');
        
        document.querySelectorAll('.view-filter-btn').forEach(b => {
            b.classList.remove('active', 'bg-slate-700', 'text-white');
            b.classList.add('text-slate-500');
        });
        if (btn) {
            btn.classList.add('active', 'bg-slate-700', 'text-white');
            btn.classList.remove('text-slate-500');
        }

        if (type === 'duty') {
            dutySec.classList.remove('hidden');
            absSec.classList.add('hidden');
        } else {
            dutySec.classList.add('hidden');
            absSec.classList.remove('hidden');
        }
    };

    onAuthStateChanged(auth, (user) => { 
        if (user) {
            initDateLogic();
            syncData(); 
            autoTabSelection();
            const defaultBtn = document.querySelector('.view-filter-btn');
            if(defaultBtn) switchViewFilter('duty', defaultBtn);
        } 
    });

    function initDateLogic() {
        const dateInput = getDateInput();
        if(!dateInput) { setTimeout(initDateLogic, 200); return; }

        if(!dateInput.value) {
            const now = new Date();
            if (now.getHours() < 5) now.setDate(now.getDate() - 1);
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;
        }
        window.loadDailyView = loadDailyView;
        window.changeDay = changeDay;
        loadDailyView();
    }

    async function syncData() {
        const dateInput = getDateInput();
        if(!dateInput) return;

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
            allUsers = snap.docs.map(d => d.data());
            renderAll();
        });

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stations'), (snap) => {
            currentStations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderAll();
        });

        const assignRef = collection(db, 'artifacts', appId, 'public', 'data', 'assignments');
        onSnapshot(assignRef, (snap) => {
            currentDayAssignments = snap.docs.map(d => d.data()).filter(a => a.date === dateInput.value);
            renderAll();
        });

        const statusRef = collection(db, 'artifacts', appId, 'public', 'data', 'station_daily_status');
        onSnapshot(statusRef, (snap) => {
            stationDailyStatuses = {};
            snap.docs.forEach(d => {
                const data = d.data();
                if (data.date === dateInput.value) {
                    stationDailyStatuses[`${data.shift}_${data.stationId}`] = data.isClosed;
                }
            });
            renderAll();
        });
    }

    function changeDay(delta) {
        const dateInput = getDateInput();
        if(!dateInput) return;
        const parts = dateInput.value.split('-');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        d.setDate(d.getDate() + delta);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;
        loadDailyView();
    }

    function loadDailyView() {
        const dateInput = getDateInput();
        if(!dateInput) return;
        const displayDate = document.getElementById('current-view-date');
        if (displayDate) displayDate.innerText = `Jornada: ${dateInput.value}`;
        syncData();
    }

    function autoTabSelection() {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 12) activeShift = 'M';
        else if (hour >= 12 && hour < 20) activeShift = 'V';
        else activeShift = 'N';
        switchActiveTab(activeShift);
    }

    window.switchActiveTab = (shift) => {
        activeShift = shift;
        const columns = ['M', 'V', 'N'];
        columns.forEach(s => {
            const col = document.getElementById(`col-${s}`);
            const tab = document.getElementById(`tab-${s}`);
            if(!col || !tab) return;
            if (window.innerWidth < 1024) {
                if (s === shift) { col.classList.remove('hidden'); tab.classList.add('bg-slate-900', 'text-white', 'shadow-lg'); tab.classList.remove('bg-white', 'text-slate-400'); }
                else { col.classList.add('hidden'); tab.classList.remove('bg-slate-900', 'text-white', 'shadow-lg'); tab.classList.add('bg-white', 'text-slate-400'); }
            } else { col.classList.remove('hidden'); }
        });
    };

    window.toggleClosedStations = () => {
        showClosedStations = !showClosedStations;
        ['M', 'V', 'N'].forEach(s => {
            const icon = document.getElementById(`toggle-icon-${s}`);
            const text = document.getElementById(`toggle-text-${s}`);
            if (icon && text) {
                icon.className = showClosedStations ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
                text.innerText = showClosedStations ? "Ocultar" : "Cerrados";
            }
        });
        renderAll();
    };

    function renderAll() {
        ['M', 'V', 'N'].forEach(shift => {
            const listContainer = document.getElementById(`list-${shift}`);
            if (!listContainer) return;
            listContainer.innerHTML = '';
            const sortedStations = [...currentStations].sort((a, b) => (a.order || 0) - (b.order || 0));
            sortedStations.forEach(st => {
                const isClosed = stationDailyStatuses[`${shift}_${st.id}`] || false;
                const elements = currentDayAssignments.filter(a => a.shift === shift && a.station === st.name && a.type !== 'ausentismo');
                if (!isClosed) listContainer.appendChild(createStationSection(st, shift, elements, false));
                else if (showClosedStations) listContainer.appendChild(createStationSection(st, shift, [], true));
            });
        });

        const absContainer = document.getElementById('container-ABS');
        if (absContainer) {
            absContainer.innerHTML = '';
            absenceReasons.forEach(reason => {
                const elements = currentDayAssignments.filter(a => a.type === 'ausentismo' && a.reason === reason);
                absContainer.appendChild(createAbsenceCard(reason, elements));
            });
        }
    }

    function createStationSection(st, shift, elements, isClosed) {
        const section = document.createElement('div');
        section.className = `space-y-3 transition-all ${isClosed ? 'opacity-40 grayscale bg-slate-50 p-3 rounded-2xl border border-dashed border-slate-200' : ''}`;
        const canClose = elements.length === 0 && !isClosed;
        section.innerHTML = `
            <div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-3">
                <h4 class="text-[9px] font-black uppercase tracking-widest ${isClosed ? 'text-slate-400' : 'text-slate-500'}">${st.name} ${isClosed ? '[CERRADO]' : ''}</h4>
                <div class="flex items-center gap-2">
                    ${canClose ? `<button onclick="toggleStationStatus('${st.id}', '${shift}', false)" class="text-[8px] font-black text-slate-300 hover:text-red-800 uppercase tracking-tighter transition-colors">Cerrar Puesto</button>` : ''}
                    ${isClosed ? `<button onclick="toggleStationStatus('${st.id}', '${shift}', true)" class="text-[8px] font-black text-emerald-600 hover:underline uppercase tracking-tighter transition-colors">Abrir</button>` : ''}
                    ${!isClosed ? `<span class="w-5 h-5 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-[8px] font-bold text-slate-400">${elements.length}</span>` : ''}
                </div>
            </div>
            <div id="list-items-${st.id}-${shift}" class="space-y-2">
                ${elements.length > 0 ? elements.map(el => renderElementRow(el)).join('') : (isClosed ? '' : `<div class="py-3 px-4 rounded-xl border-2 border-dashed border-slate-50 flex items-center justify-center text-[8px] font-bold text-slate-300 uppercase tracking-widest">Sin personal</div>`)}
            </div>`;
        return section;
    }

    function renderElementRow(el) {
        const u = allUsers.find(usr => usr.email === el.email) || { photo: null, name: 'S/N' };
        const hasEntry = !!el.realEntry;
        const hasExit = !!el.realExit;
        const isLate = hasEntry && el.assignedEntry && el.realEntry > el.assignedEntry;
        
        let statusDot = "";
        let statusText = "Esperando";
        let statusClass = "text-slate-400";
        let dotClass = "bg-slate-300";

        if (hasEntry && !hasExit) {
            statusText = isLate ? `Retardo (${el.realEntry})` : `En Turno (${el.realEntry})`;
            statusClass = isLate ? "text-red-600" : "text-emerald-600";
            dotClass = isLate ? "bg-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)]" : "bg-emerald-500 animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.5)]";
            statusDot = `<div class="absolute -top-1 -right-1 w-3.5 h-3.5 ${dotClass} rounded-full border-2 border-white"></div>`;
        } else if (hasExit) {
            statusText = "Finalizado";
            statusClass = "text-slate-400";
            dotClass = "bg-slate-400";
            statusDot = `<div class="absolute -top-1 -right-1 w-3.5 h-3.5 ${dotClass} rounded-full border-2 border-white flex items-center justify-center text-[6px] text-white"><i class="fa-solid fa-check"></i></div>`;
        } else if (el.assignedEntry) {
            const now = new Date();
            const timeNow = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            if (timeNow > el.assignedEntry) {
                statusText = "Demorado";
                statusClass = "text-amber-600";
                dotClass = "bg-amber-400";
                statusDot = `<div class="absolute -top-1 -right-1 w-3.5 h-3.5 ${dotClass} rounded-full border-2 border-white"></div>`;
            }
        }

        let actionBtn = hasExit ? `<div class="p-2 bg-slate-100 text-slate-400 rounded-lg"><i class="fa-solid fa-check text-[10px]"></i></div>` :
                         (hasEntry ? `<button onclick="quickRegisterExit('${el.email}')" class="p-2 bg-red-800 text-white rounded-lg shadow-lg hover:bg-red-900 transition-all"><i class="fa-solid fa-right-from-bracket text-[10px]"></i></button>` :
                                     `<button onclick="quickRegisterEntry('${el.email}')" class="p-2 bg-emerald-500 text-white rounded-lg shadow-lg hover:bg-emerald-600 transition-all"><i class="fa-solid fa-right-to-bracket text-[10px]"></i></button>`);

        return `
            <div class="flex items-center justify-between p-2 bg-white rounded-2xl border border-slate-100 hover:border-red-200 transition-all group/row cursor-pointer" onclick="viewElementDetail('${el.email}')">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl overflow-hidden border-2 border-slate-50 relative bg-slate-50">
                        ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-user text-xs"></i></div>`}
                        ${statusDot}
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-tight text-slate-800 truncate max-w-[120px]">${u.name}</p>
                        <p class="text-[7px] font-black uppercase tracking-tighter ${statusClass}">${statusText}</p>
                    </div>
                </div>
                <div onclick="event.stopPropagation()">${actionBtn}</div>
            </div>`;
    }

    function createAbsenceCard(reason, elements) {
        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded-[2rem] border border-slate-200/60 shadow-sm space-y-3";
        card.innerHTML = `
            <div class="flex items-center justify-between mb-2">
                <h5 class="text-[9px] font-black uppercase text-red-900/40 tracking-widest">${reason}</h5>
                <span class="text-[9px] font-black text-red-800">${elements.length}</span>
            </div>
            <div class="flex flex-wrap gap-2">
                ${elements.map(el => {
                    const u = allUsers.find(usr => usr.email === el.email) || { photo: null, name: 'S/N' };
                    // Modificamos para gestionar clic derecho y menú contextual
                    return `
                    <div 
                        onclick="openActionModal('${el.email}', '${reason}')" 
                        oncontextmenu="handleRightClick(event, '${el.email}', '${reason}')"
                        class="w-10 h-10 rounded-xl overflow-hidden border-2 border-red-50 bg-red-50/20 grayscale opacity-60 hover:grayscale-0 hover:opacity-100 hover:border-red-500 cursor-pointer transition-all shadow-sm group relative" 
                        title="${u.name} (Clic derecho: Asignar)">
                        ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-user text-xs"></i></div>`}
                    </div>`;
                }).join('')}
                ${elements.length === 0 ? '<div class="w-10 h-10 rounded-xl border-2 border-dashed border-slate-100 flex items-center justify-center text-slate-200"><i class="fa-solid fa-minus text-[10px]"></i></div>' : ''}
            </div>`;
        return card;
    }

    // --- LOGICA DE MENU CONTEXTUAL ---
    window.handleRightClick = (e, email, reason) => {
        e.preventDefault();
        selectedElementForAction = email;
        const u = allUsers.find(usr => usr.email === email) || { name: 'S/N' };
        
        const menu = document.getElementById('custom-context-menu');
        const stationsList = document.getElementById('stations-menu-list');
        document.getElementById('menu-user-name').innerText = u.name;

        // Renderizar lista de casetas con submenú de turno
        stationsList.innerHTML = '';
        currentStations.sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(st => {
            const item = document.createElement('div');
            item.className = "group relative px-4 py-2 hover:bg-slate-50 cursor-pointer flex items-center justify-between transition-colors";
            item.innerHTML = `
                <span class="text-[8px] font-black uppercase text-slate-600 tracking-tighter">${st.name}</span>
                <i class="fa-solid fa-chevron-right text-[6px] text-slate-300 group-hover:text-red-800"></i>
                <!-- Submenú de Turnos -->
                <div class="absolute left-full top-0 hidden group-hover:block ml-0.5 bg-white border border-slate-200 rounded-xl shadow-xl py-2 min-w-[100px]">
                    <button onclick="directAssign('${st.name}', 'M')" class="w-full text-left px-4 py-2 text-[7px] font-black uppercase hover:bg-amber-50 hover:text-amber-700 transition-colors border-b border-slate-50">Turno M</button>
                    <button onclick="directAssign('${st.name}', 'V')" class="w-full text-left px-4 py-2 text-[7px] font-black uppercase hover:bg-blue-50 hover:text-blue-700 transition-colors border-b border-slate-50">Turno V</button>
                    <button onclick="directAssign('${st.name}', 'N')" class="w-full text-left px-4 py-2 text-[7px] font-black uppercase hover:bg-slate-900 hover:text-white transition-colors">Turno N</button>
                </div>
            `;
            stationsList.appendChild(item);
        });

        // Posicionamiento inteligente del menú
        menu.style.top = `${e.clientY}px`;
        menu.style.left = `${e.clientX}px`;
        menu.classList.remove('hidden');

        // Cerrar menú al hacer clic fuera
        const closeMenu = () => {
            menu.classList.add('hidden');
            document.removeEventListener('click', closeMenu);
        };
        setTimeout(() => document.addEventListener('click', closeMenu), 10);
    };

    window.directAssign = async (stationName, shift) => {
        if (!selectedElementForAction) return;
        const dateInput = getDateInput();
        if(!dateInput) return;
        
        const email = selectedElementForAction;
        const docId = `${dateInput.value}_${email}`;
        
        try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId), {
                email,
                station: stationName,
                shift: shift,
                date: dateInput.value,
                type: 'presencial',
                updatedAt: serverTimestamp()
            });
            // Refrescar vista
            switchViewFilter('duty');
        } catch (e) { console.error(e); }
    };

    // --- MODAL DE ACCIÓN ---
    window.openActionModal = (email, reason) => {
        selectedElementForAction = email;
        const u = allUsers.find(usr => usr.email === email) || { photo: null, name: 'Desconocido' };
        document.getElementById('modal-user-name').innerText = u.name;
        document.getElementById('modal-user-status').innerText = `Estatus Actual: ${reason}`;
        document.getElementById('modal-user-photo').innerHTML = u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center bg-slate-100 text-slate-300"><i class="fa-solid fa-user text-xl"></i></div>`;
        document.getElementById('action-modal').classList.remove('hidden');
    };

    window.closeActionModal = () => {
        document.getElementById('action-modal').classList.add('hidden');
        selectedElementForAction = null;
    };

    window.activateElement = async () => {
        if (!selectedElementForAction) return;
        const dateInput = getDateInput();
        if(!dateInput) return;
        try {
            const email = selectedElementForAction;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', `${dateInput.value}_${email}`));
            closeActionModal();
            switchViewFilter('duty');
            window.openProfilesPanel();
        } catch (e) { console.error(e); }
    };

    // --- REGISTROS DE ENTRADA/SALIDA ---
    window.quickRegisterEntry = async (email) => {
        const dateInput = getDateInput();
        if(!dateInput) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', `${dateInput.value}_${email}`), { realEntry: timeStr, updatedAt: serverTimestamp() });
    };

    window.quickRegisterExit = async (email) => {
        const dateInput = getDateInput();
        if(!dateInput) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', `${dateInput.value}_${email}`), { realExit: timeStr, updatedAt: serverTimestamp() });
    };

    window.toggleStationStatus = async (stationId, shift, currentStatus) => {
        const dateInput = getDateInput();
        if(!dateInput) return;
        const statusRef = doc(db, 'artifacts', appId, 'public', 'data', 'station_daily_status', `${dateInput.value}_${shift}_${stationId}`);
        await setDoc(statusRef, { stationId, date: dateInput.value, shift, isClosed: !currentStatus, updatedAt: serverTimestamp() });
    };

    window.openProfilesPanel = () => { if(typeof window.loadRightContent === 'function') window.loadRightContent('Apps/Perfiles.html'); };
    window.viewElementDetail = (email) => {
        const dateInput = getDateInput();
        window.selectedUserEmail = email;
        window.selectedOperationDate = dateInput ? dateInput.value : '';
        if(typeof window.loadRightContent === 'function') window.loadRightContent('Apps/Componentes/RegAs_PP/Detalle.html');
    };
</script>
