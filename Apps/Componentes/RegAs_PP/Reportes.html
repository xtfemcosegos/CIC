<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes Operativos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #reportes-container { height: 100vh; overflow: hidden; }
        body { margin: 0; padding: 0; background-color: #f8fafc; }
    </style>
</head>
<body>

<!-- Módulo de Reportes Operativos - Optimizado para Scroll y Compatibilidad con el Shell -->
<div id="reportes-container" class="max-w-[1600px] mx-auto p-4 md:p-6 space-y-6 text-slate-900 h-full flex flex-col overflow-hidden">

    <!-- ÁREA DE CONTENIDO DINÁMICO (Scrollable) -->
    <div class="flex-1 min-h-0 overflow-hidden relative">
        
        <!-- SECCIÓN: WHATSAPP -->
        <div id="content-whatsapp" class="h-full flex flex-col space-y-6 animate-in fade-in duration-500 overflow-y-auto custom-scrollbar pr-2">
            <section class="grid grid-cols-1 lg:grid-cols-4 gap-6 min-h-fit">
                <!-- Panel Lateral de Opciones -->
                <div class="lg:col-span-1">
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-200/60 shadow-sm space-y-6 sticky top-0">
                        <div class="space-y-4">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Configuración</p>
                            <label class="flex items-center gap-3 cursor-pointer group p-4 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all border border-transparent hover:border-slate-200">
                                <input type="checkbox" id="include-times" class="w-4 h-4 accent-red-800 rounded-lg" checked>
                                <span class="text-[10px] font-bold uppercase text-slate-600 group-hover:text-slate-900 transition-colors tracking-tighter">Incluir Horas</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group p-4 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all border border-transparent hover:border-slate-200">
                                <input type="checkbox" id="include-abs" class="w-4 h-4 accent-red-800 rounded-lg" checked>
                                <span class="text-[10px] font-bold uppercase text-slate-600 group-hover:text-slate-900 transition-colors tracking-tighter">Incluir Ausentismos</span>
                            </label>
                        </div>
                        
                        <div class="space-y-3">
                            <button onclick="generateReport()" class="w-full py-5 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-800 transition-all shadow-xl shadow-slate-900/10 flex items-center justify-center gap-3 active:scale-95">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> Generar WhatsApp
                            </button>

                            <button onclick="openEmailModal()" class="w-full py-5 bg-red-800 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-900 transition-all shadow-xl shadow-red-900/10 flex items-center justify-center gap-3 active:scale-95">
                                <i class="fa-solid fa-envelope"></i> Enviar Correo
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Vista Previa de Texto -->
                <div class="lg:col-span-3">
                    <div class="bg-white rounded-[2.5rem] border border-slate-200/60 shadow-sm h-full min-h-[500px] flex flex-col overflow-hidden relative">
                        <div class="p-5 bg-slate-50/50 border-b border-slate-100 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center">
                                    <i class="fa-brands fa-whatsapp text-sm"></i>
                                </div>
                                <p class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Vista Previa WhatsApp</p>
                            </div>
                            <button onclick="copyToClipboard()" id="copy-btn" class="hidden px-5 py-2.5 bg-emerald-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-md active:scale-95">
                                <i class="fa-solid fa-copy mr-2"></i> Copiar
                            </button>
                        </div>
                        <div class="flex-1 p-8 bg-slate-50/20">
                            <textarea id="report-output" readonly placeholder="El reporte se generará aquí..." class="w-full h-full min-h-[400px] bg-transparent border-none resize-none text-[12px] font-mono text-slate-700 focus:outline-none custom-scrollbar leading-relaxed"></textarea>
                        </div>
                        
                        <!-- Toast -->
                        <div id="copy-toast" class="hidden absolute bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest animate-in slide-in-from-bottom-4 shadow-2xl z-50">
                            <i class="fa-solid fa-check-circle text-emerald-400 mr-2"></i> Copiado al Portapapeles
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- SECCIÓN: REPORTE DIARIO (TABLAS) -->
        <div id="content-daily" class="hidden h-full flex flex-col space-y-6 animate-in fade-in duration-500">
            <div id="daily-tables-container" class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-8 pb-20">
                <!-- Contenido generado dinámicamente -->
            </div>
        </div>

    </div>

    <!-- MODAL ENVÍO CORREO -->
    <div id="email-modal" class="hidden fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md animate-in fade-in duration-300">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] p-10 shadow-2xl space-y-8 animate-in zoom-in duration-300 max-h-[95vh] overflow-hidden flex flex-col">
            <div class="flex items-center justify-between border-b border-slate-100 pb-6 shrink-0">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-red-800 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-red-900/20">
                        <i class="fa-solid fa-envelope-circle-check text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Envío <span class="text-red-800">Institucional</span></h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Valide los datos antes de procesar el envío.</p>
                    </div>
                </div>
                <button onclick="closeEmailModal()" class="w-10 h-10 flex items-center justify-center rounded-full text-slate-300 hover:text-red-800 hover:bg-red-50 transition-all"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10 flex-1 min-h-0 overflow-hidden">
                <div class="lg:col-span-1 space-y-8 overflow-y-auto custom-scrollbar pr-2">
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="loadDefaultRecipients()" class="p-4 border border-slate-200 rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex flex-col items-center gap-3">
                            <i class="fa-solid fa-address-book text-slate-400 text-lg"></i> Predeterminados
                        </button>
                        <button onclick="loadTestRecipients()" class="p-4 border border-slate-200 rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-red-50 hover:text-red-800 transition-all flex flex-col items-center gap-3">
                            <i class="fa-solid fa-flask-vial text-red-400 text-lg"></i> Modo Prueba
                        </button>
                    </div>

                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Destinatarios (Para)</label>
                            <textarea id="email-to" rows="2" class="w-full bg-slate-50 border border-slate-100 p-5 rounded-2xl text-[11px] font-bold outline-none focus:border-red-800 focus:bg-white transition-all resize-none shadow-inner"></textarea>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Copia (CC)</label>
                            <textarea id="email-cc" rows="2" class="w-full bg-slate-50 border border-slate-100 p-5 rounded-2xl text-[11px] font-bold outline-none focus:border-red-800 focus:bg-white transition-all resize-none shadow-inner"></textarea>
                        </div>
                    </div>

                    <button id="btn-confirm-email" onclick="confirmAndSendEmail()" class="w-full py-6 bg-slate-900 text-white rounded-2xl text-xs font-black uppercase tracking-[0.2em] hover:bg-red-800 transition-all shadow-2xl active:scale-[0.98] flex items-center justify-center gap-3">
                        <i class="fa-solid fa-paper-plane"></i> Confirmar y Enviar
                    </button>
                </div>

                <div class="lg:col-span-2 flex flex-col space-y-4 min-h-0 overflow-hidden">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2 flex items-center gap-2 tracking-widest shrink-0">
                        <i class="fa-solid fa-eye text-red-800"></i> Vista Previa del Reporte
                    </label>
                    <div id="email-body-preview" class="flex-1 bg-white border-2 border-slate-100 rounded-[2.5rem] overflow-y-auto custom-scrollbar p-6 shadow-inner"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const appId = 'cic5-pp';

    const ESTILOS_REPORTES = {
        'falta': { bg: '#FFFF00', text: '#FF0000', border: '#EAB308' },
        'vacaciones': { bg: '#22C55E', text: '#FFFFFF', border: '#16A34A' },
        'incapacidad': { bg: '#E0F2FE', text: '#0369A1', border: '#BAE6FD' },
        'permiso': { bg: '#FEF9C3', text: '#A16207', border: '#FEF08A' },
        'recupera': { bg: '#16a34a', text: '#FFFFFF', border: '#15803d' },
        'extra': { bg: '#d946ef', text: '#FFFFFF', border: '#a21caf' },
        'retardo': { bg: '#991b1b', text: '#FFFFFF', border: '#7f1d1d' },
        'festivo': { bg: '#7e22ce', text: '#FFFFFF', border: '#6b21a8' },
        'default': { bg: '#FEE2E2', text: '#B91C1C', border: '#FECACA' }
    };

    window.switchReportTab = (tab) => {
        const wt = document.getElementById('content-whatsapp');
        const dt = document.getElementById('content-daily');
        const btW = document.getElementById('tab-whatsapp');
        const btD = document.getElementById('tab-daily');
        const extraRibbon = document.getElementById('ribbon-report-extras');

        if(tab === 'whatsapp') {
            wt.classList.remove('hidden');
            dt.classList.add('hidden');
            if(extraRibbon) extraRibbon.classList.add('hidden');
            if(btW) btW.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase transition-all bg-white text-slate-900 shadow-md";
            if(btD) btD.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase transition-all text-white/40 hover:text-white transition-colors";
        } else {
            wt.classList.add('hidden');
            dt.classList.remove('hidden');
            if(extraRibbon) extraRibbon.classList.remove('hidden');
            if(btD) btD.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase transition-all bg-white text-slate-900 shadow-md";
            if(btW) btW.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase transition-all text-white/40 hover:text-white transition-colors";
            window.generateDailyTableReport();
        }
    };

    window.syncAndLoad = () => {
        const dailyActive = document.getElementById('content-daily') && !document.getElementById('content-daily').classList.contains('hidden');
        if(dailyActive) window.generateDailyTableReport();
        else window.generateReport();
    };

    const formatDateLongLocale = (d) => {
        if(!d) return "";
        return new Date(d + 'T00:00:00').toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
    };

    window.generateReport = async () => {
        const dateEl = document.getElementById('global-report-date');
        const shiftEl = document.getElementById('report-shift');
        const out = document.getElementById('report-output');
        if(!dateEl || !shiftEl || !out) return;
        const date = dateEl.value; const shift = shiftEl.value; if(!date) return;
        out.value = "Sincronizando reportes...";
        
        try {
            const shiftLabels = { 'M': 'MATUTINO', 'V': 'VESPERTINO', 'N': 'NOCTURNO' };
            const [stationsSnap, assignsSnap, usersSnap, statusSnap] = await Promise.all([
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'stations')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'assignments')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'station_daily_status'))
            ]);

            const stations = stationsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0) - (b.order||0));
            const usersMap = {}; usersSnap.forEach(d => usersMap[d.data().email] = d.data().name);
            const allDocs = assignsSnap.docs.map(d => d.data()).filter(a => a.date === date);
            const dailyStatuses = statusSnap.docs.map(d => d.data()).filter(s => s.date === date && s.shift === shift);

            let txt = `*DISTRIBUCIÓN TURNO ${shiftLabels[shift] || shift}*\n\`${formatDateLongLocale(date)}\`\n\n`;
            
            stations.forEach(st => {
                const elements = [];
                allDocs.forEach(doc => {
                    if (doc.shifts && Array.isArray(doc.shifts)) {
                        doc.shifts.forEach(s => {
                            if (s.shift === shift && s.station === st.name && s.type !== 'ausentismo') {
                                elements.push({ ...s, email: doc.email, name: doc.name });
                            }
                        });
                    } else if (doc.shift === shift && doc.station === st.name && doc.type !== 'ausentismo') {
                        elements.push(doc);
                    }
                });

                const isClosed = dailyStatuses.find(s => s.stationId === st.id)?.isClosed;
                if (elements.length > 0 || isClosed) {
                    txt += `*${st.name.toUpperCase()}*\n`;
                    if (isClosed) txt += `Sin elementos\n`;
                    else elements.forEach(el => {
                        const name = usersMap[el.email] || el.name || el.email;
                        txt += document.getElementById('include-times')?.checked ? `• ${el.realEntry || '--:--'} Hrs. ${name}\n` : `• ${name}\n`;
                    });
                    txt += `\n`;
                }
            });

            if(document.getElementById('include-abs')?.checked) {
                const abs = [];
                allDocs.forEach(doc => {
                    if (doc.shifts && Array.isArray(doc.shifts)) {
                        doc.shifts.forEach(s => {
                            if (s.type === 'ausentismo' && s.reason !== 'Descanso') {
                                abs.push({ ...s, email: doc.email, name: doc.name });
                            }
                        });
                    } else if (doc.type === 'ausentismo' && doc.reason !== 'Descanso') {
                        abs.push(doc);
                    }
                });

                if(abs.length > 0) {
                    txt += `*AUSENTISMOS / INCIDENCIAS*\n`;
                    abs.forEach(a => txt += `• ${usersMap[a.email] || a.name || a.email} (${a.reason})\n`);
                }
            }
            
            out.value = txt.trim() || "Sin registros para este turno.";
            document.getElementById('copy-btn').classList.toggle('hidden', !txt.trim());
        } catch (e) { console.error(e); out.value = "Error al generar reporte."; }
    };

    window.generateDailyTableReport = async () => {
        const dateEl = document.getElementById('global-report-date');
        const container = document.getElementById('daily-tables-container');
        if(!dateEl || !container) return;
        const date = dateEl.value; if(!date) return;
        container.innerHTML = '<div class="py-20 text-center opacity-20"><i class="fa-solid fa-circle-notch animate-spin text-xl"></i></div>';

        try {
            const [stationsSnap, usersSnap, assignsSnap] = await Promise.all([
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'stations')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'))
            ]);
            
            const stations = stationsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0) - (b.order||0));
            const usersMap = {}; 
            usersSnap.forEach(d => { 
                const u = d.data(); 
                usersMap[u.email] = { name: u.name, id: u.employeeId }; 
            });
            const allAssignments = assignsSnap.docs.map(d => ({ docId: d.id, ...d.data() }));

            let html = "";
            ['M', 'V', 'N'].forEach(sID => {
                const label = sID === 'M' ? 'MATUTINO' : sID === 'V' ? 'VESPERTINO' : 'NOCTURNO';
                const list = [];
                // Ordenar por estaciones según catálogo (mismo orden que WhatsApp)
                stations.forEach(st => {
                    allAssignments.forEach(doc => {
                        if (doc.date === date) {
                            if (doc.shifts && Array.isArray(doc.shifts)) {
                                doc.shifts.forEach(s => {
                                    if (s.shift === sID && s.station === st.name && s.type !== 'ausentismo') {
                                        list.push({ ...s, email: doc.email, docId: doc.docId });
                                    }
                                });
                            } else if (doc.shift === sID && doc.station === st.name && doc.type !== 'ausentismo') {
                                list.push(doc);
                            }
                        }
                    });
                });
                if (list.length > 0) html += renderTable(`ASISTENCIA ${label} - ${formatDateLongLocale(date)}`, list, usersMap, false);
            });

            const absList = [];
            allAssignments.forEach(doc => {
                if (doc.date === date) {
                    if (doc.shifts && Array.isArray(doc.shifts)) {
                        doc.shifts.forEach(s => {
                            if (s.type === 'ausentismo' && s.reason !== 'Descanso') {
                                absList.push({ ...s, email: doc.email, docId: doc.docId });
                            }
                        });
                    } else if (doc.type === 'ausentismo' && doc.reason !== 'Descanso') {
                        absList.push(doc);
                    }
                }
            });
            if (absList.length > 0) html += renderTable(`AUSENCIAS E INCIDENCIAS - ${formatDateLongLocale(date)}`, absList, usersMap, true);

            container.innerHTML = html || `<div class="py-40 text-center opacity-30 text-[10px] font-black uppercase tracking-[0.4em]">Sin registros cargados</div>`;
            
            window.generateEmailHtml = () => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = container.innerHTML;
                tempDiv.querySelectorAll('input[type="text"]').forEach(inp => {
                    const span = document.createElement('span');
                    span.style.color = '#64748b'; span.style.fontStyle = 'italic'; span.style.fontSize = '10px';
                    span.innerText = inp.value || '---';
                    inp.parentNode.replaceChild(span, inp);
                });
                return tempDiv.innerHTML;
            };
        } catch (e) { console.error(e); }
    };

    // FUNCIÓN DE RENDERIZADO OPTIMIZADA PARA OUTLOOK (SIN FOTOS, TABLAS ROBUSTAS)
    function renderTable(title, list, users, isAbsence) {
        return `
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 30px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background-color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 100%;">
                <tr>
                    <td style="background-color: #0f172a; color: #ffffff; padding: 15px 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">
                        ${title}
                    </td>
                </tr>
                <tr>
                    <td>
                        <table width="100%" cellspacing="0" cellpadding="0" border="0" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="background-color: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 9px; font-weight: 900; border-bottom: 2px solid #f1f5f9;">
                                    <th width="100" style="padding: 12px 15px; text-align: left;">ID</th>
                                    <th style="padding: 12px 15px; text-align: left;">PERSONAL</th>
                                    ${isAbsence ? `<th width="140" style="padding: 12px 15px; text-align: center;">MOTIVO</th>` : `<th width="100" style="padding: 12px 15px; text-align: center;">ENTRADA</th><th width="100" style="padding: 12px 15px; text-align: center;">SALIDA</th>`}
                                    <th style="padding: 12px 15px; text-align: left;">NOTAS</th>
                                </tr>
                            </thead>
                            <tbody style="font-size: 11px; color: #1e293b;">
                                ${list.map(a => {
                                    const u = users[a.email] || { name: a.email, id: '---' };
                                    const isL = a.realEntry && a.assignedEntry && (a.realEntry > a.assignedEntry);
                                    let statusCol = "";
                                    if (isAbsence) {
                                        const c = ESTILOS_REPORTES[(a.reason || 'Falta').toLowerCase()] || ESTILOS_REPORTES['default'];
                                        statusCol = `<td style="padding: 10px 15px; text-align: center; border-bottom: 1px solid #f1f5f9;">
                                            <span style="background-color: ${c.bg}; color: ${c.text}; padding: 3px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; border: 1px solid ${c.border}; display: inline-block; text-transform: uppercase;">${a.reason || 'Falta'}</span>
                                        </td>`;
                                    } else {
                                        statusCol = `<td style="padding: 10px 15px; text-align: center; border-bottom: 1px solid #f1f5f9;">
                                                        ${isL ? '<span style="color: #b91c1c; font-weight: bold; font-size: 8px; margin-right: 4px;">RETARDO</span>' : ''}
                                                        <b style="color: ${isL ? '#b91c1c' : '#059669'}; font-family: Courier, monospace;">${a.realEntry || '--:--'}</b>
                                                     </td>
                                                     <td style="padding: 10px 15px; text-align: center; border-bottom: 1px solid #f1f5f9; font-weight: bold; font-family: Courier, monospace;">${a.realExit || '--:--'}</td>`;
                                    }
                                    return `
                                    <tr>
                                        <td style="padding: 10px 15px; color: #64748b; font-weight: bold; border-bottom: 1px solid #f1f5f9;">${u.id}</td>
                                        <td style="padding: 10px 15px; font-weight: bold; text-transform: uppercase; color: #0f172a; border-bottom: 1px solid #f1f5f9;">${u.name}</td>
                                        ${statusCol}
                                        <td style="padding: 10px 15px; border-bottom: 1px solid #f1f5f9; color: #64748b; font-style: italic;">
                                            <input type="text" value="${a.note || ''}" onchange="window.saveRowNote('${a.docId}', this.value)" placeholder="..." style="width: 100%; background: transparent; border: none; font-size: 10px; outline: none; color: #64748b;">
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </td>
                </tr>
            </table>`;
    }

    window.openEmailModal = () => {
        const preview = document.getElementById('email-body-preview');
        preview.innerHTML = window.generateEmailHtml ? window.generateEmailHtml() : "<p class='p-10 text-center opacity-30'>Generando reporte...</p>";
        document.getElementById('email-modal').classList.remove('hidden');
    };

    window.closeEmailModal = () => document.getElementById('email-modal').classList.add('hidden');
    window.loadDefaultRecipients = () => { 
        document.getElementById('email-to').value = "jesuseduardo.gutierrez@armur.com; juan.paniagua@armur.com"; 
        document.getElementById('email-cc').value = "roberto.rodriguez@armur.com;josedavid.montano@armur.com"; 
    };
    window.loadTestRecipients = () => { 
        document.getElementById('email-to').value = "proteccion.instalaciones@armur.com"; 
        document.getElementById('email-cc').value = ""; 
    };

    window.confirmAndSendEmail = async () => {
        const to = document.getElementById('email-to').value.trim();
        const cc = document.getElementById('email-cc').value.trim();
        const btn = document.getElementById('btn-confirm-email');
        if (!to) return;

        const containerHtml = window.generateEmailHtml();
        const dateEl = document.getElementById('global-report-date');
        const fechaFormateada = dateEl ? formatDateLongLocale(dateEl.value) : '';

        btn.disabled = true; const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Enviando...`;

        // PLANTILLA DE CORREO "ROBUSTA" CON TABLAS ANIDADAS (PARA OUTLOOK)
        const finalEmailBody = `
            <div style="background-color: #f1f5f9; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 800px; background-color: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; border-collapse: separate; overflow: hidden;">
                    <tr>
                        <td style="background-color: #991b1b; padding: 30px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; font-weight: 900;">Reporte de asistencia para el ${fechaFormateada}</h1>
                            <p style="color: rgba(255,255,255,0.7); margin-top: 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">CIC - Protección Patrimonial OS</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px;">
                            ${containerHtml}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 15px; text-align: center; color: #94a3b8; font-size: 10px; border-top: 1px solid #f1f5f9;">
                            Este mensaje ha sido generado automáticamente por el Módulo Operativo CIC.
                        </td>
                    </tr>
                </table>
            </div>`;

        try {
            const response = await fetch("https://default3b2cbccb81bb44a2a19a2386bb3606.02.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/507bea91c30c4743b4749a474f92ad3f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PzEbbL5wNoHu-b78wQtE7JP0H-RKDb3btp2iHGbM6vU", {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to, cc, body: finalEmailBody })
            });

            if (response.ok) {
                btn.innerHTML = `<i class="fa-solid fa-check-circle mr-2"></i> Enviado`;
                btn.classList.replace('bg-slate-900', 'bg-emerald-600');
                setTimeout(() => { 
                    window.closeEmailModal(); 
                    btn.disabled = false; btn.innerHTML = originalText; btn.classList.replace('bg-emerald-600', 'bg-slate-900'); 
                }, 2000);
            } else throw new Error();
        } catch (e) { 
            btn.disabled = false; btn.innerHTML = originalText; alert("Error de envío."); 
        }
    };

    // CONEXIÓN CON EL SHELL
    window.sendEmailFromShell = () => window.openEmailModal();

    window.saveRowNote = async (id, note) => { 
        if (!id) return; 
        try { 
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id), { note, updatedAt: serverTimestamp() }); 
        } catch (e) { 
            console.error(e); 
        } 
    };
    
    window.copyToClipboard = () => {
        const text = document.getElementById('report-output').value;
        const toast = document.getElementById('copy-toast');
        const textarea = document.createElement("textarea");
        textarea.value = text; document.body.appendChild(textarea); textarea.select();
        document.execCommand('copy'); document.body.removeChild(textarea);
        toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000);
    };

    // Inicialización
    setTimeout(() => { 
        if(window.syncAndLoad) window.syncAndLoad(); 
        
        const isDaily = document.getElementById('content-daily') && !document.getElementById('content-daily').classList.contains('hidden');
        if (isDaily) window.switchReportTab('daily');
        else window.switchReportTab('whatsapp');
    }, 300);
</script>
