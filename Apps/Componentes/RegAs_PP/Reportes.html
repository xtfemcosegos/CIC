<!-- Módulo de Reportes Limpio - El Shell controla la interfaz superior -->
<div class="max-w-[1600px] mx-auto p-4 space-y-4 text-slate-900">

    <!-- ÁREA: WHATSAPP -->
    <div id="content-whatsapp" class="space-y-4 animate-in fade-in duration-500">
        <section class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Panel Lateral de Opciones -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-6">
                    <div class="space-y-2">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Configuración de Texto</p>
                        <label class="flex items-center gap-3 cursor-pointer group p-3 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-colors">
                            <input type="checkbox" id="include-times" class="w-4 h-4 accent-red-800 rounded-lg" checked>
                            <span class="text-[10px] font-bold uppercase text-slate-600 group-hover:text-slate-900 transition-colors tracking-tighter">Incluir Horas de Entrada</span>
                        </label>
                    </div>
                    
                    <button onclick="generateReport()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-xl shadow-red-900/10 flex items-center justify-center gap-3">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Generar Texto
                    </button>
                </div>
            </div>

            <!-- Vista Previa -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm h-full min-h-[500px] flex flex-col overflow-hidden relative">
                    <div class="p-4 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i class="fa-brands fa-whatsapp text-emerald-500 text-sm"></i>
                            <p class="text-[9px] font-black text-slate-900 uppercase tracking-widest">Vista Previa para Grupos</p>
                        </div>
                        <button onclick="copyToClipboard()" id="copy-btn" class="hidden px-4 py-2 bg-emerald-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-md">
                            <i class="fa-solid fa-copy mr-2"></i> Copiar Reporte
                        </button>
                    </div>
                    <div class="flex-1 p-6">
                        <textarea id="report-output" readonly placeholder="El reporte generado aparecerá aquí..." class="w-full h-full min-h-[400px] bg-transparent border-none resize-none text-[11px] font-mono text-slate-700 focus:outline-none custom-scrollbar leading-relaxed"></textarea>
                    </div>
                    
                    <!-- Toast Copiado -->
                    <div id="copy-toast" class="hidden absolute bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest animate-in slide-in-from-bottom-4 shadow-2xl z-50">
                        <i class="fa-solid fa-check-circle text-emerald-400 mr-2"></i> Texto Copiado al Portapapeles
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- ÁREA: REPORTE DIARIO (TABLAS) -->
    <div id="content-daily" class="hidden space-y-6 animate-in fade-in duration-500">
        <div id="daily-tables-container" class="space-y-8">
            <!-- Se carga dinámicamente -->
        </div>
    </div>

    <!-- MODAL ENVÍO CORREO -->
    <div id="email-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] p-10 shadow-2xl space-y-8 animate-in zoom-in duration-300 max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex items-center justify-between border-b border-slate-100 pb-6">
                <div>
                    <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter">Confirmar <span class="text-red-800">Envío de Reporte</span></h3>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Revisa la estructura antes de procesar el envío.</p>
                </div>
                <button onclick="closeEmailModal()" class="text-slate-300 hover:text-slate-900 transition-colors">
                    <i class="fa-solid fa-circle-xmark text-2xl"></i>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-1 space-y-6">
                    <div class="space-y-2">
                        <label class="text-[8px] font-black text-slate-400 uppercase ml-2">Destinatarios (Para)</label>
                        <textarea id="email-to" rows="2" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-[10px] font-bold outline-none focus:border-red-800 transition-all resize-none shadow-inner text-slate-900"></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[8px] font-black text-slate-400 uppercase ml-2">Copia (CC)</label>
                        <textarea id="email-cc" rows="2" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-[10px] font-bold outline-none focus:border-red-800 transition-all resize-none shadow-inner text-slate-900"></textarea>
                    </div>

                    <button id="btn-confirm-email" onclick="confirmAndSendEmail()" class="w-full py-5 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-xl shadow-red-900/10 active:scale-95">
                        Confirmar y Enviar vía Power Automate
                    </button>
                </div>

                <div class="lg:col-span-2 space-y-3">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 flex items-center gap-2">
                        <i class="fa-solid fa-eye text-red-800"></i> Vista Previa del Cuerpo del Correo
                    </label>
                    <div id="email-body-preview" class="w-full h-[450px] bg-white border-2 border-slate-100 rounded-3xl overflow-y-auto custom-scrollbar p-0 shadow-inner"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, setDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const appId = 'cic5-pp';

    let currentReportState = { assigns: [], usersMap: {}, date: "", isHybrid: false, prevDate: "" };

    // --- FUNCIONES GLOBALES VINCULADAS AL SHELL ---

    window.switchReportTab = (tab) => {
        const wt = document.getElementById('content-whatsapp');
        const dt = document.getElementById('content-daily');
        const btW = document.getElementById('tab-whatsapp');
        const btD = document.getElementById('tab-daily');
        const extraRibbon = document.getElementById('ribbon-report-extras');

        if(tab === 'whatsapp') {
            wt.classList.remove('hidden');
            dt.classList.add('hidden');
            if(extraRibbon) extraRibbon.classList.add('hidden');
            if(btW) btW.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all bg-white text-slate-900 shadow-md";
            if(btD) btD.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all text-white/40 hover:text-white";
        } else {
            wt.classList.add('hidden');
            dt.classList.remove('hidden');
            if(extraRibbon) extraRibbon.classList.remove('hidden');
            if(btD) btD.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all bg-white text-slate-900 shadow-md";
            if(btW) btW.className = "px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all text-white/40 hover:text-white";
            window.generateDailyTableReport();
        }
    };

    window.syncAndLoad = () => {
        const dailyActive = document.getElementById('content-daily') && !document.getElementById('content-daily').classList.contains('hidden');
        if(dailyActive) window.generateDailyTableReport();
        else window.generateReport();
    };

    const formatDateLongLocale = (d) => {
        if(!d) return "";
        return new Date(d + 'T00:00:00').toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
    };

    window.generateReport = async () => {
        const dateEl = document.getElementById('global-report-date');
        const shiftEl = document.getElementById('report-shift');
        const out = document.getElementById('report-output');
        
        if(!dateEl || !shiftEl || !out) return;
        
        const date = dateEl.value;
        const shift = shiftEl.value;
        if(!date) return;

        out.value = "Consultando base de datos...";
        
        try {
            const shiftLabels = { 'M': 'MATUTINO', 'V': 'VESPERTINO', 'N': 'NOCTURNO' };
            const fullShiftName = shiftLabels[shift] || shift;

            const [stationsSnap, assignsSnap, statusSnap, usersSnap] = await Promise.all([
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'stations')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'assignments')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'station_daily_status')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users'))
            ]);

            const stations = stationsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0) - (b.order||0));
            const allAssigns = assignsSnap.docs.map(d => d.data());
            const assigns = allAssigns.filter(a => a.date === date && a.shift === shift);
            const dailyStatuses = statusSnap.docs.map(d => d.data()).filter(s => s.date === date && s.shift === shift);
            const usersMap = {}; 
            usersSnap.forEach(d => { usersMap[d.data().email] = d.data().name; });

            // LÓGICA DE CONTINUIDAD (Turno Anterior)
            let prevShift = '';
            let prevDateStr = date;
            if (shift === 'V') {
                prevShift = 'M';
            } else if (shift === 'N') {
                prevShift = 'V';
            } else if (shift === 'M') {
                prevShift = 'N';
                const d = new Date(date + 'T00:00:00');
                d.setDate(d.getDate() - 1);
                prevDateStr = d.toISOString().split('T')[0];
            }
            const prevAssigns = allAssigns.filter(a => a.date === prevDateStr && a.shift === prevShift);
            
            let txt = `*DISTRIBUCIÓN TURNO ${fullShiftName}*\n\`${formatDateLongLocale(date)}\`\n\n`;
            
            stations.forEach(st => {
                const elements = assigns.filter(a => a.station === st.name && a.type !== 'ausentismo');
                const isClosed = dailyStatuses.find(s => s.stationId === st.id)?.isClosed;

                if (elements.length > 0 || isClosed) {
                    txt += `*${st.name.toUpperCase()}*\n`;
                    if (isClosed) {
                        txt += `Sin elemento\n`;
                    } else {
                        elements.forEach(el => {
                            const name = usersMap[el.email] || el.email;
                            const includeTimes = document.getElementById('include-times')?.checked;
                            
                            // Verificar si continúa turno
                            const isContinued = prevAssigns.some(pa => pa.email === el.email && pa.station === st.name);

                            if (isContinued) {
                                txt += `• Continúa Turno. ${name}\n`;
                            } else if (includeTimes) {
                                const timeVal = el.realEntry || '--:--';
                                txt += `• ${timeVal} Hrs. ${name}\n`;
                            } else {
                                txt += `• ${name}\n`;
                            }
                        });
                    }
                    txt += `\n`;
                }
            });
            
            out.value = txt.trim() || `Sin registros para el turno ${fullShiftName}.`;
            document.getElementById('copy-btn').classList.remove('hidden');
        } catch (e) { 
            console.error(e);
            out.value = "Error de sincronización."; 
        }
    };

    window.generateDailyTableReport = async () => {
        const dateEl = document.getElementById('global-report-date');
        const hybridEl = document.getElementById('hybrid-night-mode');
        const container = document.getElementById('daily-tables-container');
        
        if(!dateEl || !container) return;
        const date = dateEl.value;
        const isHybrid = hybridEl?.checked || false;
        
        if(!date) return;
        container.innerHTML = '<div class="py-20 text-center opacity-20"><i class="fa-solid fa-circle-notch animate-spin text-xl"></i></div>';

        const dObj = new Date(date + 'T00:00:00');
        dObj.setDate(dObj.getDate() - 1);
        const prevDate = dObj.toISOString().split('T')[0];

        try {
            const [usersSnap, assignsSnap] = await Promise.all([
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users')),
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'))
            ]);

            const usersMap = {};
            usersSnap.forEach(d => { 
                const u = d.data();
                usersMap[u.email] = { name: u.name, id: u.employeeId }; 
            });

            const allAssignments = assignsSnap.docs.map(d => ({ docId: d.id, ...d.data() }));
            currentReportState = { assigns: allAssignments, usersMap, date, isHybrid, prevDate };

            let html = "";
            
            if (isHybrid) {
                const nightPrev = allAssignments.filter(a => a.date === prevDate && a.shift === 'N' && a.type !== 'ausentismo');
                const morningCurr = allAssignments.filter(a => a.date === date && a.shift === 'M' && a.type !== 'ausentismo');
                const absPrev = allAssignments.filter(a => a.date === prevDate && a.type === 'ausentismo' && a.reason !== 'Descanso');
                const absCurr = allAssignments.filter(a => a.date === date && a.type === 'ausentismo' && a.reason !== 'Descanso');

                if (nightPrev.length > 0) html += renderTable(`ASISTENCIA NOCTURNO - ${formatDateLongLocale(prevDate)}`, 'fa-moon', nightPrev, usersMap, false);
                if (absPrev.length > 0) html += renderTable(`AUSENCIAS - ${formatDateLongLocale(prevDate)}`, 'fa-user-xmark', absPrev, usersMap, true);
                if (morningCurr.length > 0) html += renderTable(`ASISTENCIA MATUTINO - ${formatDateLongLocale(date)}`, 'fa-sun', morningCurr, usersMap, false);
                if (absCurr.length > 0) html += renderTable(`AUSENCIAS - ${formatDateLongLocale(date)}`, 'fa-user-xmark', absCurr, usersMap, true);
            } else {
                ['M', 'V', 'N'].forEach(sID => {
                    const label = sID === 'M' ? 'MATUTINO' : sID === 'V' ? 'VESPERTINO' : 'NOCTURNO';
                    const icon = sID === 'M' ? 'fa-sun' : sID === 'V' ? 'fa-cloud-sun' : 'fa-moon';
                    const list = allAssignments.filter(a => a.date === date && a.shift === sID && a.type !== 'ausentismo');
                    if (list.length > 0) html += renderTable(`ASISTENCIA ${label} - ${formatDateLongLocale(date)}`, icon, list, usersMap, false);
                });
                const abs = allAssignments.filter(a => a.date === date && a.type === 'ausentismo' && a.reason !== 'Descanso');
                if (abs.length > 0) html += renderTable(`AUSENCIAS - ${formatDateLongLocale(date)}`, 'fa-user-xmark', abs, usersMap, true);
            }

            container.innerHTML = html || `<div class="py-40 text-center opacity-30 text-[10px] font-black uppercase tracking-[0.4em]">Sin registros</div>`;
        } catch (e) { console.error(e); }
    };

    function renderTable(title, icon, list, users, isAbsence) {
        return `
            <div class="overflow-hidden rounded-[2rem] border border-slate-100 shadow-sm bg-white animate-in slide-in-from-bottom-2">
                <div class="flex items-center justify-between px-8 py-4 bg-slate-900 text-white">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid ${icon} text-red-500"></i>
                        <h4 class="text-[10px] font-black uppercase tracking-[0.2em]">${title}</h4>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[8px] font-black uppercase tracking-widest border-b border-slate-100">
                                <th class="px-8 py-4">ID</th>
                                <th class="px-8 py-4">Personal</th>
                                ${isAbsence ? `<th class="px-8 py-4 text-center">Motivo</th>` : `<th class="px-8 py-4">Estatus</th><th class="px-8 py-4 text-center">Entrada</th><th class="px-8 py-4 text-center">Salida</th>`}
                                <th class="px-8 py-4">Notas</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${list.map(a => {
                                const u = users[a.email] || { name: a.email, id: '---' };
                                const isL = a.realEntry && a.assignedEntry && (a.realEntry > a.assignedEntry);
                                return `
                                <tr class="hover:bg-slate-50/50 transition-colors">
                                    <td class="px-8 py-4 text-[10px] font-black text-slate-400 tracking-widest">${u.id}</td>
                                    <td class="px-8 py-4 text-[11px] font-black text-slate-900 uppercase">${u.name}</td>
                                    ${isAbsence ? `
                                        <td class="px-8 py-4 text-center"><span class="px-3 py-1 bg-red-50 text-red-700 text-[8px] font-black uppercase rounded-full border border-red-100">${a.reason || 'Falta'}</span></td>
                                    ` : `
                                        <td class="px-8 py-4">
                                            <div class="flex flex-wrap gap-1">
                                                ${isL ? '<span class="px-2 py-0.5 bg-red-800 text-white text-[7px] font-black uppercase rounded shadow-sm">Retardo</span>' : ''}
                                                ${a.isExtra ? '<span class="px-2 py-0.5 bg-fuchsia-600 text-white text-[7px] font-black uppercase rounded shadow-sm">Extra</span>' : ''}
                                                ${a.isHoliday ? '<span class="px-2 py-0.5 bg-purple-700 text-white text-[7px] font-black uppercase rounded shadow-sm">Festivo</span>' : ''}
                                                ${a.isRecovery ? '<span class="px-2 py-0.5 bg-emerald-600 text-white text-[7px] font-black uppercase rounded shadow-sm">Recupera</span>' : ''}
                                            </div>
                                        </td>
                                        <td class="px-8 py-4 text-center text-[11px] font-mono font-black ${isL ? 'text-red-700' : 'text-emerald-600'}">${a.realEntry || '--:--'}</td>
                                        <td class="px-8 py-4 text-center text-[11px] font-mono font-black text-slate-900">${a.realExit || '--:--'}</td>
                                    `}
                                    <td class="px-8 py-4">
                                        <input type="text" value="${a.note || ''}" onchange="saveRowNote('${a.docId}', this.value)" placeholder="..." class="w-full bg-transparent border-none text-[10px] font-medium text-slate-500 outline-none focus:text-slate-900 italic">
                                    </td>
                                </tr>`;}).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    window.saveRowNote = async (id, note) => { 
        try { 
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', id), { note, updatedAt: serverTimestamp() }, { merge: true }); 
        } catch (e) { console.error(e); } 
    };

    window.copyToClipboard = () => {
        const text = document.getElementById('report-output').value;
        const toast = document.getElementById('copy-toast');
        const textarea = document.createElement("textarea");
        textarea.value = text; document.body.appendChild(textarea); textarea.select();
        document.execCommand('copy'); document.body.removeChild(textarea);
        toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000);
    };

    window.openEmailModal = () => {
        const modal = document.getElementById('email-modal');
        if(!modal) return;
        document.getElementById('email-to').value = "jesuseduardo.gutierrez@armur.com;juan.paniagua@armur.com";
        document.getElementById('email-cc').value = "roberto.rodriguez@armur.com";
        document.getElementById('email-body-preview').innerHTML = "<p class='p-10 text-center text-slate-400'>Generando vista previa...</p>";
        modal.classList.remove('hidden');
    };

    window.closeEmailModal = () => document.getElementById('email-modal').classList.add('hidden');

    // Inicialización al cargar el fragmento
    setTimeout(() => {
        if(window.syncAndLoad) window.syncAndLoad();
    }, 200);

</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
</style>
