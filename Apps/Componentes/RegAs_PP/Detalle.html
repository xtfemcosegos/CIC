<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="detail-scroll-container" class="h-full overflow-y-auto custom-scrollbar bg-slate-50 relative">
        
        <!-- HEADER COMPACTO FIJO -->
        <div id="hero-header" class="sticky top-0 z-50 bg-slate-900 overflow-hidden h-[100px] shadow-xl border-b border-white/10">
            <!-- Fondo sutil con desenfoque -->
            <div id="hero-bg" class="absolute inset-0 w-full h-full opacity-30">
                <div id="hero-photo-container" class="w-full h-full bg-slate-800 flex items-center justify-center">
                    <i class="fa-solid fa-user-shield text-4xl text-white/10"></i>
                </div>
                <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div>
            </div>

            <!-- Información Superpuesta Fija -->
            <div class="absolute inset-0 flex items-center px-6">
                <div id="info-wrapper" class="flex items-center gap-4 w-full">
                    <!-- Foto Miniatura Permanente -->
                    <div id="mini-photo" class="w-14 h-14 rounded-full border-2 border-white/20 overflow-hidden shrink-0 shadow-lg bg-slate-800 flex items-center justify-center">
                        <i class="fa-solid fa-user text-white/20 text-xl"></i>
                    </div>
                    
                    <div id="text-container" class="flex-1 min-w-0">
                        <p id="detail-display-date" class="text-red-500 text-[8px] font-black uppercase tracking-[0.3em] mb-0.5">Cargando...</p>
                        <div class="flex flex-col">
                            <h2 id="detail-display-name" class="text-lg font-black text-white tracking-tighter uppercase leading-tight truncate">Elemento</h2>
                            <p id="detail-display-role" class="text-slate-400 text-[9px] font-bold uppercase tracking-widest truncate leading-none mt-1">Consultando Sistema</p>
                        </div>
                    </div>

                    <div id="save-indicator" class="opacity-0 transition-opacity">
                        <i class="fa-solid fa-circle-notch animate-spin text-sm text-red-500"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTENIDO OPERATIVO -->
        <div class="p-6 space-y-8 pb-32">
            
            <!-- Semáforo de Estado General -->
            <div id="global-status" class="w-full p-4 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest border border-slate-200 bg-white text-slate-400 shadow-sm transition-all duration-300">
                Buscando Registro de Jornada...
            </div>

            <!-- LISTADO DE TURNOS -->
            <div id="shifts-container" class="space-y-12 relative before:absolute before:left-[19px] before:top-4 before:bottom-4 before:w-[2px] before:bg-slate-200">
                <!-- Los turnos se inyectan aquí dinámicamente -->
            </div>

            <!-- Botón Agregar Turno -->
            <div id="add-shift-btn-container" class="hidden">
                <button onclick="addNewShiftSlot()" class="w-full py-5 border-2 border-dashed border-slate-300 rounded-[2.5rem] text-slate-400 hover:text-red-800 hover:border-red-800 transition-all flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-plus-circle group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Agregar Doblete / Turno Extra</span>
                </button>
            </div>

            <!-- Gestión de Perfil -->
            <div class="pt-8 border-t border-slate-200">
                <button onclick="goToFullProfile()" class="w-full py-5 bg-slate-900 text-white rounded-[2.5rem] text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-xl flex items-center justify-center gap-3 active:scale-95">
                    <i class="fa-solid fa-id-card-clip"></i> Ver Expediente Completo
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
            authDomain: "cic5-pp.firebaseapp.com",
            projectId: "cic5-pp",
            storageBucket: "cic5-pp.firebasestorage.app",
            messagingSenderId: "577576116946",
            appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
            measurementId: "G-G02GSE321T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'cic5-pp';

        // Acceso a datos globales desde el padre (index.html)
        const targetEmail = window.parent.selectedUserEmail || window.selectedUserEmail;
        const selectedDate = window.parent.selectedOperationDate || window.selectedOperationDate;
        
        let stationsList = [];
        let saveTimeout = null;
        let currentShifts = [];

        onAuthStateChanged(auth, (user) => { 
            if (user) init(); 
            else signInAnonymously(auth);
        });

        async function init() {
            if (!targetEmail || !selectedDate) {
                document.getElementById('detail-display-date').innerText = "Sin Datos Seleccionados";
                return;
            }
            
            document.getElementById('detail-display-date').innerText = `Jornada: ${selectedDate}`;

            // Escuchar estaciones
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stations'), (snap) => {
                stationsList = snap.docs.map(d => d.data().name).sort();
                renderShifts();
            });

            // Escuchar info de usuario
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                const user = snap.docs.map(d => d.data()).find(u => u.email === targetEmail);
                if (user) {
                    document.getElementById('detail-display-name').innerText = user.name || targetEmail;
                    document.getElementById('detail-display-role').innerText = user.role || "Personal Operativo";
                    if (user.photo) {
                        const imgHtml = `<img src="${user.photo}" class="w-full h-full object-cover">`;
                        document.getElementById('mini-photo').innerHTML = imgHtml;
                        const bgCont = document.getElementById('hero-photo-container');
                        if (bgCont) bgCont.innerHTML = imgHtml;
                    }
                }
            });

            loadDailyAssignment();
        }

        async function loadDailyAssignment() {
            try {
                const docId = `${selectedDate}_${targetEmail}`;
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId), (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        currentShifts = d.shifts || [];
                        // Migración si el documento es de formato viejo (un solo turno)
                        if (currentShifts.length === 0 && d.shift) {
                            currentShifts = [{
                                type: d.type || 'turno',
                                shift: d.shift || '',
                                station: d.station || '',
                                assignedEntry: d.assignedEntry || '',
                                assignedExit: d.assignedExit || '',
                                realEntry: d.realEntry || '',
                                realExit: d.realExit || '',
                                note: d.note || '',
                                reason: d.reason || 'Falta'
                            }];
                        }
                    } else {
                        currentShifts = [];
                    }
                    renderShifts();
                });
            } catch (e) { console.error("Error al cargar datos:", e); }
        }

        function renderShifts() {
            const container = document.getElementById('shifts-container');
            const addBtnContainer = document.getElementById('add-shift-btn-container');

            if (currentShifts.length === 0) {
                container.innerHTML = `
                <div class="p-12 bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center space-y-4">
                    <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fa-solid fa-calendar-day text-slate-300 text-xl"></i>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sin asignación programada</p>
                    <button onclick="addNewShiftSlot()" class="px-8 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all shadow-lg">Asignar Turno</button>
                </div>`;
                addBtnContainer.classList.add('hidden');
                updateGlobalStatus();
                return;
            }

            container.innerHTML = currentShifts.map((s, i) => createShiftHTML(s, i)).join('');
            addBtnContainer.classList.toggle('hidden', currentShifts.length >= 3);
            updateGlobalStatus();
        }

        function createShiftHTML(s, i) {
            const isPlanningDone = s.station && s.assignedEntry && s.assignedExit;
            const isEntryDone = !!s.realEntry;
            const isExitDone = !!s.realExit;

            return `
            <div class="relative pl-12 animate-in slide-in-from-right duration-500" style="animation-delay: ${i*100}ms">
                <div class="absolute left-0 w-10 h-10 ${s.type === 'ausentismo' ? 'bg-red-600' : 'bg-slate-900'} rounded-full flex items-center justify-center text-white shadow-lg z-10 border-4 border-slate-50">
                    <span class="text-[10px] font-black">${i + 1}</span>
                </div>
                
                <div class="bg-white border border-slate-100 rounded-[2.5rem] p-6 shadow-sm space-y-5 transition-all hover:border-slate-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Turno Operativo</span>
                            ${s.type === 'ausentismo' ? '<span class="px-2 py-0.5 bg-red-100 text-red-700 text-[7px] font-black uppercase rounded-full">Ausentismo</span>' : ''}
                        </div>
                        <button onclick="removeShiftSlot(${i})" class="w-8 h-8 flex items-center justify-center rounded-xl bg-red-50 text-red-400 hover:bg-red-600 hover:text-white transition-all"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    </div>

                    <!-- BLOQUE PLANEACIÓN -->
                    <div class="${isPlanningDone && s.type !== 'ausentismo' ? 'bg-slate-50/50 p-3 rounded-2xl border border-dashed border-slate-200' : 'bg-blue-50/40 p-5 rounded-[2rem] border border-blue-100/50 space-y-4'}">
                        <div class="flex items-center justify-between">
                            <p class="text-[8px] font-black text-blue-800 uppercase tracking-widest">1. Planeación de Servicio</p>
                            ${isPlanningDone ? `<button onclick="toggleElement('plan-details-${i}')" class="text-[8px] font-black text-blue-500 uppercase flex items-center gap-1"><i class="fa-solid fa-pencil"></i> Editar</button>` : ''}
                        </div>

                        <div id="plan-details-${i}" class="${isPlanningDone ? 'hidden' : 'space-y-4'}">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="space-y-1">
                                    <label class="text-[7px] font-black text-slate-400 uppercase ml-2">Categoría</label>
                                    <select onchange="updateShiftData(${i}, 'type', this.value); handleAbsenceCleanup(${i}, this.value)" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-[10px] font-bold outline-none shadow-sm">
                                        <option value="turno" ${s.type === 'turno' ? 'selected' : ''}>Ordinario</option>
                                        <option value="evento" ${s.type === 'evento' ? 'selected' : ''}>Evento</option>
                                        <option value="ausentismo" ${s.type === 'ausentismo' ? 'selected' : ''}>Ausentismo</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[7px] font-black text-slate-400 uppercase ml-2">Estación</label>
                                    <select onchange="updateShiftData(${i}, 'station', this.value); autoLoadShiftTimes(${i})" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-[10px] font-bold outline-none shadow-sm">
                                        <option value="">-- SELECCIONAR --</option>
                                        ${stationsList.map(st => `<option value="${st}" ${s.station === st ? 'selected' : ''}>${st}</option>`).join('')}
                                    </select>
                                </div>
                            </div>

                            ${s.type !== 'ausentismo' ? `
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="setShiftType(${i}, 'M')" class="py-2.5 rounded-xl border ${s.shift === 'M' ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-400 border-slate-200'} text-[8px] font-black uppercase transition-all">Matutino</button>
                                <button onclick="setShiftType(${i}, 'V')" class="py-2.5 rounded-xl border ${s.shift === 'V' ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-400 border-slate-200'} text-[8px] font-black uppercase transition-all">Vespertino</button>
                                <button onclick="setShiftType(${i}, 'N')" class="py-2.5 rounded-xl border ${s.shift === 'N' ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-400 border-slate-200'} text-[8px] font-black uppercase transition-all">Nocturno</button>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="space-y-1">
                                    <p class="text-[7px] font-black text-blue-400 uppercase ml-2">Entrada Prog.</p>
                                    <input type="time" value="${s.assignedEntry || ''}" onchange="updateShiftData(${i}, 'assignedEntry', this.value)" class="w-full bg-white border border-blue-100 p-2.5 rounded-xl text-xs font-black text-center text-blue-900">
                                </div>
                                <div class="space-y-1">
                                    <p class="text-[7px] font-black text-blue-400 uppercase ml-2">Salida Prog.</p>
                                    <input type="time" value="${s.assignedExit || ''}" onchange="updateShiftData(${i}, 'assignedExit', this.value)" class="w-full bg-white border border-blue-100 p-2.5 rounded-xl text-xs font-black text-center text-blue-900">
                                </div>
                            </div>` : `
                            <div class="space-y-1">
                                <label class="text-[7px] font-black text-red-400 uppercase ml-2">Causa de Inasistencia</label>
                                <select onchange="updateShiftData(${i}, 'reason', this.value)" class="w-full bg-white border border-red-100 p-3 rounded-xl text-[10px] font-bold text-red-900 outline-none">
                                    <option value="Falta" ${s.reason === 'Falta' ? 'selected' : ''}>Falta</option>
                                    <option value="Descanso" ${s.reason === 'Descanso' ? 'selected' : ''}>Descanso</option>
                                    <option value="Incapacidad" ${s.reason === 'Incapacidad' ? 'selected' : ''}>Incapacidad</option>
                                    <option value="Vacaciones" ${s.reason === 'Vacaciones' ? 'selected' : ''}>Vacaciones</option>
                                    <option value="Permiso" ${s.reason === 'Permiso' ? 'selected' : ''}>Permiso</option>
                                </select>
                            </div>`}
                        </div>
                        
                        ${isPlanningDone && s.type !== 'ausentismo' && document.getElementById(`plan-details-${i}`)?.classList.contains('hidden') ? `
                        <div class="flex items-center gap-4 mt-1">
                            <p class="text-[10px] font-black text-slate-900 uppercase">${s.station}</p>
                            <span class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span>
                            <p class="text-[9px] font-bold text-slate-500">${s.assignedEntry} - ${s.assignedExit}</p>
                        </div>
                        ` : ''}
                    </div>

                    <!-- BLOQUE REALIDAD -->
                    ${s.type !== 'ausentismo' ? `
                    <div class="bg-emerald-50/40 p-5 rounded-[2rem] border border-emerald-100/50 space-y-4">
                        <div class="flex items-center justify-between">
                             <p class="text-[8px] font-black text-emerald-800 uppercase tracking-widest">2. Registro de Asistencia</p>
                             ${isExitDone ? '<i class="fa-solid fa-circle-check text-emerald-600 text-[10px]"></i>' : ''}
                        </div>
                        
                        <div class="flex gap-2">
                            ${isPlanningDone && !isEntryDone ? `
                            <button onclick="registerQuickEntry(${i})" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-clock"></i> Registrar Entrada
                            </button>
                            ` : ''}
                            
                            ${isEntryDone && !isExitDone ? `
                            <button onclick="registerQuickExit(${i})" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-clock-rotate-left"></i> Registrar Salida
                            </button>
                            ` : ''}
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <p class="text-[7px] font-black text-emerald-400 uppercase ml-2">Entrada Real</p>
                                <input type="time" value="${s.realEntry || ''}" onchange="updateShiftData(${i}, 'realEntry', this.value)" class="w-full bg-white border border-emerald-100 p-2.5 rounded-xl text-xs font-black text-center text-emerald-900 shadow-inner">
                            </div>
                            <div class="space-y-1">
                                <p class="text-[7px] font-black text-emerald-400 uppercase ml-2">Salida Real</p>
                                <input type="time" value="${s.realExit || ''}" onchange="updateShiftData(${i}, 'realExit', this.value)" class="w-full bg-white border border-emerald-100 p-2.5 rounded-xl text-xs font-black text-center text-emerald-900 shadow-inner">
                            </div>
                        </div>
                    </div>` : ''}

                    <!-- FLAGS Y NOTAS -->
                    <div class="space-y-3">
                        <div class="flex flex-wrap gap-2">
                            ${['isExtra', 'isHoliday', 'isRecovery'].map(key => {
                                const labels = { isExtra: 'Turno Extra', isHoliday: 'Festivo', isRecovery: 'Recupera' };
                                return `
                                <label class="flex-1 flex items-center justify-center gap-2 px-2 py-2.5 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 border border-slate-100 transition-all">
                                    <input type="checkbox" ${s[key] ? 'checked' : ''} onchange="updateShiftData(${i}, '${key}', this.checked)" class="accent-slate-900 scale-90">
                                    <span class="text-[7px] font-black uppercase text-slate-500">${labels[key]}</span>
                                </label>`;
                            }).join('')}
                        </div>
                        <textarea oninput="updateShiftData(${i}, 'note', this.value)" placeholder="Observaciones de la jornada..." class="w-full bg-slate-50 border border-slate-50 p-4 rounded-2xl text-[10px] font-medium outline-none h-16 resize-none shadow-inner focus:bg-white focus:border-slate-200 transition-all">${s.note || ''}</textarea>
                    </div>
                </div>
            </div>`;
        }

        // --- ACCIONES DE UI ---
        window.registerQuickEntry = (idx) => {
            const now = new Date();
            currentShifts[idx].realEntry = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            renderShifts(); triggerAutoSave();
        };

        window.registerQuickExit = (idx) => {
            const now = new Date();
            currentShifts[idx].realExit = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            renderShifts(); triggerAutoSave();
        };

        window.setShiftType = (idx, type) => {
            currentShifts[idx].shift = type;
            window.autoLoadShiftTimes(idx);
        };

        window.autoLoadShiftTimes = (idx) => {
            const s = currentShifts[idx];
            if (!s.shift) return;
            const isCC = s.station?.toLowerCase().includes("centro de control");
            const times = {
                'M': isCC ? { in: '06:00', out: '14:00' } : { in: '07:00', out: '15:00' },
                'V': isCC ? { in: '14:00', out: '22:00' } : { in: '13:00', out: '21:00' },
                'N': isCC ? { in: '22:00', out: '06:00' } : { in: '21:00', out: '07:00' }
            };
            const config = times[s.shift];
            if (config) {
                s.assignedEntry = config.in; s.assignedExit = config.out;
                renderShifts(); triggerAutoSave();
            }
        };

        window.toggleElement = (id) => { document.getElementById(id).classList.toggle('hidden'); };

        window.addNewShiftSlot = () => {
            if (currentShifts.length >= 3) return;
            currentShifts.push({ type: 'turno', shift: '', station: '', assignedEntry: '', assignedExit: '', realEntry: '', realExit: '', note: '', isExtra: false, isHoliday: false, isRecovery: false });
            renderShifts(); triggerAutoSave();
        };

        window.removeShiftSlot = (i) => {
            if (!confirm("¿Eliminar este turno de la jornada?")) return;
            currentShifts.splice(i, 1);
            renderShifts(); triggerAutoSave();
        };

        window.updateShiftData = (idx, field, val) => {
            currentShifts[idx][field] = val; triggerAutoSave();
        };

        window.handleAbsenceCleanup = (idx, type) => {
            if (type === 'ausentismo') {
                currentShifts[idx].assignedEntry = ""; currentShifts[idx].assignedExit = "";
                currentShifts[idx].realEntry = ""; currentShifts[idx].realExit = "";
                currentShifts[idx].reason = "Falta";
                renderShifts();
            }
            triggerAutoSave();
        };

        // --- PERSISTENCIA ---
        function triggerAutoSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            document.getElementById('save-indicator').style.opacity = "1";
            saveTimeout = setTimeout(async () => {
                try {
                    const docId = `${selectedDate}_${targetEmail}`;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId), { 
                        date: selectedDate, 
                        email: targetEmail, 
                        shifts: currentShifts, 
                        updatedAt: serverTimestamp() 
                    }, { merge: true });
                    document.getElementById('save-indicator').style.opacity = "0";
                    updateGlobalStatus();
                } catch (e) {
                    console.error("Error al guardar:", e);
                }
            }, 1500);
        }

        function updateGlobalStatus() {
            const box = document.getElementById('global-status');
            if (currentShifts.length === 0) {
                box.innerText = "Sin Asignación";
                box.className = "w-full p-4 rounded-2xl text-center text-[10px] font-black uppercase border border-slate-200 bg-white text-slate-300";
                return;
            }
            const hasAbsence = currentShifts.some(s => s.type === 'ausentismo');
            const allDone = currentShifts.every(s => s.type === 'ausentismo' || (s.realEntry && s.realExit));
            
            if (hasAbsence) {
                box.innerText = "Jornada con Incidencia / Ausencia";
                box.className = "w-full p-4 rounded-2xl text-center text-[10px] font-black uppercase border border-red-100 bg-red-50 text-red-600 shadow-sm";
            } else if (allDone) {
                box.innerText = "Jornada Finalizada con Éxito";
                box.className = "w-full p-4 rounded-2xl text-center text-[10px] font-black uppercase border border-emerald-100 bg-emerald-50 text-emerald-600 shadow-sm";
            } else {
                box.innerText = "Servicio Activo / En Seguimiento";
                box.className = "w-full p-4 rounded-2xl text-center text-[10px] font-black uppercase border border-blue-100 bg-blue-50 text-blue-600 shadow-sm";
            }
        }

        window.goToFullProfile = () => {
            // Comunicación con el padre para navegar
            if(window.parent && typeof window.parent.loadContent === 'function') {
                window.parent.selectedUserEmail = targetEmail;
                window.parent.loadContent('Perfil.html');
                if(typeof window.parent.toggleRightPanel === 'function') {
                    window.parent.toggleRightPanel(false);
                }
            }
        };
    </script>
</body>
</html>
