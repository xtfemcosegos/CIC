<!-- Detalle Operativo Multi-Turno con Encabezado Compacto Fijo - Módulo CIC Protection -->
<div id="detail-scroll-container" class="h-full overflow-y-auto custom-scrollbar bg-slate-50 relative">
    
    <!-- HEADER COMPACTO FIJO -->
    <div id="hero-header" class="sticky top-0 z-50 bg-slate-900 overflow-hidden h-[80px] shadow-xl border-b border-white/10">
        
        <!-- Fondo sutil con desenfoque -->
        <div id="hero-bg" class="absolute inset-0 w-full h-full opacity-30">
            <div id="hero-photo-container" class="w-full h-full bg-slate-800 flex items-center justify-center">
                <i class="fa-solid fa-user-shield text-4xl text-white/10"></i>
            </div>
            <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div>
        </div>

        <!-- Información Superpuesta Fija -->
        <div class="absolute inset-0 flex items-center px-6">
            <div id="info-wrapper" class="flex items-center gap-4 w-full">
                
                <!-- Foto Miniatura Permanente -->
                <div id="mini-photo" class="w-12 h-12 rounded-full border-2 border-white/20 overflow-hidden shrink-0 shadow-lg bg-slate-800 flex items-center justify-center">
                    <i class="fa-solid fa-user text-white/20 text-xl"></i>
                </div>
                
                <div id="text-container" class="flex-1 min-w-0">
                    <p id="detail-display-date" class="text-red-500 text-[8px] font-black uppercase tracking-[0.3em] mb-0.5">Cargando...</p>
                    <div class="flex flex-col">
                        <h2 id="detail-display-name" class="text-base font-black text-white tracking-tighter uppercase leading-tight truncate">Elemento</h2>
                        <p id="detail-display-role" class="text-slate-400 text-[9px] font-bold uppercase tracking-widest truncate">Consultando Sistema</p>
                    </div>
                </div>

                <div id="save-indicator" class="opacity-0 transition-opacity">
                    <i class="fa-solid fa-circle-notch animate-spin text-xs text-red-500"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENIDO OPERATIVO -->
    <div class="p-6 space-y-8 pb-32">
        
        <!-- Semáforo de Estado General -->
        <div id="global-status" class="w-full p-4 rounded-2xl text-center text-[10px] font-black uppercase tracking-widest border border-slate-200 bg-white text-slate-400 shadow-sm">
            Buscando Registro de Jornada...
        </div>

        <!-- LISTADO DE TURNOS -->
        <div id="shifts-container" class="space-y-12 relative before:absolute before:left-[19px] before:top-4 before:bottom-4 before:w-[2px] before:bg-slate-200">
            <!-- Los turnos se inyectan aquí dinámicamente -->
        </div>

        <!-- Botón Agregar Turno -->
        <div id="add-shift-btn-container" class="hidden">
            <button onclick="addNewShiftSlot()" class="w-full py-4 border-2 border-dashed border-slate-300 rounded-[2rem] text-slate-400 hover:text-red-800 hover:border-red-800 transition-all flex items-center justify-center gap-2 group">
                <i class="fa-solid fa-plus-circle group-hover:scale-110 transition-transform"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Agregar Segundo Turno / Doblete</span>
            </button>
        </div>

        <!-- Gestión de Perfil -->
        <div class="pt-8 border-t border-slate-200">
            <button onclick="goToFullProfile()" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-xl flex items-center justify-center gap-3">
                <i class="fa-solid fa-id-card-clip"></i> Ver Expediente Completo
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, onSnapshot, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'cic5-pp';

    const targetEmail = window.selectedUserEmail;
    const selectedDate = window.selectedOperationDate;
    
    let stationsList = [];
    let saveTimeout = null;
    let currentShifts = [];

    onAuthStateChanged(auth, (user) => { if (user) init(); });

    async function init() {
        if (!targetEmail || !selectedDate) return;
        document.getElementById('detail-display-date').innerText = `Jornada: ${selectedDate}`;

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stations'), (snap) => {
            stationsList = snap.docs.map(d => d.data().name);
            renderShifts();
        });

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
            const user = snap.docs.map(d => d.data()).find(u => u.email === targetEmail);
            if (user) {
                document.getElementById('detail-display-name').innerText = user.name || targetEmail;
                document.getElementById('detail-display-role').innerText = user.role || "Seguridad";
                if (user.photo) {
                    const imgHtml = `<img src="${user.photo}" class="w-full h-full object-cover">`;
                    document.getElementById('mini-photo').innerHTML = imgHtml;
                    const bgCont = document.getElementById('hero-photo-container');
                    if (bgCont) bgCont.innerHTML = imgHtml;
                }
            }
        });

        loadDailyAssignment();
    }

    async function loadDailyAssignment() {
        try {
            const docId = `${selectedDate}_${targetEmail}`;
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId));
            if (snap.exists()) {
                const d = snap.data();
                if (!d.shifts) {
                    currentShifts = [{
                        type: d.type || 'turno',
                        shift: d.shift || '',
                        station: d.station || '',
                        assignedEntry: d.assignedEntry || '',
                        assignedExit: d.assignedExit || '',
                        realEntry: d.realEntry || '',
                        realExit: d.realExit || '',
                        note: d.note || '',
                        isExtra: d.isExtra || false,
                        isHoliday: d.isHoliday || false,
                        isRecovery: d.isRecovery || false,
                        reason: d.reason || 'Falta'
                    }];
                } else {
                    currentShifts = d.shifts;
                }
            } else {
                currentShifts = [];
            }
            renderShifts();
        } catch (e) { console.error("Error al cargar datos:", e); }
    }

    function renderShifts() {
        const container = document.getElementById('shifts-container');
        const addBtnContainer = document.getElementById('add-shift-btn-container');

        if (currentShifts.length === 0) {
            container.innerHTML = `<div class="p-12 bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center space-y-4"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sin asignación activa</p><button onclick="addNewShiftSlot()" class="px-8 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest">Asignar Turno</button></div>`;
            addBtnContainer.classList.add('hidden');
            return;
        }

        container.innerHTML = currentShifts.map((s, i) => createShiftHTML(s, i)).join('');
        addBtnContainer.classList.toggle('hidden', currentShifts.length >= 3);
        updateGlobalStatus();
    }

    function createShiftHTML(s, i) {
        const isPlanningDone = s.station && s.assignedEntry && s.assignedExit;
        const isEntryDone = !!s.realEntry;
        const isExitDone = !!s.realExit;

        return `
        <div class="relative pl-12 animate-in slide-in-from-right duration-500" style="animation-delay: ${i*100}ms">
            <div class="absolute left-0 w-10 h-10 ${s.type === 'ausentismo' ? 'bg-red-600' : 'bg-slate-900'} rounded-full flex items-center justify-center text-white shadow-lg z-10">
                <span class="text-[10px] font-black">${i + 1}</span>
            </div>
            
            <div class="bg-white border border-slate-100 rounded-[2.5rem] p-6 shadow-sm space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Turno #${i+1}</h3>
                    <button onclick="removeShiftSlot(${i})" class="w-7 h-7 flex items-center justify-center rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
                </div>

                <!-- BLOQUE PLANEACIÓN -->
                <div class="${isPlanningDone && s.type !== 'ausentismo' ? 'bg-slate-50/50 p-2 rounded-xl border border-dashed border-slate-200' : 'bg-blue-50/40 p-5 rounded-[2rem] border border-blue-100/50 space-y-4'}">
                    <div class="flex items-center justify-between">
                        <p class="text-[8px] font-black text-blue-800 uppercase tracking-widest">1. Planeación Operativa</p>
                        ${isPlanningDone ? `<button onclick="toggleElement('plan-details-${i}')" class="text-[8px] font-black text-blue-500 uppercase">Ver detalles</button>` : ''}
                    </div>

                    <div id="plan-details-${i}" class="${isPlanningDone ? 'hidden' : 'space-y-4'}">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[7px] font-black text-slate-400 uppercase ml-2">Categoría</label>
                                <select onchange="updateShiftData(${i}, 'type', this.value); handleAbsenceCleanup(${i}, this.value)" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-[10px] font-bold outline-none">
                                    <option value="turno" ${s.type === 'turno' ? 'selected' : ''}>Turno Ordinario</option>
                                    <option value="evento" ${s.type === 'evento' ? 'selected' : ''}>Evento Especial</option>
                                    <option value="ausentismo" ${s.type === 'ausentismo' ? 'selected' : ''}>Ausentismo</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[7px] font-black text-slate-400 uppercase ml-2">Estación / Caseta</label>
                                <select onchange="updateShiftData(${i}, 'station', this.value); autoLoadShiftTimes(${i})" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-[10px] font-bold outline-none">
                                    <option value="">Seleccionar...</option>
                                    ${stationsList.map(st => `<option value="${st}" ${s.station === st ? 'selected' : ''}>${st}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        ${s.type !== 'ausentismo' ? `
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setShiftType(${i}, 'M')" class="p-2 rounded-xl border ${s.shift === 'M' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-200'} text-[8px] font-black uppercase">Mat</button>
                            <button onclick="setShiftType(${i}, 'V')" class="p-2 rounded-xl border ${s.shift === 'V' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-200'} text-[8px] font-black uppercase">Ves</button>
                            <button onclick="setShiftType(${i}, 'N')" class="p-2 rounded-xl border ${s.shift === 'N' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-200'} text-[8px] font-black uppercase">Noc</button>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <p class="text-[7px] font-black text-blue-400 uppercase ml-2">Entrada Prog.</p>
                                <input type="time" value="${s.assignedEntry || ''}" onchange="updateShiftData(${i}, 'assignedEntry', this.value)" class="w-full bg-white border border-blue-100 p-2.5 rounded-xl text-xs font-black text-center text-blue-900">
                            </div>
                            <div class="space-y-1">
                                <p class="text-[7px] font-black text-blue-400 uppercase ml-2">Salida Prog.</p>
                                <input type="time" value="${s.assignedExit || ''}" onchange="updateShiftData(${i}, 'assignedExit', this.value)" class="w-full bg-white border border-blue-100 p-2.5 rounded-xl text-xs font-black text-center text-blue-900">
                            </div>
                        </div>` : `
                        <div class="space-y-1">
                            <label class="text-[7px] font-black text-red-400 uppercase ml-2">Motivo Inasistencia</label>
                            <select onchange="updateShiftData(${i}, 'reason', this.value)" class="w-full bg-white border border-red-100 p-3 rounded-xl text-[10px] font-bold text-red-900 outline-none">
                                <option value="Falta" ${s.reason === 'Falta' ? 'selected' : ''}>Falta / Inasistencia</option>
                                <option value="Descanso" ${s.reason === 'Descanso' ? 'selected' : ''}>Descanso</option>
                                <option value="Incapacidad" ${s.reason === 'Incapacidad' ? 'selected' : ''}>Incapacidad</option>
                                <option value="Vacaciones" ${s.reason === 'Vacaciones' ? 'selected' : ''}>Vacaciones</option>
                            </select>
                        </div>`}
                    </div>
                </div>

                <!-- BLOQUE REALIDAD -->
                ${s.type !== 'ausentismo' ? `
                <div class="bg-emerald-50/40 p-5 rounded-[2rem] border border-emerald-100/50 space-y-4">
                    <p class="text-[8px] font-black text-emerald-800 uppercase tracking-widest">2. Seguimiento Real</p>
                    
                    <!-- BOTONES DE ACCIÓN RÁPIDA -->
                    <div class="flex gap-2">
                        ${isPlanningDone && !isEntryDone ? `
                        <button onclick="registerQuickEntry(${i})" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest shadow-lg hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-sign-in-alt"></i> Registrar Entrada
                        </button>
                        <button onclick="markQuickAbsence(${i})" class="w-12 py-3 bg-yellow-400 text-red-700 rounded-xl text-[9px] font-black uppercase transition-all flex items-center justify-center border border-red-200" title="Marcar Falta">
                            <i class="fa-solid fa-user-xmark"></i>
                        </button>
                        ` : ''}
                        
                        ${isEntryDone && !isExitDone ? `
                        <button onclick="registerQuickExit(${i})" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest shadow-lg hover:bg-red-700 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-sign-out-alt"></i> Registrar Salida
                        </button>
                        ` : ''}
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1 ${isEntryDone ? 'opacity-40 grayscale pointer-events-none' : ''}">
                            <p class="text-[7px] font-black text-emerald-400 uppercase ml-2">Entrada Real</p>
                            <input type="time" value="${s.realEntry || ''}" onchange="updateShiftData(${i}, 'realEntry', this.value)" class="w-full bg-white border border-emerald-100 p-2.5 rounded-xl text-xs font-black text-center text-emerald-900">
                        </div>
                        <div class="space-y-1">
                            <p class="text-[7px] font-black text-emerald-400 uppercase ml-2">Salida Real</p>
                            <input type="time" value="${s.realExit || ''}" onchange="updateShiftData(${i}, 'realExit', this.value)" class="w-full bg-white border border-emerald-100 p-2.5 rounded-xl text-xs font-black text-center text-emerald-900">
                        </div>
                    </div>
                </div>` : ''}

                <!-- FLAGS ADMINISTRATIVOS -->
                <div class="flex flex-wrap gap-2 pt-2 border-t border-slate-50">
                    <label class="flex-1 flex items-center justify-center gap-2 px-2 py-2.5 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 border border-slate-100 transition-all">
                        <input type="checkbox" ${s.isExtra ? 'checked' : ''} onchange="updateShiftData(${i}, 'isExtra', this.checked)" class="accent-red-800 scale-90">
                        <span class="text-[7px] font-black uppercase text-slate-400">Extra</span>
                    </label>
                    <label class="flex-1 flex items-center justify-center gap-2 px-2 py-2.5 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 border border-slate-100 transition-all">
                        <input type="checkbox" ${s.isHoliday ? 'checked' : ''} onchange="updateShiftData(${i}, 'isHoliday', this.checked)" class="accent-red-800 scale-90">
                        <span class="text-[7px] font-black uppercase text-slate-400">Festivo</span>
                    </label>
                    <label class="flex-1 flex items-center justify-center gap-2 px-2 py-2.5 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 border border-slate-100 transition-all">
                        <input type="checkbox" ${s.isRecovery ? 'checked' : ''} onchange="updateShiftData(${i}, 'isRecovery', this.checked)" class="accent-red-800 scale-90">
                        <span class="text-[7px] font-black uppercase text-slate-400">Recupera</span>
                    </label>
                </div>

                <textarea oninput="updateShiftData(${i}, 'note', this.value)" placeholder="Novedades u observaciones..." class="w-full bg-slate-50 border border-slate-50 p-4 rounded-[1.5rem] text-[10px] font-medium outline-none h-16 resize-none shadow-inner">${s.note || ''}</textarea>
            </div>
        </div>`;
    }

    // --- ACCIONES RÁPIDAS ---
    window.registerQuickEntry = (idx) => {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        currentShifts[idx].realEntry = `${hh}:${mm}`;
        renderShifts();
        triggerAutoSave();
    };

    window.registerQuickExit = (idx) => {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        currentShifts[idx].realExit = `${hh}:${mm}`;
        renderShifts();
        triggerAutoSave();
    };

    window.markQuickAbsence = (idx) => {
        if(!confirm("¿Deseas marcar este turno como Ausentismo? Esto borrará los registros reales actuales.")) return;
        currentShifts[idx].type = 'ausentismo';
        currentShifts[idx].reason = 'Falta';
        currentShifts[idx].realEntry = '';
        currentShifts[idx].realExit = '';
        renderShifts();
        triggerAutoSave();
    };

    // --- LÓGICA DE HORARIOS INTELIGENTES ---
    window.setShiftType = (idx, type) => {
        currentShifts[idx].shift = type;
        autoLoadShiftTimes(idx);
    };

    window.autoLoadShiftTimes = (idx) => {
        const s = currentShifts[idx];
        if (!s.shift) return;
        const isCC = s.station?.toLowerCase().includes("centro de control");
        const times = {
            'M': isCC ? { in: '06:00', out: '14:00' } : { in: '07:00', out: '15:00' },
            'V': isCC ? { in: '14:00', out: '22:00' } : { in: '13:00', out: '21:00' },
            'N': isCC ? { in: '22:00', out: '06:00' } : { in: '21:00', out: '07:00' }
        };
        const config = times[s.shift];
        if (config) {
            s.assignedEntry = config.in; s.assignedExit = config.out;
            renderShifts(); triggerAutoSave();
        }
    };

    window.toggleElement = (id) => { document.getElementById(id).classList.toggle('hidden'); };

    window.addNewShiftSlot = () => {
        if (currentShifts.length >= 3) return;
        currentShifts.push({ type: 'turno', shift: '', station: '', assignedEntry: '', assignedExit: '', realEntry: '', realExit: '', note: '', isExtra: false, isHoliday: false, isRecovery: false });
        renderShifts(); triggerAutoSave();
    };

    window.removeShiftSlot = (i) => {
        if (!confirm("¿Eliminar turno?")) return;
        currentShifts.splice(i, 1);
        renderShifts(); triggerAutoSave();
    };

    window.updateShiftData = (idx, field, val) => {
        currentShifts[idx][field] = val; triggerAutoSave();
    };

    window.handleAbsenceCleanup = (idx, type) => {
        if (type === 'ausentismo') {
            currentShifts[idx].assignedEntry = ""; currentShifts[idx].assignedExit = "";
            currentShifts[idx].realEntry = ""; currentShifts[idx].realExit = "";
            currentShifts[idx].reason = "Falta";
            renderShifts();
        }
        triggerAutoSave();
    };

    function triggerAutoSave() {
        if (saveTimeout) clearTimeout(saveTimeout);
        document.getElementById('save-indicator').style.opacity = "1";
        saveTimeout = setTimeout(async () => {
            try {
                const docId = `${selectedDate}_${targetEmail}`;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId), { date: selectedDate, email: targetEmail, shifts: currentShifts, updatedAt: serverTimestamp() }, { merge: true });
                document.getElementById('save-indicator').style.opacity = "0";
                updateGlobalStatus();
            } catch (e) {}
        }, 1000);
    }

    function updateGlobalStatus() {
        const box = document.getElementById('global-status');
        if (currentShifts.length === 0) return;
        const hasAbsence = currentShifts.some(s => s.type === 'ausentismo');
        box.innerText = hasAbsence ? "Jornada con Ausentismo" : "Seguimiento en Tiempo Real";
        box.className = `w-full p-4 rounded-2xl text-center text-[10px] font-black uppercase border shadow-sm ${hasAbsence ? 'bg-red-50 text-red-700' : 'bg-blue-50 text-blue-700'}`;
    }

    window.goToFullProfile = () => {
        window.selectedUserEmail = targetEmail;
        if(typeof window.loadContent === 'function') window.loadContent('Perfil.html');
        if(typeof window.toggleRightPanel === 'function') window.toggleRightPanel(false);
    };
</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
</style>
