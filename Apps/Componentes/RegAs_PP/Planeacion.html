<!-- Módulo de Planeación Operativa - Interactividad Avanzada: Colapso y Ocultamiento -->
<div id="planeacion-container" class="flex flex-col h-full bg-white select-none text-slate-900 font-sans">
    
    <div id="scroll-wrapper" class="flex-1 overflow-auto custom-scrollbar relative bg-slate-50/30">
        <!-- Uso de colgroup para forzar anchos en table-fixed -->
        <table id="planning-table" class="w-fit border-separate border-spacing-0 bg-white table-fixed">
            <colgroup id="table-columns-defs">
                <!-- Columna de Nombres Fija -->
                <col style="width: 320px;">
                <!-- Las columnas de fechas se generarán dinámicamente -->
            </colgroup>
            <tbody id="planning-body" class="divide-y divide-slate-100">
                <!-- Filas inyectadas por JS -->
            </tbody>
        </table>
        
        <!-- Indicador de Carga -->
        <div id="infinite-loader" class="hidden sticky right-0 bottom-0 bg-white/80 backdrop-blur-md p-4 flex items-center justify-center border-l border-t border-slate-100 rounded-tl-3xl shadow-2xl z-[70]">
            <i class="fa-solid fa-circle-notch animate-spin text-red-800 mr-2"></i>
            <span class="text-[10px] font-black uppercase tracking-widest text-slate-900">Cargando días...</span>
        </div>
    </div>
</div>

<!-- Menú Contextual -->
<div id="planning-context-menu" class="fixed z-[300] hidden min-w-[240px] bg-white rounded-3xl shadow-2xl border border-slate-200 py-2 animate-in fade-in zoom-in-95 duration-100 text-slate-900">
    <div class="px-5 py-4 border-b border-slate-100 bg-slate-50/50">
        <p id="menu-target-name" class="text-[11px] font-black uppercase text-slate-900 truncate">Nombre</p>
        <p id="menu-target-date" class="text-[9px] font-bold text-red-800 uppercase tracking-widest mt-1">Fecha</p>
    </div>
    
    <div class="p-1.5 space-y-1">
        <button onclick="window.openPatternManager()" class="w-full text-left px-4 py-3 bg-red-800 text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-3 transition-all hover:bg-red-700 shadow-lg shadow-red-900/10 mb-2">
            <div class="w-6 h-6 bg-white/10 rounded-lg flex items-center justify-center"><i class="fa-solid fa-gears text-xs"></i></div>
            Asignar Patrón / Días
        </button>

        <p class="px-4 py-2 text-[8px] font-black text-slate-400 uppercase tracking-widest">Asignar Turno</p>
        <button onclick="window.applyPlanning('shift', 'M')" class="w-full text-left px-4 py-2.5 text-[10px] font-black uppercase hover:bg-amber-50 hover:text-amber-700 rounded-xl flex items-center gap-3 transition-colors">
            <div class="w-6 h-6 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center"><i class="fa-solid fa-sun text-xs"></i></div>
            Turno Matutino (M)
        </button>
        <button onclick="window.applyPlanning('shift', 'V')" class="w-full text-left px-4 py-2.5 text-[10px] font-black uppercase hover:bg-blue-50 hover:text-blue-700 rounded-xl flex items-center gap-3 transition-colors">
            <div class="w-6 h-6 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center"><i class="fa-solid fa-cloud-sun text-xs"></i></div>
            Turno Vespertino (V)
        </button>
        <button onclick="window.applyPlanning('shift', 'N')" class="w-full text-left px-4 py-2.5 text-[10px] font-black uppercase hover:bg-slate-900 hover:text-white rounded-xl flex items-center gap-3 transition-colors text-slate-700">
            <div class="w-6 h-6 bg-white/10 rounded-lg flex items-center justify-center"><i class="fa-solid fa-moon text-xs"></i></div>
            Turno Nocturno (N)
        </button>

        <div class="h-px bg-slate-100 my-1.5"></div>
        <p class="px-4 py-2 text-[8px] font-black text-slate-400 uppercase tracking-widest">Reportar Ausencia</p>
        <div id="absence-options-list" class="grid grid-cols-1 gap-1"></div>

        <div class="h-px bg-slate-100 my-1.5"></div>
        <button onclick="window.clearPlanning()" class="w-full text-left px-4 py-2.5 text-[10px] font-black uppercase hover:bg-red-50 hover:text-red-700 rounded-xl flex items-center gap-3 transition-colors text-red-600">
            <div class="w-6 h-6 bg-red-100 rounded-md flex items-center justify-center"><i class="fa-solid fa-eraser text-xs"></i></div>
            Limpiar Celda
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, setDoc, doc, updateDoc, getDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'cic5-pp';

    let allUsers = [];
    let stations = [];
    let userConfigs = {};
    let assignments = [];
    let dates = [];
    let isLoadingMore = false;

    // ESTADOS DE INTERFAZ (Persistentes por sesión de vista)
    let collapsedGroups = new Set();
    let hiddenUsers = new Set();

    const absenceReasons = [
        { label: 'Descanso', icon: 'fa-bed', color: 'text-slate-400', bg: 'bg-slate-50', border: 'border-slate-200' },
        { label: 'Falta', icon: 'fa-user-xmark', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-100' },
        { label: 'Vacaciones', icon: 'fa-umbrella-beach', color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-100' },
        { label: 'Permiso', icon: 'fa-envelope-open-text', color: 'text-purple-600', bg: 'bg-purple-50', border: 'border-purple-100' },
        { label: 'Incapacidad', icon: 'fa-hospital-user', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-100' },
        { label: 'Suspensión', icon: 'fa-hand', color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-100' }
    ];

    let activeCell = { email: null, date: null, name: null, role: null };

    onAuthStateChanged(auth, (user) => { if (user) init(); });

    function init() {
        initDateRange();
        syncData();
        renderAbsenceMenu();
        setupInfiniteScroll();
        setupRibbonSync();
    }

    function renderAbsenceMenu() {
        const list = document.getElementById('absence-options-list');
        if (!list) return;
        list.innerHTML = absenceReasons.map(r => `
            <button onclick="window.applyPlanning('absence', '${r.label}')" class="w-full text-left px-4 py-2 text-[10px] font-black uppercase hover:bg-slate-50 rounded-xl flex items-center gap-3 transition-colors">
                <div class="w-6 h-6 ${r.bg} ${r.color} rounded-lg flex items-center justify-center"><i class="fa-solid ${r.icon} text-xs"></i></div>
                ${r.label}
            </button>
        `).join('');
    }

    function initDateRange() {
        dates = [];
        const start = new Date();
        if (start.getHours() < 5) start.setDate(start.getDate() - 1);
        start.setHours(0,0,0,0);
        addMoreDates(21, start);
    }

    function addMoreDates(count, fromDate) {
        const base = fromDate || new Date(dates[dates.length - 1] + 'T00:00:00');
        if (fromDate) {
            for(let i=0; i < count; i++) {
                const d = new Date(base);
                d.setDate(base.getDate() + i);
                dates.push(formatLocalDate(d));
            }
        } else {
            for(let i=1; i <= count; i++) {
                const d = new Date(base);
                d.setDate(base.getDate() + i);
                dates.push(formatLocalDate(d));
            }
        }
        updateColgroup(); // Actualizar estructuralmente los anchos
        renderRibbonHeaders();
        renderPlanning();
    }

    function updateColgroup() {
        const colgroup = document.getElementById('table-columns-defs');
        if (!colgroup) return;
        // Reiniciar con la columna de nombres
        colgroup.innerHTML = '<col style="width: 320px;">';
        // Añadir una columna de 85px por cada fecha cargada
        dates.forEach(() => {
            const col = document.createElement('col');
            col.style.width = '85px';
            colgroup.appendChild(col);
        });
    }

    function formatLocalDate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function renderRibbonHeaders() {
        const ribbonRow = document.getElementById('ribbon-date-row');
        if (!ribbonRow) { setTimeout(renderRibbonHeaders, 100); return; }
        ribbonRow.innerHTML = '';
        dates.forEach(dateStr => {
            const d = new Date(dateStr + 'T00:00:00');
            const dayName = d.toLocaleDateString('es-MX', { weekday: 'short' }).toUpperCase();
            const dayNum = d.getDate();
            const cell = document.createElement('div');
            cell.className = "flex flex-col items-center justify-center w-[85px] min-w-[85px] h-full border-r border-slate-800 transition-colors hover:bg-slate-800/50 cursor-default";
            cell.innerHTML = `
                <p class="text-[8px] font-black text-slate-500 mb-0.5 tracking-widest">${dayName}</p>
                <p class="text-xs font-black text-white">${dayNum}</p>
            `;
            ribbonRow.appendChild(cell);
        });
    }

    function setupRibbonSync() {
        const wrapper = document.getElementById('scroll-wrapper');
        const ribbonHeader = document.getElementById('ribbon-sync-header');
        if (!wrapper || !ribbonHeader) { setTimeout(setupRibbonSync, 100); return; }
        wrapper.addEventListener('scroll', () => { ribbonHeader.scrollLeft = wrapper.scrollLeft; });
    }

    function setupInfiniteScroll() {
        const wrapper = document.getElementById('scroll-wrapper');
        const loader = document.getElementById('infinite-loader');
        wrapper.addEventListener('scroll', () => {
            if (isLoadingMore) return;
            const threshold = 150; 
            const isNearEnd = wrapper.scrollLeft + wrapper.offsetWidth >= wrapper.scrollWidth - threshold;
            if (isNearEnd) {
                isLoadingMore = true;
                loader.classList.remove('hidden');
                setTimeout(() => { addMoreDates(7); loader.classList.add('hidden'); isLoadingMore = false; }, 300);
            }
        });
    }

    async function syncData() {
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stations'), (snap) => {
            stations = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0) - (b.order||0));
            renderPlanning();
        });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'user_operational_configs'), (snap) => {
            userConfigs = {};
            snap.docs.forEach(d => userConfigs[d.id] = d.data());
            renderPlanning();
        });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
            const roles = ["administrador", "guardia", "encargado", "operador cco", "centro de control"];
            allUsers = snap.docs.map(d => d.data()).filter(u => u.role && roles.includes(u.role.toLowerCase()));
            renderPlanning();
        });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'), (snap) => {
            assignments = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
            renderPlanning();
        });
    }

    // ACCIONES DE INTERFAZ
    window.toggleGroupCollapse = (gName) => {
        if (collapsedGroups.has(gName)) collapsedGroups.delete(gName);
        else collapsedGroups.add(gName);
        renderPlanning();
    };

    window.hideElement = (email) => {
        hiddenUsers.add(email);
        renderPlanning();
    };

    window.restoreHiddenElements = () => {
        hiddenUsers.clear();
        renderPlanning();
    };

    function renderPlanning() {
        const body = document.getElementById('planning-body');
        if (!body) return;
        body.innerHTML = '';
        const assignMap = {};
        assignments.forEach(a => { if (a.email && a.date) assignMap[`${a.email}_${a.date}`] = a; });
        const groups = {};
        allUsers.forEach(u => {
            const config = userConfigs[u.email] || {};
            const station = config.defaultStation || "Sin Caseta";
            if (!groups[station]) groups[station] = [];
            groups[station].push(u);
        });
        
        const groupOrder = [...stations.map(s => s.name), "Sin Caseta"];
        
        // Actualizar Ribbon/Header con botón de restauración si hay elementos ocultos
        const ribbonHeaderFirstCell = document.querySelector('#ribbon-sync-header')?.previousElementSibling;
        if(ribbonHeaderFirstCell) {
            const restBtn = hiddenUsers.size > 0 ? `<button onclick="restoreHiddenElements()" class="ml-auto text-[7px] font-black text-red-400 border border-red-800/30 px-2 py-0.5 rounded-full hover:bg-red-800 hover:text-white transition-all uppercase tracking-tighter">Restaurar (${hiddenUsers.size})</button>` : '';
            const titleSpan = ribbonHeaderFirstCell.querySelector('span');
            if(titleSpan) titleSpan.parentElement.innerHTML = `<i class="fa-solid fa-calendar-days text-red-500 text-xs"></i><span class="text-[10px] font-black uppercase text-white tracking-[0.2em]">Planeación</span> ${restBtn}`;
        }

        groupOrder.forEach(gName => {
            const usersInGroup = groups[gName];
            if (!usersInGroup || usersInGroup.length === 0) return;
            
            const isCollapsed = collapsedGroups.has(gName);
            const visibleUsers = usersInGroup.filter(u => !hiddenUsers.has(u.email));
            
            if (visibleUsers.length === 0 && !isCollapsed) return;

            const groupRow = document.createElement('tr');
            groupRow.className = "bg-slate-50 cursor-pointer hover:bg-slate-100 transition-all";
            groupRow.onclick = () => window.toggleGroupCollapse(gName);
            groupRow.innerHTML = `
                <td class="p-0 border-y border-slate-200 bg-slate-100" colspan="${dates.length + 1}">
                    <div class="sticky left-0 z-[40] p-4 pl-8 flex items-center justify-between w-[320px] min-w-[320px] max-w-[320px] shadow-[1px_0_0_#f1f5f9]">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-4 bg-red-800 rounded-full"></div>
                            <span class="text-[10px] font-black uppercase tracking-[0.25em] text-slate-600">${gName}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[8px] font-bold text-slate-400">${visibleUsers.length}</span>
                            <i class="fa-solid ${isCollapsed ? 'fa-chevron-right' : 'fa-chevron-down'} text-[8px] text-slate-300"></i>
                        </div>
                    </div>
                </td>`;
            body.appendChild(groupRow);

            if (!isCollapsed) {
                visibleUsers.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50/30 transition-colors group";
                    const nameCell = document.createElement('td');
                    nameCell.className = "sticky left-0 z-[45] bg-white group-hover:bg-slate-50 border-r border-slate-100 shadow-[1px_0_0_#f1f5f9] w-[320px] min-w-[320px] max-w-[320px]";
                    
                    nameCell.innerHTML = `
                        <div class="flex items-center gap-4 p-5 relative overflow-hidden group/cell">
                            <div onclick="window.openCellDetail('${u.email}', '${dates[0]}')" class="w-10 h-10 rounded-xl overflow-hidden border-2 border-slate-100 shrink-0 bg-slate-50 shadow-sm transition-transform cursor-pointer hover:scale-105">
                                ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-user text-xs"></i></div>`}
                            </div>
                            <div class="truncate flex-1" onclick="window.openCellDetail('${u.email}', '${dates[0]}')">
                                <p class="text-[12px] font-black uppercase text-slate-800 truncate leading-tight mb-1 cursor-pointer">${u.name || 'S/N'}</p>
                                <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${u.role}</p>
                            </div>
                            <!-- BOTÓN PARA OCULTAR ELEMENTO -->
                            <button onclick="event.stopPropagation(); window.hideElement('${u.email}')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-slate-200 hover:text-red-800 opacity-0 group-hover/cell:opacity-100 transition-all" title="Ocultar de la lista">
                                <i class="fa-solid fa-eye-slash text-[10px]"></i>
                            </button>
                        </div>`;
                    tr.appendChild(nameCell);
                    
                    dates.forEach(date => {
                        const td = document.createElement('td');
                        td.className = "p-0 border-r border-slate-100 text-center relative cursor-pointer hover:bg-red-50/30 transition-all w-[85px] min-w-[85px] max-w-[85px]";
                        td.onclick = () => openCellDetail(u.email, date);
                        td.oncontextmenu = (e) => handleCellRightClick(e, u.email, date, u.name, u.role);
                        const assign = assignMap[`${u.email}_${date}`];
                        if (assign) td.innerHTML = renderShiftIndicator(assign);
                        else td.innerHTML = `<div class="w-full h-16 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-plus text-[10px] text-slate-200"></i></div>`;
                        tr.appendChild(td);
                    });
                    body.appendChild(tr);
                });
            }
        });
    }

    function renderShiftIndicator(assign) {
        let indicators = [];
        let mainReason = assign.reason || null;
        if (!mainReason && assign.shifts) {
            const abs = assign.shifts.find(s => s.type === 'ausentismo');
            if (abs) mainReason = abs.reason;
        }
        if (mainReason) indicators.push({ val: mainReason, type: 'abs' });
        if (assign.shifts && assign.shifts.length > 0) {
            assign.shifts.filter(s => s.type !== 'ausentismo').forEach(s => { indicators.push({ val: s.shift, type: 'shift' }); });
        } else if (assign.shift && assign.type !== 'ausentismo') {
            indicators.push({ val: assign.shift, type: 'shift' });
        }
        if (indicators.length === 0) return "";
        return `<div class="flex flex-col items-center justify-center gap-1.5 py-3">${indicators.map(ind => {
            if (ind.type === 'abs') {
                const config = absenceReasons.find(r => r.label === ind.val) || { color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-100' };
                return `<span class="px-2 py-1 ${config.bg} ${config.color} text-[8px] font-black rounded-lg border ${config.border} uppercase tracking-tighter shadow-sm whitespace-nowrap">${ind.val}</span>`;
            }
            const colors = { 'M': 'bg-amber-500', 'V': 'bg-blue-500', 'N': 'bg-slate-900' };
            return `<span class="w-7 h-6 ${colors[ind.val] || 'bg-slate-400'} text-white text-[11px] font-black rounded-lg flex items-center justify-center shadow-md transition-transform hover:scale-110">${ind.val}</span>`;
        }).join('')}</div>`;
    }

    // EXPOSICIÓN GLOBAL DE FUNCIONES
    window.openPatternManager = () => {
        const { email, name, date, role } = activeCell;
        const menu = document.getElementById('planning-context-menu');
        if(menu) menu.classList.add('hidden');

        if(email && name && date) {
            window.selectedUserEmail = email;
            window.selectedUserDisplayName = name;
            window.selectedOperationDate = date;
            window.selectedUserRole = role;
            
            if(typeof window.loadRightContent === 'function') {
                window.loadRightContent('Apps/Patrones.html');
            }
        }
    };

    window.openCellDetail = (email, date) => {
        window.selectedUserEmail = email;
        window.selectedOperationDate = date;
        if(typeof window.loadRightContent === 'function') {
            window.loadRightContent('Apps/Componentes/RegAs_PP/Detalle.html');
        }
    };

    function handleCellRightClick(e, email, date, name, role) {
        e.preventDefault(); e.stopPropagation(); 
        activeCell = { email, date, name, role };
        const menu = document.getElementById('planning-context-menu');
        if (!menu) return;

        document.getElementById('menu-target-name').innerText = name;
        document.getElementById('menu-target-date').innerText = date;

        let top = e.clientY; let left = e.clientX;
        if (top + 500 > window.innerHeight) top = window.innerHeight - 510;
        if (left + 240 > window.innerWidth) left = window.innerWidth - 250;

        menu.style.top = `${top}px`; 
        menu.style.left = `${left}px`;
        menu.classList.remove('hidden');

        const closeMenu = () => { 
            menu.classList.add('hidden'); 
            document.removeEventListener('click', closeMenu); 
            document.removeEventListener('contextmenu', closeMenu);
        };
        
        setTimeout(() => {
            document.addEventListener('click', closeMenu);
            document.addEventListener('contextmenu', closeMenu);
        }, 20);
    }

    window.clearPlanning = async () => {
        const { email, date } = activeCell;
        if (!email || !date) return;
        const menu = document.getElementById('planning-context-menu');
        if(menu) menu.classList.add('hidden');
        try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', `${date}_${email}`)); } catch (e) { console.error(e); }
    };

    window.applyPlanning = async (type, value) => {
        const { email, date, name, role } = activeCell;
        if (!email || !date) return;
        
        const menu = document.getElementById('planning-context-menu');
        if(menu) menu.classList.add('hidden');

        const docId = `${date}_${email}`;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'assignments', docId);
        try {
            const config = userConfigs[email] || {};
            const stationName = config.defaultStation || "General";
            let newShiftObj = null;
            const calculateExitTime = (start, hours) => {
                if (!start) return "";
                const [h, m] = start.split(':').map(Number);
                let totalMinutes = h * 60 + m + (parseFloat(hours) * 60);
                let finalH = Math.floor((totalMinutes / 60) % 24);
                let finalM = Math.floor(totalMinutes % 60);
                return `${String(finalH).padStart(2, '0')}:${String(finalM).padStart(2, '0')}`;
            };
            if (type === 'shift') {
                const isCC = stationName.toLowerCase().includes('centro de control');
                const isEncargado = role && role.toLowerCase().includes('encargado');
                const duration = isEncargado ? 12 : 8;
                let entryTime = '07:00';
                if (value === 'M') entryTime = isCC ? '06:00' : '07:00';
                else if (value === 'V') entryTime = isCC ? '14:00' : '13:00';
                else if (value === 'N') entryTime = isCC ? '22:00' : '21:00';
                newShiftObj = { shift: value, station: stationName, type: 'asignacion', assignedEntry: entryTime, assignedExit: calculateExitTime(entryTime, duration), shiftDuration: duration, isConfirmed: false };
            } else {
                newShiftObj = { type: 'ausentismo', reason: value, shift: 'M', station: 'General', isConfirmed: true };
            }
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const data = snap.data();
                let shifts = data.shifts || [];
                if (type === 'absence') { shifts = [newShiftObj]; } 
                else {
                    if (!shifts.some(s => s.shift === value)) {
                        shifts = shifts.filter(s => s.type !== 'ausentismo');
                        shifts.push(newShiftObj);
                    }
                }
                await updateDoc(docRef, { shifts, updatedAt: serverTimestamp(), type: shifts[0].type, reason: shifts[0].reason || null });
            } else {
                await setDoc(docRef, { email, name, date, shifts: [newShiftObj], type: newShiftObj.type, reason: newShiftObj.reason || null, updatedAt: serverTimestamp() });
            }
        } catch (e) { console.error("Error en planeación:", e); }
    };
</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
