<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .chat-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.4;
            position: relative;
            margin-bottom: 4px;
        }
        .bubble-me {
            background-color: #720000;
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .bubble-them {
            background-color: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        
        .contact-item { transition: all 0.2s ease; cursor: pointer; }
        .contact-item:hover { background-color: #f8fafc; }
        .contact-item.active { background-color: #fff1f1; border-left: 4px solid #720000; }

        .loader { border-top-color: #720000; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Animaciones de transición */
        .view-transition { transition: transform 0.3s ease; }
        .slide-in { transform: translateX(0); }
        .slide-out-left { transform: translateX(-100%); }
        .slide-out-right { transform: translateX(100%); }
    </style>
</head>
<body class="bg-white h-screen flex flex-col font-sans overflow-hidden">

    <!-- PANTALLA DE CARGA -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-slate-100 loader rounded-full mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Sincronizando Chat...</p>
    </div>

    <!-- VISTA 1: LISTA DE CONVERSACIONES -->
    <div id="view-contacts" class="flex-1 flex flex-col bg-white">
        <div class="px-6 py-4 border-b border-slate-100 shrink-0">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Mensajería CIC</h2>
                <span id="my-email" class="text-[9px] font-black text-red-900 bg-red-50 px-3 py-1 rounded-full uppercase">...</span>
            </div>
            
            <div class="relative">
                <input type="text" id="user-search" oninput="searchUsers(this.value)" placeholder="Buscar usuario para chatear..." 
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-100 rounded-2xl text-[11px] font-bold focus:outline-none focus:ring-2 focus:ring-red-800/20 transition-all">
                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
            </div>
        </div>

        <div id="contacts-list" class="flex-1 overflow-y-auto custom-scrollbar">
            <!-- Los contactos con chats recientes aparecerán aquí -->
        </div>

        <!-- Resultados de búsqueda rápidos -->
        <div id="search-results" class="hidden absolute top-[130px] left-0 right-0 mx-6 bg-white border border-slate-200 rounded-2xl shadow-2xl z-40 max-h-[300px] overflow-y-auto custom-scrollbar"></div>
    </div>

    <!-- VISTA 2: CHAT ACTIVO -->
    <div id="view-chat" class="hidden fixed inset-0 bg-white z-30 flex flex-col">
        <!-- Cabecera del Chat -->
        <header class="px-4 py-3 border-b border-slate-100 flex items-center gap-3 bg-white shrink-0">
            <button onclick="backToList()" class="p-2 text-slate-400 hover:text-red-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div id="chat-header-avatar" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden">👤</div>
            <div class="flex-1 truncate">
                <h3 id="chat-header-name" class="text-xs font-black text-slate-800 uppercase truncate leading-none">Cargando...</h3>
                <p id="chat-header-status" class="text-[9px] font-bold text-red-800 uppercase mt-1">@cic.com.mx</p>
            </div>
        </header>

        <!-- Área de Mensajes -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 custom-scrollbar bg-slate-50/30">
            <!-- Burbujas de chat aquí -->
        </div>

        <!-- Input de Mensaje -->
        <div class="p-4 bg-white border-t border-slate-100">
            <div class="flex items-end gap-2 bg-slate-50 border border-slate-200 rounded-[1.5rem] p-2 pr-3">
                <textarea id="chat-input" rows="1" placeholder="Escribe un mensaje..." class="flex-1 bg-transparent border-none text-[13px] font-medium p-2 focus:outline-none resize-none custom-scrollbar"></textarea>
                <button onclick="sendMessage()" id="send-btn" class="w-10 h-10 bg-red-800 text-white rounded-full flex items-center justify-center hover:bg-red-700 transition-all shadow-lg shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCmyzbw7csEtZkPqV89OMaM4cXDpG6O930", 
            authDomain: "cic-pp.firebaseapp.com", 
            projectId: "cic-pp" 
        };
        const appId = "cic-pp";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allUsers = [];
        let messages = [];
        let selectedUserId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                syncUserData(user.uid);
            } else {
                signInAnonymously(auth);
            }
        });

        async function syncUserData(uid) {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', uid);
            onSnapshot(userRef, (snap) => {
                if (snap.exists()) {
                    currentUser = { uid, ...snap.data() };
                    currentUser.cicEmail = `${currentUser.empId || 'user'}@cic.com.mx`.toLowerCase();
                    document.getElementById('my-email').innerText = currentUser.cicEmail;
                    
                    initSync();
                }
            });
        }

        function initSync() {
            // Sincronizar Usuarios
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderContacts();
            });

            // Sincronizar todos mis mensajes (enviados y recibidos)
            // Nota: Filtramos en memoria para evitar índices complejos según RULE 2
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), (snap) => {
                messages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderContacts();
                if (selectedUserId) renderChat();
                document.getElementById('loading-overlay').classList.add('hidden');
            });
        }

        function renderContacts() {
            const list = document.getElementById('contacts-list');
            
            // Obtener IDs de personas con las que he hablado
            const myChatIds = new Set();
            messages.forEach(m => {
                if (m.fromUid === currentUser.uid) myChatIds.add(m.toUid);
                if (m.toUid === currentUser.uid) myChatIds.add(m.fromUid);
            });

            const contacts = allUsers.filter(u => myChatIds.has(u.id));

            if (contacts.length === 0) {
                list.innerHTML = `
                    <div class="py-20 text-center opacity-20">
                        <div class="text-4xl mb-2">💬</div>
                        <p class="text-[10px] font-black uppercase tracking-widest">Busca a alguien para chatear</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = contacts.map(u => {
                const lastMsg = messages
                    .filter(m => (m.fromUid === u.id && m.toUid === currentUser.uid) || (m.fromUid === currentUser.uid && m.toUid === u.id))
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];

                const hasUnread = lastMsg && lastMsg.toUid === currentUser.uid && !lastMsg.read;

                return `
                    <div onclick="selectUser('${u.id}')" class="contact-item p-5 border-b border-slate-50 flex items-center gap-4 ${selectedUserId === u.id ? 'active' : ''}">
                        <div class="w-12 h-12 rounded-full bg-slate-100 shrink-0 overflow-hidden border-2 ${hasUnread ? 'border-red-800' : 'border-transparent'}">
                            ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : '👤'}
                        </div>
                        <div class="flex-1 truncate">
                            <div class="flex justify-between items-center mb-0.5">
                                <h4 class="text-[11px] font-black text-slate-800 uppercase truncate">${u.name}</h4>
                                <span class="text-[8px] font-bold text-slate-400 uppercase">${lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                            </div>
                            <p class="text-[10px] ${hasUnread ? 'font-black text-slate-900' : 'text-slate-400'} truncate">
                                ${lastMsg ? (lastMsg.fromUid === currentUser.uid ? 'Tú: ' : '') + lastMsg.body : 'Sin mensajes'}
                            </p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.searchUsers = (q) => {
            const results = document.getElementById('search-results');
            if (!q || q.length < 1) {
                results.classList.add('hidden');
                return;
            }

            const query = q.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.id !== currentUser.uid && 
                (u.name.toLowerCase().includes(query) || u.empId?.toLowerCase().includes(query))
            );

            if (filtered.length === 0) {
                results.innerHTML = `<div class="p-4 text-center text-[10px] font-black text-slate-300 uppercase">Sin resultados</div>`;
            } else {
                results.innerHTML = filtered.map(u => `
                    <div onclick="selectUser('${u.id}')" class="p-3 flex items-center gap-3 border-b border-slate-50 cursor-pointer hover:bg-slate-50">
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs overflow-hidden">
                            ${u.photo ? `<img src="${u.photo}" class="w-full h-full object-cover">` : '👤'}
                        </div>
                        <div class="truncate">
                            <p class="text-[10px] font-black uppercase text-slate-800">${u.name}</p>
                            <p class="text-[8px] font-bold text-red-800 uppercase">${u.empId}@cic.com.mx</p>
                        </div>
                    </div>
                `).join('');
            }
            results.classList.remove('hidden');
        };

        window.selectUser = async (id) => {
            selectedUserId = id;
            const user = allUsers.find(u => u.id === id);
            
            // UI
            document.getElementById('view-chat').classList.remove('hidden');
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('user-search').value = '';
            
            document.getElementById('chat-header-name').innerText = user.name;
            document.getElementById('chat-header-status').innerText = `${user.empId}@cic.com.mx`;
            document.getElementById('chat-header-avatar').innerHTML = user.photo ? `<img src="${user.photo}" class="w-full h-full object-cover">` : '👤';
            
            renderChat();
            
            // Marcar mensajes como leídos
            const unread = messages.filter(m => m.fromUid === id && m.toUid === currentUser.uid && !m.read);
            for (const m of unread) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'messages', m.id), { read: true });
            }
        };

        window.backToList = () => {
            selectedUserId = null;
            document.getElementById('view-chat').classList.add('hidden');
            renderContacts();
        };

        function renderChat() {
            const container = document.getElementById('messages-container');
            const chatMsgs = messages
                .filter(m => (m.fromUid === selectedUserId && m.toUid === currentUser.uid) || (m.fromUid === currentUser.uid && m.toUid === selectedUserId))
                .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            container.innerHTML = chatMsgs.map((m, i) => {
                const isMe = m.fromUid === currentUser.uid;
                const prevMsg = chatMsgs[i - 1];
                const showTime = !prevMsg || (new Date(m.timestamp) - new Date(prevMsg.timestamp) > 600000); // 10 min
                
                return `
                    ${showTime ? `<div class="text-center my-4"><span class="text-[8px] font-black uppercase text-slate-300 tracking-widest">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div>` : ''}
                    <div class="chat-bubble ${isMe ? 'bubble-me' : 'bubble-them'}">
                        ${m.body}
                    </div>
                `;
            }).join('');
            
            // Scroll al fondo
            container.scrollTop = container.scrollHeight;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const body = input.value.trim();
            const btn = document.getElementById('send-btn');
            
            if (!body || !selectedUserId) return;

            btn.disabled = true;
            const targetUser = allUsers.find(u => u.id === selectedUserId);

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    fromUid: currentUser.uid,
                    fromName: currentUser.name,
                    fromEmail: currentUser.cicEmail,
                    toUid: selectedUserId,
                    toName: targetUser.name,
                    toEmail: `${targetUser.empId}@cic.com.mx`.toLowerCase(),
                    body: body,
                    timestamp: new Date().toISOString(),
                    read: false,
                    subject: 'Chat Message' // Mantener compatibilidad si se requiere
                });
                
                input.value = '';
                input.style.height = 'auto';
                btn.disabled = false;
            } catch (e) {
                console.error(e);
                btn.disabled = false;
            }
        };

        // Auto-expandir textarea
        document.getElementById('chat-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.scrollHeight > 100) this.style.overflowY = 'auto';
            else this.style.overflowY = 'hidden';
        });

        // Enviar con Enter (sin Shift)
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
