<!-- Shell principal de Registros de Entrada - Arquitectura con Encabezado Fijo y Ribbon Plata -->
<div class="flex flex-col h-full w-full bg-slate-50/50 animate-in fade-in duration-500 relative">
    
    <!-- ENCABEZADO FIJO -->
    <header id="shell-header-main" class="sticky top-0 flex-shrink-0 z-[110] bg-white border-b border-slate-100 p-4 md:px-10 shadow-sm">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-9 h-9 bg-red-800 rounded-xl flex items-center justify-center text-white shadow-xl shadow-red-800/20 rotate-3">
                    <i class="fa-solid fa-shield-halved text-sm"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                        Registros de <span class="text-red-800">Entrada de Elementos</span>
                    </h2>
                    <p class="text-slate-400 text-[7px] font-black uppercase tracking-[0.4em] mt-1 leading-none">Gestión Operativa CIC</p>
                </div>
            </div>

            <nav id="regas-tabs" class="flex items-center bg-slate-100/50 p-1.5 rounded-2xl border border-slate-200/50">
                <button onclick="loadRegAsModule('VistaDia.html', this)" class="regas-tab-btn active px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                    Vista Día
                </button>
                <button onclick="loadRegAsModule('Planeacion.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">
                    Planeación
                </button>
                <button onclick="loadRegAsModule('Reportes.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">
                    Reportes
                </button>
            </nav>
        </div>
    </header>

    <!-- CINTA DE HERRAMIENTAS (RIBBON) PLATA -->
    <div id="module-ribbon" class="sticky top-[73px] md:top-[68px] flex-shrink-0 z-[100] bg-slate-200 border-b border-slate-300 p-3 px-10 min-h-[64px] flex items-center shadow-md">
        <div id="ribbon-content" class="w-full flex items-center justify-between animate-in fade-in slide-in-from-top-1 duration-300">
            <!-- Contenido dinámico -->
        </div>
    </div>

    <!-- ÁREA DE CARGA -->
    <main id="regas-component-container" class="flex-1 bg-slate-50/20 scroll-smooth min-h-screen">
        <div class="flex items-center justify-center h-full opacity-20 py-20">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl text-red-800"></i>
        </div>
    </main>

</div>

<script>
    const ribbonConfigs = {
        'VistaDia.html': `
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
                    <p id="current-view-date" class="text-slate-600 text-[10px] font-black uppercase tracking-[0.2em]">Sincronizando...</p>
                </div>
                <div class="flex items-center gap-2 bg-slate-800 p-1 rounded-xl border border-slate-900 shadow-xl">
                    <button onclick="window.changeDay(-1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-700 hover:text-white hover:bg-red-800 transition-all text-slate-300 active:scale-90">
                        <i class="fa-solid fa-chevron-left text-[10px]"></i>
                    </button>
                    <input type="date" id="view-date-input" onchange="window.loadDailyView()" class="bg-transparent border-none text-[10px] font-black uppercase tracking-widest text-white outline-none cursor-pointer px-2">
                    <button onclick="window.changeDay(1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-700 hover:text-white hover:bg-red-800 transition-all text-slate-300 active:scale-90">
                        <i class="fa-solid fa-chevron-right text-[10px]"></i>
                    </button>
                </div>
            </div>

            <!-- TOGGLE CENTRAL: EN TURNO / AUSENTISMO -->
            <div class="flex items-center bg-slate-800 p-1 rounded-xl border border-slate-900 shadow-lg">
                <button onclick="window.switchViewFilter('duty', this)" class="view-filter-btn active px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all">
                    En Turno
                </button>
                <button onclick="window.switchViewFilter('absence', this)" class="view-filter-btn px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all text-slate-500">
                    Ausentismo
                </button>
            </div>

            <div class="flex items-center gap-3">
                <!-- Botón de silueta con + solicitado -->
                <button onclick="window.openProfilesPanel()" class="w-11 h-11 bg-slate-900 text-white rounded-xl hover:bg-red-800 transition-all shadow-lg flex items-center justify-center border border-slate-700" title="Gestionar Personal">
                    <i class="fa-solid fa-user-plus text-sm"></i>
                </button>
            </div>
        `,
        // ... (otros configs se mantienen igual)
        'Planeacion.html': `...`,
        'Reportes.html': `...`
    };

    async function loadRegAsModule(file, btn) {
        const container = document.getElementById('regas-component-container');
        const ribbon = document.getElementById('ribbon-content');
        const path = `Apps/Componentes/RegAs_PP/${file}`;
        
        ribbon.innerHTML = ribbonConfigs[file] || `<p class="text-[9px] font-black uppercase text-slate-500">Herramientas no disponibles</p>`;

        document.querySelectorAll('.regas-tab-btn').forEach(b => {
            b.classList.remove('active', 'bg-slate-900', 'text-white', 'shadow-lg');
            b.classList.add('text-slate-400');
        });
        
        if (btn) {
            btn.classList.add('active', 'bg-slate-900', 'text-white', 'shadow-lg');
            btn.classList.remove('text-slate-400');
        }

        try {
            const response = await fetch(path);
            if (response.ok) {
                const html = await response.text();
                const fragment = document.createRange().createContextualFragment(html);
                container.innerHTML = "";
                container.appendChild(fragment);
            }
        } catch (e) { console.error(e); }
    }

    (function initRegAsDefault() {
        setTimeout(() => {
            const firstTab = document.querySelector('.regas-tab-btn');
            if (firstTab) loadRegAsModule('VistaDia.html', firstTab);
        }, 100);
    })();
</script>

<style>
    .regas-tab-btn.active { background-color: #0f172a; color: white; }
    .view-filter-btn.active { background-color: #1e293b; color: #fff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    main#regas-component-container { overflow-y: visible; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
</style>
