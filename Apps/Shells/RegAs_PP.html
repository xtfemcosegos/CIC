<!-- Shell principal de Registros de Asistencia - Gestión de Correo en Ribbon -->
<div class="flex flex-col h-full w-full bg-slate-50/50 animate-in fade-in duration-500 relative">
    
    <!-- ENCABEZADO FIJO -->
    <header id="shell-header-main" class="sticky top-0 flex-shrink-0 z-[110] bg-white border-b border-slate-100 p-4 md:px-10 shadow-sm">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-9 h-9 bg-red-800 rounded-xl flex items-center justify-center text-white shadow-xl shadow-red-800/20 rotate-3">
                    <i class="fa-solid fa-shield-halved text-sm"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                        Operación <span class="text-red-800">CIC Protection</span>
                    </h2>
                    <p class="text-slate-400 text-[7px] font-black uppercase tracking-[0.4em] mt-1 leading-none">Gestión de Personal y Reportes</p>
                </div>
            </div>

            <nav id="regas-tabs" class="flex items-center bg-slate-100/50 p-1.5 rounded-2xl border border-slate-200/50">
                <button onclick="loadRegAsModule('VistaDia.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">Vista Día</button>
                <button onclick="loadRegAsModule('Planeacion.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">Planeación</button>
                <button onclick="loadRegAsModule('Reportes.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">Reportes</button>
            </nav>
        </div>
    </header>

    <!-- CINTA DE HERRAMIENTAS (RIBBON) -->
    <div id="module-ribbon" class="sticky top-[73px] md:top-[68px] flex-shrink-0 z-[100] bg-slate-900 border-b border-slate-950 p-3 px-10 min-h-[64px] flex items-center shadow-lg">
        <div id="ribbon-content" class="w-full flex items-center justify-between animate-in fade-in slide-in-from-top-1 duration-300">
            <!-- Dinámico -->
        </div>
    </div>

    <!-- ÁREA DE CARGA -->
    <main id="regas-component-container" class="flex-1 bg-slate-50/20 scroll-smooth min-h-screen">
        <div class="flex items-center justify-center h-full py-20 opacity-20">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl text-red-800"></i>
        </div>
    </main>

</div>

<script>
    const ribbonConfigs = {
        'VistaDia.html': `
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <p id="current-view-date" class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Sincronizando...</p>
                </div>
                <div class="flex items-center gap-2 bg-slate-800 p-1 rounded-xl border border-slate-700 shadow-xl">
                    <button onclick="window.changeDay?.(-1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-700 hover:text-white hover:bg-red-800 transition-all text-slate-300">
                        <i class="fa-solid fa-chevron-left text-[10px]"></i>
                    </button>
                    <input type="date" id="view-date-input" onchange="window.loadDailyView?.()" class="bg-transparent border-none text-[10px] font-black uppercase tracking-widest text-white outline-none cursor-pointer px-2">
                    <button onclick="window.changeDay?.(1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-700 hover:text-white hover:bg-red-800 transition-all text-slate-300">
                        <i class="fa-solid fa-chevron-right text-[10px]"></i>
                    </button>
                </div>
            </div>
            <div class="flex items-center bg-slate-800 p-1 rounded-xl border border-slate-700">
                <button onclick="window.switchViewFilter?.('duty', this)" class="view-filter-btn active px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all">En Turno</button>
                <button onclick="window.switchViewFilter?.('absence', this)" class="view-filter-btn px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all text-slate-500">Ausentismo</button>
            </div>
        `,
        'Reportes.html': `
            <div class="flex flex-wrap items-center gap-6 w-full">
                <!-- Selectores Base -->
                <div class="flex items-center gap-4 border-r border-white/10 pr-6 shrink-0">
                    <div class="flex flex-col">
                        <label class="text-[7px] font-black text-white/30 uppercase mb-1">Fecha</label>
                        <input type="date" id="global-report-date" onchange="window.syncAndLoad?.()" class="bg-white/10 border border-white/10 rounded-lg px-3 py-1.5 text-[10px] font-bold text-white outline-none focus:bg-white focus:text-slate-900 transition-all cursor-pointer">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[7px] font-black text-white/30 uppercase mb-1">Turno</label>
                        <select id="report-shift" onchange="window.syncAndLoad?.()" class="bg-white/10 border border-white/10 rounded-lg px-3 py-1.5 text-[10px] font-bold text-white outline-none focus:bg-white focus:text-slate-900 transition-all cursor-pointer">
                            <option value="M">Matutino</option>
                            <option value="V">Vespertino</option>
                            <option value="N">Nocturno</option>
                        </select>
                    </div>
                </div>

                <!-- Tabs de Reporte -->
                <div class="flex items-center bg-slate-800 p-1 rounded-xl border border-white/10 shrink-0 shadow-inner">
                    <button id="tab-whatsapp" onclick="window.switchReportTab?.('whatsapp')" class="px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all bg-white text-slate-900 shadow-md">WhatsApp</button>
                    <button id="tab-daily" onclick="window.switchReportTab?.('daily')" class="px-4 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition-all text-white/40 hover:text-white">Diario</button>
                </div>

                <!-- CONTROLES DE ENVÍO (Solo Reporte Diario) -->
                <div id="ribbon-report-extras" class="hidden flex-1 flex items-center gap-4 border-l border-white/10 pl-6 animate-in fade-in">
                    <div class="flex flex-1 gap-2 max-w-[400px]">
                        <input type="text" id="shell-email-to" placeholder="Para: correo@ejemplo.com" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-[9px] font-bold text-white outline-none focus:bg-white/10 transition-all placeholder:text-white/20">
                        <input type="text" id="shell-email-cc" placeholder="CC: jefe@ejemplo.com" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-[9px] font-bold text-white outline-none focus:bg-white/10 transition-all placeholder:text-white/20">
                    </div>
                    
                    <label class="flex items-center gap-2 cursor-pointer shrink-0">
                        <input type="checkbox" id="hybrid-night-mode" onchange="window.generateDailyTableReport?.()" class="sr-only peer">
                        <div class="w-7 h-4 bg-white/10 rounded-full peer peer-checked:bg-red-700 transition-all border border-white/5"></div>
                        <span class="text-[8px] font-black uppercase text-white/40 peer-checked:text-white">Nocturno</span>
                    </label>

                    <button id="shell-btn-send" onclick="window.sendEmailFromShell()" class="bg-red-800 text-white px-5 py-2 rounded-xl text-[8px] font-black uppercase tracking-widest hover:bg-red-700 shadow-lg transition-all active:scale-95 flex items-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i> <span>Enviar</span>
                    </button>
                </div>
            </div>
            <div id="ribbon-status" class="hidden px-2 text-[7px] font-black text-emerald-400 uppercase tracking-widest shrink-0"><i class="fa-solid fa-cloud-check"></i> Sincronizado</div>
        `,
        'Planeacion.html': `...`
    };

    window.sendEmailFromShell = async () => {
        const to = document.getElementById('shell-email-to').value.trim();
        const cc = document.getElementById('shell-email-cc').value.trim();
        const btn = document.getElementById('shell-btn-send');
        
        if (!to) {
            alert("Debes ingresar al menos un destinatario.");
            return;
        }

        if (!window.generateEmailHtml) {
            console.error("El componente de reportes no ha cargado la función de generación de HTML.");
            return;
        }

        const bodyHtml = window.generateEmailHtml();
        const apiURL = "https://default3b2cbccb81bb44a2a19a2386bb3606.02.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/507bea91c30c4743b4749a474f92ad3f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PzEbbL5wNoHu-b78wQtE7JP0H-RKDb3btp2iHGbM6vU";

        btn.disabled = true;
        const btnSpan = btn.querySelector('span');
        const originalText = btnSpan.innerText;
        btnSpan.innerText = "Enviando...";

        try {
            const response = await fetch(apiURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to, cc, body: bodyHtml })
            });

            if (response.ok) {
                btnSpan.innerText = "¡Enviado!";
                btn.classList.replace('bg-red-800', 'bg-emerald-600');
                setTimeout(() => {
                    btnSpan.innerText = originalText;
                    btn.classList.replace('bg-emerald-600', 'bg-red-800');
                    btn.disabled = false;
                }, 3000);
            } else {
                throw new Error();
            }
        } catch (e) {
            btnSpan.innerText = "Error";
            btn.disabled = false;
            setTimeout(() => { btnSpan.innerText = originalText; }, 3000);
        }
    };

    async function loadRegAsModule(file, btn) {
        const container = document.getElementById('regas-component-container');
        const ribbon = document.getElementById('ribbon-content');
        const path = `Apps/Componentes/RegAs_PP/${file}`;
        
        ribbon.innerHTML = ribbonConfigs[file] || '<p class="text-white/20 text-[9px] uppercase font-black">Módulo sin controles</p>';

        document.querySelectorAll('.regas-tab-btn').forEach(b => {
            b.classList.remove('active', 'bg-slate-900', 'text-white');
            b.classList.add('text-slate-400');
        });
        if (btn) {
            btn.classList.add('active', 'bg-slate-900', 'text-white');
            btn.classList.remove('text-slate-400');
        }

        try {
            const response = await fetch(path);
            if (response.ok) {
                const html = await response.text();
                container.innerHTML = "";
                const fragment = document.createRange().createContextualFragment(html);
                container.appendChild(fragment);

                const now = new Date();
                const localDate = now.toLocaleDateString('en-CA');
                const dateInp = document.getElementById('global-report-date') || document.getElementById('view-date-input');
                if(dateInp) dateInp.value = localDate;

                // Valores por defecto para el correo
                setTimeout(() => {
                    const toField = document.getElementById('shell-email-to');
                    const ccField = document.getElementById('shell-email-cc');
                    if (toField) toField.value = "jesuseduardo.gutierrez@armur.com;juan.paniagua@armur.com";
                    if (ccField) ccField.value = "roberto.rodriguez@armur.com";
                    
                    if (window.syncAndLoad) window.syncAndLoad();
                    else if (window.loadDailyView) window.loadDailyView();
                }, 150);
            }
        } catch (e) { console.error(e); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const firstTab = document.querySelector('.regas-tab-btn');
        if (firstTab) loadRegAsModule('VistaDia.html', firstTab);
    });
</script>

<style>
    .regas-tab-btn.active { background-color: #0f172a; color: white; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
    select { -webkit-appearance: none; appearance: none; }
</style>
