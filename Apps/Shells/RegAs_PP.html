<!-- Shell principal de Registros de Asistencia - Restauración de Funcionalidad Completa -->
<div class="flex flex-col h-full w-full bg-slate-50/50 animate-in fade-in duration-500 relative text-slate-900 overflow-hidden">
    
    <style>
        /* Bloquear el scroll del contenedor principal en el index para que el Shell tome el control del layout */
        #main-view { overflow: hidden !important; }
        
        /* Forzar que el contenedor donde se inyecta este shell ocupe toda la altura */
        #central-content { height: 100% !important; display: flex; flex-direction: column; }
        
        /* Asegurar que el contenedor interno sea un flex-container para sus hijos */
        #regas-component-container { height: 100%; overflow: hidden; display: flex; flex-direction: column; }
        
        #shell-header-main { position: relative; z-index: 120; flex-shrink: 0; }
        #module-ribbon { position: relative; z-index: 110; flex-shrink: 0; }

        .shell-tab-v-btn.active {
            background-color: white;
            color: #0f172a;
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .regas-tab-btn.active { 
            background-color: #0f172a !important; 
            color: white !important; 
        }
    </style>

    <!-- ENCABEZADO FIJO -->
    <header id="shell-header-main" class="flex-shrink-0 bg-white border-b border-slate-100 p-4 md:px-10 shadow-sm">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-9 h-9 bg-red-800 rounded-xl flex items-center justify-center text-white shadow-xl shadow-red-800/20 rotate-3">
                    <i class="fa-solid fa-shield-halved text-sm"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                        Operación <span class="text-red-800">CIC Protection</span>
                    </h2>
                    <p class="text-slate-400 text-[7px] font-black uppercase tracking-[0.4em] mt-1 leading-none">Gestión de Personal y Reportes</p>
                </div>
            </div>

            <nav id="regas-tabs" class="flex items-center bg-slate-100/50 p-1.5 rounded-2xl border border-slate-200/50">
                <button id="tab-btn-VistaDia.html" onclick="loadRegAsModule('VistaDia.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">Vista Día</button>
                <button id="tab-btn-Planeacion.html" onclick="loadRegAsModule('Planeacion.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">Planeación</button>
                <button id="tab-btn-Reportes.html" onclick="loadRegAsModule('Reportes.html', this)" class="regas-tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">Reportes</button>
            </nav>
        </div>
    </header>

    <!-- CINTA DE HERRAMIENTAS (RIBBON) -->
    <div id="module-ribbon" class="flex-shrink-0 bg-slate-900 border-b border-slate-950 min-h-[64px] flex items-center shadow-lg relative overflow-hidden">
        <div id="ribbon-content" class="w-full flex items-center justify-between animate-in fade-in slide-in-from-top-1 duration-300 h-full">
            <!-- Contenido dinámico inyectado -->
        </div>
    </div>

    <!-- CONTENEDOR DE MÓDULOS -->
    <main id="regas-component-container" class="flex-1 bg-slate-50/20 overflow-hidden relative">
        <div class="flex items-center justify-center h-full opacity-20">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl text-red-800"></i>
        </div>
    </main>

    <!-- MODAL DE CONFIGURACIÓN DE CORREO -->
    <div id="shell-email-config-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl space-y-6 animate-in zoom-in duration-300 text-slate-900">
            <div class="flex items-center justify-between border-b border-slate-50 pb-4">
                <div>
                    <h3 class="text-lg font-black text-slate-900 uppercase tracking-tighter">Configurar <span class="text-red-800">Destinatarios</span></h3>
                </div>
                <button onclick="toggleEmailConfig(false)" class="text-slate-300 hover:text-slate-900"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setEmailDefaults()" class="py-2 border rounded-xl text-[8px] font-black uppercase hover:bg-slate-50 transition-all text-slate-600">Predeterminados</button>
                <button onclick="setEmailTestMode()" class="py-2 border rounded-xl text-[8px] font-black uppercase hover:bg-red-50 hover:text-red-800 transition-all text-slate-600">Modo Prueba</button>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[7px] font-black text-slate-400 uppercase ml-2">Para</label>
                    <textarea id="shell-to-input" rows="2" class="w-full bg-slate-50 border p-3 rounded-xl text-[9px] font-bold outline-none shadow-inner"></textarea>
                </div>
                <div class="space-y-1">
                    <label class="text-[7px] font-black text-slate-400 uppercase ml-2">CC</label>
                    <textarea id="shell-cc-input" rows="2" class="w-full bg-slate-50 border p-3 rounded-xl text-[9px] font-bold outline-none shadow-inner"></textarea>
                </div>
            </div>
            <button onclick="toggleEmailConfig(false)" class="w-full py-4 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase hover:bg-red-800">Cerrar y Guardar</button>
        </div>
    </div>

</div>

<script>
    let emailConfig = {
        to: "jesuseduardo.gutierrez@armur.com; juan.paniagua@armur.com",
        cc: "roberto.rodriguez@armur.com;josedavid.montano@armur.com"
    };

    const getDateInput = () => document.getElementById('global-report-date') || document.getElementById('view-date-input');

    function getAutoShift() {
        const hour = new Date().getHours();
        if (hour >= 7 && hour < 13) return 'M';
        if (hour >= 13 && hour < 21) return 'V';
        return 'N';
    }

    window.changeDay = (delta) => {
        const dateInput = getDateInput();
        if(!dateInput) return;
        const d = new Date(dateInput.value + 'T00:00:00');
        d.setDate(d.getDate() + delta);
        dateInput.value = d.toISOString().split('T')[0];
        if (window.syncAndLoad) window.syncAndLoad();
        else if (window.loadDailyView) window.loadDailyView();
    };

    const ribbonConfigs = {
        'VistaDia.html': `
            <div class="flex items-center justify-between w-full px-10">
                <div class="flex items-center gap-6">
                    <!-- Selector de Fecha -->
                    <div class="flex items-center gap-2 bg-slate-800 p-1 rounded-xl border border-slate-700 shadow-inner">
                        <button onclick="window.changeDay?.(-1)" class="w-8 h-8 rounded-lg bg-slate-700 text-slate-300 hover:text-white hover:bg-red-800 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
                        <input type="date" id="view-date-input" onchange="window.loadDailyView?.()" class="bg-transparent text-[10px] font-black text-white outline-none cursor-pointer px-2">
                        <button onclick="window.changeDay?.(1)" class="w-8 h-8 rounded-lg bg-slate-700 text-slate-300 hover:text-white hover:bg-red-800 transition-all"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>

                    <!-- Selector de Turnos / Pestañas de Vista Día -->
                    <div class="flex items-center bg-slate-800 p-1 rounded-xl border border-slate-700 shadow-inner gap-1">
                        <button onclick="window.switchActiveTab?.('I')" id="shell-tab-I" class="shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all bg-white text-slate-900">Inicio</button>
                        <button onclick="window.switchActiveTab?.('M')" id="shell-tab-M" class="shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white">Matutino</button>
                        <button onclick="window.switchActiveTab?.('V')" id="shell-tab-V" class="shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white">Vespertino</button>
                        <button onclick="window.switchActiveTab?.('N')" id="shell-tab-N" class="shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white">Nocturno</button>
                        <button onclick="window.switchActiveTab?.('ABS')" id="shell-tab-ABS" class="shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all text-red-400 hover:bg-red-900/30">Ausentismos</button>
                    </div>
                </div>
                
                <button onclick="window.openProfilesPanel?.()" class="px-5 py-2.5 bg-red-800 text-white rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-red-700 transition-all flex items-center gap-3 shadow-lg shadow-red-900/20 active:scale-95">
                    <i class="fa-solid fa-users-viewfinder"></i>
                    <span>Asignar Personal</span>
                </button>
            </div>
        `,
        'Planeacion.html': `
            <div class="flex w-full h-full">
                <div class="w-[320px] bg-slate-950 border-r border-slate-800 flex items-center px-8 shrink-0">
                    <div class="flex items-center gap-3">
                         <i class="fa-solid fa-calendar-days text-red-500 text-xs"></i>
                         <span class="text-[10px] font-black uppercase text-white tracking-[0.2em]">Planeación</span>
                    </div>
                </div>
                <div id="ribbon-sync-header" class="flex-1 overflow-hidden flex items-center bg-slate-900">
                    <div id="ribbon-date-row" class="flex h-full items-center"></div>
                </div>
            </div>
        `,
        'Reportes.html': `
            <div class="flex items-center justify-between w-full px-10">
                <div class="flex items-center gap-4">
                    <div class="flex flex-col">
                        <label class="text-[7px] font-black text-white/40 uppercase mb-1 ml-1 tracking-widest">Fecha</label>
                        <input type="date" id="global-report-date" onchange="window.syncAndLoad?.()" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-1.5 text-[10px] font-bold text-white outline-none focus:border-red-800 transition-all shadow-inner">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[7px] font-black text-white/40 uppercase mb-1 ml-1 tracking-widest">Turno</label>
                        <select id="report-shift" onchange="window.syncAndLoad?.()" class="bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-1.5 text-[10px] font-bold outline-none cursor-pointer shadow-inner">
                            <option value="M">Matutino</option>
                            <option value="V">Vespertino</option>
                            <option value="N">Nocturno</option>
                        </select>
                    </div>
                    <div class="flex bg-slate-800 p-1 rounded-xl border border-slate-700 mt-4 shadow-inner">
                        <button id="tab-whatsapp" onclick="window.switchReportTab?.('whatsapp')" class="px-4 py-1.5 rounded-lg text-[8px] font-black uppercase bg-white text-slate-900 shadow-md">WhatsApp</button>
                        <button id="tab-daily" onclick="window.switchReportTab?.('daily')" class="px-4 py-1.5 rounded-lg text-[8px] font-black uppercase text-white/40 hover:text-white transition-colors">Diario</button>
                        <button id="tab-excel" onclick="window.switchReportTab?.('excel')" class="px-4 py-1.5 rounded-lg text-[8px] font-black uppercase text-white/40 hover:text-white transition-colors">Excel</button>
                    </div>
                </div>
                <div id="ribbon-report-extras" class="flex items-center gap-2 mt-4">
                    <button onclick="toggleEmailConfig(true)" class="p-2.5 bg-slate-800 border border-slate-700 text-white/40 hover:text-white rounded-xl transition-all shadow-inner"><i class="fa-solid fa-cog"></i></button>
                    <button id="shell-btn-send" onclick="window.sendEmailFromShell()" class="bg-red-800 text-white px-5 py-2.5 rounded-xl text-[8px] font-black uppercase hover:bg-red-700 shadow-lg transition-all active:scale-95 flex items-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i> <span>Enviar Correo</span>
                    </button>
                </div>
            </div>
        `
    };

    window.updateShellTabUI = (activeTabId) => {
        document.querySelectorAll('.shell-tab-v-btn').forEach(btn => {
            if (btn.id === `shell-tab-${activeTabId}`) {
                btn.className = "shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all bg-white text-slate-900 scale-105 shadow-md";
            } else if (btn.id === 'shell-tab-ABS') {
                btn.className = "shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all text-red-400 hover:bg-red-900/30";
            } else {
                btn.className = "shell-tab-v-btn px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white";
            }
        });
    };

    window.openProfilesPanel = () => {
        if (typeof window.loadRightContent === 'function') {
            window.loadRightContent('Apps/Perfiles.html');
        }
    };

    window.toggleEmailConfig = (show) => {
        const modal = document.getElementById('shell-email-config-modal');
        if (show) {
            document.getElementById('shell-to-input').value = emailConfig.to;
            document.getElementById('shell-cc-input').value = emailConfig.cc;
            modal.classList.remove('hidden');
        } else {
            emailConfig.to = document.getElementById('shell-to-input').value.trim();
            emailConfig.cc = document.getElementById('shell-cc-input').value.trim();
            modal.classList.add('hidden');
        }
    };

    window.setEmailDefaults = () => {
        document.getElementById('shell-to-input').value = "jesuseduardo.gutierrez@armur.com; juan.paniagua@armur.com";
        document.getElementById('shell-cc-input').value = "roberto.rodriguez@armur.com;josedavid.montano@armur.com";
    };

    window.setEmailTestMode = () => {
        document.getElementById('shell-to-input').value = "proteccion.instalaciones@armur.com";
        document.getElementById('shell-cc-input').value = "";
    };

    async function loadRegAsModule(file, btn) {
        localStorage.setItem('lastRegAsSubModule', file);
        const container = document.getElementById('regas-component-container');
        const ribbon = document.getElementById('ribbon-content');
        const path = `Apps/Componentes/RegAs_PP/${file}`;
        
        ribbon.innerHTML = ribbonConfigs[file] || '<p class="text-white/20 text-[9px] uppercase font-black px-10">Módulo sin controles</p>';
        document.querySelectorAll('.regas-tab-btn').forEach(b => { b.classList.remove('active'); });
        if (btn) btn.classList.add('active');

        try {
            const response = await fetch(path);
            if (response.ok) {
                const html = await response.text();
                container.innerHTML = "";
                // Usar fragmento contextual para asegurar que los <script> se ejecuten
                const fragment = document.createRange().createContextualFragment(html);
                container.appendChild(fragment);
                
                const now = new Date();
                const localDate = now.toLocaleDateString('en-CA');
                const dateInp = document.getElementById('global-report-date') || document.getElementById('view-date-input');
                if(dateInp) dateInp.value = localDate;

                const shiftInp = document.getElementById('report-shift');
                if (shiftInp) shiftInp.value = getAutoShift();

                // Dar un breve tiempo para que los scripts del módulo se registren en window
                setTimeout(() => { 
                    if (window.syncAndLoad) window.syncAndLoad(); 
                    else if (window.loadDailyView) window.loadDailyView(); 
                }, 150);
            }
        } catch (e) { console.error("Error cargando sub-módulo:", e); }
    }

    window.sendEmailFromShell = async () => {
        if (typeof window.generateEmailHtml !== 'function') return;
        const rawContent = window.generateEmailHtml();
        const emailBody = `
            <div style="background-color: #f1f5f9; padding: 30px 10px; font-family: 'Segoe UI', Arial, sans-serif;">
                <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 700px; background-color: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; border-collapse: separate; overflow: hidden;">
                    <tr><td style="background-color: #991b1b; padding: 25px; text-align: center;">
                        <h1 style="color: #ffffff; margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; font-weight: 900;">REPORTE DE OPERACIÓN CIC</h1>
                    </td></tr>
                    <tr><td style="padding: 20px;">${rawContent}</td></tr>
                    <tr><td style="padding: 15px; text-align: center; background-color: #f8fafc; border-top: 1px solid #f1f5f9; font-size: 9px; color: #94a3b8; font-weight: bold; text-transform: uppercase;">Generado automáticamente por el Sistema CIC Protection</td></tr>
                </table>
            </div>
        `;

        const btn = document.getElementById('shell-btn-send');
        if(!btn) return;
        const btnText = btn.querySelector('span');
        btn.disabled = true; btnText.innerText = "Enviando...";

        const apiURL = "https://default3b2cbccb81bb44a2a19a2386bb3606.02.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/507bea91c30c4743b4749a474f92ad3f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PzEbbL5wNoHu-b78wQtE7JP0H-RKDb3btp2iHGbM6vU";

        try {
            const response = await fetch(apiURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to: emailConfig.to, cc: emailConfig.cc, body: emailBody })
            });
            if (response.ok) {
                btnText.innerText = "¡Enviado!";
                btn.classList.replace('bg-red-800', 'bg-emerald-600');
                setTimeout(() => { btnText.innerText = "Enviar Correo"; btn.classList.replace('bg-emerald-600', 'bg-red-800'); btn.disabled = false; }, 3000);
            } else throw new Error();
        } catch (e) {
            btnText.innerText = "Error"; btn.classList.replace('bg-red-800', 'bg-orange-600');
            setTimeout(() => { btnText.innerText = "Enviar Correo"; btn.classList.replace('bg-orange-600', 'bg-red-800'); btn.disabled = false; }, 3000);
        }
    };

    (function initRegAsShell() {
        const lastFile = localStorage.getItem('lastRegAsSubModule') || 'VistaDia.html';
        setTimeout(() => {
            const btn = document.getElementById(`tab-btn-${lastFile}`) || document.querySelector('.regas-tab-btn');
            loadRegAsModule(lastFile, btn);
        }, 50);
    })();
</script>

<style>
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.8; cursor: pointer; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    select option { background-color: #1e293b; color: white; padding: 10px; }
    #ribbon-sync-header::-webkit-scrollbar { display: none; }
</style>
