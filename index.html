<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIC - Protección Patrimonial</title>
    
    <!-- Tipografía Profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#720000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CIC Patrimonial">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/192/720000/shield.png">

    <style>
        :root {
            --corporate-red: #720000;
            --dark-red: #4a0000;
            --gold-accent: #c5a059;
            --slate-gray: #1e293b;
            --border-color: #e2e8f0;
            --bg-body: #f1f5f9;
            --sidebar-width: 280px;
            --side-app-width: 400px;
            --header-height: 65px;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            overflow: hidden;
            color: var(--slate-gray);
        }

        .hidden { display: none !important; }

        /* --- PANTALLAS --- */
        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
        }
        
        .screen.active {
            display: flex;
        }

        #screen-loading.active,
        #screen-login.active {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        #screen-app.active {
            flex-direction: column;
        }

        /* --- LOGO SVG ESTILIZADO --- */
        .cic-logo-svg {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        .cic-logo-svg:hover { transform: scale(1.05); }

        /* --- LOGIN --- */
        .login-card { 
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            width: 90%; 
            max-width: 420px; 
            padding: 3rem; 
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .login-logo-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        .login-title {
            font-weight: 900;
            font-size: 1.75rem;
            color: #0f172a;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .login-subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
        }

        .login-input {
            width: 100%;
            padding: 1.1rem 1.4rem;
            margin-bottom: 1.25rem;
            border: 2px solid #f1f5f9;
            border-radius: 1.25rem;
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .login-input:focus {
            border-color: var(--corporate-red);
            background: white;
            box-shadow: 0 0 0 4px rgba(114, 0, 0, 0.1);
        }

        .btn-login { 
            background: linear-gradient(135deg, var(--corporate-red), var(--dark-red));
            color: white; 
            width: 100%; 
            padding: 1.2rem; 
            border-radius: 1.25rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(114, 0, 0, 0.3);
        }

        /* --- ENCABEZADO --- */
        header {
            background: var(--corporate-red);
            color: white;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
            position: relative;
        }

        .header-left { display: flex; align-items: center; gap: 1.25rem; }
        .menu-toggle { display: none; background: rgba(255,255,255,0.15); border: none; color: white; width: 42px; height: 42px; border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; transition: background 0.2s; }
        .menu-toggle:hover { background: rgba(255,255,255,0.25); }

        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 0.85rem; 
            cursor: pointer; 
        }

        .logo-container span { 
            font-weight: 900; 
            font-size: 1.65rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: white; 
            background: linear-gradient(to bottom, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-center h1 { 
            font-size: 0.85rem; 
            font-weight: 800; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            color: rgba(255,255,255,0.8); 
            text-align: center; 
        }

        .header-right { display: flex; align-items: center; gap: 1.25rem; }

        /* --- MENÚ BENTO --- */
        .launcher-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .launcher-btn:hover { background: white; color: var(--corporate-red); }

        .app-menu {
            position: absolute;
            top: 70px;
            right: 1.5rem;
            background: white;
            width: 340px;
            border-radius: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            padding: 1.75rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1100;
            border: 1px solid var(--border-color);
        }

        .launcher-container.active .app-menu { opacity: 1; visibility: visible; transform: translateY(0); }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            padding: 1.15rem;
            border-radius: 1.25rem;
            cursor: pointer;
            color: var(--slate-gray);
            text-decoration: none;
            transition: all 0.2s;
        }

        .menu-item:hover { background: #f1f5f9; transform: translateY(-3px); }

        .menu-item .icon {
            width: 46px;
            height: 46px;
            background: #f8fafc;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--corporate-red);
            transition: all 0.2s;
            position: relative;
        }

        .menu-item:hover .icon { background: var(--corporate-red); color: white; box-shadow: 0 8px 16px rgba(114,0,0,0.2); }
        .menu-item span { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; text-align: center; letter-spacing: 0.5px; }

        .badge { position: absolute; top: -3px; right: -3px; width: 12px; height: 12px; background: #ff4757; border-radius: 50%; border: 2px solid white; display: none; }
        .badge.active { display: block; animation: pulse-red 2s infinite; }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        /* --- LAYOUT --- */
        .main-wrapper { display: flex; flex: 1; position: relative; width: 100%; overflow: hidden; }
        aside#sidebar-left { width: var(--sidebar-width); background: white; border-right: 1px solid var(--border-color); z-index: 500; transition: transform var(--transition-speed) ease; }
        .nav-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 450; backdrop-filter: blur(8px); }
        aside#sidebar-right { width: 0; background: white; transition: width var(--transition-speed) cubic-bezier(0.19, 1, 0.22, 1); display: flex; flex-direction: column; z-index: 600; overflow: hidden; }
        aside#sidebar-right.active { width: var(--side-app-width); border-left: 1px solid var(--border-color); }
        .panel-center { flex: 1; background: var(--bg-body); padding: 1.5rem; display: flex; flex-direction: column; overflow: hidden; }
        .canvas-area { flex: 1; background: white; border-radius: 1.5rem; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .header-center { display: none; }
            .menu-toggle { display: flex; }
            aside#sidebar-left { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); z-index: 1200; height: 100vh; }
            aside#sidebar-left.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.3); }
            .nav-overlay.active { display: block; }
            aside#sidebar-right.active { width: 100vw; position: fixed; inset: 0; z-index: 1300; }
            .panel-center { padding: 1rem; }
            .app-menu { right: 1rem; width: calc(100vw - 2rem); max-width: 360px; }
        }

        /* --- AVATAR & POPUP --- */
        .avatar-container { position: relative; cursor: pointer; display: flex; align-items: center; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); overflow: hidden; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .avatar:hover { border-color: white; transform: scale(1.05); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .login-popup { position: absolute; top: 60px; right: 0; background: white; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.15); display: none; min-width: 240px; z-index: 1100; border: 1px solid var(--border-color); }
        .login-popup h4 { font-size: 0.9rem; font-weight: 800; margin-bottom: 1.25rem; color: #0f172a; text-align: center; }
        .avatar-container:hover .login-popup { display: block; }

        iframe { width: 100%; height: 100%; border: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- PANTALLA CARGA -->
    <div id="screen-loading" class="screen active">
        <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <!-- PANTALLA LOGIN -->
    <div id="screen-login" class="screen">
        <div class="login-card">
            <div class="login-logo-container">
                <!-- LOGO CIC PROTECCIÓN PATRIMONIAL -->
                <svg width="100" height="100" viewBox="0 0 100 100" class="cic-logo-svg">
                    <defs>
                        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#720000;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#4a0000;stop-opacity:1" />
                        </linearGradient>

                            <stop offset="0%" style="stop-color:#f8e2a1;stop-opacity:1" />

                    <path d="M50 5 L15 20 V50 C15 70 50 90 50 95 C50 90 85 70 85 50 V20 L50 5Z" fill="url(#shieldGrad)" />

                    <text x="50" y="58" font-family="Inter, sans-serif" font-weight="900" font-size="22" fill="url(#goldGrad)" text-anchor="middle">CIC</text>

            <h1 class="login-title">Sistema CIC</h1>

                <button type="submit" id="login-submit" class="btn-login">Ingresar al Sistema</button>

        </div>
    </div>

    <!-- PANTALLA APLICACIÓN -->
    <div id="screen-app" class="screen">
        <header id="main-header">
            <div class="header-left">
                <button class="menu-toggle" onclick="toggleNav()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="logo-container" onclick="loadInMain('Home')">
                    <svg width="32" height="32" viewBox="0 0 100 100" style="vertical-align: middle;">
                        <path d="M50 5 L15 20 V50 C15 70 50 90 50 95 C50 90 85 70 85 50 V20 L50 5Z" fill="#ffffff" />
                        <path d="M50 20 L25 32 V50 C25 65 50 80 50 82 C50 80 75 65 75 50 V32 L50 20Z" fill="var(--corporate-red)" />
                        <text x="50" y="58" font-family="Inter, sans-serif" font-weight="900" font-size="24" fill="white" text-anchor="middle">C</text>
                    </svg>
                    <span>CIC</span>
                </div>
            </div>

            <div class="header-center">
                <h1 id="app-dynamic-title">Protección Patrimonial</h1>
            </div>

            <div class="header-right">
                <!-- LANZADOR BENTO -->
                <div class="launcher-container" id="launcher">
                    <button class="launcher-btn" onclick="toggleLauncher(event)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                    </button>
                    <div class="app-menu">
                        <div class="menu-item" onclick="loadInSideApp('WhatsApp')">
                            <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
                            <span>WhatsApp</span>
                        </div>
                        <div class="menu-item" onclick="loadInSideApp('Correo')">
                            <div class="icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

                        <div class="menu-item" onclick="loadInSideApp('Areas')">
                            <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>

                    </div>
                </div>

                <!-- BOTÓN CONFIGURACIÓN -->
                <button class="launcher-btn" onclick="loadInMain('Configuracion')">

                <div class="canvas-area">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "AIzaSyCmyzbw7csEtZkPqV89OMaM4cXDpG6O930", 
            authDomain: "cic-pp.firebaseapp.com", 
            projectId: "cic-pp", 
            appId: "1:336771827172:web:ff43891fd9b0fcaca073f1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cic-pp';

        // --- MAPEO DE RUTAS PARA ENLACES DIRECTOS (Custom URLs) ---
        // Puedes configurar el nombre de la herramienta cambiando el valor de 'name'
        const TOOL_ROUTES = {
            'reloj': { path: 'Navegacion/RegistrosDeAcceso/Herramientas/RelojChecador.html', name: 'Reloj Checador Biométrico' },
            'alertas': { path: 'Apps/Alertas.html', name: 'Centro de Alertas Operativas' },
            'siniestros': { path: 'Navegacion/RegistroDeSiniestros/RegSin.html', name: 'Registro de Siniestros' },
            'contador': { path: 'Navegacion/RegistrosDeAcceso/Herramientas/Contador.html', name: 'Contador de Ingresos' },
            'home': { path: 'Apps/Home.html', name: 'Protección Patrimonial' }
        };

        // Rutas de estado
        const getPrivatePath = (uid) => doc(db, 'artifacts', appId, 'users', uid, 'settings', 'state');

        const normalizePath = (n) => {
            if (!n || n === 'about:blank') return '';
            if (n.includes('.html')) return n;
            return `Apps/${n}.html`;
        };

        const showScreen = (name) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + name);
            if(target) target.classList.add('active');
        };

        window.toggleNav = () => {
            const side = document.getElementById('sidebar-left');
            const over = document.getElementById('overlay');
            if (side && over) {
                side.classList.toggle('open');
                over.classList.toggle('active');
            }
        };

        window.toggleLauncher = (e) => {
            e.stopPropagation();
            document.getElementById('launcher').classList.toggle('active');
        };

        document.addEventListener('click', () => {
            const launcher = document.getElementById('launcher');
            if (launcher) launcher.classList.remove('active');
        });

        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('login-submit');
            
            btn.disabled = true;
            btn.innerText = 'Autenticando...';
            
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
            } catch (err) { 
                alert("Credenciales no válidas.");
                btn.disabled = false;
                btn.innerText = 'Ingresar al Sistema';
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const publicRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                onSnapshot(publicRef, (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        document.getElementById('user-display-name').innerText = d.name || user.email;
                        
                        if(d.roleId === 'administrador') {
                            document.getElementById('menu-users').classList.remove('hidden');
                        } else {
                            document.getElementById('menu-users').classList.add('hidden');
                        }

                        if (d.photo) {
                            const img = document.getElementById('header-avatar-img');
                            img.src = d.photo;
                            img.classList.remove('hidden');
                            document.getElementById('header-avatar-svg').classList.add('hidden');
                        }
                    } else {
                        document.getElementById('user-display-name').innerText = user.email;
                    }
                    showScreen('app');
                    handleInitialRouting(user.uid);
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance_day'), (snap) => {
                    const dot = document.getElementById('alerts-dot');
                    if (snap.docs.length > 0) dot.classList.add('active');
                    else dot.classList.remove('active');
                });

            } else { 
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                showScreen('login'); 
            }
        });

        // Lógica de enrutamiento inicial (Deep Links + Restore State)
        const handleInitialRouting = async (uid) => {
            const urlParams = new URLSearchParams(window.location.search);
            const toolKey = urlParams.get('tool');
            
            // 1. Prioridad: URL personalizada (?tool=reloj)
            if (toolKey && TOOL_ROUTES[toolKey]) {
                const tool = TOOL_ROUTES[toolKey];
                document.getElementById('main-frame').src = tool.path;
                document.getElementById('app-dynamic-title').innerText = tool.name; // Configuración de nombre visual
                
                // Si es un modo herramienta pura, podemos ocultar elementos (opcional)
                if (urlParams.get('view') === 'pure') {
                    document.getElementById('main-header').classList.add('hidden');
                    document.getElementById('sidebar-left').classList.add('hidden');
                    document.querySelector('.panel-center').style.padding = '0';
                    document.querySelector('.canvas-area').style.borderRadius = '0';
                    document.querySelector('.canvas-area').style.border = 'none';
                }
                return;
            }

            // 2. Restaurar estado previo si no hay URL personalizada
            restoreState(uid);
        };

        const saveState = async (mainPath, sidePath, sideTitle) => {
            if (!auth.currentUser) return;
            // No guardamos estado si estamos en una vista de herramienta directa para no romper la navegación habitual
            if (new URLSearchParams(window.location.search).has('tool')) return;

            try {
                const stateRef = getPrivatePath(auth.currentUser.uid);
                await setDoc(stateRef, {
                    mainPath: mainPath || '',
                    sidePath: sidePath || '',
                    sideTitle: sideTitle || '',
                    updatedAt: new Date().toISOString()
                }, { merge: true });
            } catch (e) { console.error("Error saving state:", e); }
        };

        const restoreState = async (uid) => {
            try {
                const stateRef = getPrivatePath(uid);
                const snap = await getDoc(stateRef);
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.mainPath) {
                        document.getElementById('main-frame').src = data.mainPath;
                        // Intentar restaurar el título del header si es una ruta conocida
                        const toolEntry = Object.values(TOOL_ROUTES).find(t => t.path === data.mainPath);
                        if (toolEntry) document.getElementById('app-dynamic-title').innerText = toolEntry.name;
                    }
                    else document.getElementById('main-frame').src = 'Apps/Home.html';

                    if (data.sidePath && data.sidePath !== 'about:blank') {
                        window.loadInSideApp(data.sidePath, true);
                    }
                } else {
                    document.getElementById('main-frame').src = 'Apps/Home.html';
                }
            } catch (e) { 
                console.error("Error restoring state:", e);
                document.getElementById('main-frame').src = 'Apps/Home.html';
            }
        };

        window.handleLogout = () => signOut(auth);

        window.loadInMain = (n, skipSave = false) => {
            const fullPath = normalizePath(n);
            document.getElementById('main-frame').src = fullPath;
            
            // Actualizar título del header dinámicamente
            const toolEntry = Object.values(TOOL_ROUTES).find(t => t.path === fullPath);
            if (toolEntry) {
                document.getElementById('app-dynamic-title').innerText = toolEntry.name;
            } else {
                const cleanTitle = n.replace(/Apps\//, '').replace(/\.html/, '').replace(/([A-Z])/g, ' $1').trim();
                document.getElementById('app-dynamic-title').innerText = cleanTitle || "Protección Patrimonial";
            }

            if(window.innerWidth <= 1024) {
                const side = document.getElementById('sidebar-left');
                if (side && side.classList.contains('open')) toggleNav();
            }
            closeSideApp(skipSave);
            if (!skipSave) saveState(fullPath, null, null);
        };

        window.loadInSideApp = (n, skipSave = false, params = '') => {
            const launcher = document.getElementById('launcher');
            if (launcher) launcher.classList.remove('active');
            
            const side = document.getElementById('sidebar-right');
            const frame = document.getElementById('side-app-frame');
            const fullPath = normalizePath(n) + params;
            
            const cleanTitle = n.replace(/Apps\//, '').replace(/\.html/, '').replace(/([A-Z])/g, ' $1').trim();
            document.getElementById('side-app-title').innerText = cleanTitle;
            
            frame.src = fullPath;
            side.classList.add('active');
            
            if (!skipSave) saveState(null, normalizePath(n), cleanTitle);
        };

        window.closeSideApp = (skipSave = false) => {
            const side = document.getElementById('sidebar-right');
            if (side) side.classList.remove('active');
            setTimeout(() => { 
                const frame = document.getElementById('side-app-frame');
                if (frame) frame.src = "about:blank"; 
            }, 300);
            if (!skipSave) saveState(null, 'about:blank', '');
        };

        window.addEventListener('message', (e) => {
            if (e.data.type === 'LOAD_NAV') {
                window.loadInMain(e.data.path);
            }
            
            if (e.data.type === 'LOAD_SIDE_APP') {
                window.loadInSideApp(e.data.app, false, e.data.params || '');
            }
        });
    </script>
</body>
</html>
