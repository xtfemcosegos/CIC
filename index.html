<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protección Patrimonial - CIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at top right, #fff5f5 0%, #ffffff 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        #login-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        #app-main { height: calc(100vh - 4rem - 2rem); }
        .avatar-group:hover #avatar-dropdown { display: block; }

        @media (max-width: 768px) {
            .mobile-panel {
                position: fixed;
                top: 0;
                bottom: 0;
                z-index: 100;
                width: 100% !important;
                box-shadow: none;
            }
            #left-panel { left: 0; }
            #right-panel { right: 0; }
        }

        /* Clase para ocultar módulos cargados en segundo plano (Keep-Alive) */
        .module-container.hidden-module {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- PANTALLA DE INICIO DE SESIÓN -->
    <div id="login-screen" class="p-6">
        <div class="w-full max-w-md space-y-12 text-center">
            <div class="space-y-4">
                <div class="inline-block p-6 bg-slate-50 rounded-[3rem] shadow-sm border border-slate-100 mb-2">
                    <!-- Logo CIC - Ruta corregida -->
                    <img src="Multimedia/Logo.png" alt="Logo CIC" class="h-16 w-auto object-contain mx-auto" onerror="this.src='https://via.placeholder.com/150?text=CIC'">
                </div>
                <h2 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                    Acceso al <span class="text-red-800 tracking-widest">CIC</span>
                </h2>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.3em]">Identificación Requerida</p>
            </div>

            <form id="login-form" class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block ml-1">Correo Institucional</label>
                    <input id="login-email" type="email" required placeholder="usuario@cic.com.mx" class="w-full bg-slate-50 border border-slate-200 p-5 rounded-2xl text-sm font-bold outline-none focus:border-red-800 focus:bg-white transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block ml-1">Contraseña</label>
                    <input id="login-password" type="password" required placeholder="••••••••••••" class="w-full bg-slate-50 border border-slate-200 p-5 rounded-2xl text-sm font-bold outline-none focus:border-red-800 focus:bg-white transition-all">
                </div>
                <div id="login-error" class="hidden text-[10px] font-black text-red-600 bg-red-50 p-4 rounded-xl uppercase tracking-widest text-center">
                    Credenciales inválidas
                </div>
                <button id="login-submit" type="submit" class="w-full bg-slate-900 text-white p-5 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-xl shadow-slate-200 mt-6 flex items-center justify-center gap-2">
                    <span>Entrar al Sistema</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ENCABEZADO -->
    <header id="app-header" class="hidden h-16 bg-white/95 backdrop-blur-md border-b border-gray-200 flex-shrink-0 z-50 px-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2 md:gap-4 w-1/3 md:w-1/4">
            <button id="toggle-left-btn" onclick="toggleLeftPanel()" class="p-2 text-slate-500 hover:text-red-800 hover:bg-slate-50 rounded-xl transition-all">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <!-- Logo CIC Header - Ruta corregida -->
            <div class="flex items-center h-8 md:h-10 overflow-hidden cursor-pointer" onclick="loadContent('home.html')">
                <img src="Multimedia/Logo.png" alt="Logo CIC" class="object-contain h-full" onerror="this.outerHTML='<div class=\'bg-slate-900 text-white px-3 py-1 rounded-lg font-black text-[10px] md:text-sm cursor-pointer tracking-tighter\'>CIC</div>'">
            </div>
        </div>

        <div class="flex-1 text-center">
            <h1 class="text-xs md:text-xl font-black text-slate-900 tracking-tighter uppercase flex items-center justify-center gap-2">
                <span class="text-red-800 hidden md:inline">●</span>
                <span class="truncate">Protección Patrimonial</span>
            </h1>
        </div>

        <div class="w-1/3 md:w-1/4 flex justify-end items-center gap-1 md:gap-2">
            <!-- Botón de Usuarios reducido solo a icono -->
            <button id="admin-nav-btn" onclick="loadContent('adminUser.html')" class="hidden items-center justify-center w-10 h-10 text-slate-500 hover:text-red-800 hover:bg-red-50 rounded-xl transition-all group" title="Administrar Usuarios">
                <i data-lucide="users" class="w-5 h-5"></i>
            </button>
            
            <div class="relative avatar-group ml-1 h-full flex items-center group">
                <div class="flex items-center h-full px-1 md:px-2 cursor-pointer">
                    <div class="flex items-center p-0.5 rounded-full border border-slate-200 group-hover:border-red-800 group-hover:shadow-md transition-all bg-white overflow-hidden relative w-8 h-8 md:w-10 md:h-10">
                        <div id="user-avatar-circle" class="w-full h-full bg-slate-900 rounded-full flex items-center justify-center text-white overflow-hidden relative">
                            <i id="header-avatar-icon" data-lucide="user" class="w-4 h-4 md:w-5 md:h-5 text-white/50"></i>
                            <img id="header-avatar-img" class="hidden absolute inset-0 w-full h-full object-cover">
                        </div>
                    </div>
                </div>
                
                <div id="avatar-dropdown" class="hidden absolute right-0 top-[100%] w-56 md:w-60 bg-white border border-slate-200 rounded-2xl md:rounded-[2rem] shadow-2xl py-2 z-50 overflow-hidden">
                    <div id="user-info-box" class="px-5 py-4 border-b border-slate-50 bg-slate-50/50">
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Sesión Activa</p>
                        <p id="user-display-name" class="text-[11px] font-black text-slate-900 truncate uppercase">Cargando...</p>
                    </div>
                    <div class="p-1.5 space-y-1">
                        <button onclick="loadContent('Perfil.html')" class="w-full flex items-center px-4 py-3 text-[10px] font-black uppercase tracking-widest text-slate-600 hover:bg-slate-50 hover:text-red-800 rounded-2xl transition-all">
                            <i data-lucide="user-cog" class="w-4 h-4 mr-3 opacity-60"></i> Mi Perfil
                        </button>
                        <button id="logout-nav-btn" class="w-full flex items-center px-4 py-3 text-[10px] font-black uppercase tracking-widest text-red-600 hover:bg-red-50 rounded-2xl transition-all">
                            <i data-lucide="log-out" class="w-4 h-4 mr-3"></i> Cerrar Sesión
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ÁREA DE CONTENIDO -->
    <main id="app-main" class="hidden flex flex-1 overflow-hidden relative">
        <aside id="left-panel" class="hidden md:flex mobile-panel flex-col w-72 min-w-[18rem] bg-slate-50 border-r border-slate-200 h-full overflow-hidden transition-all duration-300">
            <!-- Iframe para Nav.html - Ruta corregida -->
            <iframe src="Nav.html" frameborder="0" class="w-full h-full"></iframe>
        </aside>

        <section id="main-view" class="flex-1 bg-white overflow-hidden h-full z-10">
            <!-- Contenedor Keep-Alive -->
            <div id="central-content" class="w-full h-full relative"></div>
        </section>

        <!-- PANEL DERECHO DINÁMICO -->
        <aside id="right-panel" class="hidden mobile-panel flex-col md:w-[30%] min-w-[300px] bg-white border-l border-slate-200 shadow-2xl md:shadow-none h-full overflow-hidden transition-all duration-300">
            <div class="p-6 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                <h3 id="right-panel-title" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-900">Detalles</h3>
                <button onclick="toggleRightPanel(false)" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-800 hover:bg-red-50 transition-all">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex-1 overflow-hidden" id="right-panel-content">
                <iframe id="right-panel-iframe" src="" frameborder="0" class="w-full h-full"></iframe>
            </div>
        </aside>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer id="app-footer" class="hidden h-8 bg-slate-950 flex-shrink-0 z-[60] flex items-center justify-between px-4 md:px-6 border-t border-white/5 relative">
        <button onclick="toggleSyncModal(true)" class="flex items-center gap-3 hover:bg-white/5 px-2 rounded-lg transition-all group">
            <div id="sync-status-indicator" class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
            <p id="sync-status-text" class="text-[7px] md:text-[8px] font-black text-slate-400 uppercase tracking-widest group-hover:text-white transition-colors">Base Actualizada</p>
        </button>
        <p class="hidden sm:block text-[8px] font-black text-slate-600 uppercase tracking-[0.4em]">CIC — Protection System</p>
        <div class="text-[9px] text-slate-500 font-bold uppercase">v5.6.0</div>
    </footer>

    <!-- MODAL DE SINCRONIZACIÓN -->
    <div id="sync-details-modal" class="invisible opacity-0 fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl space-y-6 animate-in zoom-in duration-200">
            <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600">
                        <i data-lucide="database" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h4 class="text-xs font-black text-slate-900 uppercase tracking-widest">Sincronización Local</h4>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Estado del almacenamiento en caché</p>
                    </div>
                </div>
                <button onclick="toggleSyncModal(false)" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-50 hover:text-red-800 transition-all">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-2" id="sync-collection-status"></div>
                <div class="space-y-3">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Cambios Recientes</p>
                    <div id="sync-logs-container" class="max-h-60 overflow-y-auto custom-scrollbar space-y-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="py-10 text-center opacity-30 text-[9px] font-black uppercase">Sin cambios registrados</div>
                    </div>
                </div>
            </div>

            <div class="flex justify-center pt-2">
                <button onclick="syncDatabase(true)" class="px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-xl shadow-slate-200">
                    Forzar Sincronización Total
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
            authDomain: "cic5-pp.firebaseapp.com",
            projectId: "cic5-pp",
            storageBucket: "cic5-pp.firebasestorage.app",
            messagingSenderId: "577576116946",
            appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
            measurementId: "G-G02GSE321T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'cic5-pp';

        // --- GESTIÓN DE CACHÉ ---
        const DB_LOCAL = {
            users: [],
            stations: [],
            notices: [],
            lastSync: null,
            syncLogs: [],
            status: { users: 'none', stations: 'none', notices: 'none' }
        };

        const CacheManager = {
            STORAGE_KEY: 'CIC5_LOCAL_DB',
            init: function() {
                const stored = localStorage.getItem(this.STORAGE_KEY);
                if (stored) { Object.assign(DB_LOCAL, JSON.parse(stored)); return true; }
                return false;
            },
            save: function() {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(DB_LOCAL));
                DB_LOCAL.lastSync = new Date().toISOString();
                this.updateGlobalIndicator();
                this.renderSyncModalContent();
            },
            destroy: function() {
                localStorage.removeItem(this.STORAGE_KEY);
                localStorage.removeItem('lastLoadedModule');
            },
            log: function(msg, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                DB_LOCAL.syncLogs.unshift({ timestamp, msg, type });
                if (DB_LOCAL.syncLogs.length > 30) DB_LOCAL.syncLogs.pop();
            },
            updateGlobalIndicator: function() {
                const indicator = document.getElementById('sync-status-indicator');
                const textEl = document.getElementById('sync-status-text');
                if (!indicator || !textEl) return;
                const states = Object.values(DB_LOCAL.status);
                if (states.some(s => s === 'error')) {
                    indicator.className = "w-2 h-2 rounded-full bg-red-600";
                    textEl.innerText = "Error de sincronización";
                } else if (states.some(s => s === 'pending')) {
                    indicator.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
                    textEl.innerText = "Actualizando...";
                } else {
                    indicator.className = "w-2 h-2 rounded-full bg-emerald-500";
                    textEl.innerText = "Base Actualizada";
                }
            },
            renderSyncModalContent: function() {
                const logsCont = document.getElementById('sync-logs-container');
                const statusCont = document.getElementById('sync-collection-status');
                if (!logsCont || !statusCont) return;
                statusCont.innerHTML = Object.entries(DB_LOCAL.status).map(([name, state]) => `
                    <div class="p-3 border rounded-xl text-center ${state === 'success' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-50'}">
                        <p class="text-[7px] font-black uppercase">${name}</p>
                    </div>`).join('');
                logsCont.innerHTML = DB_LOCAL.syncLogs.map(l => `<div class="text-[9px] pb-2 border-b border-slate-50"><b>${l.timestamp}</b>: ${l.msg}</div>`).join('');
            }
        };

        // --- SINCRONIZACIÓN ---
        async function syncDatabase(forceFull = false) {
            const cols = ['users', 'stations', 'notices'];
            cols.forEach(c => DB_LOCAL.status[c] = 'pending');
            CacheManager.updateGlobalIndicator();
            const promises = cols.map(async (colName) => {
                try {
                    if (DB_LOCAL[colName].length > 0 && !forceFull) {
                        DB_LOCAL.status[colName] = 'success';
                        listenForUpdates(colName);
                        return;
                    }
                    const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', colName));
                    DB_LOCAL[colName] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    DB_LOCAL.status[colName] = 'success';
                    listenForUpdates(colName);
                } catch (e) { DB_LOCAL.status[colName] = 'error'; }
            });
            await Promise.all(promises);
            CacheManager.save();
        }

        function listenForUpdates(colName) {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', colName), (snap) => {
                snap.docChanges().forEach(change => {
                    const data = { id: change.doc.id, ...change.doc.data() };
                    if (change.type === "added" || change.type === "modified") {
                        const idx = DB_LOCAL[colName].findIndex(i => i.id === data.id);
                        if (idx > -1) DB_LOCAL[colName][idx] = data; else DB_LOCAL[colName].push(data);
                    }
                    if (change.type === "removed") DB_LOCAL[colName] = DB_LOCAL[colName].filter(i => i.id !== data.id);
                });
                CacheManager.save();
                if (colName === 'users') updateHeaderUI();
                if (colName === 'notices' && document.getElementById('notices-container-home')) loadNoticesFromLocal();
            });
        }

        // --- SISTEMA DE NAVEGACIÓN "KEEP-ALIVE" ---
        const loadedModules = new Map();

        window.loadContent = async (file) => {
            localStorage.setItem('lastLoadedModule', file);
            const container = document.getElementById('central-content');
            
            // Ocultar todos los módulos cargados anteriormente sin eliminarlos del DOM
            loadedModules.forEach(div => div.classList.add('hidden-module'));

            if (loadedModules.has(file)) {
                // Si el módulo ya fue cargado, simplemente lo mostramos para mantener su estado
                loadedModules.get(file).classList.remove('hidden-module');
                window.dispatchEvent(new CustomEvent('moduleShow', { detail: { file } }));
            } else {
                // Si es la primera vez que se llama, lo descargamos y creamos su contenedor único
                try {
                    const response = await fetch(file);
                    if (response.ok) {
                        const html = await response.text();
                        const moduleDiv = document.createElement('div');
                        // Generar ID único basado en la ruta para evitar colisiones
                        moduleDiv.id = `module-${file.replace(/\//g, '-').replace('.', '-')}`;
                        moduleDiv.className = "module-container w-full h-full";
                        
                        // Inyectar HTML procesando los scripts
                        moduleDiv.appendChild(document.createRange().createContextualFragment(html));
                        container.appendChild(moduleDiv);
                        loadedModules.set(file, moduleDiv);
                        
                        if (window.lucide) lucide.createIcons();
                        if (file === 'home.html') loadNoticesFromLocal();
                    }
                } catch (e) { console.error("Error cargando módulo:", e); }
            }
        };

        // --- SIDE PANEL CONTROLS ---
        window.loadRightContent = (path, title = "Detalles") => {
            const iframe = document.getElementById('right-panel-iframe');
            const titleEl = document.getElementById('right-panel-title');
            if (titleEl) titleEl.innerText = title;
            if (iframe) iframe.src = path;
            window.toggleRightPanel(true);
        };

        window.closeRightPanel = () => {
            window.toggleRightPanel(false);
            setTimeout(() => {
                document.getElementById('right-panel-iframe').src = "";
            }, 300);
        };

        window.toggleSyncModal = (show) => {
            const modal = document.getElementById('sync-details-modal');
            if (show) { modal.classList.remove('invisible', 'opacity-0'); CacheManager.renderSyncModalContent(); }
            else { modal.classList.add('invisible', 'opacity-0'); }
        };

        function updateHeaderUI() {
            const email = auth.currentUser?.email;
            const profile = DB_LOCAL.users?.find(u => u.email === email);
            if (profile) {
                document.getElementById('user-display-name').innerText = profile.name || email;
                document.getElementById('admin-nav-btn').classList.toggle('hidden', profile.role !== 'Administrador');
                if (profile.photo) {
                    const img = document.getElementById('header-avatar-img');
                    img.src = profile.photo; img.classList.remove('hidden');
                    document.getElementById('header-avatar-icon').classList.add('hidden');
                }
            }
        }

        function loadNoticesFromLocal() {
            const container = document.getElementById('notices-container-home');
            if (!container || !DB_LOCAL.notices) return;
            container.innerHTML = DB_LOCAL.notices.map(n => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm mb-4">
                    <h4 class="text-[11px] font-black uppercase text-slate-900 mb-2">${n.title}</h4>
                    <p class="text-[10px] text-slate-500">${n.message}</p>
                </div>`).join('');
        }

        window.toggleLeftPanel = (show) => {
            const lp = document.getElementById('left-panel');
            if (show === undefined) show = lp.classList.contains('hidden');
            if (show) { lp.classList.remove('hidden'); lp.classList.add('flex'); window.toggleRightPanel(false); }
            else { lp.classList.add('hidden'); lp.classList.remove('flex'); }
        };

        window.toggleRightPanel = (show) => {
            const rp = document.getElementById('right-panel');
            if (show === undefined) show = rp.classList.contains('hidden');
            if (show) { rp.classList.remove('hidden'); rp.classList.add('flex'); window.toggleLeftPanel(false); }
            else { rp.classList.add('hidden'); rp.classList.remove('flex'); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user && !user.isAnonymous) {
                ['app-header', 'app-main', 'app-footer'].forEach(id => document.getElementById(id).classList.remove('hidden'));
                document.getElementById('login-screen').style.display = 'none';
                const hasLocal = CacheManager.init();
                await syncDatabase(!hasLocal);
                updateHeaderUI();
                // Iniciar con home.html por defecto
                loadContent(localStorage.getItem('lastLoadedModule') || 'home.html');
            } else {
                ['app-header', 'app-main', 'app-footer'].forEach(id => document.getElementById(id).classList.add('hidden'));
                document.getElementById('login-screen').style.display = 'flex';
                if (!user) signInAnonymously(auth);
            }
        });

        document.getElementById('logout-nav-btn').onclick = async () => { 
            CacheManager.destroy(); await signOut(auth); location.reload(); 
        };

        const loginForm = document.getElementById('login-form');
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (error) { document.getElementById('login-error').classList.remove('hidden'); }
        };
    </script>
</body>
</html>
