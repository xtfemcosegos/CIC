<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIC - Protección Patrimonial</title>
    
    <!-- Tipografía Profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#720000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CIC Patrimonial">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/192/720000/shield.png">

    <style>
        :root {
            --corporate-red: #720000;
            --dark-red: #4a0000;
            --gold-accent: #c5a059;
            --slate-gray: #1e293b;
            --border-color: #e2e8f0;
            --bg-body: #f1f5f9;
            --sidebar-width: 280px;
            --side-app-width: 400px;
            --header-height: 65px;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            overflow: hidden;
            color: var(--slate-gray);
        }

        .hidden { display: none !important; }

        /* --- PANTALLAS --- */
        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
        }
        
        .screen.active {
            display: flex;
        }

        #screen-loading.active,
        #screen-login.active {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        #screen-app.active {
            flex-direction: column;
        }

        /* --- LOGO SVG --- */
        .cic-logo-svg {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        /* --- LOGIN --- */
        .login-card { 
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            width: 90%; 
            max-width: 420px; 
            padding: 3rem; 
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .login-logo-container { margin-bottom: 2rem; display: flex; justify-content: center; }
        .login-title { font-weight: 900; font-size: 1.75rem; color: #0f172a; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: -1px; }
        .login-subtitle { font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 2.5rem; }
        
        .login-input {
            width: 100%;
            padding: 1.1rem 1.4rem;
            margin-bottom: 1.25rem;
            border: 2px solid #f1f5f9;
            border-radius: 1.25rem;
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .login-input:focus { border-color: var(--corporate-red); background: white; box-shadow: 0 0 0 4px rgba(114, 0, 0, 0.1); }

        .btn-login { 
            background: linear-gradient(135deg, var(--corporate-red), var(--dark-red));
            color: white; 
            width: 100%; 
            padding: 1.2rem; 
            border-radius: 1.25rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        /* --- ENCABEZADO --- */
        header {
            background: var(--corporate-red);
            color: white;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
            position: relative;
        }

        .header-left { display: flex; align-items: center; gap: 1.25rem; }
        .menu-toggle { display: none; background: rgba(255,255,255,0.15); border: none; color: white; width: 42px; height: 42px; border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; }

        .logo-container { display: flex; align-items: center; gap: 0.85rem; cursor: pointer; }
        .logo-container span { font-weight: 900; font-size: 1.65rem; letter-spacing: 2px; text-transform: uppercase; color: white; }

        .header-center h1 { font-size: 0.85rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.8); text-align: center; }

        .header-right { display: flex; align-items: center; gap: 1.25rem; }

        /* --- MENÚ BENTO --- */
        .launcher-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .launcher-btn:hover { background: white; color: var(--corporate-red); }

        .app-menu {
            position: absolute;
            top: 70px;
            right: 1.5rem;
            background: white;
            width: 340px;
            border-radius: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            padding: 1.75rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1100;
            border: 1px solid var(--border-color);
        }

        .launcher-container.active .app-menu { opacity: 1; visibility: visible; transform: translateY(0); }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            padding: 1.15rem;
            border-radius: 1.25rem;
            cursor: pointer;
            color: var(--slate-gray);
            text-decoration: none;
            transition: all 0.2s;
        }

        .menu-item .icon {
            width: 46px;
            height: 46px;
            background: #f8fafc;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--corporate-red);
            transition: all 0.2s;
            position: relative;
        }

        .menu-item:hover { background: #f1f5f9; transform: translateY(-3px); }
        .menu-item:hover .icon { background: var(--corporate-red); color: white; }
        .menu-item span { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; text-align: center; letter-spacing: 0.5px; }

        /* --- LAYOUT --- */
        .main-wrapper { display: flex; flex: 1; position: relative; width: 100%; overflow: hidden; }
        aside#sidebar-left { width: var(--sidebar-width); background: white; border-right: 1px solid var(--border-color); z-index: 500; transition: transform var(--transition-speed) ease; }
        .nav-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 450; backdrop-filter: blur(8px); }
        aside#sidebar-right { width: 0; background: white; transition: width var(--transition-speed) cubic-bezier(0.19, 1, 0.22, 1); display: flex; flex-direction: column; z-index: 600; overflow: hidden; }
        aside#sidebar-right.active { width: var(--side-app-width); border-left: 1px solid var(--border-color); }
        .panel-center { flex: 1; background: var(--bg-body); padding: 1.5rem; display: flex; flex-direction: column; overflow: hidden; }
        .canvas-area { flex: 1; background: white; border-radius: 1.5rem; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        @media (max-width: 1024px) {
            .header-center { display: none; }
            .menu-toggle { display: flex; }
            aside#sidebar-left { position: fixed; inset: 0; width: 280px; transform: translateX(-100%); z-index: 1200; height: 100vh; }
            aside#sidebar-left.open { transform: translateX(0); }
            .nav-overlay.active { display: block; }
            aside#sidebar-right.active { width: 100vw; position: fixed; inset: 0; z-index: 1300; }
        }

        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); overflow: hidden; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .login-popup { position: absolute; top: 60px; right: 0; background: white; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.15); display: none; min-width: 240px; z-index: 1100; }
        .avatar-container:hover .login-popup { display: block; }

        iframe { width: 100%; height: 100%; border: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge { position: absolute; top: -3px; right: -3px; width: 12px; height: 12px; background: #ff4757; border-radius: 50%; border: 2px solid white; display: none; }
        .badge.active { display: block; }
    </style>
</head>
<body>

    <div id="screen-loading" class="screen active">
        <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <div id="screen-login" class="screen">
        <div class="login-card">
            <div class="login-logo-container">
                <svg width="100" height="100" viewBox="0 0 100 100" class="cic-logo-svg">
                    <defs>
                        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#720000" /><stop offset="100%" style="stop-color:#4a0000" />
                        </linearGradient>
                        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#f8e2a1" /><stop offset="100%" style="stop-color:#c5a059" />
                        </linearGradient>
                    </defs>
                    <path d="M50 5 L15 20 V50 C15 70 50 90 50 95 C50 90 85 70 85 50 V20 L50 5Z" fill="url(#shieldGrad)" />
                    <text x="50" y="58" font-family="Inter" font-weight="900" font-size="22" fill="url(#goldGrad)" text-anchor="middle">CIC</text>
                </svg>
            </div>
            <h1 class="login-title">Sistema CIC</h1>
            <p class="login-subtitle">Protección Patrimonial</p>
            <form id="login-form">
                <input type="email" id="login-email" class="login-input" placeholder="Correo corporativo" required>
                <input type="password" id="login-pass" class="login-input" placeholder="Contraseña" required>
                <button type="submit" id="login-submit" class="btn-login">Ingresar al Sistema</button>
            </form>
        </div>
    </div>

    <div id="screen-app" class="screen">
        <header id="main-header">
            <div class="header-left">
                <button class="menu-toggle" onclick="toggleNav()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="logo-container" onclick="loadInMain('Home')">
                    <svg width="32" height="32" viewBox="0 0 100 100"><path d="M50 5 L15 20 V50 C15 70 50 90 50 95 C50 90 85 70 85 50 V20 L50 5Z" fill="#ffffff" /><text x="50" y="58" font-family="Inter" font-weight="900" font-size="24" fill="var(--corporate-red)" text-anchor="middle">C</text></svg>
                    <span>CIC</span>
                </div>
            </div>
            <div class="header-center"><h1 id="app-dynamic-title">Protección Patrimonial</h1></div>
            <div class="header-right">
                <div class="launcher-container" id="launcher">
                    <button class="launcher-btn" onclick="toggleLauncher(event)">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                    </button>
                    <div class="app-menu">
                        <div class="menu-item" onclick="loadInSideApp('WhatsApp')"><div class="icon">WA</div><span>WhatsApp</span></div>
                        <div class="menu-item" onclick="loadInSideApp('Correo')"><div class="icon">✉️</div><span>Correo</span></div>
                        <div id="menu-users" class="menu-item hidden" onclick="loadInSideApp('Perfiles')"><div class="icon">👤</div><span>Perfiles</span></div>
                        <div class="menu-item" onclick="loadInSideApp('Areas')"><div class="icon">🗺️</div><span>Áreas</span></div>
                        <div class="menu-item" onclick="loadInSideApp('Bases')"><div class="icon">🏢</div><span>Bases</span></div>
                        <div class="menu-item" onclick="loadInSideApp('Alertas')"><div class="icon">🔔</div><span>Alertas</span></div>
                    </div>
                </div>
                <button class="launcher-btn" onclick="loadInMain('Configuracion')">⚙️</button>
                <div class="avatar-container">
                    <div class="avatar">
                        <img id="header-avatar-img" src="" class="hidden">
                        <span id="header-avatar-svg">👤</span>
                    </div>
                    <div class="login-popup">
                        <h4 id="user-display-name">Cargando...</h4>
                        <button class="btn-login" style="padding: 0.75rem; font-size: 0.75rem;" onclick="handleLogout()">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-wrapper">
            <div class="nav-overlay" id="overlay" onclick="toggleNav()"></div>
            <aside id="sidebar-left"><iframe id="nav-frame" src="Apps/Navegacion.html"></iframe></aside>
            <section class="panel-center"><div class="canvas-area"><iframe id="main-frame" src="about:blank"></iframe></div></section>
            <aside id="sidebar-right">
                <div style="height: 60px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: #f8fafc;">
                    <h3 id="side-app-title" style="font-size: 0.75rem; font-weight: 900; color: var(--corporate-red); text-transform: uppercase;">Módulo</h3>
                    <button onclick="closeSideApp()" style="background: none; border: none; font-size: 2rem; cursor: pointer; color: #94a3b8;">&times;</button>
                </div>
                <iframe id="side-app-frame" src="about:blank" style="flex: 1;"></iframe>
            </aside>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "AIzaSyCmyzbw7csEtZkPqV89OMaM4cXDpG6O930", 
            authDomain: "cic-pp.firebaseapp.com", 
            projectId: "cic-pp", 
            appId: "1:336771827172:web:ff43891fd9b0fcaca073f1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cic-pp';

        const TOOL_ROUTES = {
            'reloj': { path: 'Navegacion/RegistrosDeAcceso/Herramientas/RelojChecador.html', name: 'Reloj Checador Biométrico' },
            'alertas': { path: 'Apps/Alertas.html', name: 'Centro de Alertas Operativas' },
            'siniestros': { path: 'Navegacion/RegistroDeSiniestros/RegSin.html', name: 'Registro de Siniestros' },
            'contador': { path: 'Navegacion/RegistrosDeAcceso/Herramientas/Contador.html', name: 'Contador de Ingresos' },
            'home': { path: 'Apps/Home.html', name: 'Protección Patrimonial' }
        };

        const normalizePath = (n) => {
            if (!n || n === 'about:blank') return '';
            return n.includes('.html') ? n : `Apps/${n}.html`;
        };

        const showScreen = (name) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + name);
            if(target) target.classList.add('active');
        };

        window.toggleNav = () => {
            document.getElementById('sidebar-left').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.toggleLauncher = (e) => {
            e.stopPropagation();
            document.getElementById('launcher').classList.toggle('active');
        };

        document.addEventListener('click', () => {
            const l = document.getElementById('launcher');
            if (l) l.classList.remove('active');
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-submit');
            btn.disabled = true; btn.innerText = 'Autenticando...';
            try { 
                await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); 
            } catch (err) { 
                alert("Credenciales no válidas."); btn.disabled = false; btn.innerText = 'Ingresar al Sistema';
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const publicRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                onSnapshot(publicRef, (snap) => {
                    const d = snap.exists() ? snap.data() : {};
                    document.getElementById('user-display-name').innerText = d.name || user.email;
                    if(d.roleId === 'administrador') document.getElementById('menu-users').classList.remove('hidden');
                    if (d.photo) {
                        const img = document.getElementById('header-avatar-img');
                        img.src = d.photo; img.classList.remove('hidden');
                        document.getElementById('header-avatar-svg').classList.add('hidden');
                    }
                    showScreen('app');
                    handleInitialRouting(user.uid);
                });
            } else {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
                showScreen('login'); 
            }
        });

        const handleInitialRouting = async (uid) => {
            const urlParams = new URLSearchParams(window.location.search);
            const toolKey = urlParams.get('tool');
            if (toolKey && TOOL_ROUTES[toolKey]) {
                const tool = TOOL_ROUTES[toolKey];
                document.getElementById('main-frame').src = tool.path;
                document.getElementById('app-dynamic-title').innerText = tool.name;
                return;
            }
            restoreState(uid);
        };

        const saveState = async (mainPath, sidePath, sideTitle) => {
            if (!auth.currentUser || new URLSearchParams(window.location.search).has('tool')) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'state'), {
                    mainPath: mainPath || '', sidePath: sidePath || '', sideTitle: sideTitle || '', updatedAt: new Date().toISOString()
                }, { merge: true });
            } catch (e) {}
        };

        const restoreState = async (uid) => {
            try {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', uid, 'settings', 'state'));
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.mainPath) window.loadInMain(data.mainPath, true);
                    else document.getElementById('main-frame').src = 'Apps/Home.html';
                    if (data.sidePath && data.sidePath !== 'about:blank') window.loadInSideApp(data.sidePath, true);
                } else { document.getElementById('main-frame').src = 'Apps/Home.html'; }
            } catch (e) { document.getElementById('main-frame').src = 'Apps/Home.html'; }
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        window.loadInMain = (n, skipSave = false) => {
            const path = normalizePath(n);
            document.getElementById('main-frame').src = path;
            const tool = Object.values(TOOL_ROUTES).find(t => t.path === path);
            document.getElementById('app-dynamic-title').innerText = tool ? tool.name : n.replace(/([A-Z])/g, ' $1').trim();
            if(window.innerWidth <= 1024 && document.getElementById('sidebar-left').classList.contains('open')) toggleNav();
            closeSideApp(skipSave);
            if (!skipSave) saveState(path, null, null);
        };

        window.loadInSideApp = (n, skipSave = false, params = '') => {
            document.getElementById('launcher').classList.remove('active');
            const side = document.getElementById('sidebar-right');
            const fullPath = normalizePath(n) + params;
            const title = n.replace(/Apps\//, '').replace(/\.html/, '').replace(/([A-Z])/g, ' $1').trim();
            document.getElementById('side-app-title').innerText = title;
            document.getElementById('side-app-frame').src = fullPath;
            side.classList.add('active');
            if (!skipSave) saveState(null, normalizePath(n), title);
        };

        window.closeSideApp = (skipSave = false) => {
            document.getElementById('sidebar-right').classList.remove('active');
            setTimeout(() => { document.getElementById('side-app-frame').src = "about:blank"; }, 300);
            if (!skipSave) saveState(null, 'about:blank', '');
        };

        window.addEventListener('message', (e) => {
            if (e.data.type === 'LOAD_NAV') window.loadInMain(e.data.path);
            if (e.data.type === 'LOAD_SIDE_APP') window.loadInSideApp(e.data.app, false, e.data.params || '');
        });
    </script>
</body>
</html>
