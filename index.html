<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIC - Protección Patrimonial</title>
    
    <!-- Tipografía Profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#720000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CIC Patrimonial">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/192/720000/shield.png">

    <style>
        :root {
            --corporate-red: #720000;
            --dark-red: #4a0000;
            --gold-accent: #c5a059;
            --slate-gray: #1e293b;
            --border-color: #e2e8f0;
            --bg-body: #f1f5f9;
            --sidebar-width: 280px;
            --side-app-width: 400px;
            --header-height: 65px;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            overflow: hidden;
            color: var(--slate-gray);
        }

        .hidden { display: none !important; }

        /* --- PANTALLAS --- */
        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
        }
        
        .screen.active {
            display: flex;
        }

        #screen-loading.active,
        #screen-login.active {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        #screen-app.active {
            flex-direction: column;
        }

        /* --- LOGIN REDISEÑADO --- */
        .login-card { 
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            width: 90%; 
            max-width: 420px; 
            padding: 3rem; 
            border-radius: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .login-title {
            font-weight: 900;
            font-size: 1.5rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .login-input {
            width: 100%;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            border: 2px solid #f1f5f9;
            border-radius: 1rem;
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .login-input:focus {
            border-color: var(--corporate-red);
            background: white;
            box-shadow: 0 0 0 4px rgba(114, 0, 0, 0.1);
        }

        .btn-login { 
            background: var(--corporate-red);
            color: white; 
            width: 100%; 
            padding: 1.15rem; 
            border-radius: 1rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: var(--dark-red);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(114, 0, 0, 0.2);
        }

        /* --- ENCABEZADO --- */
        header {
            background: var(--corporate-red);
            color: white;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 1000;
            box-shadow: 0 1px 10px rgba(0,0,0,0.1);
            flex-shrink: 0;
            position: relative;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-toggle {
            display: none;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .menu-toggle:hover { background: rgba(255,255,255,0.25); }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .logo-container span {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
        }

        .header-center h1 {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.9);
            text-align: center;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* --- MENÚ BENTO --- */
        .launcher-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .launcher-btn:hover { background: white; color: var(--corporate-red); }

        .app-menu {
            position: absolute;
            top: 70px;
            right: 1.5rem;
            background: white;
            width: 320px;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1100;
            border: 1px solid var(--border-color);
        }

        .launcher-container.active .app-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            border-radius: 1rem;
            cursor: pointer;
            color: var(--slate-gray);
            text-decoration: none;
            transition: background 0.2s;
        }

        .menu-item:hover { background: #f1f5f9; }

        .menu-item .icon {
            width: 42px;
            height: 42px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--corporate-red);
            transition: all 0.2s;
        }

        .menu-item:hover .icon { background: var(--corporate-red); color: white; }

        .menu-item span {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* --- LAYOUT --- */
        .main-wrapper {
            display: flex;
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        aside#sidebar-left {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--border-color);
            z-index: 500;
            transition: transform var(--transition-speed) ease;
        }

        .nav-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 450;
            backdrop-filter: blur(4px);
        }

        aside#sidebar-right {
            width: 0;
            background: white;
            transition: width var(--transition-speed) cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            z-index: 600;
            overflow: hidden;
        }
        
        aside#sidebar-right.active {
            width: var(--side-app-width);
            border-left: 1px solid var(--border-color);
        }

        .panel-center {
            flex: 1;
            background: var(--bg-body);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .canvas-area {
            flex: 1;
            background: white;
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .header-center { display: none; }
            .menu-toggle { display: flex; }
            
            aside#sidebar-left {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                transform: translateX(-100%);
                z-index: 1200;
                height: 100vh;
            }

            aside#sidebar-left.open {
                transform: translateX(0);
                box-shadow: 20px 0 50px rgba(0,0,0,0.2);
            }

            .nav-overlay.active { display: block; }

            aside#sidebar-right.active { 
                width: 100vw; 
                position: fixed; 
                inset: 0;
                z-index: 1300;
            }

            .panel-center { padding: 1rem; }
            .app-menu { 
                right: 1rem; 
                width: calc(100vw - 2rem); 
                max-width: 350px; 
            }
        }

        @media (min-width: 1600px) {
            :root {
                --sidebar-width: 320px;
                --side-app-width: 450px;
            }
        }

        /* --- AVATAR & POPUP --- */
        .avatar-container { position: relative; cursor: pointer; display: flex; align-items: center; }
        .avatar { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.3); 
            overflow: hidden; 
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .login-popup {
            position: absolute;
            top: 60px; 
            right: 0;
            background: white;
            padding: 1.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            display: none;
            min-width: 220px;
            z-index: 1100;
            border: 1px solid var(--border-color);
        }

        .login-popup h4 {
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #0f172a;
        }

        .avatar-container:hover .login-popup { display: block; }

        iframe { width: 100%; height: 100%; border: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- PANTALLA CARGA -->
    <div id="screen-loading" class="screen active">
        <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <!-- PANTALLA LOGIN -->
    <div id="screen-login" class="screen">
        <div class="login-card">
            <span class="login-logo">🛡️</span>
            <h1 class="login-title">Sistema CIC</h1>
            <p class="login-subtitle">Protección Patrimonial</p>
            <form id="login-form">
                <input type="email" id="login-email" class="login-input" placeholder="Correo corporativo" required>
                <input type="password" id="login-pass" class="login-input" placeholder="Contraseña" required>
                <button type="submit" id="login-submit" class="btn-login">Ingresar al Sistema</button>
            </form>
        </div>
    </div>

    <!-- PANTALLA APLICACIÓN -->
    <div id="screen-app" class="screen">
        <header>
            <div class="header-left">
                <button class="menu-toggle" onclick="toggleNav()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="logo-container" onclick="loadInMain('Home')">
                    <span>CIC</span>
                </div>
            </div>

            <div class="header-center">
                <h1>Protección Patrimonial</h1>
            </div>

            <div class="header-right">
                <div class="launcher-container" id="launcher">
                    <button class="launcher-btn" onclick="toggleLauncher(event)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                    </button>
                    <div class="app-menu">
                        <div class="menu-item" onclick="loadInSideApp('WhatsApp')">
                            <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
                            <span>WhatsApp</span>
                        </div>
                        <div class="menu-item" onclick="loadInSideApp('Correo')">
                            <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
                            <span>Correo</span>
                        </div>
                        <div class="menu-item" onclick="loadInSideApp('Perfiles')">
                            <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                            <span>Perfiles</span>
                        </div>
                    </div>
                </div>

                <div class="avatar-container">
                    <div class="avatar">
                        <svg id="header-avatar-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <img id="header-avatar-img" src="" class="hidden">
                    </div>
                    <div class="login-popup">
                        <h4 id="user-display-name">Cargando...</h4>
                        <button class="btn-login" style="padding: 0.75rem; font-size: 0.75rem;" onclick="handleLogout()">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-wrapper">
            <div class="nav-overlay" id="overlay" onclick="toggleNav()"></div>
            <aside id="sidebar-left">
                <iframe id="nav-frame" src="Apps/Navegacion.html"></iframe>
            </aside>
            <section class="panel-center">
                <div class="canvas-area">
                    <iframe id="main-frame" src="Apps/Home.html"></iframe>
                </div>
            </section>
            <aside id="sidebar-right">
                <div style="height: 60px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; flex-shrink: 0; background: #f8fafc;">
                    <h3 id="side-app-title" style="font-size: 0.75rem; font-weight: 900; color: var(--corporate-red); text-transform: uppercase; letter-spacing: 1px;">Módulo</h3>
                    <button onclick="closeSideApp()" style="background: none; border: none; font-size: 2rem; cursor: pointer; color: #94a3b8; display: flex; align-items: center;">&times;</button>
                </div>
                <iframe id="side-app-frame" src="about:blank" style="flex: 1;"></iframe>
            </aside>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "AIzaSyCmyzbw7csEtZkPqV89OMaM4cXDpG6O930", 
            authDomain: "cic-pp.firebaseapp.com", 
            projectId: "cic-pp", 
            appId: "1:336771827172:web:ff43891fd9b0fcaca073f1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cic-pp';

        // Rutas de estado
        const getPrivatePath = (uid) => doc(db, 'artifacts', appId, 'users', uid, 'settings', 'state');

        // FUNCIÓN CLAVE: Normalizar rutas para evitar duplicidad de carpetas
        const normalizePath = (n) => {
            if (!n || n === 'about:blank') return '';
            // Si ya tiene extensión .html, asumimos que es una ruta completa desde la raíz
            if (n.includes('.html')) return n;
            // Si es un nombre simple, le asignamos la carpeta Apps por defecto
            return `Apps/${n}.html`;
        };

        const showScreen = (name) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + name);
            if(target) target.classList.add('active');
        };

        window.toggleNav = () => {
            const side = document.getElementById('sidebar-left');
            const over = document.getElementById('overlay');
            side.classList.toggle('open');
            over.classList.toggle('active');
        };

        window.toggleLauncher = (e) => {
            e.stopPropagation();
            document.getElementById('launcher').classList.toggle('active');
        };

        document.addEventListener('click', () => {
            document.getElementById('launcher').classList.remove('active');
        });

        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('login-submit');
            
            btn.disabled = true;
            btn.innerText = 'Autenticando...';
            
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
            } catch (err) { 
                alert("Credenciales no válidas.");
                btn.disabled = false;
                btn.innerText = 'Ingresar al Sistema';
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const publicRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                onSnapshot(publicRef, (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        document.getElementById('user-display-name').innerText = d.name || user.email;
                        if (d.photo) {
                            const img = document.getElementById('header-avatar-img');
                            img.src = d.photo;
                            img.classList.remove('hidden');
                            document.getElementById('header-avatar-svg').classList.add('hidden');
                        }
                    } else {
                        document.getElementById('user-display-name').innerText = user.email;
                    }
                    showScreen('app');
                    restoreState(user.uid);
                });
            } else { 
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                showScreen('login'); 
            }
        });

        // Persistencia de estado usando rutas normalizadas
        const saveState = async (mainPath, sidePath, sideTitle) => {
            if (!auth.currentUser) return;
            try {
                const stateRef = getPrivatePath(auth.currentUser.uid);
                // Guardamos la ruta final normalizada para que sea independiente de dónde se llamó
                await setDoc(stateRef, {
                    mainPath: mainPath || '',
                    sidePath: sidePath || '',
                    sideTitle: sideTitle || '',
                    updatedAt: new Date().toISOString()
                }, { merge: true });
            } catch (e) { console.error("Error saving state:", e); }
        };

        const restoreState = async (uid) => {
            try {
                const stateRef = getPrivatePath(uid);
                const snap = await getDoc(stateRef);
                if (snap.exists()) {
                    const data = snap.data();
                    // Restauramos directamente al src del iframe
                    if (data.mainPath) {
                        document.getElementById('main-frame').src = data.mainPath;
                    }
                    if (data.sidePath && data.sidePath !== 'about:blank') {
                        const side = document.getElementById('sidebar-right');
                        const frame = document.getElementById('side-app-frame');
                        document.getElementById('side-app-title').innerText = data.sideTitle || 'Módulo';
                        frame.src = data.sidePath;
                        side.classList.add('active');
                    }
                }
            } catch (e) { console.error("Error restoring state:", e); }
        };

        window.handleLogout = () => signOut(auth);

        window.loadInMain = (n, skipSave = false) => {
            const fullPath = normalizePath(n);
            document.getElementById('main-frame').src = fullPath;
            if(window.innerWidth <= 1024) toggleNav();
            closeSideApp(skipSave);
            if (!skipSave) saveState(fullPath, null, null);
        };

        window.loadInSideApp = (n, skipSave = false) => {
            document.getElementById('launcher').classList.remove('active');
            const side = document.getElementById('sidebar-right');
            const frame = document.getElementById('side-app-frame');
            const fullPath = normalizePath(n);
            const cleanTitle = n.replace(/Apps\//, '').replace(/\.html/, '').replace(/([A-Z])/g, ' $1').trim();
            
            document.getElementById('side-app-title').innerText = cleanTitle;
            frame.src = fullPath;
            side.classList.add('active');
            if (!skipSave) saveState(null, fullPath, cleanTitle);
        };

        window.closeSideApp = (skipSave = false) => {
            document.getElementById('sidebar-right').classList.remove('active');
            setTimeout(() => { document.getElementById('side-app-frame').src = "about:blank"; }, 300);
            if (!skipSave) saveState(null, 'about:blank', '');
        };

        window.addEventListener('message', (e) => {
            if (e.data.type === 'LOAD_NAV') {
                const fullPath = normalizePath(e.data.path);
                document.getElementById('main-frame').src = fullPath;
                saveState(fullPath, null, null);
                if(window.innerWidth <= 1024) {
                    const side = document.getElementById('sidebar-left');
                    const over = document.getElementById('overlay');
                    side.classList.remove('open');
                    over.classList.remove('active');
                }
            }
        });
    </script>
</body>
</html>
