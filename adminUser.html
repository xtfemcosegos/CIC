<!-- Gestión de Usuarios: Módulo protegido para visualización y administración de perfiles -->
<div class="max-w-6xl mx-auto p-6 md:p-10 space-y-8 animate-in fade-in duration-500">
    
    <!-- CAPA DE SEGURIDAD -->
    <div id="admin-access-guard" class="min-h-[400px] flex flex-col items-center justify-center text-center space-y-4">
        <div id="guard-loading">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl text-red-800"></i>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] mt-4 text-slate-400">Verificando Credenciales...</p>
        </div>
        <div id="guard-error" class="hidden space-y-4">
            <div class="inline-block p-6 bg-red-50 rounded-full text-red-800 mb-2">
                <i class="fa-solid fa-shield-slash text-4xl"></i>
            </div>
            <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter">Acceso Restringido</h3>
            <p id="error-message" class="text-slate-500 text-xs font-bold max-w-xs mx-auto uppercase tracking-widest leading-relaxed">
                Esta sección es exclusiva para usuarios con nivel de <span class="text-red-800">Administrador</span>.
            </p>
            <button onclick="location.reload()" class="mt-4 px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-all">
                Reintentar Acceso
            </button>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="admin-main-container" class="hidden space-y-8">
        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 border-b border-slate-100 pb-8">
            <div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                    Gestión de <span class="text-red-800 tracking-widest">Personal</span>
                </h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">
                    Control de perfiles y accesos del sistema CIC
                </p>
            </div>
            
            <!-- Barra de Acciones: Siempre en una fila -->
            <div class="flex flex-nowrap items-center gap-2 md:gap-3 overflow-x-auto no-scrollbar pb-2 lg:pb-0">
                <button onclick="exportUsersToJSON()" class="flex-shrink-0 bg-white border border-slate-200 text-slate-900 px-4 py-3.5 rounded-2xl text-[9px] md:text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-download text-sm"></i>
                    <span>Exportar</span>
                </button>
                
                <button onclick="document.getElementById('json-import-input').click()" class="flex-shrink-0 bg-white border border-slate-200 text-slate-900 px-4 py-3.5 rounded-2xl text-[9px] md:text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-file-import text-sm"></i>
                    <span>Importar</span>
                </button>
                <input type="file" id="json-import-input" accept=".json" class="hidden" onchange="importUsersFromJSON(event)">

                <button onclick="document.getElementById('photos-import-input').click()" class="flex-shrink-0 bg-white border border-slate-200 text-slate-900 px-4 py-3.5 rounded-2xl text-[9px] md:text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-images text-sm"></i>
                    <span>Fotos</span>
                </button>
                <input type="file" id="photos-import-input" accept="image/jpeg" multiple class="hidden" onchange="importUserPhotos(event)">

                <button onclick="openUserModal()" class="flex-shrink-0 bg-slate-900 text-white px-5 py-3.5 rounded-2xl text-[9px] md:text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-lg shadow-slate-200 flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-sm"></i>
                    <span>Nuevo</span>
                </button>
            </div>
        </header>

        <!-- Filtros y Estadísticas -->
        <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
            <div class="relative w-full md:max-w-md">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="user-search" oninput="filterUsers()" placeholder="BUSCAR POR NOMBRE O ID..." class="w-full pl-12 pr-6 py-4 bg-white border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest outline-none focus:border-red-800 transition-all shadow-sm">
            </div>
            <div class="flex gap-8 px-6">
                <div class="text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total</p>
                    <p id="stat-total" class="text-xl font-black text-slate-900">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-red-800">Admins</p>
                    <p id="stat-admins" class="text-xl font-black text-red-800">0</p>
                </div>
            </div>
        </div>

        <section class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Foto</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID Nómina</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre Completo</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Correo</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Puesto</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal de Formulario -->
    <div id="user-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeUserModal()"></div>
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-10 relative shadow-2xl animate-in zoom-in duration-300">
            <h3 id="modal-title" class="text-2xl font-black text-slate-900 tracking-tighter uppercase mb-8">
                Registrar <span class="text-red-800">Usuario</span>
            </h3>
            
            <form id="user-form" class="space-y-6">
                <input type="hidden" id="user-doc-id">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">ID de Empleado *</label>
                    <input type="text" id="user-employee-id" required placeholder="Ej: 5258253" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800 transition-all">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre Completo *</label>
                        <input type="text" id="user-name" required placeholder="Ej: Juan Pérez" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Rol / Puesto *</label>
                        <select id="user-role" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800 transition-all">
                            <option value="Administrador">Administrador</option>
                            <option value="Operador CCO">Operador CCO</option>
                            <option value="Encargado">Encargado</option>
                            <option value="Guardia">Guardia</option>
                            <option value="Centro de Control">Centro de Control</option>
                            <option value="Colaborador">Colaborador</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Correo Institucional</label>
                    <input type="email" id="user-email" required placeholder="usuario@cic.com" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800 transition-all">
                </div>
                <div id="password-field-container" class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Contraseña Temporal</label>
                    <input type="password" id="user-password" placeholder="Mínimo 6 caracteres" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-xs font-bold outline-none focus:border-red-800 transition-all">
                </div>
                <div id="form-error" class="hidden text-[9px] font-black text-red-600 bg-red-50 p-4 rounded-xl uppercase tracking-widest text-center"></div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeUserModal()" class="flex-1 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">Cancelar</button>
                    <button id="submit-user-btn" type="submit" class="flex-[2] bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-all shadow-lg">
                        <span id="submit-text">Sincronizar Datos</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0OIcOy_tO1sIDZ2tXgi-LsrTQlGH-8T4",
        authDomain: "cic5-pp.firebaseapp.com",
        projectId: "cic5-pp",
        storageBucket: "cic5-pp.firebasestorage.app",
        messagingSenderId: "577576116946",
        appId: "1:577576116946:web:a1e2bcb2393f464ebe030b",
        measurementId: "G-G02GSE321T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = 'cic5-pp'; 

    const tableBody = document.getElementById('users-table-body');
    const userModal = document.getElementById('user-modal');
    const userForm = document.getElementById('user-form');
    const formError = document.getElementById('form-error');

    let currentUsers = [];
    let isProfileSynced = false;

    window.viewUserProfile = (email) => {
        window.selectedUserEmail = email;
        if (typeof window.loadContent === 'function') {
            window.loadContent('Perfil.html');
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) { verifyPermissions(user.email || 'anonimo'); }
        else { signInAnonymously(auth).catch(() => showAccessError("Error de conexión.")); }
    });

    function verifyPermissions(email) {
        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
        const safetyTimeout = setTimeout(() => { if (currentUsers.length === 0) showAccessError("Tiempo de espera agotado."); }, 8000);

        onSnapshot(usersRef, async (snap) => {
            clearTimeout(safetyTimeout);
            currentUsers = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
            const myProfile = currentUsers.find(u => u.email === email);

            if (!isProfileSynced && email !== 'anonimo' && !myProfile && currentUsers.length === 0) {
                isProfileSynced = true;
                try {
                    await addDoc(usersRef, {
                        employeeId: 'ADMIN-01', name: 'Administrador de Sistema', email: email,
                        role: 'Administrador', createdAt: serverTimestamp(), updatedAt: serverTimestamp()
                    });
                } catch (e) {}
                return;
            }

            if (myProfile?.role === 'Administrador' || (email === 'anonimo' && currentUsers.length > 0)) {
                showAdminContent(currentUsers);
            } else {
                showAccessError("Acceso denegado: Se requiere perfil de Administrador.");
            }
        }, () => {
            clearTimeout(safetyTimeout);
            showAccessError("Error de permisos en la base de datos.");
        });
    }

    function showAdminContent(users) {
        document.getElementById('admin-access-guard')?.classList.add('hidden');
        document.getElementById('admin-main-container')?.classList.remove('hidden');
        updateStats(users);
        renderUsersTable(users);
    }

    function showAccessError(msg) {
        document.getElementById('guard-loading')?.classList.add('hidden');
        const errContainer = document.getElementById('guard-error');
        if (errContainer) {
            errContainer.classList.remove('hidden');
            if (msg) document.getElementById('error-message').innerText = msg;
        }
    }

    function updateStats(users) {
        document.getElementById('stat-total').innerText = users.length;
        document.getElementById('stat-admins').innerText = users.filter(u => u.role === 'Administrador').length;
    }

    function renderUsersTable(users) {
        const search = (document.getElementById('user-search')?.value || "").toLowerCase();
        const filtered = users.filter(u => 
            (u.name || "").toLowerCase().includes(search) || 
            (u.employeeId || "").toLowerCase().includes(search)
        );

        const sorted = [...filtered].sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        tableBody.innerHTML = sorted.map(user => `
            <tr class="hover:bg-slate-50/80 transition-all group cursor-pointer" onclick="viewUserProfile('${user.email}')">
                <td class="p-6">
                    <div class="w-10 h-10 rounded-full border border-slate-100 overflow-hidden bg-slate-50 flex items-center justify-center shadow-sm">
                        ${user.photo ? `<img src="${user.photo}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-user text-slate-300"></i>`}
                    </div>
                </td>
                <td class="p-6 font-mono text-[10px] font-black text-slate-400 uppercase tracking-widest">${user.employeeId || 'S/N'}</td>
                <td class="p-6">
                    <span class="text-[11px] font-black text-slate-900 uppercase group-hover:text-red-800 transition-colors">${user.name || 'Usuario CIC'}</span>
                </td>
                <td class="p-6 text-[10px] font-bold text-slate-500 lowercase">${user.email}</td>
                <td class="p-6">
                    <span class="px-3 py-1 bg-red-50 text-red-800 text-[8px] font-black uppercase rounded-full tracking-widest border border-red-100">
                        ${user.role}
                    </span>
                </td>
                <td class="p-6 text-right" onclick="event.stopPropagation()">
                    <div class="flex justify-end gap-2">
                        <button onclick="editUser('${user.docId}', '${user.employeeId}', '${user.name}', '${user.email}', '${user.role}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 text-slate-400 hover:text-red-800 hover:bg-red-50 transition-all shadow-sm">
                            <i class="fa-solid fa-pen text-[10px]"></i>
                        </button>
                        <button onclick="removeUser('${user.docId}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all shadow-sm">
                            <i class="fa-solid fa-trash text-[10px]"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    window.filterUsers = () => renderUsersTable(currentUsers);

    window.importUsersFromJSON = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                let added = 0; let errors = 0;
                const DEFAULT_PASS = "Comercio01";
                for (let i = 0; i < data.length; i++) {
                    const { id, nombre, puesto, email } = data[i];
                    if (!id || !nombre || !puesto) { errors++; continue; }
                    const finalEmail = email || `${id}@cic.com`;
                    try {
                        const tempApp = initializeApp(firebaseConfig, `imp-${Date.now()}-${i}`);
                        const tempAuth = getAuth(tempApp);
                        await createUserWithEmailAndPassword(tempAuth, finalEmail, DEFAULT_PASS);
                        await deleteApp(tempApp);
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), {
                            employeeId: id, name: nombre, role: puesto, email: finalEmail,
                            createdAt: serverTimestamp(), updatedAt: serverTimestamp()
                        });
                        added++;
                    } catch (err) { errors++; }
                }
                alert(`Importación: ${added} Éxitos.`);
            } catch (err) { alert("JSON Inválido."); }
            event.target.value = '';
        };
        reader.readAsText(file);
    };

    window.importUserPhotos = async (event) => {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;
        let p = 0;
        for (const file of files) {
            const empId = file.name.split('.')[0];
            const target = currentUsers.find(u => u.employeeId === empId);
            if (target) {
                try {
                    const b64 = await convertToBase64(file);
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', target.docId), { photo: b64, updatedAt: serverTimestamp() });
                    p++;
                } catch {}
            }
        }
        alert(`Fotos Sincronizadas: ${p}`);
        event.target.value = '';
    };

    function convertToBase64(file) {
        return new Promise((res, rej) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = () => res(r.result);
            r.onerror = err => rej(err);
        });
    }

    window.closeUserModal = () => userModal.classList.add('hidden');
    window.openUserModal = () => {
        userForm.reset();
        document.getElementById('user-doc-id').value = '';
        document.getElementById('modal-title').innerHTML = 'Registrar <span class="text-red-800">Usuario</span>';
        document.getElementById('password-field-container').classList.remove('hidden');
        userModal.classList.remove('hidden');
    };

    window.editUser = (docId, empId, name, email, role) => {
        document.getElementById('user-doc-id').value = docId;
        document.getElementById('user-employee-id').value = empId;
        document.getElementById('user-name').value = name;
        document.getElementById('user-email').value = email;
        document.getElementById('user-role').value = role;
        document.getElementById('modal-title').innerHTML = 'Configurar <span class="text-red-800">Usuario</span>';
        document.getElementById('password-field-container').classList.add('hidden');
        userModal.classList.remove('hidden');
    };

    window.removeUser = async (id) => {
        if (confirm('¿Eliminar registro?')) {
            try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id)); } catch (err) {}
        }
    };

    userForm.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('user-doc-id').value;
        const empId = document.getElementById('user-employee-id').value;
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        const role = document.getElementById('user-role').value;
        const pass = document.getElementById('user-password').value;
        const btn = document.getElementById('submit-user-btn');
        formError.classList.add('hidden');
        btn.disabled = true;
        try {
            if (!id && pass) {
                const tempApp = initializeApp(firebaseConfig, "regApp");
                const tempAuth = getAuth(tempApp);
                await createUserWithEmailAndPassword(tempAuth, email, pass);
                await deleteApp(tempApp);
            }
            const data = { employeeId: empId, name, email, role, updatedAt: serverTimestamp() };
            if (id) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id), data); }
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), data); }
            closeUserModal();
        } catch (err) {
            formError.classList.remove('hidden');
            formError.innerText = "Error: " + (err.code || "Verificar conexión");
        } finally { btn.disabled = false; }
    };
</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    /* Ocultar scrollbar de la barra de acciones */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
