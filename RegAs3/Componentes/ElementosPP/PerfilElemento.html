<div class="flex flex-col h-full bg-slate-50 relative animate-fade-in overflow-hidden">
    
    <!-- HEADER / PORTADA -->
    <div class="h-64 bg-slate-800 relative shrink-0">
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900 to-brand-900 opacity-90"></div>
        
        <!-- Botón Cerrar -->
        <button onclick="window.closeElementProfile()" class="absolute top-4 right-4 text-white/70 hover:text-white bg-black/20 hover:bg-black/40 rounded-full p-2 transition-all z-20">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>

        <div class="absolute bottom-0 left-0 w-full p-8 flex items-end gap-6 bg-gradient-to-t from-slate-900 via-slate-900/60 to-transparent">
            <!-- Foto Principal -->
            <div class="relative group">
                <img id="pe-photo" src="" class="w-32 h-32 rounded-2xl object-cover border-4 border-white shadow-2xl bg-slate-200" onerror="this.src='https://ui-avatars.com/api/?name=User&background=random&size=128'">
                
                <!-- Acciones de Foto -->
                <div class="absolute bottom-[-10px] right-[-10px] flex gap-2">
                    <button onclick="window.profileManager.startCamera()" class="bg-white text-slate-700 p-2.5 rounded-full shadow-lg hover:text-brand-600 transition-transform hover:scale-110 border border-slate-200" title="Tomar Foto">
                        <i class="fa-solid fa-camera"></i>
                    </button>
                    <button onclick="document.getElementById('pe-photo-input').click()" class="bg-white text-slate-700 p-2.5 rounded-full shadow-lg hover:text-blue-600 transition-transform hover:scale-110 border border-slate-200" title="Subir Archivo">
                        <i class="fa-solid fa-upload"></i>
                    </button>
                </div>
                <input type="file" id="pe-photo-input" class="hidden" accept="image/*" onchange="window.profileManager.updatePhoto(this)">
            </div>
            
            <div class="text-white pb-2 flex-grow">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-bold leading-tight mb-1" id="pe-name">Cargando...</h1>
                        <div class="flex items-center gap-3 text-slate-300 font-mono text-sm">
                            <span id="pe-id" class="bg-white/10 px-2 py-0.5 rounded">ID: ---</span>
                            <span id="pe-area" class="flex items-center gap-1"><i class="fa-solid fa-map-pin text-red-400"></i> ---</span>
                        </div>
                    </div>
                    <!-- Badges de Estado -->
                    <div class="flex flex-col items-end gap-2">
                        <span id="pe-status" class="px-3 py-1 rounded-full bg-green-500/20 text-green-300 text-xs font-bold border border-green-500/30 uppercase tracking-wider">Activo</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PESTAÑAS DE NAVEGACIÓN -->
    <div class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm flex px-6 gap-6 overflow-x-auto">
        <button onclick="window.profileManager.setTab('info')" id="tab-btn-info" class="py-4 text-sm font-bold border-b-2 border-brand-600 text-brand-600 transition-colors whitespace-nowrap">
            <i class="fa-solid fa-id-card mr-2"></i>Información
        </button>
        <button onclick="window.profileManager.setTab('schedule')" id="tab-btn-schedule" class="py-4 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">
            <i class="fa-solid fa-calendar-days mr-2"></i>Gestión de Turnos
        </button>
        <button onclick="window.profileManager.setTab('history')" id="tab-btn-history" class="py-4 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">
            <i class="fa-solid fa-clock-rotate-left mr-2"></i>Historial & Estadísticas
        </button>
    </div>

    <!-- CONTENIDO SCROLLABLE -->
    <div class="flex-grow overflow-y-auto custom-scrollbar p-8 bg-slate-50">
        <div class="max-w-6xl mx-auto space-y-8">

            <!-- VISTA 1: INFORMACIÓN GENERAL -->
            <div id="view-info" class="space-y-6 animate-fade-in">
                <!-- (Código del formulario de información sin cambios) -->
                <form id="pe-form-info" onsubmit="window.profileManager.saveInfo(event)">
                     <div class="flex justify-end mb-4">
                        <button type="button" id="btn-edit-global" onclick="window.profileManager.toggleEditInfo(true)" class="text-sm font-bold text-brand-600 hover:bg-brand-50 px-3 py-1.5 rounded-lg border border-brand-200 transition-colors">
                            <i class="fa-solid fa-pen-to-square mr-1"></i> Editar Información
                        </button>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 relative overflow-hidden mb-6">
                        <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                        <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide mb-6 border-b border-slate-100 pb-2">Datos Personales</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nombre Completo</label>
                                <input type="text" name="name" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50 font-semibold text-slate-700" readonly>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Fecha Nacimiento</label>
                                <input type="date" name="birthDate" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50" readonly>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Domicilio</label>
                                <input type="text" name="address" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50" readonly>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Celular</label>
                                <input type="tel" name="phone" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50" readonly>
                            </div>
                        </div>
                    </div>
                     <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-brand-600"></div>
                        <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide mb-6 border-b border-slate-100 pb-2">Información Laboral</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Número Empleado</label>
                                <input type="text" name="id" class="pe-input w-full text-sm border-slate-200 rounded-lg bg-slate-100 text-slate-500 cursor-not-allowed" readonly>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Puesto</label>
                                <input type="text" name="position" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50" readonly>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Área Asignada</label>
                                <select name="area" id="pe-area-select" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50 pointer-events-none" disabled></select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Fecha Ingreso</label>
                                <input type="date" name="startDate" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50" readonly>
                            </div>
                             <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">NSS</label>
                                <input type="text" name="nss" class="pe-input w-full text-sm border-slate-200 rounded-lg focus:ring-brand-500 bg-slate-50" readonly>
                            </div>
                        </div>
                    </div>
                    <div id="dynamic-sections-container" class="space-y-6"></div>
                    <div id="btn-add-section" class="hidden text-center py-4 border-2 border-dashed border-slate-300 rounded-xl hover:border-brand-400 hover:bg-white transition-colors cursor-pointer" onclick="window.profileManager.addCustomSection()">
                        <i class="fa-solid fa-plus text-slate-400 text-xl"></i>
                        <p class="text-xs text-slate-500 font-bold uppercase mt-1">Agregar Nueva Sección</p>
                    </div>
                    <div id="pe-info-actions" class="hidden mt-6 flex justify-end gap-3 sticky bottom-6 z-30 pt-4 bg-slate-50/90 backdrop-blur border-t border-slate-200">
                        <button type="button" onclick="window.profileManager.toggleEditInfo(false)" class="px-6 py-3 bg-white border border-slate-300 text-slate-600 font-bold rounded-xl shadow-sm hover:bg-slate-50">Cancelar</button>
                        <button type="submit" class="px-8 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg hover:bg-brand-700">Guardar Cambios</button>
                    </div>
                </form>
            </div>

            <!-- VISTA 2: GESTIÓN DE TURNOS (Actualizada con Timeline) -->
            <div id="view-schedule" class="hidden animate-fade-in grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Columna Izquierda: Gestión del Día -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <i class="fa-solid fa-calendar-day text-brand-600"></i> Gestión Detallada por Día
                            </h3>
                            <input type="date" id="pe-day-picker" class="border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-brand-500 outline-none" onchange="window.profileManager.loadDayAssignments(this.value)">
                        </div>

                        <!-- CONTENEDOR DE TURNOS DEL DÍA -->
                        <div id="pe-day-shifts-container" class="space-y-4"></div>

                        <!-- Botón Agregar Turno al Día -->
                        <div class="mt-6">
                            <button onclick="window.profileManager.addShiftToDay()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 font-bold hover:text-brand-600 hover:border-brand-400 hover:bg-white transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-plus-circle"></i> Agregar Turno / Incidencia al Día
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Columna Derecha: Patrones y Resumen -->
                <div class="space-y-6">
                    <!-- Asignación de Patrón Masivo -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                            <h3 class="text-sm font-bold text-slate-800">Aplicar Patrón</h3>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Plantilla</label>
                                <select id="pe-pattern-select" class="w-full text-xs border-slate-300 rounded-lg focus:ring-indigo-500"></select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Inicio</label>
                                <input type="date" id="pe-pattern-start" class="w-full text-xs border-slate-300 rounded-lg focus:ring-indigo-500">
                            </div>
                            <button onclick="window.profileManager.applyPattern()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg text-xs font-bold shadow-md transition-colors">
                                Aplicar Secuencia
                            </button>
                        </div>
                    </div>

                    <!-- Próximos 7 Días -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="px-5 py-3 border-b border-slate-100 bg-slate-50/50">
                            <h3 class="font-bold text-slate-700 text-xs uppercase">Agenda Semanal</h3>
                        </div>
                        <div class="divide-y divide-slate-100" id="pe-upcoming-shifts"></div>
                    </div>
                </div>
            </div>

            <!-- VISTA 3: HISTORIAL (Calendario) -->
            <div id="view-history" class="hidden animate-fade-in space-y-6">
                <!-- (Código del calendario se mantiene igual que la versión anterior) -->
                 <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-green-100 text-green-600 flex items-center justify-center font-bold text-lg" id="stat-attendance">0</div>
                        <div><p class="text-xs text-slate-400 uppercase font-bold">Asistencias</p><p class="text-xs text-slate-500">Mes Actual</p></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center font-bold text-lg" id="stat-absences">0</div>
                        <div><p class="text-xs text-slate-400 uppercase font-bold">Faltas</p><p class="text-xs text-slate-500">Mes Actual</p></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-lg" id="stat-lates">0</div>
                        <div><p class="text-xs text-slate-400 uppercase font-bold">Retardos</p><p class="text-xs text-slate-500">Mes Actual</p></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg" id="stat-extra">0</div>
                        <div><p class="text-xs text-slate-400 uppercase font-bold">T. Extra</p><p class="text-xs text-slate-500">Horas</p></div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                        <button onclick="window.profileManager.changeHistoryMonth(-1)" class="w-8 h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center hover:text-brand-600 transition-colors"><i class="fa-solid fa-chevron-left"></i></button>
                        <h3 class="text-lg font-bold text-slate-700 uppercase tracking-wide" id="history-month-label">--</h3>
                        <button onclick="window.profileManager.changeHistoryMonth(1)" class="w-8 h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center hover:text-brand-600 transition-colors"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="grid grid-cols-7 border-b border-slate-200 bg-slate-50 text-center text-xs font-bold text-slate-400 uppercase py-2">
                        <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                    </div>
                    <div id="history-calendar-grid" class="grid grid-cols-7 auto-rows-fr"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- MODAL CÁMARA (Se mantiene igual) -->
<div id="camera-modal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="relative w-full max-w-md bg-slate-900 rounded-2xl overflow-hidden shadow-2xl border border-slate-700">
        <div class="relative aspect-[4/3] bg-black">
            <video id="camera-feed" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1]"></video>
        </div>
        <div class="p-6 flex justify-center gap-4">
            <button onclick="window.profileManager.capturePhoto()" class="w-16 h-16 rounded-full border-4 border-white flex items-center justify-center bg-transparent hover:bg-white/10 transition-colors">
                <div class="w-12 h-12 bg-red-600 rounded-full"></div>
            </button>
            <button onclick="window.profileManager.stopCamera()" class="absolute top-4 right-4 text-white hover:text-gray-300">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        <canvas id="camera-canvas" class="hidden"></canvas>
    </div>
</div>

<script id="script-profile-element">
    window.profileManager = {
        elementId: null,
        userData: {},
        currentDate: new Date(),
        historyDate: new Date(),
        assignments: [],
        videoStream: null,

        init(id) {
            if (!document.getElementById('pe-name')) return;
            this.elementId = id;
            this.loadData();
            this.renderHeader();
            this.populateInfoForm();
            this.populatePatterns();
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('pe-day-picker').value = today;
            this.loadDayAssignments(today);
            
            this.renderHistory(); 
            this.setTab('info');
        },

        loadData() {
            const config = JSON.parse(localStorage.getItem('regas_epp_config') || '[]');
            this.userData = config.find(e => e.id === this.elementId) || {};
            if(!this.userData.customSections) this.userData.customSections = [];
        },

        renderHeader() {
            const name = this.userData.name || 'Sin Nombre';
            const area = this.userData.area || 'Sin Área';
            document.getElementById('pe-name').textContent = name;
            document.getElementById('pe-id').textContent = `ID: ${this.elementId}`;
            document.getElementById('pe-area').innerHTML = `<i class="fa-solid fa-map-pin text-red-400"></i> ${area}`;
            const photoImg = document.getElementById('pe-photo');
            photoImg.src = `FotosElementosPP/${this.elementId}.jpg`;
            photoImg.onerror = function() {
                this.src = `https://ui-avatars.com/api/?name=${name}&background=random&size=128`;
            };
        },

        // --- GESTIÓN DE TURNOS AVANZADA (Integración Baner_Perfil) ---
        loadDayAssignments(dateStr) {
            this.currentDate = dateStr;
            const all = JSON.parse(localStorage.getItem('regas_assignments') || '[]');
            this.assignments = all.filter(a => a.elementId === this.elementId && a.date === dateStr);
            this.assignments.sort((a, b) => (a.startTime || "00:00").localeCompare(b.startTime || "00:00"));
            this.renderDayShifts();
            this.renderUpcomingShifts();
        },

        renderDayShifts() {
            const container = document.getElementById('pe-day-shifts-container');
            container.innerHTML = '';

            if (this.assignments.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 py-8 italic border-2 border-dashed border-slate-100 rounded-xl">Sin asignaciones para este día.</div>`;
                return;
            }

            this.assignments.forEach((assign, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden relative transition-all duration-300";
                
                const isAbsent = ['Falta', 'Descanso', 'Vacaciones', 'Incapacidad', 'Permiso', 'Suspension'].includes(assign.shift);
                
                card.innerHTML = `
                    <div class="px-4 py-3 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Asignación ${index + 1}</span>
                            <button onclick="window.profileManager.deleteShift(${index})" class="text-slate-300 hover:text-red-500 transition-colors" title="Eliminar"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                        <div class="flex gap-1">
                            ${!isAbsent ? this.renderFlagButton(index, 'isExtraTime', 'Extra', 'blue') : ''}
                            ${!isAbsent ? this.renderFlagButton(index, 'isRecovery', 'Recup.', 'purple') : ''}
                            ${!isAbsent ? this.renderFlagButton(index, 'isHoliday', 'Festivo', 'amber') : ''}
                        </div>
                    </div>

                    <div id="view-mode-${index}" class="p-4 relative">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                                    ${assign.shift} 
                                    ${assign.isLate ? '<span class="bg-red-100 text-red-600 text-[9px] px-1.5 py-0.5 rounded uppercase">Retardo</span>' : ''}
                                </h3>
                                ${!isAbsent ? `<p class="text-xs text-slate-500 font-mono">${assign.startTime || '--:--'} - ${assign.duration || 0} hrs</p>` : ''}
                                <p class="text-[11px] text-brand-600 font-medium mt-0.5"><i class="fa-solid fa-location-dot"></i> ${assign.area || 'General'}</p>
                            </div>
                            <button onclick="window.profileManager.toggleEditShift(${index}, true)" class="text-xs font-bold text-brand-600 hover:bg-brand-50 px-2 py-1 rounded border border-transparent hover:border-brand-100 transition-colors"><i class="fa-solid fa-pen"></i> Editar</button>
                        </div>

                        ${!isAbsent ? `<div class="border-l-2 border-slate-200 pl-5 ml-1 space-y-6 my-2 relative z-0">${this.renderTimelineHTML(assign, index)}</div>` : ''}

                        <div class="mt-3 pt-3 border-t border-slate-100 flex justify-between items-center">
                            ${!isAbsent ? `
                            <label class="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" onchange="window.profileManager.updateShiftField(${index}, 'isLate', this.checked)" ${assign.isLate ? 'checked' : ''} class="rounded text-orange-500 focus:ring-orange-500">
                                <span class="text-xs font-bold text-slate-500">Retardo</span>
                            </label>` : '<span></span>'}
                            <select onchange="window.profileManager.setAbsence(${index}, this.value)" class="text-xs border-slate-200 rounded-lg text-slate-600 py-1 pl-2 pr-6 bg-slate-50">
                                <option value="">Cambiar a Ausencia...</option>
                                <option value="Falta">❌ Falta</option>
                                <option value="Descanso">💤 Descanso</option>
                                <option value="Vacaciones">✈️ Vacaciones</option>
                                <option value="Incapacidad">🚑 Incapacidad</option>
                                <option value="Permiso">📄 Permiso</option>
                            </select>
                        </div>
                    </div>

                    <div id="edit-mode-${index}" class="hidden bg-white p-4 border-t border-brand-100">
                        <div class="space-y-3">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="col-span-2">
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1">Tipo / Nombre</label>
                                    <select id="edit-shift-type-${index}" class="w-full text-xs rounded border-slate-300 focus:ring-brand-500">
                                        <option value="Diurno" ${assign.shift === 'Diurno' ? 'selected' : ''}>Diurno</option>
                                        <option value="Vespertino" ${assign.shift === 'Vespertino' ? 'selected' : ''}>Vespertino</option>
                                        <option value="Nocturno" ${assign.shift === 'Nocturno' ? 'selected' : ''}>Nocturno</option>
                                        <option value="Extra" ${assign.shift === 'Extra' ? 'selected' : ''}>Extra</option>
                                        <optgroup label="Ausentismo">
                                            <option value="Falta" ${assign.shift === 'Falta' ? 'selected' : ''}>Falta</option>
                                            <option value="Descanso" ${assign.shift === 'Descanso' ? 'selected' : ''}>Descanso</option>
                                            <option value="Vacaciones" ${assign.shift === 'Vacaciones' ? 'selected' : ''}>Vacaciones</option>
                                            <option value="Incapacidad" ${assign.shift === 'Incapacidad' ? 'selected' : ''}>Incapacidad</option>
                                        </optgroup>
                                    </select>
                                </div>
                                <div class="col-span-2">
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1">Área / Caseta</label>
                                    <select id="edit-area-${index}" class="w-full text-xs rounded border-slate-300 focus:ring-brand-500">
                                        ${this.getAreaOptionsHTML(assign.area)}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1">Entrada</label>
                                    <input type="time" id="edit-start-${index}" value="${assign.startTime || ''}" class="w-full text-xs rounded border-slate-300">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1">Duración (h)</label>
                                    <input type="number" id="edit-duration-${index}" value="${assign.duration || 8}" class="w-full text-xs rounded border-slate-300">
                                </div>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="window.profileManager.saveShiftConfig(${index})" class="flex-1 bg-brand-600 text-white text-xs font-bold py-2 rounded shadow-sm hover:bg-brand-700">Guardar</button>
                                <button onclick="window.profileManager.toggleEditShift(${index}, false)" class="px-3 bg-slate-100 text-slate-600 text-xs font-bold py-2 rounded hover:bg-slate-200">Cancelar</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        },

        renderTimelineHTML(assign, idx) {
            const checkIn = assign.checkInTime || '';
            const checkOut = assign.checkOutTime || '';
            const movement = assign.movementTime; 

            let html = `
                <div class="relative group">
                    <div class="absolute -left-[27px] top-2.5 w-3 h-3 ${checkIn ? 'bg-green-500 border-green-600' : 'bg-white border-slate-300'} rounded-full border-2 z-10"></div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Entrada</label>
                    <div class="flex gap-2">
                        <input type="time" value="${checkIn}" class="w-24 text-sm border-slate-300 rounded h-8 font-mono" onchange="window.profileManager.updateShiftField(${idx}, 'checkInTime', this.value)">
                        <button onclick="window.profileManager.setNow(${idx}, 'checkInTime')" class="bg-slate-100 hover:bg-green-100 text-slate-400 hover:text-green-600 rounded px-2 h-8"><i class="fa-solid fa-stopwatch"></i></button>
                    </div>
                    ${this.getEvidenceLinks(assign, 'checkIn')}
                </div>
            `;

            if (movement) {
                html += `
                    <div class="relative group mt-6 mb-6">
                        <div class="absolute -left-[27px] top-2.5 w-3 h-3 bg-purple-500 border-purple-600 rounded-full border-2 z-10"></div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] font-bold text-purple-600 uppercase">Se mueve a</label>
                            <button onclick="window.profileManager.removeMovement(${idx})" class="text-[9px] text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <div class="bg-purple-50 p-2 rounded-lg border border-purple-100 mb-2 space-y-2">
                            <div class="flex gap-2">
                                <input type="time" value="${movement}" onchange="window.profileManager.updateShiftField(${idx}, 'movementTime', this.value)" class="w-full text-xs border-purple-200 rounded text-purple-700 h-7">
                                <select onchange="window.profileManager.updateShiftField(${idx}, 'movementArea', this.value)" class="w-full text-[10px] h-7 border-purple-200 rounded text-purple-800 font-bold">
                                    ${this.getAreaOptionsHTML(assign.movementArea)}
                                </select>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="relative my-4 ml-[-12px]">
                        <button onclick="window.profileManager.addMovement(${idx})" class="text-[9px] bg-white border border-slate-200 text-slate-400 hover:text-purple-600 hover:border-purple-300 px-2 py-0.5 rounded-full shadow-sm transition-all z-20 relative">+ Rotación</button>
                    </div>
                `;
            }

            html += `
                <div class="relative group mt-2">
                    <div class="absolute -left-[27px] top-2.5 w-3 h-3 ${checkOut ? 'bg-blue-500 border-blue-600' : 'bg-white border-slate-300'} rounded-full border-2 z-10"></div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Salida</label>
                    <div class="flex gap-2">
                        <input type="time" value="${checkOut}" class="w-24 text-sm border-slate-300 rounded h-8 font-mono" onchange="window.profileManager.updateShiftField(${idx}, 'checkOutTime', this.value)">
                        <button onclick="window.profileManager.setNow(${idx}, 'checkOutTime')" class="bg-slate-100 hover:bg-blue-100 text-slate-400 hover:text-blue-600 rounded px-2 h-8"><i class="fa-solid fa-stopwatch"></i></button>
                    </div>
                    ${this.getEvidenceLinks(assign, 'checkOut')}
                </div>
            `;
            return html;
        },

        // --- MANEJO DE DATOS ---
        addShiftToDay() {
            const newShift = {
                elementId: this.elementId,
                date: this.currentDate,
                shift: 'Diurno',
                startTime: '07:00',
                duration: 8,
                area: this.userData.area || 'General',
                timestamp: Date.now()
            };
            this.assignments.push(newShift);
            this.saveAssignments();
        },

        deleteShift(index) {
            if(confirm("¿Eliminar este turno?")) {
                this.assignments.splice(index, 1);
                this.saveAssignments();
            }
        },

        saveShiftConfig(index) {
            const assign = this.assignments[index];
            assign.shift = document.getElementById(`edit-shift-type-${index}`).value;
            assign.area = document.getElementById(`edit-area-${index}`).value;
            
            const isAbsent = ['Falta', 'Descanso', 'Vacaciones', 'Incapacidad', 'Permiso', 'Suspension'].includes(assign.shift);
            if (!isAbsent) {
                assign.startTime = document.getElementById(`edit-start-${index}`).value;
                assign.duration = document.getElementById(`edit-duration-${index}`).value;
                assign.isAbsent = false;
            } else {
                assign.isAbsent = true;
                assign.startTime = null; assign.duration = 0;
            }

            this.toggleEditShift(index, false);
            this.saveAssignments();
        },

        updateShiftField(index, field, value) {
            this.assignments[index][field] = value;
            this.saveAssignments();
        },

        addMovement(index) {
            const now = new Date();
            this.assignments[index].movementTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            this.assignments[index].movementArea = this.assignments[index].area;
            this.saveAssignments();
        },

        removeMovement(index) {
            this.assignments[index].movementTime = null;
            this.assignments[index].movementArea = null;
            this.saveAssignments();
        },

        setAbsence(index, type) {
            if (!type) return;
            if (confirm(`¿Cambiar turno a ${type}?`)) {
                const a = this.assignments[index];
                a.shift = type;
                a.isAbsent = true;
                a.startTime = null;
                this.saveAssignments();
            }
        },

        saveAssignments() {
            let all = JSON.parse(localStorage.getItem('regas_assignments') || '[]');
            all = all.filter(a => !(a.elementId === this.elementId && a.date === this.currentDate));
            if (this.assignments.length > 0) all = [...all, ...this.assignments];
            localStorage.setItem('regas_assignments', JSON.stringify(all));
            if(window.syncManager) window.syncManager.uploadData(true);
            window.dispatchEvent(new CustomEvent('regas:assignments-updated'));
            this.renderDayShifts();
            this.renderUpcomingShifts();
            this.renderHistory();
        },

        // --- Helpers UI ---
        toggleEditShift(index, edit) {
            const view = document.getElementById(`view-mode-${index}`);
            const editor = document.getElementById(`edit-mode-${index}`);
            if(edit) { view.classList.add('hidden'); editor.classList.remove('hidden'); }
            else { view.classList.remove('hidden'); editor.classList.add('hidden'); }
        },

        setNow(index, field) {
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            this.updateShiftField(index, field, timeStr);
        },

        renderFlagButton(index, field, label, color) {
            const isActive = this.assignments[index][field];
            const bgClass = isActive ? `bg-${color}-100 text-${color}-700 border-${color}-200` : `bg-white text-slate-300 border-slate-100 hover:border-slate-300`;
            return `<button onclick="window.profileManager.updateShiftField(${index}, '${field}', ${!isActive})" class="px-2 py-1 text-[10px] font-bold rounded border transition-colors ${bgClass}">${label}</button>`;
        },

        getAreaOptionsHTML(selected) {
            const config = JSON.parse(localStorage.getItem('regas_areas_config') || '{"categories":[]}');
            let opts = '<option value="">-- Área --</option>';
            config.categories?.forEach(cat => cat.areas?.forEach(a => {
                opts += `<option value="${a.name}" ${a.name === selected ? 'selected' : ''}>${a.name}</option>`;
            }));
            return opts;
        },

        getEvidenceLinks(assign, type) {
            const photo = assign[type + 'Photo'];
            const location = assign[type + 'Location'];
            if (!photo && !location) return '';
            // Aquí podríamos agregar lógica para mostrar evidencia
            return '';
        },

        // ... (Funciones de cámara, info form, patrones y historial se mantienen igual) ...
        startCamera() { /* ... */ },
        stopCamera() { /* ... */ },
        capturePhoto() { /* ... */ },
        populateInfoForm() { /* ... */ },
        toggleEditInfo(e) { /* ... */ },
        saveInfo(e) { /* ... */ },
        populatePatterns() { /* ... */ },
        applyPattern() { /* ... */ },
        renderUpcomingShifts() { /* ... */ },
        changeHistoryMonth(d) { /* ... */ },
        renderHistory() { /* ... */ },
        addCustomSection() { /* ... */ },
        
        setTab(name) {
            ['info', 'schedule', 'history'].forEach(t => {
                const btn = document.getElementById(`tab-btn-${t}`);
                const view = document.getElementById(`view-${t}`);
                if (t === name) {
                    btn.classList.add('border-brand-600', 'text-brand-600');
                    btn.classList.remove('border-transparent', 'text-slate-500');
                    view.classList.remove('hidden');
                } else {
                    btn.classList.remove('border-brand-600', 'text-brand-600');
                    btn.classList.add('border-transparent', 'text-slate-500');
                    view.classList.add('hidden');
                }
            });
        }
    };
</script>
