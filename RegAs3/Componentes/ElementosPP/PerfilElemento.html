<!-- PANEL DE PERFIL (OCUPA TODO EL BODY) -->
<div class="min-h-screen bg-slate-50 flex flex-col">
    
    <!-- Header del Perfil -->
    <div class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <button onclick="window.closeElementProfile()" class="text-slate-500 hover:text-slate-800 flex items-center gap-2 font-medium">
                    <i class="fa-solid fa-arrow-left"></i> Volver al listado
                </button>
                <h1 class="text-lg font-bold text-slate-900">Perfil del Elemento</h1>
                <div class="w-20"></div> <!-- Espaciador -->
            </div>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div class="flex-grow max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- 1. Tarjeta de Información -->
            <div class="md:col-span-1">
                <div class="bg-white rounded-xl shadow p-6 border border-slate-100 text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-brand-500 to-brand-700"></div>
                    
                    <div class="relative mt-12 mb-4">
                        <div id="profile-icon-container" class="w-24 h-24 mx-auto bg-white rounded-full border-4 border-white shadow-lg flex items-center justify-center text-4xl text-slate-400">
                            <!-- Icono dinámico -->
                        </div>
                    </div>
                    
                    <h2 id="profile-name" class="text-xl font-bold text-slate-800 mb-1">Cargando...</h2>
                    <p id="profile-id" class="text-sm text-slate-500 font-mono mb-4">ID: ---</p>
                    <span id="profile-area" class="inline-block bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-semibold mb-6">---</span>
                    
                    <div class="border-t border-slate-100 pt-4 text-left">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Estadísticas</h4>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm text-slate-600">Turnos este mes</span>
                            <span class="font-bold text-brand-600">0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-slate-600">Asistencia</span>
                            <span class="font-bold text-green-600">100%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Panel de Asignaciones (Calendario/Lista) -->
            <div class="md:col-span-2 space-y-6">
                
                <!-- Formulario de Asignación Rápida -->
                <div class="bg-white rounded-xl shadow p-6 border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                        <i class="fa-solid fa-calendar-plus text-brand-600 mr-2"></i> Asignar Turno
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-end">
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Fecha</label>
                            <input type="date" id="assign-date" class="w-full rounded-md border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Turno / Horario</label>
                            <select id="assign-shift" class="w-full rounded-md border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm">
                                <option value="Matutino">Matutino (06:00 - 14:00)</option>
                                <option value="Vespertino">Vespertino (14:00 - 22:00)</option>
                                <option value="Nocturno">Nocturno (22:00 - 06:00)</option>
                                <option value="12x12">Jornada 12x12</option>
                            </select>
                        </div>
                        <div class="sm:col-span-2">
                            <button onclick="window.profileManager.addAssignment()" class="w-full bg-brand-600 text-white hover:bg-brand-700 font-medium py-2 rounded-md shadow-sm transition-colors">
                                Confirmar Asignación
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Historial de Asignaciones -->
                <div class="bg-white rounded-xl shadow border border-slate-100 overflow-hidden">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                        <h3 class="font-bold text-slate-700 text-sm">Próximos Turnos Asignados</h3>
                    </div>
                    <ul id="assignments-list" class="divide-y divide-slate-100 max-h-64 overflow-y-auto">
                        <!-- Lista dinámica -->
                        <li class="p-6 text-center text-slate-400 text-sm">No hay turnos asignados.</li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    window.profileManager = {
        currentElementId: null,
        currentElement: null,
        assignmentsKey: 'regas_assignments',
        configKey: 'regas_epp_config',

        init(elementId) {
            this.currentElementId = elementId;
            // Cargar datos del elemento
            const config = JSON.parse(localStorage.getItem(this.configKey) || '[]');
            this.currentElement = config.find(el => el.id === elementId);

            if (!this.currentElement) {
                alert("Elemento no encontrado");
                window.closeElementProfile();
                return;
            }

            this.renderProfileInfo();
            this.renderAssignments();
            
            // Set date picker to today
            document.getElementById('assign-date').valueAsDate = new Date();
        },

        renderProfileInfo() {
            const el = this.currentElement;
            document.getElementById('profile-name').textContent = el.name || el.title;
            document.getElementById('profile-id').textContent = `ID: ${el.id}`;
            document.getElementById('profile-area').textContent = el.area || 'Área no asignada';
            
            const iconContainer = document.getElementById('profile-icon-container');
            const icon = el.icon || 'fa-user';
            
            if(icon.includes('http')) {
                iconContainer.innerHTML = `<img src="${icon}" class="w-full h-full object-cover rounded-full">`;
            } else {
                iconContainer.innerHTML = `<i class="fa-solid ${icon}"></i>`;
            }
        },

        renderAssignments() {
            const list = document.getElementById('assignments-list');
            const allAssignments = JSON.parse(localStorage.getItem(this.assignmentsKey) || '[]');
            // Filtrar asignaciones SOLO para este ID
            const myAssignments = allAssignments.filter(a => a.elementId === this.currentElementId);
            
            // Ordenar por fecha desc
            myAssignments.sort((a, b) => new Date(b.date) - new Date(a.date));

            list.innerHTML = '';
            
            if(myAssignments.length === 0) {
                list.innerHTML = '<li class="p-6 text-center text-slate-400 text-sm italic">No hay turnos asignados aún.</li>';
                return;
            }

            myAssignments.forEach((assign, index) => {
                const li = document.createElement('li');
                li.className = "px-6 py-4 hover:bg-slate-50 flex justify-between items-center";
                
                // Formato Fecha amigable
                const dateObj = new Date(assign.date + 'T12:00:00'); // Hack para evitar problema timezone
                const dateStr = dateObj.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

                li.innerHTML = `
                    <div>
                        <p class="text-sm font-bold text-slate-800 capitalize">${dateStr}</p>
                        <p class="text-xs text-slate-500 mt-0.5"><i class="fa-regular fa-clock mr-1"></i> ${assign.shift}</p>
                    </div>
                    <button onclick="window.profileManager.deleteAssignment('${assign.date}', '${assign.shift}')" class="text-slate-300 hover:text-red-500 transition-colors" title="Eliminar asignación">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                list.appendChild(li);
            });
        },

        addAssignment() {
            const date = document.getElementById('assign-date').value;
            const shift = document.getElementById('assign-shift').value;
            
            if(!date) return alert("Selecciona una fecha");

            const allAssignments = JSON.parse(localStorage.getItem(this.assignmentsKey) || '[]');
            
            // Evitar duplicados exactos (mismo ID, fecha y turno)
            const exists = allAssignments.some(a => a.elementId === this.currentElementId && a.date === date && a.shift === shift);
            if(exists) return alert("Ya existe este turno asignado para esta fecha.");

            // Guardar
            allAssignments.push({
                elementId: this.currentElementId,
                date: date,
                shift: shift,
                timestamp: Date.now()
            });

            localStorage.setItem(this.assignmentsKey, JSON.stringify(allAssignments));
            this.renderAssignments();
            
            // Feedback
            const btn = document.querySelector('button[onclick*="addAssignment"]');
            const originalText = btn.textContent;
            btn.textContent = "Asignado con éxito";
            btn.classList.add('bg-green-600');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-green-600');
            }, 1500);
        },
        
        deleteAssignment(date, shift) {
            if(!confirm("¿Eliminar esta asignación?")) return;
            
            let allAssignments = JSON.parse(localStorage.getItem(this.assignmentsKey) || '[]');
            allAssignments = allAssignments.filter(a => !(a.elementId === this.currentElementId && a.date === date && a.shift === shift));
            
            localStorage.setItem(this.assignmentsKey, JSON.stringify(allAssignments));
            this.renderAssignments();
        }
    };
</script>
