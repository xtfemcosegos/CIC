<!-- VISTA DE PLANIFICACIÓN DIARIA -->
<div class="bg-white rounded-xl shadow border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-140px)] animate-fade-in relative">
    
    <!-- 1. BARRA SUPERIOR (FECHA) -->
    <div class="p-4 bg-white border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4 flex-shrink-0 z-20 shadow-sm relative">
        <div class="flex items-center gap-4 bg-slate-50 p-1 rounded-lg border border-slate-200 shadow-sm">
            <button onclick="window.dayViewManager.changeDate(-1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-brand-600 bg-white rounded shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="text-center min-w-[140px]">
                <span class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider leading-none mb-1" id="day-label">HOY</span>
                <input type="date" id="current-date-picker" class="bg-transparent border-none p-0 text-sm font-bold text-slate-800 text-center h-5 w-full focus:ring-0 cursor-pointer" onchange="window.dayViewManager.setDate(this.value)">
            </div>
            <button onclick="window.dayViewManager.changeDate(1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-brand-600 bg-white rounded shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="flex gap-4 text-xs text-slate-500 font-medium">
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span> <span id="stat-diurno">0</span> Día</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-orange-500"></span> <span id="stat-vespertino">0</span> Tarde</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-slate-800"></span> <span id="stat-nocturno">0</span> Noche</div>
        </div>
    </div>

    <!-- 3. NAVEGACIÓN -->
    <div class="flex border-b border-slate-200 bg-white shadow-sm z-10 flex-shrink-0">
        <button onclick="window.dayViewManager.setTab('Diurno')" id="tab-diurno" class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-blue-600 transition-all"><i class="fa-regular fa-sun mr-2"></i> Diurno</button>
        <button onclick="window.dayViewManager.setTab('Vespertino')" id="tab-vespertino" class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-orange-600 transition-all"><i class="fa-solid fa-cloud-sun mr-2"></i> Vespertino</button>
        <button onclick="window.dayViewManager.setTab('Nocturno')" id="tab-nocturno" class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-slate-800 transition-all"><i class="fa-solid fa-moon mr-2"></i> Nocturno</button>
    </div>

    <!-- 4. CONTENIDO -->
    <div class="flex-grow overflow-y-auto bg-slate-50 p-4 custom-scrollbar relative">
        <div class="mb-6">
            <button onclick="window.dayViewManager.openAddModal()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 hover:text-brand-600 hover:border-brand-400 hover:bg-white transition-all text-sm font-bold uppercase tracking-wide flex items-center justify-center gap-2 group shadow-sm hover:shadow-md">
                <i class="fa-solid fa-plus bg-slate-200 group-hover:bg-brand-100 p-1 rounded-full w-6 h-6 flex items-center justify-center"></i>
                Agregar a Turno <span id="btn-add-shift-name" class="ml-1 text-slate-800">Actual</span>
            </button>
        </div>

        <div id="active-shift-container" class="space-y-6 min-h-[100px]"></div>
        
        <div class="mt-8 pt-6 border-t-2 border-slate-200 border-dashed">
            <div class="flex items-center justify-between mb-4 cursor-pointer group" onclick="document.getElementById('absences-list').classList.toggle('hidden'); document.getElementById('chevron-absences').classList.toggle('rotate-180');">
                <h3 class="font-bold text-slate-500 text-sm uppercase flex items-center gap-2 group-hover:text-slate-700">
                    <i class="fa-solid fa-user-slash"></i> Ausentismo / Descansos <span class="bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full text-xs" id="count-absences">0</span>
                </h3>
                <i id="chevron-absences" class="fa-solid fa-chevron-down text-slate-400 transition-transform"></i>
            </div>
            <div id="absences-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>
    </div>

    <!-- MODAL AGREGAR -->
    <div id="add-element-modal" class="fixed inset-0 z-50 hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4" onclick="if(event.target === this) window.dayViewManager.closeAddModal()">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[80vh]">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800">Asignar Personal</h3>
                <button onclick="window.dayViewManager.closeAddModal()" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-3 bg-white border-b border-slate-100">
                <input type="text" placeholder="Buscar..." class="w-full pl-4 pr-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-slate-50" onkeyup="window.dayViewManager.filterElementsList(this.value)">
            </div>
            <div id="elements-selection-list" class="flex-grow overflow-y-auto p-2 space-y-3 bg-slate-50 custom-scrollbar"></div>
        </div>
    </div>
</div>

<img src="x" onerror="if(!window.dayViewManager && document.getElementById('script-day-view')) eval(document.getElementById('script-day-view').innerText);" style="display:none;" />

<script id="script-day-view">
    window.RegAs = window.RegAs || {};
    if (!window.RegAs.assignments) {
        window.RegAs.assignments = {
            STORAGE_KEY: 'regas_assignments',
            getAll() { return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]'); },
            save(data) { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data)); window.dispatchEvent(new CustomEvent('regas:assignments-updated')); },
            addMany(newA) { const all = this.getAll(); newA.forEach(n => { const idx = all.findIndex(a => a.elementId === n.elementId && a.date === n.date); if(idx !== -1) all.splice(idx,1); all.push(n); }); this.save(all); }
        };
    }

    window.dayViewManager = {
        currentDate: new Date(),
        currentTab: 'Diurno',
        alertInterval: null,
        
        init() {
            if (!this._listening) {
                window.addEventListener('regas:assignments-updated', () => {
                    this.render();
                });
                this._listening = true;
            }

            // --- LÓGICA DE SALTO DE FECHA (Desde Vista Semanal) ---
            const jumpDate = localStorage.getItem('regas_jump_date');
            if (jumpDate) {
                this.setDate(jumpDate);
                localStorage.removeItem('regas_jump_date'); // Consumir fecha
            } else {
                this.setDate(new Date().toISOString().split('T')[0]);
            }
            
            console.log("DayViewManager Initialized");
        },

        setDate(dateStr) {
            const parts = dateStr.split('-');
            this.currentDate = new Date(parts[0], parts[1] - 1, parts[2]);
            const picker = document.getElementById('current-date-picker');
            if(picker) picker.value = dateStr;
            const isToday = this.currentDate.toDateString() === new Date().toDateString();
            document.getElementById('day-label').textContent = isToday ? 'HOY' : this.currentDate.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
            this.render();
        },

        changeDate(d) { this.currentDate.setDate(this.currentDate.getDate() + d); this.setDate(this.formatDate(this.currentDate)); },
        setTab(t) { this.currentTab = t; this.render(); },
        formatDate(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); },

        render() {
            const dateStr = this.formatDate(this.currentDate);
            document.getElementById('btn-add-shift-name').textContent = this.currentTab;
            
            const allAssignments = window.RegAs.assignments.getAll();
            const configElements = JSON.parse(localStorage.getItem('regas_epp_config') || '[]');
            
            const todayAssignments = allAssignments.filter(a => a.date === dateStr);
            const groups = { 'Diurno': [], 'Vespertino': [], 'Nocturno': [], 'Descanso': [] };

            todayAssignments.forEach(assign => {
                const elementInfo = configElements.find(e => e.id === assign.elementId) || { name: 'Desconocido', area: 'Sin Área' };
                const item = { ...elementInfo, ...assign };
                if (groups[assign.shift]) groups[assign.shift].push(item);
                else groups['Diurno'].push(item); 
            });

            ['Diurno','Vespertino','Nocturno'].forEach(t => {
                const el = document.getElementById(`stat-${t.toLowerCase()}`);
                if(el) el.textContent = groups[t].length;
            });
            const elAbs = document.getElementById('count-absences');
            if(elAbs) elAbs.textContent = groups['Descanso'].length;

            ['Diurno','Vespertino','Nocturno'].forEach(t => {
                const btn = document.getElementById(`tab-${t.toLowerCase()}`);
                if (btn) {
                    const active = this.currentTab === t;
                    btn.className = `flex-1 py-3 text-sm font-${active ? 'bold' : 'medium'} border-b-2 transition-all ${active ? (t==='Diurno'?'text-blue-600 border-blue-600 bg-blue-50': t==='Vespertino'?'text-orange-600 border-orange-600 bg-orange-50':'text-slate-800 border-slate-800 bg-slate-100') : 'text-slate-400 border-transparent hover:text-slate-600'}`;
                }
            });

            this.renderContent(groups[this.currentTab]);
            this.renderAbsences(groups['Descanso']);
        },

        renderContent(items) {
            const container = document.getElementById('active-shift-container');
            if(!container) return;
            container.innerHTML = '';
            
            // Agrupación por Área con ordenamiento
            const areas = {};
            const areaConfig = JSON.parse(localStorage.getItem('regas_areas_config') || '{"categories":[]}');
            const areaOrder = {};
            let orderCounter = 0;
            if (areaConfig.categories) {
                areaConfig.categories.forEach(cat => {
                    if (cat.areas) cat.areas.forEach(area => { areaOrder[area.name] = orderCounter++; });
                });
            }
            items.forEach(i => { 
                const a = i.area || 'General'; 
                if(!areas[a]) areas[a]=[]; 
                areas[a].push(i); 
            });

            const sortedAreaKeys = Object.keys(areas).sort((a, b) => {
                const orderA = areaOrder[a] !== undefined ? areaOrder[a] : 9999;
                const orderB = areaOrder[b] !== undefined ? areaOrder[b] : 9999;
                if (orderA !== orderB) return orderA - orderB;
                return a.localeCompare(b);
            });

            if (sortedAreaKeys.length === 0) {
                 container.innerHTML = `<div class="flex flex-col items-center justify-center h-32 text-slate-300"><i class="fa-regular fa-calendar-xmark text-4xl mb-3"></i><p class="text-sm">Sin personal en ${this.currentTab}</p></div>`;
            }

            sortedAreaKeys.forEach(area => {
                const div = document.createElement('div');
                div.innerHTML = `<h4 class="text-xs font-bold text-slate-500 uppercase mb-3 pl-1 flex items-center"><span class="w-2 h-2 rounded-full bg-slate-300 mr-2"></span>${area}</h4><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 area-grid"></div>`;
                const grid = div.querySelector('.area-grid');
                areas[area].forEach(item => grid.appendChild(this.createCard(item)));
                container.appendChild(div);
            });
        },

        createCard(item) {
            const card = document.createElement('div');
            card.onclick = () => window.dayViewManager.openSidePanel(item);
            
            const isActive = item.checkInTime && !item.checkOutTime;
            const color = this.currentTab==='Diurno'?'bg-blue-500':this.currentTab==='Vespertino'?'bg-orange-500':'bg-slate-800';
            const photo = `FotosElementosPP/${item.id}.jpg`; // RUTA DE FOTO CORREGIDA PARA CONTEXTO REGAS3
            const imgClass = isActive ? "w-10 h-10 rounded-full object-cover border-2 border-green-500 shadow-sm" : "w-10 h-10 rounded-full object-cover border border-slate-100 bg-slate-100";
            const activeIndicator = isActive ? `<div class="absolute top-2 right-2 flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></div>` : '';
            const statusIcon = isActive ? `<i class="fa-solid fa-circle-check text-green-500 ml-1 text-xs" title="Activo"></i>` : '';

            card.className = "bg-white border border-slate-200 rounded-lg p-3 hover:shadow-md hover:border-brand-300 transition-all cursor-pointer flex items-center gap-3 relative overflow-hidden group";
            card.innerHTML = `<div class="absolute left-0 top-0 bottom-0 w-1 ${color}"></div>${activeIndicator}<img src="${photo}" class="${imgClass}" onerror="this.src='https://ui-avatars.com/api/?name=${item.name}&background=random'"><div class="min-w-0 pr-2"><h5 class="text-sm font-bold text-slate-800 truncate flex items-center gap-1">${item.name} ${statusIcon}</h5><p class="text-xs text-slate-500 font-mono flex items-center gap-1"><i class="fa-regular fa-clock text-[10px]"></i> ${item.startTime} - ${item.duration}h</p></div>`;
            return card;
        },

        renderAbsences(items) {
            const container = document.getElementById('absences-list');
            if(!container) return;
            container.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-slate-100 border border-slate-200 rounded-lg p-2 flex items-center gap-3 opacity-75 hover:opacity-100 cursor-pointer transition-opacity";
                div.innerHTML = `<div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-400 text-xs"><i class="fa-solid fa-bed"></i></div><div><p class="text-xs font-bold text-slate-600 line-through">${item.name}</p><p class="text-[10px] text-slate-500">${item.area}</p></div>`;
                div.onclick = () => window.dayViewManager.openSidePanel(item);
                container.appendChild(div);
            });
        },

        openAddModal() {
            document.getElementById('add-element-modal').classList.remove('hidden');
            this.renderElementsList();
        },
        closeAddModal() { document.getElementById('add-element-modal').classList.add('hidden'); },
        
        filterElementsList(q) { this.renderElementsList(q.toLowerCase()); },
        renderElementsList(filter='') {
            const container = document.getElementById('elements-selection-list');
            const elements = JSON.parse(localStorage.getItem('regas_epp_config') || '[]');
            container.innerHTML = '';
            elements.filter(e => !filter || e.name.toLowerCase().includes(filter)).forEach(e => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left flex items-center gap-3 p-2 hover:bg-white hover:shadow-sm rounded border border-transparent hover:border-slate-200";
                btn.innerHTML = `<div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 text-xs font-bold">${e.name.charAt(0)}</div><div><p class="text-sm font-bold text-slate-700">${e.name}</p><p class="text-[10px] text-slate-400">${e.area || 'General'}</p></div>`;
                btn.onclick = () => {
                    window.RegAs.assignments.addMany([{ elementId: e.id, date: this.formatDate(this.currentDate), shift: this.currentTab, startTime: '07:00', duration: 8, area: e.area || 'General' }]);
                    this.closeAddModal();
                };
                container.appendChild(btn);
            });
        },

        async openSidePanel(item) {
            console.log("Solicitud de apertura de panel para:", item.name);
            
            if (window.loadComponent && window.toggleRightPanel) {
                // Validación para cargar Baner_Perfil si no existe
                if (!window.profileSidePanelManager || !document.getElementById('side-p-name')) {
                    // FIX: Ruta corregida para cargar desde RegAs3/RegAs.html
                    await window.loadComponent('Componentes/Baner_Perfil.html', 'right-panel-content');
                }
                window.toggleRightPanel(true);
                
                setTimeout(() => {
                    if (window.profileSidePanelManager) {
                        window.profileSidePanelManager.init(item);
                    } else {
                        // Intento de recuperación
                        const script = document.getElementById('script-baner-perfil');
                        if(script) eval(script.innerText);
                        if(window.profileSidePanelManager) window.profileSidePanelManager.init(item);
                    }
                }, 50);
            }
        }
    };

    window.dayViewManager.init();
</script>
