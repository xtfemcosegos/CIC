<!-- VISTA DE PLANIFICACIÓN DIARIA (PESTAÑAS) -->
<div class="bg-white rounded-xl shadow border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-140px)] animate-fade-in relative">
    
    <!-- 1. BARRA SUPERIOR -->
    <div class="p-4 bg-white border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4 flex-shrink-0 z-10">
        <div class="flex items-center gap-4 bg-slate-50 p-1 rounded-lg border border-slate-200 shadow-sm">
            <button onclick="window.dayViewManager.changeDate(-1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-brand-600 bg-white rounded shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="text-center min-w-[140px]">
                <span class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider leading-none mb-1" id="day-label">HOY</span>
                <input type="date" id="current-date-picker" class="bg-transparent border-none p-0 text-sm font-bold text-slate-800 text-center h-5 w-full focus:ring-0" onchange="window.dayViewManager.setDate(this.value)">
            </div>
            <button onclick="window.dayViewManager.changeDate(1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-brand-600 bg-white rounded shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="flex gap-4 text-xs text-slate-500 font-medium">
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span> <span id="stat-diurno">0</span> Día</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-orange-500"></span> <span id="stat-vespertino">0</span> Tarde</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-slate-800"></span> <span id="stat-nocturno">0</span> Noche</div>
        </div>
    </div>

    <!-- 2. NAVEGACIÓN -->
    <div class="flex border-b border-slate-200 bg-slate-50/50">
        <button onclick="window.dayViewManager.setTab('Diurno')" id="tab-diurno" class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-blue-600 flex justify-center items-center gap-2"><i class="fa-regular fa-sun"></i> Diurno</button>
        <button onclick="window.dayViewManager.setTab('Vespertino')" id="tab-vespertino" class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-orange-600 flex justify-center items-center gap-2"><i class="fa-solid fa-cloud-sun"></i> Vespertino</button>
        <button onclick="window.dayViewManager.setTab('Nocturno')" id="tab-nocturno" class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-slate-800 flex justify-center items-center gap-2"><i class="fa-solid fa-moon"></i> Nocturno</button>
    </div>

    <!-- 3. CONTENIDO SCROLLABLE -->
    <div class="flex-grow overflow-y-auto bg-slate-50 p-4 custom-scrollbar">
        <div id="active-shift-container" class="space-y-6 min-h-[200px]"></div>
        
        <div class="mt-8 pt-6 border-t-2 border-slate-200 border-dashed">
            <div class="flex items-center justify-between mb-4 cursor-pointer" onclick="document.getElementById('absences-list').classList.toggle('hidden');">
                <h3 class="font-bold text-slate-500 text-sm uppercase flex items-center gap-2"><i class="fa-solid fa-user-slash"></i> Ausentismo / Descansos <span class="bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full text-xs" id="count-absences">0</span></h3>
                <i class="fa-solid fa-chevron-down text-slate-400"></i>
            </div>
            <div id="absences-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>
    </div>
</div>

<img src="x" onerror="if(window.dayViewManager) window.dayViewManager.init(); else if(document.getElementById('script-day-view')) eval(document.getElementById('script-day-view').innerText);" style="display:none;" />

<script id="script-day-view">
    window.dayViewManager = {
        currentDate: new Date(),
        currentTab: 'Diurno',

        init() {
            if (!this._listening) {
                window.addEventListener('regas:assignments-updated', () => this.render());
                this._listening = true;
            }
            this.setDate(new Date().toISOString().split('T')[0]);
        },

        setDate(dateStr) {
            const parts = dateStr.split('-');
            this.currentDate = new Date(parts[0], parts[1] - 1, parts[2]);
            const picker = document.getElementById('current-date-picker');
            if(picker) picker.value = dateStr;
            document.getElementById('day-label').textContent = this.currentDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
            this.render();
        },

        changeDate(days) {
            this.currentDate.setDate(this.currentDate.getDate() + days);
            const dateStr = this.currentDate.getFullYear() + '-' + String(this.currentDate.getMonth() + 1).padStart(2, '0') + '-' + String(this.currentDate.getDate()).padStart(2, '0');
            this.setDate(dateStr);
        },

        setTab(tabName) {
            this.currentTab = tabName;
            this.render();
        },

        render() {
            const dateStr = this.currentDate.getFullYear() + '-' + String(this.currentDate.getMonth() + 1).padStart(2, '0') + '-' + String(this.currentDate.getDate()).padStart(2, '0');
            const allAssignments = window.RegAs?.assignments?.getAll() || JSON.parse(localStorage.getItem('regas_assignments') || '[]');
            const configElements = JSON.parse(localStorage.getItem('regas_epp_config') || '[]');
            const dayAssignments = allAssignments.filter(a => a.date === dateStr);
            const groups = { 'Diurno': [], 'Vespertino': [], 'Nocturno': [], 'Descanso': [] };

            dayAssignments.forEach(assign => {
                const elementInfo = configElements.find(e => e.id === assign.elementId) || { name: 'Desconocido', area: 'Sin Área', icon: 'fa-user' };
                const item = { ...assign, ...elementInfo };
                if (assign.shift === 'Descanso' || assign.type === 'Descanso') groups['Descanso'].push(item);
                else if (groups[assign.shift]) groups[assign.shift].push(item);
                else {
                    const h = parseInt(assign.startTime?.split(':')[0] || 0);
                    if (h >= 20 || h <= 5) groups['Nocturno'].push(item); else if (h >= 13) groups['Vespertino'].push(item); else groups['Diurno'].push(item);
                }
            });

            document.getElementById('stat-diurno').textContent = groups['Diurno'].length;
            document.getElementById('stat-vespertino').textContent = groups['Vespertino'].length;
            document.getElementById('stat-nocturno').textContent = groups['Nocturno'].length;
            document.getElementById('count-absences').textContent = groups['Descanso'].length;

            this.updateTabsUI();
            this.renderActiveTabContent(groups[this.currentTab]);
            this.renderAbsences(groups['Descanso']);
        },

        updateTabsUI() {
            ['Diurno', 'Vespertino', 'Nocturno'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab.toLowerCase()}`);
                if (this.currentTab === tab) btn.className = `flex-1 py-3 text-sm font-bold border-b-2 transition-all flex justify-center items-center gap-2 ${this.getTabColor(tab, true)}`;
                else btn.className = `flex-1 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition-all flex justify-center items-center gap-2`;
            });
        },

        getTabColor(tab, active) {
            if (!active) return "";
            if (tab === 'Diurno') return "text-blue-700 border-blue-600 bg-blue-50";
            if (tab === 'Vespertino') return "text-orange-700 border-orange-500 bg-orange-50";
            if (tab === 'Nocturno') return "text-slate-800 border-slate-800 bg-slate-200";
            return "";
        },

        renderActiveTabContent(items) {
            const container = document.getElementById('active-shift-container');
            container.innerHTML = '';
            if (items.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-48 text-slate-300"><i class="fa-regular fa-calendar-xmark text-4xl mb-3"></i><p class="text-sm">Sin personal asignado</p></div>`;
                return;
            }
            const areas = {};
            items.forEach(item => { const area = item.area || 'Sin Asignar'; if (!areas[area]) areas[area] = []; areas[area].push(item); });

            Object.keys(areas).sort().forEach(areaName => {
                const areaItems = areas[areaName];
                const groupEl = document.createElement('div');
                groupEl.innerHTML = `<h4 class="text-xs font-bold text-slate-500 uppercase mb-3 flex items-center"><span class="w-1.5 h-1.5 rounded-full bg-slate-400 mr-2"></span>${areaName}<span class="ml-2 text-[10px] bg-slate-200 px-1.5 rounded text-slate-500">${areaItems.length}</span></h4><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 area-grid"></div>`;
                const grid = groupEl.querySelector('.area-grid');
                areaItems.forEach(item => {
                    const card = document.createElement('div');
                    const itemData = encodeURIComponent(JSON.stringify(item));
                    // CAMBIO: Ahora llama a la nueva lógica de panel global
                    card.onclick = () => window.dayViewManager.openSidePanel(decodeURIComponent(itemData));
                    
                    let sideColor = "bg-slate-400";
                    if(this.currentTab === 'Diurno') sideColor = "bg-blue-500";
                    if(this.currentTab === 'Vespertino') sideColor = "bg-orange-500";
                    if(this.currentTab === 'Nocturno') sideColor = "bg-slate-800";
                    
                    const localPhotoPath = `FotosElementosPP/${item.id}.jpg`;
                    const avatar = `<img src="${localPhotoPath}" class="w-10 h-10 rounded-full object-cover border border-slate-100" onerror="this.onerror=null; this.outerHTML='<div class=\\'w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400\\'><i class=\\'fa-solid fa-user\\'></i></div>'">`;

                    card.className = "bg-white border border-slate-200 rounded-lg p-3 hover:shadow-md hover:border-brand-300 transition-all cursor-pointer flex items-center gap-3 group relative overflow-hidden";
                    card.innerHTML = `<div class="absolute left-0 top-0 bottom-0 w-1 ${sideColor}"></div>${avatar}<div class="flex-grow min-w-0"><h5 class="text-sm font-bold text-slate-800 truncate">${item.name}</h5><p class="text-xs text-slate-500 font-mono">${item.startTime} - ${item.duration}h</p></div><i class="fa-solid fa-chevron-right text-slate-300 opacity-0 group-hover:opacity-100 text-xs"></i>`;
                    grid.appendChild(card);
                });
                container.appendChild(groupEl);
            });
        },

        renderAbsences(items) {
            const container = document.getElementById('absences-list');
            container.innerHTML = '';
            if (items.length === 0) { container.innerHTML = `<p class="text-xs text-slate-400 col-span-full italic ml-2">Sin ausencias.</p>`; return; }
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = "bg-slate-100 border border-slate-200 rounded p-2 flex items-center gap-3 opacity-75";
                const localPhotoPath = `FotosElementosPP/${item.id}.jpg`;
                const avatar = `<img src="${localPhotoPath}" class="w-8 h-8 rounded-full object-cover grayscale" onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex'"><div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-400 text-xs hidden"><i class="fa-solid fa-bed"></i></div>`;
                el.innerHTML = `${avatar}<div><p class="text-xs font-bold text-slate-600 line-through decoration-slate-400">${item.name}</p><p class="text-[10px] text-slate-500">${item.area}</p></div>`;
                container.appendChild(el);
            });
        },

        // --- LÓGICA DEL PANEL GLOBAL ---
        openSidePanel(itemJson) {
            const item = typeof itemJson === 'string' ? JSON.parse(itemJson) : itemJson;
            
            // Generamos el HTML del panel aquí
            const localPhotoPath = `FotosElementosPP/${item.elementId || item.id}.jpg`;
            const currentId = item.elementId || item.id;

            const html = `
                <!-- Header: Foto Full Width -->
                <div class="h-48 bg-slate-200 relative shrink-0 group">
                    <img src="${localPhotoPath}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random&size=256'">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 to-transparent flex flex-col justify-end p-5">
                        <div class="flex justify-between items-end w-full">
                            <div>
                                <h2 class="text-white font-bold text-xl leading-tight drop-shadow-md mb-1">${item.name}</h2>
                                <p class="text-slate-300 text-xs font-mono drop-shadow-sm flex items-center gap-2">
                                    <span class="bg-white/20 px-1.5 rounded text-[10px]">ID: ${currentId}</span>
                                </p>
                            </div>
                            <!-- Botón Acceso Directo Perfil Completo -->
                            <button onclick="if(window.openElementProfile) { window.toggleRightPanel(false); window.openElementProfile('${currentId}'); }" class="mb-1 text-white hover:text-brand-200 bg-white/20 hover:bg-white/30 border border-white/30 backdrop-blur-sm px-3 py-1.5 rounded-lg text-xs transition-colors flex items-center gap-2 shadow-sm">
                                <i class="fa-solid fa-expand"></i> <span class="hidden sm:inline">Perfil</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Pestañas del Panel -->
                <div class="flex border-b border-slate-200 bg-white shrink-0">
                    <button class="flex-1 py-3 text-sm font-bold text-brand-600 border-b-2 border-brand-600 bg-brand-50/50">Turno</button>
                    <button class="flex-1 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent" disabled>Incidencias</button>
                    <button class="flex-1 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent" disabled>Bitácora</button>
                </div>

                <!-- Contenido Timeline -->
                <div class="flex-grow overflow-y-auto p-6 bg-slate-50">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">Proceso de Asistencia</h3>
                    <div class="relative pl-4 border-l-2 border-slate-200 space-y-8">
                        
                        <!-- Asignación -->
                        <div class="relative">
                            <div class="absolute -left-[21px] top-0 w-3 h-3 bg-brand-600 rounded-full border-2 border-white shadow-sm ring-1 ring-brand-100"></div>
                            <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="text-sm font-bold text-slate-700">Turno Asignado</span>
                                    <span class="text-[10px] bg-brand-50 text-brand-700 px-1.5 py-0.5 rounded border border-brand-100">${item.shift}</span>
                                </div>
                                <div class="flex items-center gap-2 text-xs font-mono text-slate-600 bg-slate-50 p-1.5 rounded">
                                    <i class="fa-regular fa-clock"></i> <span>${item.startTime} - ${item.duration}h</span>
                                </div>
                            </div>
                        </div>

                        <!-- Entrada -->
                        <div class="relative">
                            <div class="absolute -left-[21px] top-2 w-3 h-3 bg-white rounded-full border-2 border-slate-300 shadow-sm" id="dot-checkin"></div>
                            <div>
                                <label class="text-xs font-bold text-slate-600 mb-1 block">Hora de Entrada</label>
                                <div class="flex gap-2">
                                    <input type="time" id="input-checkin" class="w-full text-sm border-slate-300 rounded-md focus:border-brand-500 focus:ring-brand-500" onchange="window.dayViewManager.updateTimelineStatus()">
                                    <button class="bg-white border border-slate-300 text-slate-400 hover:text-green-600 hover:border-green-500 rounded-md px-3" onclick="window.dayViewManager.setNow('input-checkin')"><i class="fa-solid fa-stopwatch"></i></button>
                                </div>
                            </div>
                        </div>

                        <!-- Salida -->
                        <div class="relative">
                            <div class="absolute -left-[21px] top-2 w-3 h-3 bg-white rounded-full border-2 border-slate-300 shadow-sm" id="dot-checkout"></div>
                            <div>
                                <label class="text-xs font-bold text-slate-600 mb-1 block">Hora de Salida</label>
                                <div class="flex gap-2">
                                    <input type="time" id="input-checkout" class="w-full text-sm border-slate-300 rounded-md focus:border-brand-500 focus:ring-brand-500" onchange="window.dayViewManager.updateTimelineStatus()">
                                    <button class="bg-white border border-slate-300 text-slate-400 hover:text-red-600 hover:border-red-500 rounded-md px-3" onclick="window.dayViewManager.setNow('input-checkout')"><i class="fa-solid fa-stopwatch"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Incidencias -->
                    <div class="mt-8 pt-6 border-t border-slate-200 space-y-3">
                        <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="form-checkbox h-4 w-4 text-brand-600 rounded border-slate-300"><span class="text-sm text-slate-700">Es Recuperación</span></label>
                        <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="form-checkbox h-4 w-4 text-brand-600 rounded border-slate-300"><span class="text-sm text-slate-700">Tiempo Extra</span></label>
                        <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="form-checkbox h-4 w-4 text-red-600 rounded border-slate-300"><span class="text-sm text-slate-700">Retardo / Salida Anticipada</span></label>
                    </div>
                </div>

                <!-- Footer -->
                <div class="p-4 border-t border-slate-200 bg-white">
                    <button onclick="window.toggleRightPanel(false)" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2 rounded-lg shadow-sm transition-colors text-sm">Guardar Asistencia</button>
                </div>
            `;

            // INYECTAR EN INDEX
            if(window.updateRightPanelContent) {
                window.updateRightPanelContent(html);
                window.toggleRightPanel(true);
            } else {
                console.error("Función del index no encontrada");
            }
        },

        setNow(inputId) {
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            document.getElementById(inputId).value = timeStr;
            this.updateTimelineStatus();
        },

        updateTimelineStatus() {
            const checkin = document.getElementById('input-checkin').value;
            const checkout = document.getElementById('input-checkout').value;
            const dotIn = document.getElementById('dot-checkin');
            const dotOut = document.getElementById('dot-checkout');

            if(checkin) { dotIn.classList.remove('bg-white', 'border-slate-300'); dotIn.classList.add('bg-green-500', 'border-green-600'); }
            else { dotIn.classList.add('bg-white', 'border-slate-300'); dotIn.classList.remove('bg-green-500', 'border-green-600'); }

            if(checkout) { dotOut.classList.remove('bg-white', 'border-slate-300'); dotOut.classList.add('bg-red-500', 'border-red-600'); }
            else { dotOut.classList.add('bg-white', 'border-slate-300'); dotOut.classList.remove('bg-red-500', 'border-red-600'); }
        }
    };

    window.dayViewManager.init();
</script>
