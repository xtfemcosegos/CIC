<div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden animate-fade-in">
    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
        <h3 class="font-bold text-slate-700">Listado de Elementos Activos</h3>
        <span class="text-xs bg-brand-100 text-brand-700 px-2 py-1 rounded-full font-medium" id="total-count">0 Elementos</span>
    </div>
    
    <div class="overflow-x-auto max-h-[500px]">
        <table class="min-w-full divide-y divide-slate-200 relative">
            <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Elemento</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">ID</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Área</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">Acciones</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-slate-200" id="view-elements-tbody">
                <!-- Se llena dinámicamente -->
            </tbody>
        </table>
    </div>
</div>

<img src="x" onerror="if(window.renderElementsList) window.renderElementsList(); else if(document.getElementById('script-view-list')) eval(document.getElementById('script-view-list').innerText);" style="display:none;" />

<script id="script-view-list">
    window.renderElementsList = function() {
        const tbody = document.getElementById('view-elements-tbody');
        const countBadge = document.getElementById('total-count');
        const storageKey = 'regas_epp_config';
        let data = JSON.parse(localStorage.getItem(storageKey) || '[]');
        
        // Datos dummy de fallback si LS está vacío
        if(data.length === 0) {
           data = [
                { id: "5650856", name: "América Celeste Reyes Martínez", area: "Centro de Control", icon: "fa-user" },
                { id: "86959", name: "Eladio Hernández del Ángel", area: "Encargado", icon: "fa-user-tie" }
           ];
        }

        countBadge.textContent = `${data.length} Elementos`;
        tbody.innerHTML = '';

        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors";
            
            let iconHtml = item.icon?.includes('http') 
                ? `<img src="${item.icon}" class="h-10 w-10 rounded-lg object-cover bg-slate-100">`
                : `<div class="h-10 w-10 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center text-lg"><i class="fa-solid ${item.icon || 'fa-user'}"></i></div>`;

            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 h-10 w-10">${iconHtml}</div>
                        <div class="ml-4">
                            <div class="text-sm font-medium text-slate-900">${item.name || item.title}</div>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-500">${item.id}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-800">${item.area || 'N/A'}</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <div class="flex justify-end space-x-2">
                        <!-- BOTÓN ASIGNACIONES (NUEVO) -->
                        <button onclick="window.openElementProfile('${item.id}')" class="bg-brand-50 text-brand-700 hover:bg-brand-600 hover:text-white border border-brand-200 px-3 py-1.5 rounded-md transition-all shadow-sm flex items-center gap-1 text-xs">
                            <i class="fa-regular fa-calendar-check"></i> Asignaciones
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    };
    window.renderElementsList();
</script>
