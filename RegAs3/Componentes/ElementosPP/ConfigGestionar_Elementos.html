<div class="flex flex-col md:flex-row h-full gap-4 relative">
    
    <!-- 1. BARRA LATERAL: LISTADO DE ELEMENTOS -->
    <div class="w-full md:w-1/3 border-r border-slate-200 pr-0 md:pr-4 flex flex-col h-[60vh] md:h-full">
        <div class="flex justify-between items-center mb-4 sticky top-0 bg-white z-10 py-2">
            <h4 class="font-bold text-slate-700">Elementos</h4>
            <button onclick="window.itemManager.createNew()" class="text-xs bg-brand-100 text-brand-700 hover:bg-brand-200 px-2 py-1 rounded transition-colors">
                <i class="fa-solid fa-plus mr-1"></i>Nuevo
            </button>
        </div>
        
        <!-- Lista Scrollable -->
        <div id="items-list" class="flex-grow overflow-y-auto space-y-2 pr-2">
            <!-- Se llena con JS -->
        </div>
    </div>

    <!-- 2. PANEL PRINCIPAL: EDITOR -->
    <div class="w-full md:w-2/3 flex flex-col h-[60vh] md:h-full overflow-hidden">
        
        <!-- Estado Vacío -->
        <div id="editor-empty" class="flex-grow flex flex-col items-center justify-center text-slate-400 bg-slate-50 rounded-lg border border-dashed border-slate-300">
            <i class="fa-solid fa-arrow-left md:hidden text-2xl mb-2"></i>
            <i class="fa-solid fa-arrow-left hidden md:block text-2xl mb-2"></i>
            <p>Selecciona un elemento para editar o crea uno nuevo</p>
        </div>

        <!-- Formulario Editor (Oculto por defecto) -->
        <div id="editor-form" class="hidden flex-col h-full bg-white">
            
            <!-- Cabecera del Editor -->
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                <h4 class="font-bold text-brand-600" id="editor-title">Editar Elemento</h4>
                <div class="flex gap-2">
                    <button onclick="window.itemManager.deleteCurrent()" id="btn-delete" class="text-xs text-red-500 hover:bg-red-50 px-3 py-1.5 rounded transition-colors hidden">
                        <i class="fa-solid fa-trash mr-1"></i>Eliminar
                    </button>
                    <button onclick="window.itemManager.save()" class="text-xs bg-brand-600 text-white hover:bg-brand-700 px-4 py-1.5 rounded shadow transition-colors">
                        <i class="fa-solid fa-save mr-1"></i>Guardar
                    </button>
                </div>
            </div>

            <!-- Scroll del Formulario -->
            <div class="flex-grow overflow-y-auto pr-2 pb-10 space-y-6">
                
                <!-- A. INFORMACIÓN BÁSICA (Fijo) -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <h5 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Información Básica</h5>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- ID (Solo lectura si es edit) -->
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">ID Único</label>
                            <input type="text" id="input-id" class="w-full rounded-md border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm px-3 py-2 border" placeholder="EJ: CCTV-01">
                        </div>
                        <!-- Nombre -->
                        <div>
                            <label class="block text-xs font-medium text-slate-700 mb-1">Nombre del Elemento</label>
                            <input type="text" id="input-name" class="w-full rounded-md border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm px-3 py-2 border" placeholder="Ej: Cámara Dome">
                        </div>
                        <!-- Icono / Imagen -->
                        <div class="md:col-span-2">
                            <label class="block text-xs font-medium text-slate-700 mb-1">Icono (Clase FontAwesome) o URL Imagen</label>
                            <div class="flex gap-2">
                                <div class="w-10 h-10 bg-white border border-slate-300 rounded flex items-center justify-center text-slate-500 text-lg" id="icon-preview">
                                    <i class="fa-solid fa-cube"></i>
                                </div>
                                <input type="text" id="input-icon" oninput="window.itemManager.updateIconPreview(this.value)" class="flex-grow rounded-md border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm px-3 py-2 border" placeholder="Ej: fa-video o https://...">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- B. CONSTRUCTOR DE SECCIONES -->
                <div id="sections-container" class="space-y-4">
                    <!-- Las secciones se inyectan aquí -->
                </div>

                <!-- Botón Añadir Sección -->
                <button onclick="window.formBuilder.addSection()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-lg text-slate-400 hover:text-brand-600 hover:border-brand-300 hover:bg-brand-50 transition-all text-sm font-medium">
                    <i class="fa-solid fa-plus-circle mr-2"></i>Añadir Nueva Sección
                </button>

            </div>
        </div>
    </div>
</div>

<script>
    // --- LÓGICA DE GESTIÓN (ITEM MANAGER) ---
    // Cambio importante: Asignar a window para garantizar acceso global desde onclick
    window.itemManager = {
        data: [],
        currentId: null,
        storageKey: 'regas_epp_config',

        init() {
            // 1. Cargar datos de LocalStorage o usar Defaults
            const stored = localStorage.getItem(this.storageKey);
            if (stored) {
                this.data = JSON.parse(stored);
            } else {
                // Datos de ejemplo iniciales (Los mismos del Vistas/ElementosPP.html)
                this.data = [
                    { id: 'CCTV', name: 'Cámaras CCTV', icon: 'fa-video', sections: [] },
                    { id: 'RADIO', name: 'Radios de Comunicación', icon: 'fa-walkie-talkie', sections: [] },
                    { id: 'ACCESO', name: 'Control de Accesos', icon: 'fa-id-card', sections: [] }
                ];
                this.saveToLS();
            }
            this.renderList();
        },

        saveToLS() {
            localStorage.setItem(this.storageKey, JSON.stringify(this.data));
            // Disparar evento para que otras vistas se actualicen si fuera necesario
            window.dispatchEvent(new Event('regasDataUpdated'));
        },

        renderList() {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            
            this.data.forEach(item => {
                const isActive = item.id === this.currentId;
                const el = document.createElement('div');
                // Estilo del item de lista
                el.className = `p-3 rounded-lg cursor-pointer flex items-center gap-3 transition-all border ${isActive ? 'bg-brand-50 border-brand-200 ring-1 ring-brand-200' : 'bg-white border-slate-100 hover:border-slate-300'}`;
                el.onclick = () => this.selectItem(item.id);
                
                // Icono o Imagen
                let iconHtml = '';
                if (item.icon.includes('http')) {
                    iconHtml = `<img src="${item.icon}" class="w-8 h-8 rounded object-cover">`;
                } else {
                    iconHtml = `<div class="w-8 h-8 rounded bg-slate-100 text-slate-500 flex items-center justify-center"><i class="fa-solid ${item.icon || 'fa-cube'}"></i></div>`;
                }

                el.innerHTML = `
                    ${iconHtml}
                    <div class="flex-grow min-w-0">
                        <p class="text-sm font-medium text-slate-700 truncate">${item.name}</p>
                        <p class="text-xs text-slate-400 truncate">ID: ${item.id}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs text-slate-300"></i>
                `;
                list.appendChild(el);
            });
        },

        selectItem(id) {
            this.currentId = id;
            const item = this.data.find(i => i.id === id);
            this.renderList(); // Para actualizar estilo activo
            this.loadEditor(item);
        },

        createNew() {
            this.currentId = null;
            this.renderList(); // Quitar selección
            this.loadEditor(null);
        },

        loadEditor(item) {
            const emptyState = document.getElementById('editor-empty');
            const formState = document.getElementById('editor-form');
            const btnDelete = document.getElementById('btn-delete');
            const title = document.getElementById('editor-title');

            emptyState.classList.add('hidden');
            formState.classList.remove('hidden');
            formState.classList.add('flex');

            if (item) {
                // Modo Edición
                title.textContent = "Editar: " + item.name;
                document.getElementById('input-id').value = item.id;
                document.getElementById('input-id').disabled = true; // No cambiar ID en edición
                document.getElementById('input-id').classList.add('bg-slate-100');
                document.getElementById('input-name').value = item.name;
                document.getElementById('input-icon').value = item.icon || '';
                this.updateIconPreview(item.icon);
                btnDelete.classList.remove('hidden');
                
                // Cargar Secciones
                window.formBuilder.renderSections(item.sections || []);
            } else {
                // Modo Nuevo
                title.textContent = "Nuevo Elemento";
                document.getElementById('input-id').value = '';
                document.getElementById('input-id').disabled = false;
                document.getElementById('input-id').classList.remove('bg-slate-100');
                document.getElementById('input-name').value = '';
                document.getElementById('input-icon').value = '';
                this.updateIconPreview('');
                btnDelete.classList.add('hidden');
                
                // Limpiar Secciones
                window.formBuilder.renderSections([]);
            }
        },

        save() {
            const idInput = document.getElementById('input-id');
            const id = idInput.value.trim();
            const name = document.getElementById('input-name').value.trim();
            const icon = document.getElementById('input-icon').value.trim();
            
            if (!id || !name) {
                alert("El ID y el Nombre son obligatorios");
                return;
            }

            // Obtener estructura del constructor
            const sections = window.formBuilder.getStructure();

            const newItem = { id, name, icon, sections };

            if (this.currentId) {
                // Actualizar existente
                const index = this.data.findIndex(i => i.id === this.currentId);
                if (index !== -1) {
                    this.data[index] = newItem;
                }
            } else {
                // Crear nuevo (validar ID único)
                if (this.data.some(i => i.id === id)) {
                    alert("Este ID ya existe. Por favor usa otro.");
                    return;
                }
                this.data.push(newItem);
                this.currentId = id; // Seleccionarlo
            }

            this.saveToLS();
            this.renderList();
            
            // Feedback visual simple
            const saveBtn = document.querySelector('#editor-form button i.fa-save');
            saveBtn.className = "fa-solid fa-check mr-1";
            setTimeout(() => saveBtn.className = "fa-solid fa-save mr-1", 1000);
        },

        deleteCurrent() {
            if (!this.currentId) return;
            if (confirm("¿Estás seguro de eliminar este elemento? Esta acción no se puede deshacer.")) {
                this.data = this.data.filter(i => i.id !== this.currentId);
                this.saveToLS();
                this.currentId = null;
                this.renderList();
                document.getElementById('editor-empty').classList.remove('hidden');
                document.getElementById('editor-form').classList.add('hidden');
                document.getElementById('editor-form').classList.remove('flex');
            }
        },

        updateIconPreview(val) {
            const container = document.getElementById('icon-preview');
            if (!val) {
                container.innerHTML = '<i class="fa-solid fa-cube"></i>';
                return;
            }
            if (val.includes('http')) {
                container.innerHTML = `<img src="${val}" class="w-full h-full object-cover rounded">`;
            } else {
                container.innerHTML = `<i class="fa-solid ${val}"></i>`;
            }
        }
    };

    // --- LÓGICA DEL CONSTRUCTOR DE FORMULARIOS (FORM BUILDER) ---
    // Cambio importante: Asignar a window
    window.formBuilder = {
        container: document.getElementById('sections-container'),

        renderSections(sections) {
            this.container.innerHTML = '';
            sections.forEach(section => this.addSectionUI(section));
        },

        addSection() {
            this.addSectionUI({ title: '', fields: [] });
        },

        addSectionUI(data) {
            const sectionId = 'section-' + Date.now();
            const div = document.createElement('div');
            div.className = "bg-white border border-slate-200 rounded-lg p-3 relative group section-block";
            div.innerHTML = `
                <!-- Cabecera Sección -->
                <div class="flex items-center gap-2 mb-3">
                    <div class="cursor-move text-slate-300 hover:text-slate-500"><i class="fa-solid fa-grip-vertical"></i></div>
                    <input type="text" value="${data.title}" class="section-title-input font-bold text-slate-700 border-none focus:ring-0 p-0 w-full placeholder-slate-300" placeholder="Nombre de la Sección (ej: Mantenimiento)">
                    <button onclick="this.closest('.section-block').remove()" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                
                <!-- Contenedor Campos -->
                <div class="fields-container space-y-2 pl-4 border-l-2 border-slate-100">
                    <!-- Campos aquí -->
                </div>

                <!-- Botón Añadir Campo -->
                <div class="mt-3 pl-4">
                    <button onclick="window.formBuilder.addFieldUI(this.closest('.section-block').querySelector('.fields-container'))" class="text-xs text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1">
                        <i class="fa-solid fa-plus"></i> Añadir Campo
                    </button>
                </div>
            `;
            
            this.container.appendChild(div);

            // Renderizar campos existentes
            const fieldsContainer = div.querySelector('.fields-container');
            if (data.fields && data.fields.length > 0) {
                data.fields.forEach(field => this.addFieldUI(fieldsContainer, field));
            } else {
                // Añadir un campo vacío por defecto si es nueva sección
                if(!data.title) this.addFieldUI(fieldsContainer); 
            }
        },

        addFieldUI(container, data = { label: '', type: 'text' }) {
            const div = document.createElement('div');
            div.className = "flex items-center gap-2 field-row bg-slate-50 p-2 rounded";
            
            // Opciones de tipo de campo
            const types = [
                {val: 'text', label: 'Texto'},
                {val: 'number', label: 'Número'},
                {val: 'date', label: 'Fecha'},
                {val: 'boolean', label: 'Sí/No'},
                {val: 'photo', label: 'Foto'},
            ];
            
            const optionsHtml = types.map(t => `<option value="${t.val}" ${data.type === t.val ? 'selected' : ''}>${t.label}</option>`).join('');

            div.innerHTML = `
                <input type="text" value="${data.label}" class="field-label-input text-xs border border-slate-300 rounded px-2 py-1 w-1/2 focus:border-brand-500 focus:ring-brand-500" placeholder="Nombre del Campo">
                <select class="field-type-select text-xs border border-slate-300 rounded px-2 py-1 w-1/3 focus:border-brand-500 focus:ring-brand-500">
                    ${optionsHtml}
                </select>
                <button onclick="this.closest('.field-row').remove()" class="text-slate-400 hover:text-red-500 ml-auto"><i class="fa-solid fa-times"></i></button>
            `;
            container.appendChild(div);
        },

        getStructure() {
            const sections = [];
            const sectionBlocks = this.container.querySelectorAll('.section-block');
            
            sectionBlocks.forEach(block => {
                const title = block.querySelector('.section-title-input').value.trim();
                if (!title) return; 

                const fields = [];
                const fieldRows = block.querySelectorAll('.field-row');
                
                fieldRows.forEach(row => {
                    const label = row.querySelector('.field-label-input').value.trim();
                    const type = row.querySelector('.field-type-select').value;
                    if (label) {
                        fields.push({ label, type });
                    }
                });

                sections.push({ title, fields });
            });
            return sections;
        }
    };

    // Inicializar
    window.itemManager.init();

</script>
