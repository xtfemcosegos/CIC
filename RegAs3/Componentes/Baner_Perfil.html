<div id="profile-scroll-container" class="h-full bg-slate-50 relative overflow-y-auto custom-scrollbar scroll-smooth">
    
    <!-- 1. HEADER GRANDE (Scrollable) -->
    <div class="h-80 bg-slate-800 relative group shrink-0">
        <img id="side-p-photo" src="" class="w-full h-full object-cover opacity-90" alt="Perfil">
        
        <!-- Fallback si no hay foto -->
        <div id="side-p-fallback" class="absolute inset-0 flex items-center justify-center bg-slate-700 hidden">
            <i class="fa-solid fa-user text-6xl text-slate-500"></i>
        </div>

        <!-- Gradiente e Información -->
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/20 to-transparent flex flex-col justify-end p-6">
            <div class="flex justify-between items-end w-full">
                <div class="min-w-0 mr-4">
                    <h2 id="side-p-name" class="text-white font-bold text-2xl leading-tight drop-shadow-md mb-1">Cargando...</h2>
                    <div class="flex flex-wrap items-center gap-2">
                        <span id="side-p-id" class="text-slate-200 text-xs font-mono bg-white/20 px-2 py-0.5 rounded backdrop-blur-sm">ID: ---</span>
                        <span id="side-p-area" class="text-slate-200 text-xs flex items-center"><i class="fa-solid fa-map-pin mr-1 text-red-400"></i> ---</span>
                    </div>
                </div>
                <!-- Botón Expandir -->
                <button id="btn-expand-profile" class="text-white hover:text-brand-300 bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-sm p-2 rounded-lg transition-all shadow-sm" title="Ver Perfil Completo">
                    <i class="fa-solid fa-expand text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 2. BARRA DE NAVEGACIÓN STICKY (Con Mini-Perfil) -->
    <div id="sticky-nav" class="sticky top-0 z-40 bg-white shadow-sm transition-all duration-200">
        
        <!-- Mini Perfil (Oculto inicialmente, aparece al hacer scroll) -->
        <div id="mini-profile-header" class="hidden px-4 py-2 border-b border-slate-100 bg-white/95 backdrop-blur flex items-center gap-3 animate-fade-in">
            <img id="mini-p-photo" src="" class="w-8 h-8 rounded-full object-cover border border-slate-200 bg-slate-100">
            <div class="min-w-0 flex-grow">
                <p id="mini-p-name" class="text-sm font-bold text-slate-800 truncate leading-none">Nombre</p>
                <p class="text-[10px] text-slate-500 truncate leading-none mt-0.5">Detalles del turno</p>
            </div>
        </div>

        <!-- Pestañas -->
        <div class="flex border-b border-slate-200">
            <button onclick="window.profileSidePanelManager.setTab('turno')" id="side-tab-turno" class="flex-1 py-3 text-xs font-bold text-brand-600 border-b-2 border-brand-600 bg-brand-50/50 transition-colors uppercase tracking-wide">Gestión Turno</button>
            <button onclick="window.profileSidePanelManager.setTab('bitacora')" id="side-tab-bitacora" class="flex-1 py-3 text-xs font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-600 hover:bg-slate-50 transition-colors uppercase tracking-wide" disabled>Bitácora</button>
        </div>
    </div>

    <!-- 3. CONTENIDO PRINCIPAL -->
    <div class="p-5 pb-20"> <!-- Padding bottom extra para scroll -->
        
        <!-- VISTA: GESTIÓN TURNO -->
        <div id="side-content-turno" class="animate-fade-in">
            
            <!-- TARJETA DE ESTADO ACTUAL -->
            <div id="shift-config-card" class="bg-white rounded-xl border border-slate-200 shadow-sm mb-6 overflow-hidden transition-all duration-300">
                
                <!-- CABECERA: CONFIGURACIÓN BÁSICA -->
                <div class="px-4 py-3 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-slate-700" id="view-shift-name">--</span>
                            <button onclick="window.profileSidePanelManager.toggleEditMode(true)" class="text-[10px] text-brand-600 hover:underline"><i class="fa-solid fa-pen"></i></button>
                        </div>
                        <p class="text-[10px] text-slate-400 font-mono" id="view-shift-time">--:--</p>
                    </div>
                    <div id="status-badge" class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-slate-200 text-slate-500 shadow-sm">
                        Cargando...
                    </div>
                </div>

                <!-- MODO VISUALIZACIÓN OPERATIVA -->
                <div id="shift-view-mode" class="p-4 relative">
                    <div id="operational-timeline" class="border-l-2 border-slate-200 pl-5 ml-1 space-y-6 my-2 relative z-0">
                        <!-- Timeline dinámico -->
                    </div>

                    <!-- Controles Rápidos -->
                    <div class="mt-6 pt-4 border-t border-slate-100 flex flex-wrap gap-3 justify-between items-center">
                        <label class="flex items-center gap-2 cursor-pointer group select-none">
                            <div class="relative flex items-center">
                                <input type="checkbox" id="quick-check-late" onchange="window.profileSidePanelManager.toggleLate(this.checked)" class="peer h-4 w-4 rounded border-slate-300 text-orange-500 focus:ring-orange-500 transition-all cursor-pointer">
                            </div>
                            <span class="text-xs font-bold text-slate-500 group-hover:text-orange-600 transition-colors">Retardo</span>
                        </label>

                        <div class="relative">
                            <select id="quick-absence-select" onchange="window.profileSidePanelManager.setAbsence(this.value)" class="appearance-none bg-slate-50 border border-slate-200 hover:border-slate-300 text-slate-600 text-xs rounded-lg py-1.5 pl-3 pr-8 focus:outline-none focus:ring-2 focus:ring-brand-500/20 cursor-pointer font-medium transition-colors">
                                <option value="">Marcar Ausencia...</option>
                                <option value="Falta">❌ Falta</option>
                                <option value="Descanso">💤 Descanso</option>
                                <option value="Permiso">📄 Permiso</option>
                                <option value="Incapacidad">🚑 Incapacidad</option>
                                <option value="Vacaciones">✈️ Vacaciones</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-400">
                                <i class="fa-solid fa-chevron-down text-[10px]"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MODO EDICIÓN COMPLETA -->
                <div id="shift-edit-mode" class="hidden bg-white p-4">
                    <h4 class="text-xs font-bold text-slate-400 uppercase mb-3 flex justify-between items-center">
                        Editar Asignación
                        <button onclick="window.profileSidePanelManager.deleteAssignment()" class="text-[10px] text-red-500 hover:bg-red-50 px-2 py-1 rounded border border-red-200 transition-colors hover:border-red-400 font-bold">
                            <i class="fa-solid fa-trash mr-1"></i> Eliminar Turno
                        </button>
                    </h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1">Cambiar Área</label>
                            <select id="edit-area-select" class="w-full text-xs rounded border-slate-300 focus:ring-brand-500"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1">Entrada Prog.</label>
                                <input type="time" id="edit-start-time" class="w-full text-xs rounded border-slate-300">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1">Duración</label>
                                <input type="number" id="edit-duration" class="w-full text-xs rounded border-slate-300">
                            </div>
                        </div>
                        <div class="flex gap-2 mt-4 pt-2 border-t border-slate-100">
                            <button onclick="window.profileSidePanelManager.saveConfigChanges()" class="flex-1 bg-brand-600 text-white text-xs font-bold py-2 rounded hover:bg-brand-700">Guardar</button>
                            <button onclick="window.profileSidePanelManager.toggleEditMode(false)" class="px-3 bg-white border border-slate-300 text-slate-600 text-xs font-bold py-2 rounded hover:bg-slate-50">Cancelar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Comentarios -->
            <div class="mt-4">
                <label class="block text-xs font-bold text-slate-500 mb-2 flex items-center gap-2">
                    <i class="fa-regular fa-comment-dots"></i> Observaciones Generales
                </label>
                <textarea id="main-comments" rows="3" class="w-full text-sm border-slate-300 rounded-xl focus:border-brand-500 focus:ring-brand-500 bg-slate-50 focus:bg-white transition-colors" placeholder="Escribe detalles adicionales sobre el turno o incidencia..." onchange="window.profileSidePanelManager.saveComments(this.value)"></textarea>
            </div>

        </div>
    </div>
</div>

<!-- Modal Foto Evidencia -->
<div id="evidence-modal" class="fixed inset-0 z-[60] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in" onclick="this.classList.add('hidden')">
    <div class="relative max-w-full max-h-full">
        <img id="evidence-img" src="" class="max-h-[85vh] rounded shadow-2xl border-4 border-white/10">
        <button class="absolute -top-10 right-0 text-white hover:text-red-400 text-2xl transition-colors"><i class="fa-solid fa-xmark"></i></button>
        <p class="text-white text-center text-xs mt-2 font-mono" id="evidence-label">Evidencia de Asistencia</p>
    </div>
</div>

<!-- Trigger Script -->
<img src="x" onerror="if(!window.profileSidePanelManager && document.getElementById('script-baner-perfil')) eval(document.getElementById('script-baner-perfil').innerText);" style="display:none;">

<script id="script-baner-perfil">
    window.profileSidePanelManager = {
        currentItem: null,

        init(item) {
            this.currentItem = item;
            this.renderHeader(item);
            this.renderMainCard();
            this.populateEditForm();
            document.getElementById('main-comments').value = item.comments || '';
            
            // Configurar Scroll Listener para efecto Sticky
            const scrollContainer = document.getElementById('profile-scroll-container');
            const miniHeader = document.getElementById('mini-profile-header');
            
            scrollContainer.onscroll = () => {
                if (scrollContainer.scrollTop > 280) { // Altura aprox del header grande
                    miniHeader.classList.remove('hidden');
                } else {
                    miniHeader.classList.add('hidden');
                }
            };

            const btnExpand = document.getElementById('btn-expand-profile');
            btnExpand.onclick = () => {
                window.toggleRightPanel(false); 
                if(window.openElementProfile) window.openElementProfile(item.elementId || item.id);
            };
        },

        renderHeader(item) {
            const name = item.name || 'Sin Nombre';
            const id = `ID: ${item.elementId || item.id}`;
            const area = `<i class="fa-solid fa-map-pin mr-1 text-red-400"></i> ${item.area || 'Sin Asignar'}`;
            const photoSrc = `FotosElementosPP/${item.elementId || item.id}.jpg`;

            // Header Grande
            document.getElementById('side-p-name').textContent = name;
            document.getElementById('side-p-id').textContent = id;
            document.getElementById('side-p-area').innerHTML = area;
            
            const photoEl = document.getElementById('side-p-photo');
            const fallbackEl = document.getElementById('side-p-fallback');
            
            photoEl.classList.remove('hidden');
            fallbackEl.classList.add('hidden');
            photoEl.src = photoSrc;
            photoEl.onerror = function() {
                this.classList.add('hidden');
                fallbackEl.classList.remove('hidden');
                fallbackEl.classList.add('flex');
                document.getElementById('mini-p-photo').src = `https://ui-avatars.com/api/?name=${name}&background=random`;
            };

            // Mini Header
            document.getElementById('mini-p-name').textContent = name;
            document.getElementById('mini-p-photo').src = photoSrc;
        },

        // --- ELIMINACIÓN ROBUSTA (BASE DE DATOS) ---
        deleteAssignment() {
            if(confirm("¿Estás seguro de eliminar este turno? La acción es irreversible.")) {
                const id = this.currentItem.elementId || this.currentItem.id;
                const date = this.currentItem.date;

                // Intento 1: Usar gestor global si existe
                if(window.RegAs && window.RegAs.assignments && typeof window.RegAs.assignments.remove === 'function') {
                    window.RegAs.assignments.remove(id, date);
                } 
                // Intento 2: Manipulación directa de localStorage (Fallback)
                else {
                    console.warn("Usando fallback de eliminación local...");
                    const all = JSON.parse(localStorage.getItem('regas_assignments') || '[]');
                    const newAll = all.filter(a => !(a.elementId === id && a.date === date));
                    localStorage.setItem('regas_assignments', JSON.stringify(newAll));
                    
                    // Notificar cambios para que la vista se actualice
                    window.dispatchEvent(new CustomEvent('regas:assignments-updated'));
                }
                
                // Cerrar panel
                window.toggleRightPanel(false);
            }
        },

        // --- MAPA Y FOTOS ---
        getEvidenceLinks(type) {
            const photo = this.currentItem[type + 'Photo'];
            const location = this.currentItem[type + 'Location'];
            
            let html = '<div class="flex gap-2 mt-1">';
            let hasLink = false;

            if (photo) {
                html += `<button onclick="event.stopPropagation(); window.profileSidePanelManager.viewEvidencePhoto('${type}')" class="text-[9px] text-blue-500 hover:text-blue-700 font-bold flex items-center gap-1 bg-blue-50 px-2 py-0.5 rounded border border-blue-100 transition-colors"><i class="fa-solid fa-camera"></i> Foto</button>`;
                hasLink = true;
            }
            
            // Verificación robusta de objeto location
            if (location && typeof location.lat === 'number' && typeof location.lng === 'number') {
                html += `<button onclick="event.stopPropagation(); window.profileSidePanelManager.viewEvidenceLocation('${type}')" class="text-[9px] text-green-600 hover:text-green-800 font-bold flex items-center gap-1 bg-green-50 px-2 py-0.5 rounded border border-green-100 transition-colors"><i class="fa-solid fa-map-location-dot"></i> Mapa</button>`;
                hasLink = true;
            } else if (location) {
                // Debug si llega algo pero no los numeros
                console.log("Datos de ubicación inválidos para", type, location);
            }

            html += '</div>';
            return hasLink ? html : '';
        },

        viewEvidencePhoto(type) {
            const photo = this.currentItem[type + 'Photo'];
            if(photo) {
                document.getElementById('evidence-img').src = photo;
                document.getElementById('evidence-modal').classList.remove('hidden');
            }
        },

        viewEvidenceLocation(type) {
            const location = this.currentItem[type + 'Location'];
            if(location && location.lat && location.lng) {
                // URL Universal de Google Maps con marcador
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${location.lat},${location.lng}`;
                window.open(mapUrl, '_blank');
            } else {
                alert("No hay coordenadas válidas registradas.");
            }
        },

        // --- RENDERIZADO Y LÓGICA (Sin cambios mayores, solo integración) ---
        renderMainCard() {
            const item = this.currentItem;
            document.getElementById('view-shift-name').textContent = item.shift;
            document.getElementById('view-shift-time').textContent = `${item.startTime || '--:--'} - ${item.duration || 0} hrs`;
            
            const status = this.calculateStatus(item);
            const badge = document.getElementById('status-badge');
            badge.className = `px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-sm ${status.bg} ${status.text}`;
            badge.innerHTML = status.label;

            this.renderTimeline();
            document.getElementById('quick-check-late').checked = !!item.isLate;
            const absSelect = document.getElementById('quick-absence-select');
            const isAbsent = ['Falta', 'Descanso', 'Incapacidad', 'Permiso', 'Vacaciones'].includes(item.shift);
            absSelect.value = isAbsent ? item.shift : "";
        },

        calculateStatus(item) {
            const isAbsent = ['Falta', 'Descanso', 'Incapacidad', 'Permiso', 'Vacaciones'].includes(item.shift) || item.isAbsent;
            if (isAbsent) return { label: `<i class="fa-solid fa-user-slash mr-1"></i> ${item.shift}`, bg: 'bg-slate-200', text: 'text-slate-500' };
            if (item.checkOutTime) return { label: '<i class="fa-solid fa-check-double mr-1"></i> Finalizado', bg: 'bg-slate-100', text: 'text-slate-500' };
            if (item.checkInTime) return { label: '<i class="fa-solid fa-circle-check mr-1"></i> En Turno', bg: 'bg-green-100', text: 'text-green-600' };
            const now = new Date();
            const [h, m] = (item.startTime || "00:00").split(':').map(Number);
            const startMinutes = h * 60 + m;
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            if (currentMinutes > startMinutes + 15) return { label: '<i class="fa-solid fa-triangle-exclamation mr-1"></i> Retardo', bg: 'bg-orange-100', text: 'text-orange-600' };
            return { label: '<i class="fa-solid fa-hourglass-start mr-1"></i> Por Ingresar', bg: 'bg-blue-100', text: 'text-blue-600' };
        },

        getAreaOptionsHTML(selectedArea) {
            const areasConfig = JSON.parse(localStorage.getItem('regas_areas_config') || '{"categories":[]}');
            let options = '<option value="">-- Área --</option>';
            if(areasConfig.categories) {
                areasConfig.categories.forEach(cat => {
                    if(cat.areas) cat.areas.forEach(a => {
                        const sel = a.name === selectedArea ? 'selected' : '';
                        options += `<option value="${a.name}" ${sel}>${a.name}</option>`;
                    });
                });
            }
            return options;
        },

        renderTimeline() {
            const container = document.getElementById('operational-timeline');
            const item = this.currentItem;
            const isAbsent = ['Falta', 'Descanso', 'Incapacidad', 'Permiso', 'Vacaciones'].includes(item.shift);
            if (isAbsent) {
                container.innerHTML = `<div class="p-3 bg-slate-50 border border-dashed border-slate-200 rounded text-center text-xs text-slate-400 italic">No se requieren registros para este estado.</div>`;
                return;
            }

            const checkIn = item.checkInTime || '';
            const checkOut = item.checkOutTime || '';
            const movementExists = !!item.movementTime;

            let html = `
                <div class="relative group">
                    <div class="absolute -left-[27px] top-2.5 w-3 h-3 ${checkIn ? 'bg-green-500 border-green-600' : 'bg-white border-slate-300'} rounded-full border-2 z-10 transition-colors shadow-sm"></div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 flex justify-between">
                        Entrada 
                        ${item.isLate ? '<span class="text-orange-500 text-[9px] font-bold ml-2">RETARDO</span>' : ''}
                    </label>
                    <div class="flex flex-col gap-2">
                        <div class="flex gap-2">
                            <input type="time" id="input-checkin" value="${checkIn}" class="w-full text-sm border-slate-300 rounded-lg focus:ring-brand-500 h-9 bg-slate-50 focus:bg-white font-mono" onchange="window.profileSidePanelManager.saveTime('checkInTime', this.value)">
                            <button onclick="window.profileSidePanelManager.setNow('input-checkin', 'checkInTime')" class="bg-white border border-slate-200 text-slate-400 hover:text-green-600 hover:border-green-500 rounded-lg px-3 h-9 transition-all shadow-sm active:scale-95" title="Marcar Ahora"><i class="fa-solid fa-stopwatch"></i></button>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-lg border border-slate-200">
                            <span class="text-[9px] font-bold text-slate-400 uppercase whitespace-nowrap px-1">Ingresa a:</span>
                            <select onchange="window.profileSidePanelManager.saveField('checkInArea', this.value)" class="w-full text-[10px] py-0.5 px-2 border-none bg-transparent text-slate-700 font-medium focus:ring-0 cursor-pointer">
                                ${this.getAreaOptionsHTML(item.checkInArea || item.area)}
                            </select>
                        </div>
                        ${this.getEvidenceLinks('checkIn')}
                    </div>
                </div>
                <div class="absolute left-[-22px] top-10 ${movementExists ? 'bottom-28' : 'bottom-10'} w-0.5 bg-slate-200 -z-0"></div>
            `;

            if (movementExists) {
                html += `
                    <div class="relative group mt-6 mb-6">
                        <div class="absolute -left-[27px] top-2.5 w-3 h-3 bg-purple-500 border-purple-600 rounded-full border-2 z-10 transition-colors shadow-sm"></div>
                        <div class="flex justify-between items-center mb-1 ml-1">
                            <label class="text-[10px] font-bold text-purple-600 uppercase">Se mueve a</label>
                            <button onclick="window.profileSidePanelManager.removeMovement()" class="text-[9px] text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex gap-2">
                                <input type="time" value="${item.movementTime || ''}" onchange="window.profileSidePanelManager.saveField('movementTime', this.value)" class="w-full text-xs border-purple-200 rounded focus:ring-purple-500 text-purple-700 h-8">
                            </div>
                            <div class="bg-purple-50 p-1.5 rounded border border-purple-100">
                                <select onchange="window.profileSidePanelManager.saveField('movementArea', this.value)" class="w-full text-[10px] py-0.5 px-2 border-none bg-transparent text-purple-800 font-bold focus:ring-0">
                                    ${this.getAreaOptionsHTML(item.movementArea)}
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[-22px] bottom-10 top-auto h-16 w-0.5 bg-slate-200 -z-0"></div>
                `;
            } else {
                html += `
                    <div class="relative my-4 ml-[-12px]">
                        <button onclick="window.profileSidePanelManager.addMovement()" class="text-[9px] bg-white border border-slate-200 text-slate-400 hover:text-purple-600 hover:border-purple-300 px-2 py-0.5 rounded-full shadow-sm transition-all z-20 relative">+ Rotación</button>
                    </div>
                `;
            }

            html += `
                <div class="relative group mt-2">
                    <div class="absolute -left-[27px] top-2.5 w-3 h-3 ${checkOut ? 'bg-blue-500 border-blue-600' : 'bg-white border-slate-300'} rounded-full border-2 z-10 transition-colors shadow-sm"></div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Salida</label>
                    <div class="flex flex-col gap-2">
                        <div class="flex gap-2">
                            <input type="time" id="input-checkout" value="${checkOut}" class="w-full text-sm border-slate-300 rounded-lg focus:ring-brand-500 h-9 bg-slate-50 focus:bg-white font-mono" onchange="window.profileSidePanelManager.saveTime('checkOutTime', this.value)">
                            <button onclick="window.profileSidePanelManager.setNow('input-checkout', 'checkOutTime')" class="bg-white border border-slate-200 text-slate-400 hover:text-blue-600 rounded-lg px-3 h-9 shadow-sm"><i class="fa-solid fa-stopwatch"></i></button>
                        </div>
                        ${this.getEvidenceLinks('checkOut')}
                    </div>
                </div>
            `;
            container.innerHTML = html;
        },

        saveTime(field, val) { this.currentItem[field] = val; this.persistChanges(); this.renderMainCard(); },
        saveField(field, val) { this.currentItem[field] = val; this.persistChanges(); },
        addMovement() {
            const now = new Date();
            this.currentItem.movementTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            this.currentItem.movementArea = this.currentItem.area;
            this.persistChanges();
            this.renderMainCard();
        },
        removeMovement() { this.currentItem.movementTime = null; this.currentItem.movementArea = null; this.persistChanges(); this.renderMainCard(); },
        setNow(inputId, field) {
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            document.getElementById(inputId).value = timeStr;
            this.saveTime(field, timeStr);
        },
        toggleLate(checked) { this.currentItem.isLate = checked; this.persistChanges(); this.renderMainCard(); },
        setAbsence(type) {
            if (!type) return; 
            if (confirm(`¿Cambiar turno a ${type}? Esto borrará los registros de hora actuales.`)) {
                this.currentItem.shift = type;
                this.currentItem.isAbsent = (type === 'Falta');
                this.currentItem.checkInTime = null;
                this.currentItem.checkOutTime = null;
                this.currentItem.startTime = null;
                this.currentItem.duration = 0;
                this.currentItem.movementTime = null;
                this.currentItem.movementArea = null;
                this.currentItem.checkInArea = null;
                this.persistChanges();
                this.init(this.currentItem);
            } else {
                document.getElementById('quick-absence-select').value = "";
            }
        },
        toggleEditMode(edit) {
            const view = document.getElementById('shift-view-mode');
            const editor = document.getElementById('shift-edit-mode');
            if(edit) {
                view.classList.add('hidden');
                editor.classList.remove('hidden');
                this.populateEditForm();
            } else {
                view.classList.remove('hidden');
                editor.classList.add('hidden');
            }
        },
        populateEditForm() {
            document.getElementById('edit-area-select').innerHTML = this.getAreaOptionsHTML(this.currentItem.area);
            document.getElementById('edit-start-time').value = this.currentItem.startTime || '';
            document.getElementById('edit-duration').value = this.currentItem.duration || 8;
        },
        saveConfigChanges() {
            this.currentItem.area = document.getElementById('edit-area-select').value;
            this.currentItem.startTime = document.getElementById('edit-start-time').value;
            this.currentItem.duration = document.getElementById('edit-duration').value;
            const isAbsent = ['Falta', 'Descanso', 'Incapacidad', 'Permiso', 'Vacaciones'].includes(this.currentItem.shift);
            if(isAbsent && this.currentItem.startTime) { this.currentItem.shift = 'Diurno'; }
            this.persistChanges();
            this.init(this.currentItem);
            this.toggleEditMode(false);
        },
        saveComments(val) { this.currentItem.comments = val; this.persistChanges(); },
        persistChanges() {
            const allAssignments = window.RegAs.assignments.getAll();
            const idx = allAssignments.findIndex(a => a.elementId === this.currentItem.elementId && a.date === this.currentItem.date);
            if (idx !== -1) {
                allAssignments[idx] = { ...allAssignments[idx], ...this.currentItem };
                window.RegAs.assignments.save(allAssignments);
            }
        },
        setTab(tabName) {
            ['turno', 'bitacora'].forEach(t => {
                const btn = document.getElementById(`side-tab-${t}`);
                if(!btn) return;
                const content = document.getElementById(`side-content-${t}`);
                if (t === tabName) {
                    btn.className = "flex-1 py-2.5 text-xs font-bold text-brand-600 border-b-2 border-brand-600 bg-brand-50/50 transition-colors uppercase tracking-wide";
                    if(content) content.classList.remove('hidden');
                } else {
                    btn.className = "flex-1 py-2.5 text-xs font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-600 hover:bg-slate-50 transition-colors uppercase tracking-wide";
                    if(content) content.classList.add('hidden');
                }
            });
        }
    };
</script>
