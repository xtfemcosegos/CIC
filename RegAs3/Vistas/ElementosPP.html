<!-- LÓGICA ESPECÍFICA DE ESTE MÓDULO -->
<script>
    (function() {
        console.log("Cargando lógica de EPP...");
        
        // Datos específicos para Elementos de Protección
        // He adaptado los datos anteriores para que tengan sentido en este contexto
        const eppModules = [
            {
                title: "Cascos de Seguridad",
                desc: "Inventario de cascos dieléctricos y de protección general. Normativa ANSI Z89.1.",
                icon: "fa-helmet-safety",
                color: "bg-yellow-100 text-yellow-800"
            },
            {
                title: "Guantes Industriales",
                desc: "Control de stock de guantes de nitrilo, cuero y carnaza para manipulación.",
                icon: "fa-hands", // Usando un icono genérico cercano
                color: "bg-blue-100 text-blue-800"
            },
            {
                title: "Botas de Seguridad",
                desc: "Registro de tallas y asignación de calzado con punta de acero.",
                icon: "fa-shoe-prints",
                color: "bg-stone-200 text-stone-700"
            },
            {
                title: "Protección Auditiva",
                desc: "Gestión de orejeras y tapones auditivos para zonas de alto ruido.",
                icon: "fa-ear-listen",
                color: "bg-green-100 text-green-800"
            },
            {
                title: "Gafas Protectoras",
                desc: "Lentes de seguridad anti-empañantes y con filtro UV.",
                icon: "fa-glasses",
                color: "bg-indigo-100 text-indigo-800"
            },
            {
                title: "Chalecos Reflectivos",
                desc: "Dotación de ropa de alta visibilidad para trabajo nocturno o en vía.",
                icon: "fa-vest",
                color: "bg-orange-100 text-orange-800"
            }
        ];

        const gridContainer = document.getElementById('epp-grid');
        
        if (gridContainer) {
            gridContainer.innerHTML = ''; // Limpiar por si acaso
            
            eppModules.forEach((feature, index) => {
                const card = document.createElement('div');
                card.className = "bg-white overflow-hidden shadow rounded-2xl p-6 hover-scale border border-slate-100 flex flex-col h-full";
                
                // Animación inline
                card.style.opacity = '0';
                card.style.animation = `fadeIn 0.5s ease-out forwards ${index * 0.1}s`;

                card.innerHTML = `
                    <div class="flex items-center mb-4">
                        <div class="flex-shrink-0">
                            <div class="h-12 w-12 rounded-xl ${feature.color} flex items-center justify-center text-xl">
                                <i class="fa-solid ${feature.icon}"></i>
                            </div>
                        </div>
                        <div class="ml-4">
                            <h3 class="text-lg font-bold text-slate-900">${feature.title}</h3>
                        </div>
                    </div>
                    <p class="text-base text-slate-500 flex-grow">
                        ${feature.desc}
                    </p>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                        <span class="text-xs font-semibold text-slate-400 bg-slate-100 px-2 py-1 rounded">Stock: 120</span>
                        <button class="text-sm font-medium text-brand-600 hover:text-brand-500 flex items-center gap-1">
                            Gestionar <i class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }
    })();
</script>
