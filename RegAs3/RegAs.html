<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegAs - Control de Asistencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fef2f2', 100: '#fee2e2', 200: '#fecaca', 300: '#fca5a5', 400: '#f87171', 500: '#dc2626', 600: '#b91c1c', 700:'#991b1b', 800:'#7f1d1d', 900:'#450a0a', 950:'#2a0a0a' }
                    }
                }
            }
        }
    </script>

    <!-- Script de Seguridad de Sesión -->
    <script>
        (function() {
            const session = localStorage.getItem('regas_user_session');
            if (!session) {
                window.location.href = 'https://cicxtfemco.online/login.html';
            }
        })();
    </script>
</head>
<body class="bg-slate-50 overflow-hidden h-screen flex text-slate-800">
    
    <!-- Sidebar Container -->
    <aside id="module-sidebar" class="w-64 bg-white border-r border-slate-200 h-full hidden md:block flex-shrink-0 z-30 transition-all duration-300">
        <!-- Se inyecta Baner_Lateral.html aquí -->
        <div class="flex items-center justify-center h-full text-slate-300"><i class="fa-solid fa-circle-notch fa-spin text-2xl"></i></div>
    </aside>

    <!-- Overlay Móvil -->
    <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 z-20 hidden md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <!-- Main App Container -->
    <main class="flex-grow h-full relative flex flex-col min-w-0 transition-all duration-300">
        
        <!-- HEADER DEL MÓDULO -->
        <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 sm:px-6 shrink-0 z-20 shadow-sm">
            <!-- Izquierda: Título y Toggle -->
            <div class="flex items-center gap-4">
                <!-- Botón Toggle (Visible en móvil O cuando el sidebar está oculto por el perfil) -->
                <button id="sidebar-toggle-btn" onclick="toggleSidebar()" class="md:hidden text-slate-500 hover:text-brand-600 p-1 rounded-lg transition-colors" title="Mostrar Menú">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <div>
                    <h1 class="font-bold text-lg text-slate-800 leading-none">Elementos PP</h1>
                    <span class="text-[10px] font-bold text-brand-600 uppercase tracking-widest">Control de Asistencia</span>
                </div>
            </div>

            <!-- Derecha: Perfil -->
            <div class="relative">
                <button onclick="toggleUserMenu(event)" class="w-9 h-9 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center border border-slate-200 hover:ring-2 hover:ring-brand-200 transition-all shadow-sm overflow-hidden" id="header-avatar-btn">
                    <i class="fa-solid fa-user"></i>
                </button>

                <!-- Menú Desplegable -->
                <div id="header-user-menu" class="absolute right-0 top-full mt-2 w-56 bg-white rounded-xl shadow-xl border border-slate-200 z-50 hidden animate-fade-in overflow-hidden">
                    <div class="px-4 py-3 border-b border-slate-100 bg-slate-50">
                        <p class="text-sm font-bold text-slate-800 truncate" id="header-user-name">Usuario</p>
                        <p class="text-[10px] text-slate-500 truncate" id="header-user-role">Rol</p>
                    </div>
                    <div class="p-1">
                        <button onclick="openMyProfile()" class="w-full text-left flex items-center gap-3 px-3 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-slate-800 rounded-lg transition-colors">
                            <i class="fa-solid fa-id-badge w-4 text-center"></i> Mi Perfil
                        </button>
                        <div class="border-t border-slate-100 my-1"></div>
                        <button onclick="logout()" class="w-full text-left flex items-center gap-3 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                            <i class="fa-solid fa-power-off w-4 text-center"></i> Cerrar Sesión
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Contenido Dinámico -->
        <div id="module-content" class="flex-grow h-full relative overflow-hidden"></div>
    </main>

    <!-- Panel Lateral Derecho (Perfil Global) -->
    <aside id="global-right-panel" class="w-0 bg-white border-l border-slate-200 h-full overflow-hidden flex-shrink-0 transition-all duration-300 ease-in-out relative z-40 shadow-xl absolute right-0 top-0">
        <div class="w-[28vw] min-w-[350px] h-full flex flex-col relative"> 
            <div id="right-panel-content" class="h-full flex flex-col bg-white"></div>
        </div>
    </aside>

    <script>
        // --- GESTIÓN DE SESIÓN Y UI ---
        function updateHeaderUI() {
            const session = localStorage.getItem('regas_user_session');
            if (session) {
                try {
                    const user = JSON.parse(session);
                    const name = user['Nombre Completo'] || user.Nombre || "Usuario";
                    const initial = name.charAt(0);
                    const roles = {0:"Admin", 1:"Supervisor", 2:"Operativo"};
                    
                    document.getElementById('header-user-name').textContent = name;
                    document.getElementById('header-user-role').textContent = roles[user.Nivel] || "Colaborador";

                    const btn = document.getElementById('header-avatar-btn');
                    const photos = user.Fotografias || [];
                    const photo = photos.length > 0 ? photos[0] : (user.Fotografia || user.FOTOGRAFIA);

                    if (photo) {
                        btn.innerHTML = `<img src="${photo}" class="w-full h-full object-cover">`;
                    } else {
                        btn.innerHTML = `<span class="font-bold text-lg">${initial}</span>`;
                    }
                    btn.classList.add('bg-brand-100', 'text-brand-700', 'border-brand-200');
                    btn.classList.remove('bg-slate-100', 'text-slate-500');
                } catch (e) { console.error(e); }
            }
        }

        function toggleUserMenu(e) {
            e.stopPropagation();
            document.getElementById('header-user-menu').classList.toggle('hidden');
        }

        // --- LÓGICA DE INTERCAMBIO DE PANELES ---
        function toggleSidebar() {
            const sidebar = document.getElementById('module-sidebar');
            const overlay = document.getElementById('mobile-overlay');
            const rightPanel = document.getElementById('global-right-panel');
            
            // Si el panel derecho está abierto, cerrarlo restaura el sidebar automáticamente (via toggleRightPanel)
            if (rightPanel.classList.contains('w-[28vw]')) {
                toggleRightPanel(false);
                return;
            }

            // Lógica estándar de menú móvil
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                // Solo añadir fixed/shadow en móvil si no estamos en desktop mode restaurado
                if (window.innerWidth < 768) { 
                    sidebar.classList.add('fixed', 'inset-y-0', 'left-0', 'shadow-xl');
                    overlay.classList.remove('hidden');
                } else {
                    // En desktop, aseguramos que se vea como bloque
                    sidebar.classList.add('md:block');
                }
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('fixed', 'inset-y-0', 'left-0', 'shadow-xl');
                overlay.classList.add('hidden');
            }
        }

        async function openMyProfile() {
            await loadInternalComponent('../Componentes/MiPerfil.html', 'right-panel-content');
            toggleRightPanel(true);
        }

        function logout() {
            localStorage.removeItem('regas_user_session');
            localStorage.removeItem('regas_session_start');
            window.location.href = 'https://cicxtfemco.online/login.html';
        }

        async function loadInternalComponent(url, containerId) {
            const container = document.getElementById(containerId);
            try {
                const response = await fetch(url);
                if(!response.ok) throw new Error(`Error HTTP ${response.status} al cargar ${url}`);
                const html = await response.text();
                container.innerHTML = html;
                
                container.querySelectorAll("script").forEach(oldScript => {
                    const newScript = document.createElement("script");
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch(e) { console.error("Error cargando componente interno:", e); }
        }

        // --- TOGGLE PANEL DERECHO CON GESTIÓN DE SIDEBAR ---
        window.toggleRightPanel = function(show) {
            const panel = document.getElementById('global-right-panel');
            const sidebar = document.getElementById('module-sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle-btn');

            if(show) {
                // ABRIR Panel Derecho
                panel.classList.remove('w-0');
                panel.classList.add('w-[28vw]', 'min-w-[350px]');
                
                // OCULTAR Sidebar Izquierdo (Modo Enfoque)
                sidebar.classList.remove('md:block'); // Quitar visibilidad desktop
                sidebar.classList.add('hidden');      // Forzar oculto
                
                // MOSTRAR Botón de Menú en Header (Para poder reabrir sidebar)
                toggleBtn.classList.remove('md:hidden');
                
            } else {
                // CERRAR Panel Derecho
                panel.classList.remove('w-[28vw]', 'min-w-[350px]');
                panel.classList.add('w-0');
                setTimeout(() => {
                    const content = document.getElementById('right-panel-content');
                    if(content) content.innerHTML = '';
                }, 300);

                // RESTAURAR Sidebar Izquierdo
                sidebar.classList.remove('hidden');
                sidebar.classList.add('md:block');
                
                // OCULTAR Botón de Menú en Header (Ya no es necesario en desktop)
                toggleBtn.classList.add('md:hidden');
            }
        };

        window.loadComponent = loadInternalComponent;
        
        document.addEventListener('click', () => {
            document.getElementById('header-user-menu').classList.add('hidden');
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateHeaderUI();
            loadInternalComponent('Componentes/Baner_Lateral.html', 'module-sidebar');
            loadInternalComponent('Vistas/ElementosPP.html', 'module-content');
        });
    </script>
</body>
</html>
