        <!-- SCRIPTS CORE -->
        <script>
            function updateClock() {
                const now = new Date();
                const clockEl = document.getElementById('clock-display');
                if (clockEl) clockEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            }
            setInterval(updateClock, 1000); updateClock();

            // --- GESTOR DE SINCRONIZACIÓN CENTRALIZADO ---
            window.syncManager = {
                API_URL: "https://default3b2cbccb81bb44a2a19a2386bb3606.02.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9f1a1b8b772e4e8299870e50b78b6dd5/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ADqvyD8wK1Qwzdx8bmSkrMB6-bURKepai99jsYOqab4",
                DB_KEYS: [
                    'regas_epp_config',
                    'regas_assignments',
                    'regas_areas_config',
                    'regas_shift_templates',
                    'regas_pattern_templates',
                    'regas_chat_messages',
                    'regas_counters'
                ],
                
                init() {
                    console.log("Iniciando SyncManager...");
                    this.renderDbStatus();
                    // 1. Descarga inicial automática
                    this.downloadData();
                    
                    // 2. Autosave periódico (cada 60s)
                    setInterval(() => this.uploadData(true), 60000);
                },

                async downloadData() {
                    this.updateUI('syncing', 'Descargando...');
                    try {
                        const response = await fetch(this.API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ Mode: 'Descarga' })
                        });

                        if (!response.ok) throw new Error("Error en API");
                        
                        const result = await response.json();
                        
                        // Parsear body si viene como string (común en Power Automate)
                        let cloudData = result;
                        if(result.body && typeof result.body === 'string') {
                            try { cloudData = JSON.parse(result.body); } catch(e) {}
                        } else if (result.Data) {
                            cloudData = result.Data;
                        }

                        if (cloudData && Object.keys(cloudData).length > 0) {
                            // Aplicar datos de la nube
                            this.DB_KEYS.forEach(key => {
                                if (cloudData[key]) {
                                    localStorage.setItem(key, JSON.stringify(cloudData[key]));
                                }
                            });
                            this.updateUI('online', 'Sincronizado');
                            console.log("Datos descargados y aplicados.");
                            // Recargar módulo actual para reflejar cambios
                            window.dispatchEvent(new CustomEvent('regas:assignments-updated'));
                        } else {
                            console.warn("Nube vacía o formato inválido. Manteniendo datos locales.");
                            this.updateUI('local', 'Local (Nube vacía)');
                        }
                    } catch (error) {
                        console.error("Fallo descarga:", error);
                        this.updateUI('offline', 'Modo Offline');
                    }
                    this.renderDbStatus();
                },

                async uploadData(isAuto = false) {
                    if(!isAuto) this.updateUI('syncing', 'Subiendo...');
                    
                    const payload = {};
                    this.DB_KEYS.forEach(key => {
                        const val = localStorage.getItem(key);
                        if(val) payload[key] = JSON.parse(val);
                    });

                    try {
                        await fetch(this.API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                Mode: 'Carga',
                                Data: payload 
                            })
                        });
                        if(!isAuto) this.updateUI('online', 'Guardado en Nube');
                        console.log("Autoguardado exitoso.");
                    } catch (error) {
                        console.error("Fallo subida:", error);
                        if(!isAuto) this.updateUI('offline', 'Error al guardar');
                    }
                    this.renderDbStatus();
                },

                updateUI(status, label) {
                    const icon = document.getElementById('db-icon');
                    const dot = document.getElementById('db-indicator');
                    const text = document.getElementById('sync-status-label');
                    const footerText = document.getElementById('cloud-indicator-text');
                    const time = document.getElementById('last-sync-time');

                    if(text) text.textContent = label;
                    if(time) time.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

                    if (status === 'syncing') {
                        icon.className = "fa-solid fa-rotate fa-spin";
                        dot.className = "absolute top-2 right-2 w-1.5 h-1.5 bg-yellow-400 rounded-full ring-1 ring-white";
                    } else if (status === 'online') {
                        icon.className = "fa-solid fa-cloud text-brand-600";
                        dot.className = "absolute top-2 right-2 w-1.5 h-1.5 bg-green-500 rounded-full ring-1 ring-white";
                        if(footerText) footerText.innerHTML = '<i class="fa-solid fa-circle text-green-500 text-[8px]"></i> Online';
                    } else {
                        icon.className = "fa-solid fa-database text-slate-400";
                        dot.className = "absolute top-2 right-2 w-1.5 h-1.5 bg-gray-400 rounded-full ring-1 ring-white";
                        if(footerText) footerText.innerHTML = '<i class="fa-solid fa-circle text-gray-300 text-[8px]"></i> Offline';
                    }
                },

                renderDbStatus() {
                    const list = document.getElementById('db-status-list');
                    if(!list) return;
                    list.innerHTML = '';
                    
                    this.DB_KEYS.forEach(key => {
                        const data = localStorage.getItem(key);
                        const size = data ? (data.length / 1024).toFixed(1) : 0;
                        
                        const div = document.createElement('div');
                        div.className = "flex justify-between items-center p-2 hover:bg-slate-50 rounded";
                        div.innerHTML = `
                            <div class="flex items-center gap-2">
                                <i class="fa-solid fa-database text-slate-300 text-xs"></i>
                                <span class="text-xs text-slate-600 font-medium truncate max-w-[120px]">${key.replace('regas_','')}</span>
                            </div>
                            <span class="text-[9px] text-slate-400 font-mono">${size} KB</span>
                        `;
                        list.appendChild(div);
                    });
                },

                togglePanel(e) {
                    e.stopPropagation();
                    const panel = document.getElementById('db-status-popover');
                    // Cerrar user menu si está abierto
                    document.getElementById('user-menu-popover')?.classList.add('hidden');
                    
                    panel.classList.toggle('hidden');
                    if(!panel.classList.contains('hidden')) this.renderDbStatus();
                }
            };

            // --- Core: Navegación y Carga ---
            window.appCore = window.appCore || {};
            
            // Nueva función para toggle del menú de usuario
            window.appCore.toggleUserPanel = function(event) {
                event.stopPropagation();
                const panel = document.getElementById('user-menu-popover');
                // Cerrar otros paneles
                document.getElementById('db-status-popover')?.classList.add('hidden');
                
                if (panel.classList.contains('hidden')) {
                    panel.classList.remove('hidden');
                    const closeHandler = (e) => {
                        if (!panel.contains(e.target) && e.target !== event.currentTarget) {
                            panel.classList.add('hidden');
                            document.removeEventListener('click', closeHandler);
                        }
                    };
                    setTimeout(() => document.addEventListener('click', closeHandler), 10);
                } else {
                    panel.classList.add('hidden');
                }
            };

            // Mantener toggleDbPanel en window.appCore para compatibilidad
            window.appCore.toggleDbPanel = window.syncManager.togglePanel.bind(window.syncManager);

            // Export/Import hooks (si existen en el código anterior, los mantenemos aquí o en syncManager)
            // Para mantener compatibilidad con versiones previas, mapeamos:
            window.appCore.exportDB = async () => {
                // Implementación simplificada usando el payload actual
                const payload = {};
                window.syncManager.DB_KEYS.forEach(key => {
                    const val = localStorage.getItem(key);
                    if(val) payload[key] = JSON.parse(val);
                });
                const dataStr = JSON.stringify(payload, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `RegAs_Backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            
            window.appCore.importDB = (inputElement) => {
                const file = inputElement.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (!confirm("Sobrescribir datos locales?")) return;
                        window.syncManager.DB_KEYS.forEach(key => {
                            if (importedData[key]) localStorage.setItem(key, JSON.stringify(importedData[key]));
                        });
                        alert("Importado. Recargando...");
                        location.reload();
                    } catch (error) { alert("Error JSON"); }
                };
                reader.readAsText(file);
            };


            async function loadComponent(url, containerId) {
                const container = document.getElementById(containerId);
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const html = await response.text();
                    container.innerHTML = html;
                    container.querySelectorAll("script").forEach(oldScript => {
                        const newScript = document.createElement("script");
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                    return true;
                } catch (error) {
                    console.error(`Error cargando ${url}:`, error);
                    return false;
                }
            }

            window.loadModule = function(url) {
                const container = document.getElementById('app-container');
                window.toggleRightPanel(false);
                container.style.opacity = '0';
                container.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    loadComponent(url, 'app-container').then(() => {
                        container.style.transition = 'opacity 0.3s ease-out, transform 0.3s ease-out';
                        container.style.opacity = '1';
                        container.style.transform = 'translateY(0)';
                        const drawer = document.getElementById('mobile-sidebar-drawer');
                        if (!drawer.classList.contains('-translate-x-full')) toggleMobileSidebar();
                        container.scrollTop = 0;
                    });
                }, 200);
            };

            window.toggleRightPanel = function(show) {
                const panel = document.getElementById('global-right-panel');
                if (show) { panel.classList.remove('w-0'); panel.classList.add('w-[28vw]', 'min-w-[350px]'); } 
                else { panel.classList.remove('w-[28vw]', 'min-w-[350px]'); panel.classList.add('w-0'); setTimeout(() => { document.getElementById('right-panel-content').innerHTML = ''; }, 300); }
            };

            window.toggleMobileSidebar = function() {
                const overlay = document.getElementById('mobile-sidebar-overlay');
                const drawer = document.getElementById('mobile-sidebar-drawer');
                const content = document.getElementById('mobile-sidebar-content');
                if (drawer.classList.contains('-translate-x-full')) {
                    content.innerHTML = document.getElementById('sidebar-container').innerHTML;
                    overlay.classList.remove('hidden');
                    setTimeout(() => drawer.classList.remove('-translate-x-full'), 10);
                } else {
                    drawer.classList.add('-translate-x-full');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            };
            document.getElementById('mobile-sidebar-btn').addEventListener('click', toggleMobileSidebar);

            document.addEventListener('DOMContentLoaded', async () => {
                await loadComponent('Componentes/Baner_Lateral.html', 'sidebar-container');
                loadModule('Vistas/ElementosPP.html');
                window.syncManager.init(); // Iniciar sincronización
            });
        </script>
    </body>
    </html>
