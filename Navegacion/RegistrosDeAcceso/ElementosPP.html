<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        .nav-link.active {
            color: #720000;
            font-weight: 900;
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #720000;
            border-radius: 2px;
        }
        #content-frame {
            width: 100%;
            height: calc(100vh - 64px); /* Ajustado para encabezado compacto */
            border: none;
        }
    </style>
</head>
<body class="bg-white font-sans text-slate-800 overflow-hidden">

    <!-- ENCABEZADO COMPACTO -->
    <header class="h-16 px-6 border-b border-slate-100 flex items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <h1 class="text-sm font-black text-slate-900 uppercase tracking-tighter leading-none">Elementos PP</h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Control de Operaciones</p>
            </div>
            
            <div class="h-8 w-[1px] bg-slate-100 mx-2"></div>

            <nav class="flex items-center gap-6">
                <button onclick="loadSection('VistaDia')" id="btn-VistaDia" class="nav-link active text-[10px] font-black uppercase tracking-widest">Día</button>
                <button onclick="loadSection('VistaSemana')" id="btn-VistaSemana" class="nav-link text-slate-400 text-[10px] font-black uppercase tracking-widest">Semana</button>
                <button onclick="loadSection('Reportes')" id="btn-Reportes" class="nav-link text-slate-400 text-[10px] font-black uppercase tracking-widest">Reportes</button>
            </nav>
        </div>

        <div class="flex items-center gap-3">
            <div class="flex flex-col items-end mr-2">
                <span id="live-clock" class="text-[10px] font-black text-slate-900">00:00:00</span>
                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Tiempo Real</span>
            </div>
            <button onclick="window.parent.loadInSideApp('Perfiles')" class="p-2 bg-slate-50 text-slate-400 rounded-lg hover:text-red-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
            </button>
        </div>
    </header>

    <!-- ÁREA DE CONTENIDO -->
    <main>
        <iframe id="content-frame" src="../ElementosPP/VistaDia.html"></iframe>
    </main>

    <script>
        function loadSection(section) {
            // Actualizar Frame
            const frame = document.getElementById('content-frame');
            frame.src = `../ElementosPP/${section}.html`;

            // Actualizar Estilos de Nav
            document.querySelectorAll('.nav-link').forEach(btn => {
                btn.classList.remove('active', 'text-slate-900');
                btn.classList.add('text-slate-400');
            });

            const activeBtn = document.getElementById(`btn-${section}`);
            activeBtn.classList.add('active');
            activeBtn.classList.remove('text-slate-400');
        }

        // Reloj en vivo para el encabezado
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-MX', { hour12: false });
            document.getElementById('live-clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
