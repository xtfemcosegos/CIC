<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes steam { 0% { transform: translateY(0) scaleX(1); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-20px) scaleX(1.5); opacity: 0; } }
        @keyframes breathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .steam-line { animation: steam 2s infinite; }
        .breathe { animation: breathe 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-white flex items-center justify-center min-h-screen font-sans overflow-hidden">
    <div id="construction-content" class="text-center max-w-md p-6">
        <div class="relative w-48 h-48 mx-auto mb-8 flex items-center justify-center">
            <div class="relative breathe">
                <div class="w-16 h-24 bg-slate-700 rounded-t-3xl border-4 border-slate-800 relative">
                    <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-10 h-12 bg-amber-200 rounded-xl border-4 border-slate-800"></div>
                    <div class="absolute top-8 -right-4 flex items-center">
                        <div class="w-6 h-3 bg-slate-700 border-y-2 border-r-2 border-slate-800 rounded-r-full"></div>
                        <div class="relative w-8 h-6 bg-white border-2 border-slate-800 rounded-b-md">
                            <div class="absolute -top-4 left-1 flex gap-1">
                                <div class="w-0.5 h-3 bg-slate-300 rounded-full steam-line" style="animation-delay: 0s;"></div>
                                <div class="w-0.5 h-3 bg-slate-300 rounded-full steam-line" style="animation-delay: 0.5s;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <h2 class="text-xl font-black text-slate-900 uppercase tracking-tighter">Vista Semanal en Desarrollo</h2>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2 leading-relaxed">
            Organizando los turnos de la semana... <br> Café listo, código en proceso.
        </p>
    </div>
</body>
</html>
