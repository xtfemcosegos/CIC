<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root { --corporate-red: #720000; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .caseta-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .caseta-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }

        .element-photo {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .element-photo:hover {
            transform: scale(1.1);
            border-color: var(--corporate-red);
            z-index: 10;
        }

        .shift-column {
            background: rgba(248, 250, 252, 0.5);
            border-radius: 1rem;
            min-height: 60px;
        }

        .loader { border-top-color: var(--corporate-red); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <!-- OVERLAY DE CARGA -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-10 h-10 border-4 border-slate-100 loader rounded-full mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Sincronizando Tablero...</p>
    </div>

    <div class="max-w-7xl mx-auto">
        <!-- CABECERA -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Asistencia Diaria</h1>
                <p id="current-date-label" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Cargando fecha...</p>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="bg-white px-4 py-2 rounded-2xl border border-slate-200 flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[9px] font-black uppercase text-slate-500">Sincronizado</span>
                </div>
            </div>
        </header>

        <!-- GRID DE CASETAS -->
        <div id="casetas-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Las casetas se inyectan aquí -->
        </div>

        <div id="empty-state" class="hidden py-40 text-center opacity-20">
            <i class="fa-solid fa-users-slash text-6xl mb-4"></i>
            <p class="text-xl font-black uppercase">No hay registros hoy</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCmyzbw7csEtZkPqV89OMaM4cXDpG6O930", 
            authDomain: "cic-pp.firebaseapp.com", 
            projectId: "cic-pp",
            appId: "1:336771827172:web:ff43891fd9b0fcaca073f1"
        };
        const appId = "cic-pp";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let records = [];
        let areas = [];

        // Fecha de hoy en formato local
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('current-date-label').innerText = new Date().toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        onAuthStateChanged(auth, (user) => {
            if (user) initDashboard();
            else signInAnonymously(auth);
        });

        function initDashboard() {
            // 1. Obtener Casetas
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'areas'), (snap) => {
                areas = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => a.type === 'caseta');
                renderBoard();
            });

            // 2. Obtener Asistencia de Hoy
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance_day'), (snap) => {
                records = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(r => r.date === today);
                renderBoard();
                
                document.getElementById('loading-overlay').classList.add('opacity-0');
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 300);
            });
        }

        function renderBoard() {
            const grid = document.getElementById('casetas-grid');
            const empty = document.getElementById('empty-state');
            
            if (areas.length === 0) return;
            grid.innerHTML = '';
            
            const sortedAreas = [...areas].sort((a, b) => a.name.localeCompare(b.name));

            sortedAreas.forEach(caseta => {
                const casetaRecords = records.filter(r => r.locationId === caseta.id);
                
                const card = document.createElement('div');
                card.className = "caseta-card bg-white rounded-[2rem] border border-slate-100 p-6 flex flex-col";
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-shield-halved text-sm"></i>
                            </div>
                            <div>
                                <h3 class="text-xs font-black uppercase text-slate-800 leading-none">${caseta.name}</h3>
                                <p class="text-[8px] font-bold text-slate-400 uppercase mt-1">Punto de Control</p>
                            </div>
                        </div>
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${casetaRecords.length} Reg.</span>
                    </div>

                    <div class="grid grid-cols-3 gap-2">
                        ${renderShift('morning', 'M', casetaRecords)}
                        ${renderShift('afternoon', 'V', casetaRecords)}
                        ${renderShift('night', 'N', casetaRecords)}
                    </div>
                `;
                grid.appendChild(card);
            });

            empty.classList.toggle('hidden', areas.length > 0);
        }

        function renderShift(shiftKey, label, records) {
            const shiftRecords = records.filter(r => r.shift === shiftKey);
            
            return `
                <div class="shift-column p-2 flex flex-col items-center gap-2">
                    <span class="text-[7px] font-black text-slate-300 uppercase mb-1">${label}</span>
                    <div class="flex flex-wrap justify-center gap-1.5">
                        ${shiftRecords.length > 0 ? 
                            shiftRecords.map(r => `
                                <div class="relative group">
                                    <img src="${r.userPhoto}" 
                                         onclick="openDetail('${r.id}')"
                                         title="${r.userName}"
                                         class="element-photo w-8 h-8 rounded-full object-cover shadow-sm bg-slate-200">
                                    <div class="absolute -top-1 -right-1 w-2.5 h-2.5 ${r.type === 'clock_in_ai' ? 'bg-green-500' : 'bg-amber-500'} border-2 border-white rounded-full"></div>
                                </div>
                            `).join('') 
                            : '<div class="w-8 h-8 rounded-full border border-dashed border-slate-200 flex items-center justify-center text-[8px] text-slate-200"><i class="fa-solid fa-user-plus"></i></div>'
                        }
                    </div>
                </div>
            `;
        }

        window.openDetail = (alertId) => {
            // Enviamos mensaje al index para cargar Alertas con el detalle
            window.parent.postMessage({
                type: 'LOAD_SIDE_APP',
                app: 'Alertas',
                params: `?detailId=${alertId}`
            }, '*');
        };
    </script>
</body>
</html>
