<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .slot-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-zone {
            min-height: 90px;
            transition: all 0.2s ease;
        }

        .drop-zone.drag-over {
            background: #fef2f2;
            border-color: #720000;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(114, 0, 0, 0.1);
        }

        .assigned-badge {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .shift-pill {
            transition: all 0.3s ease;
        }
        .shift-pill.active {
            background: #0f172a;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #save-indicator {
            position: fixed;
            bottom: 24px;
            right: 24px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4 md:p-8 flex flex-col gap-6">

    <!-- INDICADOR DE GUARDADO -->
    <div id="save-indicator" class="opacity-0 transition-opacity duration-300 flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-2xl">
        <i class="fa-solid fa-cloud-arrow-up animate-bounce"></i>
        Sincronizando...
    </div>

    <!-- CABECERA Y HERRAMIENTAS -->
    <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <h2 class="text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none">Tablero Diario</h2>
                <div class="flex items-center gap-2 mt-2">
                    <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sincronización en vivo</p>
                </div>
            </div>

            <div class="h-10 w-[1px] bg-slate-100 hidden md:block"></div>

            <div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                <button onclick="changeDate(-1)" class="p-2 hover:bg-white rounded-xl transition-all text-slate-400 hover:text-slate-900">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </button>
                <div class="flex flex-col items-center px-2">
                    <input type="date" id="date-selector" class="bg-transparent border-none text-xs font-black uppercase outline-none cursor-pointer text-center">
                </div>
                <button onclick="changeDate(1)" class="p-2 hover:bg-white rounded-xl transition-all text-slate-400 hover:text-slate-900">
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>
            <button onclick="setToday()" class="px-4 py-2 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-red-800 transition-colors">Hoy</button>
        </div>

        <div class="flex flex-wrap items-center gap-4">
            <!-- RESUMEN -->
            <div class="flex gap-4 px-6 py-2 bg-slate-50 rounded-2xl border border-slate-100">
                <div class="text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">Total</p>
                    <p id="stat-total" class="text-xs font-black text-slate-900">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">Asignados</p>
                    <p id="stat-assigned" class="text-xs font-black text-green-600">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">Vacantes</p>
                    <p id="stat-pending" class="text-xs font-black text-red-800">0</p>
                </div>
            </div>

            <div class="h-6 w-[1px] bg-slate-100"></div>

            <!-- FILTRO DE TURNOS -->
            <div class="flex p-1 bg-slate-100 rounded-xl">
                <button onclick="setViewShift('morning')" id="btn-morning" class="shift-pill px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg active">M</button>
                <button onclick="setViewShift('afternoon')" id="btn-afternoon" class="shift-pill px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg">T</button>
                <button onclick="setViewShift('night')" id="btn-night" class="shift-pill px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg">N</button>
                <button onclick="setViewShift('all')" id="btn-all" class="shift-pill px-4 py-2 rounded-lg" title="Vista Comparativa">
                    <i class="fa-solid fa-grip"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- ÁREA PRINCIPAL -->
    <main id="main-board" class="flex-1 overflow-y-auto custom-scrollbar pb-24">
        <!-- Render dinámico -->
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCmyzbw7csEtZkPqV89OMaM4cXDpG6O930", 
            authDomain: "cic-pp.firebaseapp.com", 
            projectId: "cic-pp"
        };
        const appId = "cic-pp";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let areas = [];
        let locations = [];
        let attendance = {};
        let currentSelectedDate = new Date().toISOString().split('T')[0];
        let currentViewShift = 'morning';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                initDateSelector();
                initSync();
            } else { signInAnonymously(auth); }
        });

        function initDateSelector() {
            const selector = document.getElementById('date-selector');
            selector.value = currentSelectedDate;
            selector.addEventListener('change', (e) => {
                currentSelectedDate = e.target.value;
                renderBoard();
            });
        }

        window.setToday = () => {
            currentSelectedDate = new Date().toISOString().split('T')[0];
            document.getElementById('date-selector').value = currentSelectedDate;
            renderBoard();
        };

        window.changeDate = (days) => {
            const dateObj = new Date(currentSelectedDate + "T12:00:00");
            dateObj.setDate(dateObj.getDate() + days);
            currentSelectedDate = dateObj.toISOString().split('T')[0];
            document.getElementById('date-selector').value = currentSelectedDate;
            renderBoard();
        };

        window.setViewShift = (shift) => {
            currentViewShift = shift;
            document.querySelectorAll('.shift-pill').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${shift}`).classList.add('active');
            renderBoard();
        };

        function showIndicator(show) {
            document.getElementById('save-indicator').style.opacity = show ? "1" : "0";
        }

        async function initSync() {
            // Sincronizar estructura
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'areas'), (snap) => {
                areas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'job_positions'), (pSnap) => {
                    const puestos = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    locations = [...areas.filter(a => a.type === 'caseta'), ...puestos]
                                .sort((a, b) => (a.index || 0) - (b.index || 0));
                    renderBoard();
                });
            });

            // Sincronizar asistencias del día seleccionado
            // RULE 2: Evitamos queries complejas, traemos todo y filtramos localmente
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance_day'), (snap) => {
                attendance = {};
                snap.docs.forEach(d => {
                    const data = d.data();
                    if (data.date === currentSelectedDate) {
                        const key = `${data.date}_${data.shift}_${data.locationId}`;
                        if (!attendance[key]) attendance[key] = [];
                        attendance[key].push({ docId: d.id, ...data });
                    }
                });
                renderBoard();
            });
        }

        function createSlotHTML(loc, shift) {
            const list = attendance[`${currentSelectedDate}_${shift}_${loc.id}`] || [];
            const isOccupied = list.length > 0;
            
            return `
                <div class="slot-card flex flex-col w-[150px] bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm hover:shadow-md transition-all">
                    <div class="bg-slate-900 py-2 px-3 flex items-center justify-between">
                        <span class="text-[9px] font-black text-white/50 uppercase tracking-tighter truncate">${loc.name}</span>
                        ${isOccupied ? '<i class="fa-solid fa-circle-check text-[10px] text-green-400"></i>' : '<i class="fa-solid fa-circle text-[10px] text-slate-700"></i>'}
                    </div>
                    
                    <div class="drop-zone flex-1 p-3 flex flex-wrap items-center justify-center gap-2 relative" 
                         ondragover="event.preventDefault(); this.classList.add('drag-over')" 
                         ondragleave="this.classList.remove('drag-over')"
                         ondrop="handleDrop(event, '${shift}', '${loc.id}')">
                        
                        ${list.map(item => `
                            <div class="assigned-badge relative group/item w-12 h-12">
                                <img src="${item.userPhoto}" class="w-full h-full object-cover rounded-full border-2 border-white shadow-sm">
                                <button onclick="removeAssignment('${item.docId}')" class="absolute -top-1 -right-1 w-5 h-5 bg-red-600 text-white rounded-full flex items-center justify-center text-[8px] opacity-0 group-hover/item:opacity-100 transition-opacity border-2 border-white shadow-md">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                                <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 px-2 py-0.5 bg-slate-800 text-white text-[7px] font-black rounded opacity-0 group-hover/item:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10">
                                    ${item.userName}
                                </div>
                            </div>
                        `).join('')}

                        ${!isOccupied ? `
                            <div class="flex flex-col items-center opacity-10">
                                <i class="fa-solid fa-user-plus text-xl mb-1"></i>
                                <span class="text-[7px] font-black uppercase">Vacante</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderBoard() {
            const board = document.getElementById('main-board');
            if (!board) return;

            let assignedCount = 0;
            let totalSlots = locations.length;

            if (currentViewShift === 'all') {
                totalSlots *= 3;
                board.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="space-y-4">
                            <div class="flex items-center gap-3 px-4 py-2 bg-amber-50 rounded-2xl border border-amber-100">
                                <i class="fa-solid fa-sun text-amber-500 text-xs"></i>
                                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-900">Matutino</h3>
                            </div>
                            <div class="flex flex-wrap gap-4">
                                ${locations.map(loc => {
                                    if (attendance[`${currentSelectedDate}_morning_${loc.id}`]) assignedCount++;
                                    return createSlotHTML(loc, 'morning');
                                }).join('')}
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-center gap-3 px-4 py-2 bg-blue-50 rounded-2xl border border-blue-100">
                                <i class="fa-solid fa-cloud-sun text-blue-500 text-xs"></i>
                                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-900">Vespertino</h3>
                            </div>
                            <div class="flex flex-wrap gap-4">
                                ${locations.map(loc => {
                                    if (attendance[`${currentSelectedDate}_afternoon_${loc.id}`]) assignedCount++;
                                    return createSlotHTML(loc, 'afternoon');
                                }).join('')}
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-center gap-3 px-4 py-2 bg-slate-900 rounded-2xl">
                                <i class="fa-solid fa-moon text-slate-400 text-xs"></i>
                                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-white">Nocturno</h3>
                            </div>
                            <div class="flex flex-wrap gap-4">
                                ${locations.map(loc => {
                                    if (attendance[`${currentSelectedDate}_night_${loc.id}`]) assignedCount++;
                                    return createSlotHTML(loc, 'night');
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                board.innerHTML = `
                    <div class="flex flex-wrap gap-5 justify-center md:justify-start">
                        ${locations.map(loc => {
                            if (attendance[`${currentSelectedDate}_${currentViewShift}_${loc.id}`]) assignedCount++;
                            return createSlotHTML(loc, currentViewShift);
                        }).join('')}
                    </div>
                `;
            }

            // Actualizar estadísticas
            document.getElementById('stat-total').innerText = totalSlots;
            document.getElementById('stat-assigned').innerText = assignedCount;
            document.getElementById('stat-pending').innerText = totalSlots - assignedCount;
        }

        window.handleDrop = async (e, shift, locationId) => {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            const rawData = e.dataTransfer.getData('user_profile') || e.dataTransfer.getData('text/plain');
            if (!rawData) return;

            try {
                const userData = JSON.parse(rawData);
                showIndicator(true);
                
                // Generar un ID determinista para evitar duplicados del mismo usuario en el mismo slot/turno/día
                const docId = `${currentSelectedDate}_${shift}_${locationId}_${userData.id}`;
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance_day', docId), {
                    userId: userData.id,
                    userName: userData.name,
                    userPhoto: userData.photo,
                    locationId: locationId,
                    shift: shift,
                    date: currentSelectedDate,
                    assignedAt: new Date().toISOString()
                });
                
                setTimeout(() => showIndicator(false), 500);
            } catch (err) { 
                console.error("Error al asignar:", err); 
                showIndicator(false);
            }
        };

        window.removeAssignment = async (docId) => {
            try {
                showIndicator(true);
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance_day', docId));
                setTimeout(() => showIndicator(false), 500);
            } catch (err) { 
                console.error("Error al eliminar:", err); 
                showIndicator(false);
            }
        };
    </script>
</body>
</html>
