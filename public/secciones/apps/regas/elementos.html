        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        import { getDatabase, ref as rRef, set as rSet, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Credenciales oficiales de RegAs 
        const firebaseConfig = {
            databaseURL: "https://cic-os-default-rtdb.firebaseio.com/",
            apiKey: "AIzaSyA05gexuh4zNt4ro_Rh2TJFMYfoicW8nbg",
            projectId: "cic-os",
            storageBucket: "cic-os.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);
        const fs = getFirestore(app);
        const rtdb = getDatabase(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const AUTH_UID = urlParams.get('uid') || '';
        let appStarted = false;

        let allElements = {};
        let casetasConfig = {}; // Catálogo de casetas para ordenación dinámica por index
        let editingKey = null;
        let urlCache = {};

        // --- MANEJO DE INDEXEDDB LOCAL ---
        const DB_NAME = "CIC_OS_RegAs";
        const STORE_NAME = "catalogos";
        const ENTRY_KEY = "ElementosPP";

        function showLocalToast(message, type = 'success') {
            const toast = document.getElementById('local-toast');
            const msgEl = document.getElementById('local-toast-msg');
            if (!toast) return;

            toast.className = "fixed bottom-4 left-1/2 transform -translate-x-1/2 z-[300] text-white text-xs font-bold uppercase tracking-widest px-5 py-3 rounded-full shadow-2xl transition-all duration-300 flex items-center gap-2 border border-white/10";
            
            if (type === 'success') {
                toast.classList.add('bg-green-600');
            } else if (type === 'error') {
                toast.classList.add('bg-red-600');
            } else {
                toast.classList.add('bg-indigo-600');
            }

            msgEl.innerText = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');

            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // NOTIFICADOR FORTIFICADO PARA DELTA UPDATES EN RTDB
        async function notifyCatalogUpdate() {
            localStorage.setItem('thisUpdate', 'true');
            const ts = Date.now().toString();
            
            let localUpdates = {};
            try {
                const stored = localStorage.getItem('updates_regas');
                if (stored && stored.startsWith('{')) {
                    localUpdates = JSON.parse(stored);
                }
            } catch(e) {}
            
            localUpdates["Catalogos"] = ts;
            localStorage.setItem('updates_regas', JSON.stringify(localUpdates));
            
            await rSet(rRef(rtdb, `updates/RegAs/Catalogos`), ts).catch(err => console.error("[Elementos] Error al notificar RTDB:", err));
        }

        function getIndexedDB() {
            return new Promise((resolve, reject) => {
                try {
                    const request = indexedDB.open(DB_NAME);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                } catch (e) {
                    reject(e);
                }
            });
        }

        async function fetchFromIndexedDB() {
            try {
                const idb = await getIndexedDB();
                return new Promise((resolve, reject) => {
                    const tx = idb.transaction(STORE_NAME, "readonly");
                    const store = tx.objectStore(STORE_NAME);
                    const getReq = store.get(ENTRY_KEY);
                    getReq.onsuccess = () => resolve(getReq.result || {});
                    getReq.onerror = () => reject(getReq.error);
                });
            } catch (err) {
                console.error("Error al acceder a IndexedDB:", err);
                return {};
            }
        }

        // Obtener simultáneamente los catálogos ElementosPP y Casetas para el ordenamiento dinámico
        async function fetchCatalogosFromIndexedDB() {
            try {
                const idb = await getIndexedDB();
                return new Promise((resolve, reject) => {
                    const tx = idb.transaction(STORE_NAME, "readonly");
                    const store = tx.objectStore(STORE_NAME);
                    const reqEl = store.get("ElementosPP");
                    const reqCas = store.get("Casetas");
                    
                    let result = { elementos: {}, casetas: {} };
                    
                    reqEl.onsuccess = () => {
                        result.elementos = reqEl.result || {};
                        if (reqCas.readyState === "done") resolve(result);
                    };
                    reqCas.onsuccess = () => {
                        result.casetas = reqCas.result || {};
                        if (reqEl.readyState === "done") resolve(result);
                    };
                    reqEl.onerror = () => reject(reqEl.error);
                    reqCas.onerror = () => reject(reqCas.error);
                });
            } catch (err) {
                console.error("Error al acceder a IndexedDB para catálogos:", err);
                return { elementos: {}, casetas: {} };
            }
        }

        async function writeToIndexedDB(data) {
            const idb = await getIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = idb.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                const putReq = store.put(data, ENTRY_KEY);
                putReq.onsuccess = () => resolve();
                putReq.onerror = () => reject(putReq.error);
            });
        }

        async function updateDataInDB(updatedData) {
            const storageObj = { id: ENTRY_KEY, ...updatedData };
            await writeToIndexedDB(storageObj);
            allElements = updatedData;
            updateCasetaFilterOptions();
            renderGrid();
        }

        async function getPhotoURL(id) {
            if (!id) return null;
            if (urlCache[id]) return urlCache[id];
            try {
                // Intentar ruta estándar
                const url = await getDownloadURL(sRef(storage, `Fotos/ElementosPP/${id}.webp`));
                urlCache[id] = url;
                return url;
            } catch (e) {
                try {
                    // Intentar ruta legacy
                    const url = await getDownloadURL(sRef(storage, `ElementosPP/${id}.webp`));
                    urlCache[id] = url;
                    return url;
                } catch (e2) {
                    urlCache[id] = 'not_found';
                    return null;
                }
            }
        }

        function calculateAge(birthday) {
            if (!birthday) return "S/N";
            
            const parts = birthday.match(/\d+/g); 
            if (!parts || parts.length < 3) return "S/N";

            let day, month, year;
            
            if (parts[0].length === 4) { 
                year = parseInt(parts[0], 10);
                month = parseInt(parts[1], 10);
                day = parseInt(parts[2], 10);
            } else { 
                day = parseInt(parts[0], 10);
                month = parseInt(parts[1], 10);
                year = parseInt(parts[2], 10);
            }

            if (isNaN(day) || isNaN(month) || isNaN(year)) return "S/N";

            const today = new Date();
            let age = today.getFullYear() - year;
            const m = (today.getMonth() + 1) - month;

            if (m < 0 || (m === 0 && today.getDate() < day)) {
                age--;
            }

            return age >= 0 ? age : "S/N";
        }

        window.copyCardAsImage = async (cardId) => {
            const card = document.getElementById(cardId);
            const controls = card.querySelector('.action-controls');
            
            const originalDisplay = controls.style.display;
            controls.style.display = 'none';

            // MITIGACIÓN AGRESIVA DE ERRORES DE FUENTES 404 (dom-to-image):
            // Removemos por completo cualquier hoja de estilo sospechosa antes del renderizado
            const styleSheets = Array.from(document.querySelectorAll('link[rel="stylesheet"], style'));
            const removedSheets = [];
            styleSheets.forEach(sheet => {
                const href = sheet.getAttribute('href') || '';
                const content = sheet.textContent || '';
                if (href.includes('office.net') || href.includes('fabric') || content.includes('Segoe UI') || content.includes('Leelawadee') || content.includes('office365')) {
                    sheet.remove();
                    removedSheets.push(sheet);
                }
            });

            try {

        function processImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxDim = 800;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) { height *= maxDim / width; width = maxDim; }
                            else { width *= maxDim / height; height = maxDim; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => blob ? resolve(blob) : reject(), 'image/webp', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

            const path = name.split('.');
            let current = allElements[editingKey];
            if (!current) return;

            for (let i = 0; i < path.length - 1; i++) {
                if (!current[path[i]]) current[path[i]] = {};
                current = current[path[i]];

        window.forceCatalogDownload = async () => {

            showLocalToast("Sincronizando catálogo con la nube...", "info");

            try {
                const catDocRef = doc(fs, "RegAs", "Catalogos");
                const catDocSnap = await getDoc(catDocRef);

                if (catDocSnap.exists()) {
                    const dataCatalogos = catDocSnap.data();

                    const idb = await getIndexedDB();
                    const tx = idb.transaction(STORE_NAME, "readwrite");
                    const store = tx.objectStore(STORE_NAME);

                    if (dataCatalogos.ElementosPP) {
                        const elStorage = { id: "ElementosPP", ...dataCatalogos.ElementosPP };
                        await store.put(elStorage);
                    }
                    if (dataCatalogos.Casetas) {
                        const casStorage = { id: "Casetas", ...dataCatalogos.Casetas };
                        await store.put(casStorage);
                    }

                    idb.close();

                    let localUpdates = {};
                    try {
                        const stored = localStorage.getItem('updates_regas');
                        if (stored && stored.startsWith('{')) localUpdates = JSON.parse(stored);
                    } catch (e) {}

                    const remoteSnap = await get(rRef(rtdb, 'updates/RegAs/Catalogos'));
                    const ts = remoteSnap.val() || Date.now().toString();

                    localUpdates["Catalogos"] = ts;
                    localStorage.setItem('updates_regas', JSON.stringify(localUpdates));

                    await initData();
                    showLocalToast("Catálogo sincronizado exitosamente", "success");
                } else {
                    showLocalToast("No se encontró el catálogo maestro en la nube", "error");
                }
            } catch (err) {
                console.error("Error forzando descarga:", err);
                showLocalToast("Fallo al descargar catálogo", "error");
            } finally {
                if (syncIcon) syncIcon.classList.remove('animate-spin-fast');
            }
        };

                try {
                    const stored = localStorage.getItem('updates_regas');

                const localTs = localUpdates["Catalogos"];

                                            <tr>
                                                <th class="bg-slate-500 text-white px-2 py-1 font-bold w-[40%]">Informacion</th>

                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr class="border-b border-slate-100">
                                                <td class="px-2 py-1 font-black uppercase text-black">NOMBRE</td>
                                                <td class="px-2 py-1 text-black leading-tight">${name}</td>
                                            </tr>
                                            <tr class="border-b border-slate-100">
                                                <td class="px-2 py-1 font-black uppercase text-black">FECHA DE ALTA</td>
                                                <td class="px-2 py-1 text-black">${data.Operativa?.FechaDeIngreso || 'S/N'}</td>
                                            </tr>
                                            ${isBaja ? `
                                            <tr class="border-b border-slate-100">
                                                <td class="px-2 py-1 font-black uppercase text-black">FECHA DE BAJA</td>
                                                <td class="px-2 py-1 text-red-600 font-bold">${data.Operativa.FechaDeBaja || 'S/N'}</td>

                                            <tr class="border-b border-slate-100">
                                                <td class="px-2 py-1 font-black uppercase text-black">EDAD</td>

                                                <td class="px-2 py-1 font-black uppercase text-black">PUESTO</td>

                                            <tr class="border-b border-slate-100">
                                                <td class="px-2 py-1 font-black uppercase text-black">ESTADO CIVIL</td>

                                <div class="mt-2 pt-2 border-t border-slate-100 flex items-center justify-end gap-2 action-controls">

                                            <span>WhatsApp</span>
                                        </a>
                                    ` : ''}
                                    <button type="button" onclick="copyCardAsImage('${cardId}')" class="flex items-center justify-center gap-1 px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition-colors font-bold text-[9px] uppercase tracking-widest shadow-sm">
                                        <i data-lucide="camera" class="w-3.5 h-3.5"></i> Copiar
                                    </button>
                                    <button type="button" onclick="editElement('${name}')" class="flex items-center justify-center gap-1 px-3 py-1.5 bg-fuchsia-50 text-fuchsia-600 rounded-lg hover:bg-fuchsia-600 hover:text-white transition-colors font-bold text-[9px] uppercase tracking-widest shadow-sm">
                                        <i data-lucide="edit-2" class="w-3.5 h-3.5"></i> Editar
                                    </button>
                                </div>
                            </div>

                        </div>
                    `;
                    gridContainer.appendChild(card);
                }
                groupSection.appendChild(gridContainer);
                container.appendChild(groupSection);
            }
            
            lucide.createIcons();
        }

        async function checkSessionAndInit() {
            const localToken = sessionStorage.getItem('cic_os_token');
            const localConfig = sessionStorage.getItem('cic_os_config');
            const localTokenVariant = sessionStorage.getItem('cic_oc_token'); 

            if (localToken || localConfig || localTokenVariant) {
                console.log("Sesión validada exitosamente mediante las variables del Shell en SessionStorage.");
                if (!appStarted) {
                    appStarted = true;
                    await checkCatalogVersionAndInit();
                }
            } else {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        if (AUTH_UID && user.uid !== AUTH_UID) return;
                        if (!appStarted) {
                            appStarted = true;
                            await checkCatalogVersionAndInit();
                        }
                    } else {
                        const loadingText = document.getElementById('loadingText');
                        if (loadingText) {
                            loadingText.textContent = "Esperando sesión activa desde el sistema principal...";
                        }
                    }
                });
            }
        }

        async function initData() {
            const localData = await fetchCatalogosFromIndexedDB();
            
            // NORMALIZACIÓN ROBUSTA DE CATALOGOS (Soporta directo y anidamiento de .data)
            let rawElementos = localData.elementos || {};
            if (rawElementos.data && typeof rawElementos.data === 'object') {
                allElements = { ...rawElementos.data };
            } else {
                allElements = { ...rawElementos };
            }
            delete allElements.id;
            delete allElements.data;

            // NORMALIZACIÓN ROBUSTA DE CASETAS
            let rawCasetas = localData.casetas || {};
            if (rawCasetas.data && typeof rawCasetas.data === 'object') {
                casetasConfig = { ...rawCasetas.data };
            } else {
                casetasConfig = { ...rawCasetas };
            }
            delete casetasConfig.id;
            delete casetasConfig.data;

            updateCasetaFilterOptions(); 
            renderGrid();
        }

        // --- INICIALIZACIÓN ---
        document.getElementById('searchInput').addEventListener('input', renderGrid);
        document.getElementById('statusFilter').addEventListener('change', renderGrid);
        document.getElementById('casetaFilter').addEventListener('change', renderGrid);
        
        checkSessionAndInit();

    </script>
</body>
</html>
