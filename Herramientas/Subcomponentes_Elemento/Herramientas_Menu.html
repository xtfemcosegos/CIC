<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: transparent; padding: 12px; }
        
        /* Estilos de Tarjetas Compactas */
        .tool-card { background: white; border: 1px solid #e5e7eb; border-radius: 20px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .tool-card.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .tool-card:active { transform: scale(0.98); background: #f8fafc; }
        
        .icon-box-sm { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        
        /* Buscador Ajustado */
        #search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 16px; margin-top: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 50; overflow: hidden; display: none; border: 1px solid #f1f5f9; }
        .result-item { padding: 10px 16px; font-size: 11px; font-weight: 700; color: #1e293b; cursor: pointer; border-bottom: 1px solid #f8fafc; }
        .result-item:hover, .result-item.selected { background: #fdf8f8; color: #450a0a; border-left: 4px solid #450a0a; }
        
        .animate-fade { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo Botón Conteo - Ajustado para ser más grande */
        .count-btn { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 14px; display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .count-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }
    </style>
</head>
<body class="space-y-4">

    <!-- SECCIÓN SUPERIOR: IDENTIDAD Y CONTEO PEGUADOS -->
    <div class="max-w-xl mx-auto space-y-2">
        <!-- SUBENCABEZADO: ELEMENTO CONSULTADO -->
        <div id="consulting-banner" class="bg-white border border-slate-100 rounded-[22px] p-3 flex items-center justify-between shadow-sm animate-fade">
            <div class="flex items-center gap-3">
                <div id="sel-avatar" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center overflow-hidden">
                    <i class="fa-solid fa-user text-slate-300"></i>
                </div>
                <div>
                    <p class="text-[7px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Elemento:</p>
                    <h3 id="sel-name" class="text-[11px] font-black uppercase text-slate-800 tracking-tight">Cargando...</h3>
                </div>
            </div>
            <button onclick="resetToSelf()" class="text-[7px] font-black uppercase text-red-900 bg-red-50 px-2 py-1.5 rounded-lg hover:bg-red-100 transition-colors border border-red-100">Mi Perfil</button>
        </div>

        <!-- CAJÓN DE CONTEO RÁPIDO - Ajustado para ser un poco más grande (p-4) -->
        <div class="bg-slate-900 rounded-[22px] p-4 shadow-xl flex items-center gap-3">
            <div class="shrink-0 pl-1 pr-3 border-r border-white/10">
                <i class="fa-solid fa-plus-minus text-white/30 text-sm"></i>
            </div>
            <div class="grid grid-cols-2 gap-3 flex-grow">
                <button class="count-btn">
                    <i class="fa-solid fa-person text-red-400 text-sm"></i>
                    <span class="text-[10px] font-black text-white uppercase tracking-widest">Personas</span>
                </button>
                <button class="count-btn">
                    <i class="fa-solid fa-car text-blue-400 text-sm"></i>
                    <span class="text-[10px] font-black text-white uppercase tracking-widest">Vehículos</span>
                </button>
            </div>
        </div>
    </div>

    <!-- BUSCADOR -->
    <div class="relative max-w-xl mx-auto">
        <div class="flex items-center bg-white rounded-2xl shadow-sm border border-slate-100 px-4 h-11">
            <i class="fa-solid fa-magnifying-glass text-slate-300 text-xs mr-3"></i>
            <input type="text" id="search-input" autocomplete="off" class="w-full text-[11px] font-bold outline-none uppercase tracking-widest placeholder:text-slate-300" placeholder="Cambiar empleado a gestionar..." oninput="filterUsers(this.value)">
        </div>
        <div id="search-results"></div>
    </div>

    <!-- LISTADO DE HERRAMIENTAS COMPACTAS -->
    <div class="max-w-xl mx-auto grid grid-cols-1 gap-2">
        <!-- BOTÓN: ASISTENCIA -->
        <a id="link-checador" href="#" onclick="checkSelection(event, 'Checador.html')" class="tool-card disabled">
            <div class="icon-box-sm bg-emerald-100 text-emerald-600"><i class="fa-solid fa-fingerprint"></i></div>
            <div class="text-left flex-grow">
                <p class="text-[7px] font-black text-emerald-600 uppercase tracking-[0.15em] leading-none mb-1">Seguridad</p>
                <h3 class="text-[11px] font-black text-slate-800 uppercase tracking-tight">Checador Biométrico</h3>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-200 text-[10px]"></i>
        </a>

        <!-- BOTÓN: RECORRIDOS -->
        <a id="link-recorrido" href="#" onclick="checkSelection(event, 'Recorridos.html')" class="tool-card disabled">
            <div class="icon-box-sm bg-blue-100 text-blue-600"><i class="fa-solid fa-person-walking"></i></div>
            <div class="text-left flex-grow">
                <p class="text-[7px] font-black text-blue-600 uppercase tracking-[0.15em] leading-none mb-1">Supervisión</p>
                <h3 class="text-[11px] font-black text-slate-800 uppercase tracking-tight">Iniciar Recorrido QR</h3>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-200 text-[10px]"></i>
        </a>

        <!-- BOTÓN: BITÁCORA -->
        <a id="link-bitacora" href="#" onclick="checkSelection(event, 'Bitacora.html')" class="tool-card disabled">
            <div class="icon-box-sm bg-amber-100 text-amber-600"><i class="fa-solid fa-pen-to-square"></i></div>
            <div class="text-left flex-grow">
                <p class="text-[7px] font-black text-amber-600 uppercase tracking-[0.15em] leading-none mb-1">Registros</p>
                <h3 class="text-[11px] font-black text-slate-800 uppercase tracking-tight">Bitácora Operativa</h3>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-200 text-[10px]"></i>
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCd4p8USmJeFOie1cJj0Hi80-z8IbLAGqU", 
            authDomain: "cic6-pp-web.firebaseapp.com", 
            projectId: "cic6-pp-web", 
            storageBucket: "cic6-pp-web.firebasestorage.app", 
            messagingSenderId: "248659087868", 
            appId: "1:248659087868:web:a277ef700d83c7f1d22279" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allUsers = [];
        let selectedUid = null;
        let myUid = null;
        let selectedIndex = -1;
        let filteredResults = [];

        window.onload = async () => {
            const snap = await getDocs(collection(db, 'artifacts', 'cic.pp', 'public', 'data', 'Usuarios'));
            snap.forEach(d => allUsers.push({ uid: d.id, ...d.data() }));

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    myUid = user.uid;
                    const urlParams = new URLSearchParams(window.location.search);
                    const queryUid = urlParams.get('uid');
                    loadSelectedUser(queryUid || user.uid);
                }
            });
        };

        async function loadSelectedUser(uid) {
            selectedUid = uid;
            try {
                const snap = await getDoc(doc(db, 'artifacts', 'cic.pp', 'public', 'data', 'Usuarios', uid));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('sel-name').innerText = data.nombre || "---";
                    if(data.foto) document.getElementById('sel-avatar').innerHTML = `<img src="${data.foto}" class="w-full h-full object-cover">`;
                    else document.getElementById('sel-avatar').innerHTML = `<i class="fa-solid fa-user text-slate-300"></i>`;
                    
                    document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('disabled'));
                }
            } catch(e) { console.error(e); }
        }

        window.filterUsers = (val) => {
            const res = document.getElementById('search-results');
            selectedIndex = -1;
            if(!val.trim()){ res.style.display = 'none'; return; }
            const q = val.toLowerCase();
            filteredResults = allUsers.filter(u => u.nombre?.toLowerCase().includes(q) || String(u.id_empleado).includes(q)).slice(0, 5);
            renderResults();
        };

        function renderResults() {
            const res = document.getElementById('search-results');
            res.innerHTML = filteredResults.map((u, index) => `
                <div class="result-item ${index === selectedIndex ? 'selected' : ''}" onclick="selectUser('${u.uid}')">
                    ${u.nombre} <span class="opacity-20 text-[8px] ml-1">#${u.id_empleado || '---'}</span>
                </div>
            `).join('');
            res.style.display = filteredResults.length ? 'block' : 'none';
        }

        window.selectUser = (uid) => {
            document.getElementById('search-input').value = "";
            document.getElementById('search-results').style.display = 'none';
            loadSelectedUser(uid);
        };

        window.resetToSelf = () => loadSelectedUser(myUid);

        window.checkSelection = (e, target) => {
            e.preventDefault();
            if(!selectedUid) return;
            window.location.href = `${target}?uid=${selectedUid}`;
        };

        document.getElementById('search-input').addEventListener('keydown', (e) => {
            if (!filteredResults.length) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); selectedIndex = (selectedIndex + 1) % filteredResults.length; renderResults(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIndex = (selectedIndex - 1 + filteredResults.length) % filteredResults.length; renderResults(); }
            else if (e.key === 'Enter' && selectedIndex >= 0) { e.preventDefault(); selectUser(filteredResults[selectedIndex].uid); }
        });
    </script>
</body>
</html>
