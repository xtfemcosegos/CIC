<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Elementos - CIC6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Maps API con carga asíncrona corregida -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDoGMql48pFyB9VFETw0c_dxFaC5yXRyVQ&libraries=places" async defer></script>
    <style>
        :root {
            --md-primary: #450a0a;
            --md-surface: #ffffff;
            --md-background: #fdf8f8;
            --md-outline: #e5e7eb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--md-background);
            color: #1e293b;
            margin: 0;
            min-height: 100vh;
        }

        /* --- UI Components --- */
        .card-material {
            background: white;
            border-radius: 28px;
            border: 1px solid var(--md-outline);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .tab-btn {
            flex: 1; padding: 16px; font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; color: #94a3b8; border-bottom: 3px solid transparent; transition: all 0.3s;
        }
        .tab-btn.active { color: var(--md-primary); border-bottom-color: var(--md-primary); }

        .input-standard {
            width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 16px;
            padding: 12px 16px; font-size: 14px; font-weight: 600; outline: none; transition: all 0.2s;
        }
        .input-standard:focus { border-color: var(--md-primary); background: white; }

        .btn-action {
            background: var(--md-primary); color: white; border-radius: 20px; padding: 16px;
            font-weight: 800; text-transform: uppercase; font-size: 12px; width: 100%;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- Perfil Estilos --- */
        .data-section { padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .section-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 5px 0; }
        .section-label {
            font-size: 10px; font-weight: 800; color: #ffffff; background-color: var(--md-primary);
            padding: 4px 14px; border-radius: 999px; text-transform: uppercase;
        }
        .info-label { font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 4px; margin-left: 4px; display: block; text-transform: uppercase; }
        
        #map-container { width: 100%; height: 180px; border-radius: 16px; margin-top: 10px; border: 1px solid var(--md-outline); display: none; }
        .mini-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; padding: 10px 0; }
        .gallery-thumb { aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--md-outline); cursor: pointer; }

        /* --- Camera Overlay --- */
        #camera-overlay {
            position: fixed; inset: 0; background: black; z-index: 5000;
            display: none; flex-direction: column; align-items: center;
        }
        .video-container {
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        video { width: 100%; max-height: 100%; object-fit: cover; }
        .camera-controls {
            width: 100%; padding: 30px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex; gap: 15px; justify-content: center; align-items: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <!-- VISTA LOGIN -->
    <div id="login-view" class="fixed inset-0 flex items-center justify-center p-6 z-[3000] bg-[#fdf8f8]">
        <div class="card-material w-full max-w-md p-8 flex flex-col items-center animate-fade">
            <div class="w-20 h-20 bg-red-50 rounded-3xl flex items-center justify-center mb-6">
                <i class="fa-solid fa-user-clock text-3xl text-red-900"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Acceso Personal</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8">CIC-6 Protección Patrimonial</p>
            
            <div class="w-full space-y-4">
                <input type="email" id="login-email" class="input-standard" placeholder="Correo Institucional">
                <input type="password" id="login-pass" class="input-standard" placeholder="Contraseña">
                <button onclick="handleLogin()" id="btn-login" class="btn-action mt-4">Entrar al Portal</button>
            </div>
        </div>
    </div>

    <!-- VISTA PRINCIPAL -->
    <div id="app-view" class="hidden flex flex-col min-h-screen">
        <header class="bg-[#450a0a] text-white p-6 pb-12">
            <div class="max-w-xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img id="user-avatar-top" src="" class="w-12 h-12 rounded-2xl object-cover border border-white/20 shadow-lg">
                    <div>
                        <h1 id="user-name-top" class="text-sm font-black uppercase tracking-tight leading-none">Cargando...</h1>
                        <p id="user-role-top" class="text-[9px] text-red-200/60 font-bold uppercase tracking-widest mt-1">---</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="status-badge" class="flex items-center gap-2 bg-black/20 px-3 py-1.5 rounded-full">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        <span class="text-[8px] font-black uppercase">Sincronizado</span>
                    </div>
                    <button onclick="handleLogout()" class="w-9 h-9 rounded-xl bg-white/10 flex items-center justify-center"><i class="fa-solid fa-power-off text-xs text-red-200"></i></button>
                </div>
            </div>
        </header>

        <nav class="max-w-xl mx-auto w-full -mt-6 px-6">
            <div class="bg-white rounded-2xl shadow-xl flex border border-slate-100 overflow-hidden">
                <button onclick="switchTab('checkin')" id="tab-checkin" class="tab-btn active">Asistencia</button>
                <button onclick="switchTab('profile')" id="tab-profile" class="tab-btn">Mi Perfil</button>
            </div>
        </nav>

        <main class="max-w-xl mx-auto w-full flex-grow p-6 pb-24">
            
            <!-- VISTA: ASISTENCIA -->
            <div id="view-checkin" class="space-y-6 animate-fade">
                <div class="text-center py-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]" id="checkin-label-top">Próxima Asignación</p>
                    <h2 id="current-date-txt" class="text-xl font-black text-slate-800 uppercase tracking-tighter">Buscando turnos...</h2>
                </div>

                <div class="card-material p-6 space-y-5">
                    <div id="assignment-loading" class="flex flex-col items-center py-10 gap-3 opacity-30">
                        <i class="fa-solid fa-circle-notch animate-spin"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest">Consultando...</span>
                    </div>

                    <div id="assignment-empty" class="hidden text-center py-10 space-y-3">
                        <i class="fa-solid fa-calendar-xmark text-3xl text-slate-200"></i>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Sin turnos en los siguientes 7 días</p>
                    </div>

                    <div id="assignment-data" class="hidden space-y-6">
                        <div class="flex items-center justify-between border-b border-slate-50 pb-4">
                            <div>
                                <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block">Turno Programado</label>
                                <span id="assign-shift" class="text-lg font-black text-red-900 uppercase">---</span>
                                <p id="assign-date" class="text-[9px] font-bold text-slate-400 mt-1 uppercase italic">---</p>
                            </div>
                            <div class="text-right">
                                <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block">Ubicación</label>
                                <span id="assign-booth" class="text-xs font-black text-slate-700 uppercase">---</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 bg-slate-50 rounded-2xl">
                                <label class="text-[8px] font-black text-slate-400 uppercase block mb-1">Entrada Programada</label>
                                <span id="assign-time" class="text-sm font-black text-slate-800">--:-- hrs</span>
                            </div>
                            <div class="p-4 bg-slate-50 rounded-2xl">
                                <label class="text-[8px] font-black text-slate-400 uppercase block mb-1">Registro Real</label>
                                <span id="real-time" class="text-sm font-black text-emerald-600">--:--</span>
                            </div>
                        </div>

                        <div id="checkin-action-zone">
                            <button id="btn-register" onclick="startBiometricCheck()" class="btn-action bg-emerald-600 shadow-lg shadow-emerald-600/20">
                                <i class="fa-solid fa-camera"></i>
                                Registrar Entrada
                            </button>
                        </div>
                        <div id="checkin-success-msg" class="hidden p-5 bg-emerald-50 text-emerald-700 border border-emerald-100 rounded-[24px] text-center">
                            <i class="fa-solid fa-circle-check text-2xl mb-1 block"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest">Asistencia Confirmada</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VISTA: MI PERFIL -->
            <div id="view-profile" class="hidden animate-fade">
                <form id="expediente-form" class="card-material p-6 space-y-4">
                    <div class="flex flex-col items-center mb-8">
                        <div class="relative">
                            <img id="profile-pic-edit" src="" class="w-28 h-28 rounded-[36px] object-cover border-4 border-slate-50 shadow-inner">
                            <button type="button" onclick="openCameraGallery()" class="absolute -bottom-2 -right-2 w-10 h-10 bg-red-900 text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white">
                                <i class="fa-solid fa-camera text-xs"></i>
                            </button>
                        </div>
                        <!-- Corregido ID para sincronización con script -->
                        <input type="text" name="nombre" id="profile-name-disp" class="text-center font-black uppercase text-slate-800 text-lg mt-4 outline-none border-none bg-transparent w-full" placeholder="NOMBRE COMPLETO">
                        <p id="profile-puesto-disp" class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em]">---</p>
                    </div>

                    <section class="data-section">
                        <div class="section-header" onclick="toggleSec(this)">
                            <div class="section-label">Identidad</div>
                            <i class="fa-solid fa-chevron-down text-[10px] text-slate-300"></i>
                        </div>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="info-label">Nómina</label><input type="number" name="id_empleado" class="input-standard text-sm" readonly></div>
                                <div><label class="info-label">Estatus</label><input type="text" name="status" class="input-standard text-sm bg-slate-50" readonly></div>
                            </div>
                            <label class="info-label">Galería Personal</label>
                            <div id="gallery-grid" class="mini-gallery"></div>
                        </div>
                    </section>

                    <section class="data-section">
                        <div class="section-header" onclick="toggleSec(this)">
                            <div class="section-label">Salud y Datos</div>
                            <i class="fa-solid fa-chevron-down text-[10px] text-slate-300"></i>
                        </div>
                        <div class="space-y-4 hidden">
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="info-label">Nacimiento</label><input type="date" name="fecha_nacimiento" class="input-standard text-sm" onchange="calcAge(this.value)"></div>
                                <div><label class="info-label">Edad</label><input type="text" id="val-edad" readonly class="input-standard text-sm bg-slate-50"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="info-label">Sangre</label><select name="tipo_sangre" class="input-standard text-sm"><option value="O+">O+</option><option value="O-">O-</option><option value="A+">A+</option><option value="B+">B+</option></select></div>
                                <div><label class="info-label">Sexo</label><select name="sexo" class="input-standard text-sm"><option value="Hombre">Hombre</option><option value="Mujer">Mujer</option></select></div>
                            </div>
                            <label class="info-label">Alergias / Condiciones</label>
                            <textarea name="alergias" class="input-standard text-sm h-20 py-2"></textarea>
                        </div>
                    </section>

                    <section class="data-section">
                        <div class="section-header" onclick="toggleSec(this)">
                            <div class="section-label">Ubicación</div>
                            <i class="fa-solid fa-chevron-down text-[10px] text-slate-300"></i>
                        </div>
                        <div class="space-y-4 hidden">
                            <label class="info-label">Domicilio</label>
                            <input type="text" name="domicilio" id="inp-domicilio" class="input-standard text-sm" placeholder="Dirección...">
                            <div id="map-container"></div>
                        </div>
                    </section>

                    <section class="data-section">
                        <div class="section-header" onclick="toggleSec(this)">
                            <div class="section-label">Contacto</div>
                            <i class="fa-solid fa-chevron-down text-[10px] text-slate-300"></i>
                        </div>
                        <div class="space-y-4 hidden">
                            <label class="info-label">Celular</label>
                            <input type="tel" name="celular" class="input-standard text-sm">
                            <div class="flex justify-between items-center mt-2"><span class="text-[9px] font-black uppercase text-slate-400">Emergencias</span><button type="button" onclick="addItem('emergencias')" class="text-[8px] font-black uppercase text-red-900">+ Añadir</button></div>
                            <div id="container-emergencias" class="space-y-2"></div>
                        </div>
                    </section>
                </form>
            </div>
        </main>
    </div>

    <!-- OVERLAY CÁMARA -->
    <div id="camera-overlay">
        <div class="video-container">
            <video id="video-stream" autoplay playsinline muted></video>
        </div>
        <div class="camera-controls">
            <button onclick="stopCamera()" class="px-8 py-4 bg-white/10 text-white rounded-2xl font-black uppercase text-[10px]">Cerrar</button>
            <button onclick="capturePhoto()" id="btn-capture-now" class="px-12 py-4 bg-emerald-500 text-white rounded-2xl font-black uppercase text-[10px] shadow-xl flex items-center gap-3">
                <i class="fa-solid fa-camera"></i> Capturar Foto
            </button>
        </div>
    </div>
    <canvas id="photo-canvas" class="hidden"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, addDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCd4p8USmJeFOie1cJj0Hi80-z8IbLAGqU",
            authDomain: "cic6-pp-web.firebaseapp.com",
            projectId: "cic6-pp-web",
            storageBucket: "cic6-pp-web.firebasestorage.app",
            messagingSenderId: "248659087868",
            appId: "1:248659087868:web:a277ef700d83c7f1d22279"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'cic.pp';

        let currentUserData = null;
        let activeAssignment = null;
        let isSaving = false;
        let captureTarget = 'checkin';
        let map, marker, autocompletes = {};

        // --- AUTH ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                await loadUserProfile(user.uid);
                await findNextAssignment(user.uid);
                // Retrasar inicio de mapas para asegurar que Google API esté listo
                setTimeout(initGoogleMaps, 1000);
            } else {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
            }
        });

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Acceso Incorrecto"); }
        };

        window.handleLogout = () => { if(confirm("¿Desea cerrar sesión?")) signOut(auth); };

        // --- MAPS ---
        function initGoogleMaps() {
            try {
                if (typeof google === 'undefined') return;
                const inpDom = document.getElementById('inp-domicilio');
                if (!inpDom) return;
                autocompletes.domicilio = new google.maps.places.Autocomplete(inpDom, { fields: ["formatted_address", "geometry", "name"], types: ["address"] });
                map = new google.maps.Map(document.getElementById('map-container'), { zoom: 15, center: { lat: 25.68, lng: -100.31 }, mapTypeControl: false, streetViewControl: false });
                marker = new google.maps.Marker({ map: map });
                autocompletes.domicilio.addListener('place_changed', () => {
                    const place = autocompletes.domicilio.getPlace();
                    if (!place.geometry) return;
                    inpDom.value = place.formatted_address;
                    document.getElementById('map-container').style.display = 'block';
                    map.setCenter(place.geometry.location); marker.setPosition(place.geometry.location);
                    autoSave();
                });
            } catch (e) { console.warn("Google Maps no pudo iniciar:", e); }
        }

        // --- LOAD DATA ---
        async function loadUserProfile(uid) {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Usuarios', uid));
            if (snap.exists()) {
                currentUserData = snap.data();
                const avatar = currentUserData.foto || `https://ui-avatars.com/api/?background=450a0a&color=fff&name=${encodeURIComponent(currentUserData.nombre)}`;
                
                // Elementos del Header
                if(document.getElementById('user-avatar-top')) document.getElementById('user-avatar-top').src = avatar;
                if(document.getElementById('user-name-top')) document.getElementById('user-name-top').innerText = currentUserData.nombre;
                if(document.getElementById('user-role-top')) document.getElementById('user-role-top').innerText = currentUserData.puesto || "Operador";
                
                // Formulario de Perfil
                const form = document.getElementById('expediente-form');
                if (form) {
                    Object.keys(currentUserData).forEach(k => { if (form.elements[k]) form.elements[k].value = currentUserData[k]; });
                }
                
                // Visuales de la pestaña Perfil
                if(document.getElementById('profile-pic-edit')) document.getElementById('profile-pic-edit').src = avatar;
                
                const nameDisp = document.getElementById('profile-name-disp');
                if(nameDisp) {
                    if(nameDisp.tagName === 'INPUT') nameDisp.value = currentUserData.nombre;
                    else nameDisp.innerText = currentUserData.nombre;
                }
                
                if(document.getElementById('profile-puesto-disp')) document.getElementById('profile-puesto-disp').innerText = currentUserData.puesto || "OPERADOR";
                
                if(currentUserData.fecha_nacimiento) calcAge(currentUserData.fecha_nacimiento);
                loadGallery();
                initAutoSaveListeners();
            }
        }

        function initAutoSaveListeners() {
            const form = document.getElementById('expediente-form');
            if(!form) return;
            form.querySelectorAll('input, select, textarea').forEach(el => {
                el.addEventListener('change', autoSave);
            });
        }

        async function autoSave() {
            if (isSaving || !auth.currentUser) return;
            isSaving = true;
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if(dot) dot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";
            if(txt) txt.innerText = "Guardando";

            const form = document.getElementById('expediente-form');
            const payload = Object.fromEntries(new FormData(form).entries());
            
            // Sincronizar nombre del input de cabecera si se cambió
            const headerName = document.getElementById('profile-name-disp');
            if(headerName) payload.nombre = headerName.value;

            payload.emergencias = Array.from(document.getElementById('container-emergencias').children).map(card => {
                const obj = {};
                card.querySelectorAll('[data-key]').forEach(f => obj[f.getAttribute('data-key')] = f.value);
                return obj;
            });

            payload.foto = document.getElementById('profile-pic-edit').src;

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Usuarios', auth.currentUser.uid), payload);
                setTimeout(() => {
                    if(dot) dot.className = "w-2 h-2 rounded-full bg-emerald-500";
                    if(txt) txt.innerText = "Sincronizado";
                    isSaving = false;
                }, 1000);
            } catch (e) { isSaving = false; }
        }

        // --- ASIGNACIONES ---
        async function findNextAssignment(uid) {
            document.getElementById('assignment-loading').classList.remove('hidden');
            document.getElementById('assignment-data').classList.add('hidden');
            const shifts = ['matutino', 'vespertino', 'nocturno'];
            let found = false;

            for (let i = 0; i < 7; i++) {
                const d = new Date();
                if (d.getHours() >= 0 && d.getHours() < 5) d.setDate(d.getDate() - 1);
                d.setDate(d.getDate() + i);
                const dateId = d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '');
                const displayDate = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

                for (const s of shifts) {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'RegAs', dateId, s, uid));
                    if (snap.exists()) {
                        const data = snap.data();
                        if (i === 0 && data.salida_real) continue;
                        activeAssignment = { shiftId: s, data, dateId };
                        document.getElementById('checkin-label-top').innerText = i === 0 ? "Asignación de Hoy" : "Próxima Asignación";
                        document.getElementById('current-date-txt').innerText = displayDate;
                        document.getElementById('assign-date').innerText = displayDate.toUpperCase();
                        document.getElementById('assign-shift').innerText = s;
                        document.getElementById('assign-booth').innerText = data.Caseta;
                        document.getElementById('assign-time').innerText = `${data.entrada_planificada} hrs`;
                        document.getElementById('real-time').innerText = data.entrada_real ? `${data.entrada_real} hrs` : '--:--';
                        
                        document.getElementById('checkin-action-zone').classList.toggle('hidden', !!data.entrada_real);
                        document.getElementById('checkin-success-msg').classList.toggle('hidden', !data.entrada_real);
                        found = true; break;
                    }
                }
                if (found) break;
            }
            document.getElementById('assignment-loading').classList.add('hidden');
            if (found) document.getElementById('assignment-data').classList.remove('hidden');
            else document.getElementById('assignment-empty').classList.remove('hidden');
        }

        // --- CÁMARA Y CAPTURA ---
        let stream = null;
        window.startBiometricCheck = () => { captureTarget = 'checkin'; openCamera(); };
        window.openCameraGallery = () => { captureTarget = 'gallery'; openCamera(); };

        async function openCamera() {
            const overlay = document.getElementById('camera-overlay');
            overlay.style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                document.getElementById('video-stream').srcObject = stream;
            } catch (e) { alert("Error cámara"); stopCamera(); }
        }

        window.stopCamera = () => { if (stream) stream.getTracks().forEach(t => t.stop()); document.getElementById('camera-overlay').style.display = 'none'; };

        window.capturePhoto = async () => {
            const video = document.getElementById('video-stream');
            const canvas = document.getElementById('photo-canvas');
            canvas.width = 480; canvas.height = 640;
            canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
            const b64 = canvas.toDataURL('image/jpeg', 0.6);
            stopCamera();
            if (captureTarget === 'checkin') await processCheckIn(b64);
            else await processGalleryAdd(b64);
        };

        async function processCheckIn(photoB64) {
            const btn = document.getElementById('btn-register');
            btn.disabled = true; btn.innerText = "Geolocalizando...";
            let locStr = "No disponible";
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
                locStr = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            } catch (e) {}

            try {
                const { dateId, shiftId, data: orig } = activeAssignment;
                const uid = auth.currentUser.uid;
                const nowTime = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false });
                
                await addDoc(collection(db, 'artifacts', appId, 'users', uid, 'fotos'), { foto: photoB64, fecha: dateId, createdAt: serverTimestamp() });
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'Usuarios', uid, 'Fotos'), { photoData: photoB64, timestamp: new Date().toISOString() });

                const [pH, pM] = (orig.entrada_planificada || "07:00").split(':').map(Number);
                const isLate = new Date() > new Date().setHours(pH, pM, 0);

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'RegAs', dateId, shiftId, uid), {
                    entrada_real: nowTime, retardo: isLate, foto_evidencia: photoB64, ubicacion_checador: locStr
                });

                document.getElementById('real-time').innerText = `${nowTime} hrs`;
                document.getElementById('checkin-action-zone').classList.add('hidden');
                document.getElementById('checkin-success-msg').classList.remove('hidden');
            } catch (e) { alert("Fallo al registrar entrada"); btn.disabled = false; }
        }

        async function processGalleryAdd(photoB64) {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'Usuarios', auth.currentUser.uid, 'Fotos'), { photoData: photoB64, timestamp: new Date().toISOString() });
        }

        function loadGallery() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Usuarios', auth.currentUser.uid, 'Fotos'), snap => {
                const grid = document.getElementById('gallery-grid');
                if(!grid) return;
                grid.innerHTML = '';
                snap.forEach(d => {
                    const pic = d.data();
                    const div = document.createElement('div'); div.className = "gallery-thumb";
                    div.innerHTML = `<img src="${pic.photoData}" class="w-full h-full object-cover">`;
                    div.onclick = () => { if(confirm("¿Usar como foto principal?")) { document.getElementById('profile-pic-edit').src = pic.photoData; autoSave(); }};
                    grid.appendChild(div);
                });
            });
        }

        // --- UTILS ---
        window.toggleSec = (el) => { const c = el.nextElementSibling; c.classList.toggle('hidden'); el.querySelector('i').classList.toggle('rotate-180'); };
        window.switchTab = (tab) => {
            document.getElementById('view-checkin').classList.toggle('hidden', tab !== 'checkin');
            document.getElementById('view-profile').classList.toggle('hidden', tab !== 'profile');
            document.getElementById('tab-checkin').classList.toggle('active', tab === 'checkin');
            document.getElementById('tab-profile').classList.toggle('active', tab === 'profile');
        };
        window.calcAge = (d) => { if(!d) return; const y = Math.floor((new Date() - new Date(d)) / 31557600000); const val = document.getElementById('val-edad'); if(val) val.value = `${y} años`; };
        window.addItem = (type) => {
            const div = document.createElement('div'); div.className = "sub-item-card animate-fade";
            div.innerHTML = `<div class="grid grid-cols-2 gap-3"><input type="text" class="input-standard text-xs col-span-2" placeholder="Nombre/Parentesco" data-key="nombre"><input type="tel" class="input-standard text-xs col-span-2" placeholder="Teléfono" data-key="telefono"></div><button type="button" onclick="this.parentElement.remove(); autoSave();" class="absolute top-2 right-2 text-red-200">✕</button>`;
            document.getElementById(`container-${type}`).appendChild(div);
            div.querySelectorAll('input').forEach(el => el.addEventListener('change', autoSave));
        };
        function restoreItem(type, values) {
            addItem(type);
            const card = document.getElementById(`container-${type}`).lastElementChild;
            Object.keys(values).forEach(key => { const f = card.querySelector(`[data-key="${key}"]`); if (f) f.value = values[key]; });
        }
    </script>
</body>
</html>
